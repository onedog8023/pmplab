<style>
:root {
  --navy:    #0d1b2a;
  --navy-mid:#152336;
  --navy-lt: #1e3a5f;
  --gold:    #c9a84c;
  --gold-lt: #e8c96a;
  --cream:   #f5f0e8;
  --white:   #ffffff;
  --gray-1:  #8a9bb0;
  --gray-2:  #c4cdd8;
  --border:  rgba(201,168,76,0.25);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
  background: var(--navy);
  color: var(--cream);
  line-height: 1.8;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ── NAV ─────────────────────────────── */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px; height: 72px;
  background: rgba(13,27,42,0.88);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { display: flex; align-items: center; gap: 14px; text-decoration: none; }
.nav-logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold-lt));
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif SC', serif;
  font-weight: 700; font-size: 18px; color: var(--navy);
}
.nav-logo-name { font-family: 'Noto Serif SC', serif; font-weight: 600; font-size: 17px; color: var(--cream); letter-spacing: 2px; }
.nav-logo-sub { font-size: 10px; font-weight: 300; color: var(--gray-1); letter-spacing: 3px; display: block; margin-top: -2px; }
.nav-links { display: flex; gap: 32px; list-style: none; }
.nav-links a { text-decoration: none; color: var(--gray-2); font-size: 14px; font-weight: 400; letter-spacing: 1px; transition: color 0.25s; position: relative; }
.nav-links a:hover { color: var(--cream); }
.nav-cta { padding: 8px 22px; border: 1px solid var(--gold); color: var(--gold) !important; border-radius: 4px; font-size: 13px; letter-spacing: 1px; transition: background 0.25s, color 0.25s !important; }
.nav-cta:hover { background: var(--gold) !important; color: var(--navy) !important; }

/* ── HERO IMAGE ──────────────────────── */
.article-hero {
  width: 100%;
  aspect-ratio: 16/9;
  max-height: 520px;
  background-size: cover; background-position: center;
  position: relative; margin-top: 72px;
}
.article-hero::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(13,27,42,0.3) 0%, rgba(13,27,42,0.85) 100%);
}
.article-hero-placeholder {
  width: 100%; height: 320px; margin-top: 72px;
  background: linear-gradient(135deg, var(--navy-lt) 0%, var(--navy-mid) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 64px; opacity: 0.3;
}

/* ── ARTICLE WRAPPER ────────────────── */
.article-wrap {
  max-width: 860px; margin: 0 auto;
  padding: 0 24px;
}

/* ── ARTICLE HEADER ─────────────────── */
.article-header { padding: 56px 0 40px; }
.article-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.article-tag {
  display: inline-block; padding: 3px 12px;
  background: var(--gold); color: var(--navy);
  font-size: 11px; font-weight: 600; letter-spacing: 2px; border-radius: 2px;
}
.article-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(26px, 4vw, 40px); font-weight: 700;
  line-height: 1.3; color: var(--cream);
  letter-spacing: 2px; margin-bottom: 28px;
}
.article-meta {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.article-meta-item { font-size: 13px; color: var(--gray-1); letter-spacing: 1px; }
.article-meta-sep { color: var(--border); }
.article-source-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; background: rgba(201,168,76,0.12);
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; color: var(--gold); letter-spacing: 1px;
}

/* ── SUMMARY ─────────────────────────── */
.article-summary {
  background: rgba(201,168,76,0.06);
  border-left: 3px solid var(--gold);
  border-radius: 0 8px 8px 0;
  padding: 24px 28px; margin: 40px 0;
}
.article-summary-label {
  font-size: 11px; color: var(--gold); letter-spacing: 3px;
  font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.article-summary-label::before { content: '◆'; font-size: 8px; }
.article-summary-text {
  font-size: 15px; color: var(--gray-2); line-height: 2;
  font-weight: 300;
}

/* ── ARTICLE BODY ───────────────────── */
.article-body {
  font-size: 15px; color: var(--gray-2); line-height: 2.2;
  font-weight: 300;
  padding-bottom: 64px;
}
.article-body p { margin-bottom: 1.5em; }
.article-body p:first-child { text-indent: 2em; }
.article-body h1, .article-body h2, .article-body h3 {
  font-family: 'Noto Serif SC', serif;
  color: var(--cream); font-weight: 700; line-height: 1.3;
}
.article-body h1 { font-size: 24px; margin: 40px 0 20px; letter-spacing: 2px; }
.article-body h2 { font-size: 20px; margin: 32px 0 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.article-body h3 { font-size: 17px; margin: 24px 0 12px; color: var(--gold-lt); }
.article-body strong { color: var(--cream); font-weight: 600; }
.article-body em { font-style: italic; color: var(--gold-lt); }
.article-body ul, .article-body ol { margin: 16px 0 20px 24px; }
.article-body li { margin-bottom: 8px; }
.article-body blockquote {
  margin: 28px 0; padding: 20px 24px;
  background: rgba(201,168,76,0.05);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  color: var(--gray-2); font-style: italic;
}
.article-body hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }
.article-body code {
  background: rgba(201,168,76,0.1); padding: 2px 6px;
  border-radius: 3px; font-size: 13px; color: var(--gold-lt);
}

/* ── ARTICLE FOOTER ─────────────────── */
.article-footer {
  border-top: 1px solid var(--border);
  padding: 40px 0 80px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;
}
.article-back-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 12px 24px; border: 1px solid var(--border);
  color: var(--gray-2); font-size: 13px; letter-spacing: 1px;
  text-decoration: none; border-radius: 4px;
  transition: border-color 0.25s, color 0.25s;
}
.article-back-btn:hover { border-color: var(--gold); color: var(--cream); }
.article-source-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; background: var(--gold);
  color: var(--navy); font-size: 13px; font-weight: 600;
  letter-spacing: 1px; text-decoration: none; border-radius: 4px;
  transition: background 0.25s, transform 0.2s;
}
.article-source-btn:hover { background: var(--gold-lt); transform: translateY(-2px); }

/* ── NOT FOUND ───────────────────────── */
.not-found {
  text-align: center; padding: 120px 24px;
  font-family: 'Noto Serif SC', serif;
}
.not-found-icon { font-size: 64px; opacity: 0.4; margin-bottom: 24px; }
.not-found-title { font-size: 28px; color: var(--cream); margin-bottom: 12px; }
.not-found-text { font-size: 14px; color: var(--gray-1); }

/* ── LOADING ─────────────────────────── */
.loading-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 16px;
}
.loading-spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--gray-1); letter-spacing: 2px; }

/* ── RESPONSIVE ─────────────────────── */
@media (max-width: 960px) {
  .nav { padding: 0 24px; }
  .nav-links { display: none; }
  .article-wrap { padding: 0 20px; }
  .article-hero { height: 240px; }
  .article-title { font-size: 24px; }
}
@media (max-width: 600px) {
  .article-hero { height: 240px; }
  .article-meta { gap: 10px; }
}
</style>

  var EMBEDDED_ARTICLES = [{"id": "recvgm1202fgJl", "title": "上海市“十五五”规划专家确认：轨交“外环”正在建设！上海还能比现在“大”得多", "categories": ["专家视点"], "cover_url": "'covers//covers/recvgm1202fgJl.jpg", "date": "2026-04-10", "author": "上观新闻", "author_unit": "上观新闻", "source": "微信公众号：上观新闻", "summary": "众所周知，陆铭一直关注大城市发展。他的代表作《大国大城》，核心观点就是：一个国家的人口和经济，会逐渐向城市群集中，在城市群内部则会逐渐向大城市周围的都市圈集中。陆铭也关心乡村。在问答网站知乎上，他有一条高赞回答，是讲 “ 大山深处的农村该怎么发展 ”。他说： “ 如果当地有卖得出去的东西（包括旅游资源），就把路修进去，如果没有，就把人搬出来。", "content": "众所周知，陆铭一直关注大城市发展。他的代表作《大国大城》，核心观点就是：一个国家的人口和经济，会逐渐向城市群集中，在城市群内部则会逐渐向大城市周围的都市圈集中。 陆铭也关心乡村。在问答网站知乎上，他有一条高赞回答，是讲 “ 大山深处的农村该怎么发展 ” 。他说： “ 如果当地有卖得出去的东西（包括旅游资源），就把路修进去，如果没有，就把人搬出来。 ” 两者的逻辑是共通的：所有的生产要素和资源，应当根据发展的需要，破除壁垒、自由流动、优化配置。一个明确的方向是，把中心城市做大、优势地区做强，形成了规模效应，方能带动周边发展、提高整体效率。 这也是一个 “ 做大蛋糕 ” 的过程 。在与解放日报 ·上观新闻观见工作室的对话中， 陆铭 不止一次 强调，今天的地区与地区之间，必须是合力 “ 做蛋糕 ” ，而不是斤斤计较地 “ 分蛋糕 ” 。能否打破 “ 分蛋糕 ” 的传统观念，将直接影响全局。 2020 年 8 月 24 日，习近平总书记就 “ 十四五 ” 规划编制主持召开经济社会领域专家座谈会，陆铭是现场参会发言的专家之一。当时陆铭提出，在城乡和区域发展方面，如果人口、土地、空间等体制性结构性问题得以解决，将能产生巨大的 “ 制度红利 ” 。 五年后的今天，陆铭被聘请为国家 “ 十五五 ” 发展规划专家委员会专家。在他看来，五年前提到的那些问题能否继续突破，仍是未来五年中国发展的关键。 而上海这座中国最大的经济 “ 大城 ” ，也需要在更大的格局中考量自己的位置 —— 换一个参照系，对很多问题的理解和对策，都会大不一样。 【对话嘉宾】陆铭：全国政协委员，民建上海市委会副主委，上海市“十五五”规划专家咨询委员会专家，上海交通大学安泰经济与管理学院特聘教授、上海交通大学中国发展研究院院长，上观智库特聘顾问。 从都市圈角度 上海还能 “ 大 ” 得多 观见： 上海一直被称作 “ 大上海 ” ，但这些年，大家对上海的人口、土地等，有许多新的议论。从你的 “ 大国大城 ” 视角看，上海够大了吗？ 陆铭： 最大最基本的问题是，什么叫上海？我们到底怎么看上海的定位？应该用什么样的视野来理解上海？ 首先明确一点，中国现在面临激烈的国际竞争，国家的竞争力来自哪里？来自长三角、珠三角这些条件最好的优势地区。要发挥出这样的优势，必须有一个强大的增长极，也就是大城市跟周边的中小城市连成片，一体化发展的都市圈。 我们从研究中得到结论，一个城市群的中心城市跟外围之间，是存在辐射带动作用的。 中心城市如果做小了，龙头就做小了，城市群的发展动力没有了。 中国的城市过去都是行政管辖的概念。我们看城市的竞争力，要从都市圈去看，跟国外的城市比，也要从都市圈的角度去比。从行政管辖区域看，上海的规模似乎已经很大了。但从都市圈的角度，上海还可以大得多，上海发挥的作用也应该大得多。 观见： 也就需要一个新的参照系？ 陆铭： 很多数字的算法要变一变。比如人口。大家一直说上海好像人口太多了，但看看东京都市圈，超过 3700 万；国内的广州和佛山，两座紧密连接的城市人口加起来已经达到 2800 万。广佛的关系其实就像上海的浦西和浦东的关系，是一个紧密的一体化的都市圈概念。深圳和东莞，两座城市面积相加只有上海的 2/3 ，但它的人口也是 2800 万。这几个都市圈出什么问题了吗？好像没有。不仅没有出问题，还给本地和周边地区带来了强大的经济发展动力。 又比如轨道交通， 大家一直说上海是轨交最长的城市，我提了很多次，不要老是这么讲，这不科学。 因为上海是一个行政管辖概念的城市，是不能和国外的单个城市这样比较的。光看总量，如果把上海和毗邻的中小城市甚至苏州全部算进来，在这个范围内打包统计所有的轨道交通、包括高铁，我们的总里程比东京都市圈要少差不多 1000 公里。 观见： 并且他们的密度更高。 陆铭： 不要简单地比长度，要比密度，要比开发的强度。 现在更紧迫的问题是土地。东京都市圈，以皇居为中心，东京都市圈整个城市建设半径大概是50- 80 公里。这个距离放到上海，相当于从人民广场分别到了昆山和苏州市中心。同样的范围，从自然条件看，我们比他们好很多 —— 我们都是平原，他们有大量的山地；我们几乎没有自然灾害，他们则处于地震带上。但是东京都市圈集聚了超过 3700 万的人口，上海与紧邻的江浙中小城市形成的潜在都市圈人口约为 3100 万，上海的人口是大约 2500 万，比他们少。为什么？土地开发强度不够。 东京都市圈在山地很多的情况下，开发强度还达到了 33 ％，这样的开发，似乎也没有带来环境破坏、不宜居、交通拥堵等负面影响。 而我们在面积相当、条件更好的范围内的土地开发强度只有约30％。 观见： 一提到开发强度，大家就想到各种各样的 “ 红线 ” 。很长时间以来一直有一种观念，上海这样的城市建设用地已经所剩无几了。 陆铭： 一定程度上 ， 过去的“红线”更多是根据行政辖区概念来的，根据都市圈发展态势，我们是否应该在整个都市圈范围内考虑城市建设用地的供应？现在普遍的说法是，一个城市的建设用地不能突破市域面积的50%。但如果从都市圈的范围来进行规划，作为中心城市的这个地区为什么要维持50％的开发强度？为什么不能是51％、55％甚至是60％？ 我的意思是， 对于每一个“天花板”，恐怕都应该有更严肃的理论基础。 比如现在，我们是不是可以考虑，中心城区往外延伸的轨交和高速公路沿线土地，有更高强度开发？就算在50公里半径的都市圈范围内提高到33％，也还有大量的余地。这可以有极大突破。 要大胆地投，不要怕没需求 观见： 从目前看，高强度开发可以从哪里着手？ 陆铭： 都市圈有两种形态，一种我称之为 “ 八爪鱼 ” ，从中心城区沿着轨道交通和高速公路沿线高强度开发，天然地是一体化的，东京都市圈就是代表。另一种是 “ 中心城区 + 卫星城 ” 的模式，我称为“太阳系”，虽然中心城和新城之间也有高速公路和轨道交通的连接，但沿线的土地开发强度实际上不高，很多是农田，中国的城市圈往往是这样的。在后一种模式下，如果轨道交通和高速公路沿线土地可以优先进行高强度开发，对一体化发展也有很大的好处。 观见： 但也有人会质疑，高强度的开发意味着大量的成本，事实上有这么大的需求吗？ 陆铭： 最近关于五个新城的发展规模上有些争论，有人说，（五个新城）不要做太大了，实事求是一点。我的看法不一样。上海都市圈要做大，上海管辖范围内的地方当然要做大，五个新城的区位正好是连接中心城区和周边的节点上，落子是没有问题的。关键是怎么理解。 比如人口，不能理解成“中心城区的人往外搬”来发展新城。 在整个上海服务业占比越来越高，人口有重返中心城区的趋势下，“搬人口”是违反市场规律的，可能是做不成的。五个新城要做成，必须想方设法引进新的人口做增量，让它成为突破人口天花板的一个空间。考虑土地、交通布局等，都是如此。 观见： 你的意思是，需要一定的超前布局？ 陆铭： 我一直觉得，应该规划先行，要敢于从未来的需求着手来布局，而不只是看现在有多少。并且，当我们把数据打开来分析，对需求的理解就会不一样。 再拿地铁来说，上海地铁的里程的确很长了，但至少有几个问题。第一，中心城区的轨交密度还不够。我最近看了一个内环和中环中间的房子，说是 “ 三轨交界处 ” ，实际上步行到周边任意一个轨道交通站点都至少需要 20 分钟。但在东京、巴黎，中心城区的地铁站密度是更高的 。 第二，郊区仍未形成网格化的轨交网络。当然最近已经有向好的趋势， 我们在建一个轨交的外环， 还有一些城际铁路通往郊区和相邻城市。 但青浦、嘉定，更不要说奉贤、金山，轨道交通的覆盖率还是不够的。机场联络线去年底开通后，成了通勤线，就很说明问题，说明人们有大量的需求。 所以我始终觉得， 上海的地铁可以大胆去投，不会没有人坐的。 金山、奉贤，如果思路打开，我们不说全域开发，就打造几个新城，围绕轨交布局产业，在站点附近做工业园、产业园，绝对做得起来。不要不敢建，不建，只会限制城市的容量。 然后，人口的控制又反过来限制了做基础设施投资的空间。 观见： 成本问题怎么解决？ 陆铭： 靠制度。香港地铁是挣钱的，是通过地铁上盖建筑的租金覆盖成本，它的容积率很高，功能很多样。相比之下，上海轨交站点上面的上盖建筑，以及轨交站点附近的建筑物，容积率是不够的。另外，我们的土地用途里面，产业用地、商业用地、住宅用地、基础设施用地，分得太清楚。现代化城市里，可不可以下面轨交、上面商业、再上面居住？如果可以，形成立体开发格局，不管对轨交利用率还是城市活化，都有巨大作用。 观见： 上面这些都涉及很多政策突破，短期内能落地吗？ 陆铭： 从国家角度，保障优势地区要素供给，已经是个明确的方向。我们当然要抓住这样的机会。就算政策不变，上海也有很多现有的政策可以用。比如农业用地转建设用地，如果是用于重大工程，国家允许先使用后报备。上海有很多重大工程，土地供应完全可以突破，而不是受制于自己红线的划定。 一体化，就要摆脱“分蛋糕”思维 观见： 从一体化、都市圈的角度看大城市，一方面要看它本身的规模，一方面还更要看它的带动力，看它跟周边城市之间的关系。大城市的辐射能力很强，但从有辐射能力到真正释放辐射效应，是否还要突破一些障碍？ 陆铭： 我们现在从上海开车往江苏跑，一个非常明显的现象是，到了省界，上海这边是农田，江苏这边就是高楼大厦。全国不止一个超大城市和周边城市之间，存在这种现象。在我看来，这样的现象只应该存在于国家与国家的边界上，比如美国跟墨西哥。一国之内的城市之间，是不应该出现这种分割现象的。 那么为什么会这样？源自于过去一个主流想法——肥水不流外人田。大家总觉得，如果我们和周边城市的基础设施连接得特别好，土地连片开发，我们的资源就流到外地去了。 这个想法背后，是一个思维的误区，就是觉得大家是在“分蛋糕”。 好像我给你多分一点，我就少了，你给我多分一点，你就少了，大城市发展慢下来一点，产业、资源就能到中小城市去了。这是不对的。 “ 十五五 ” 时期上海比较紧迫的事情，就是尽快推都市圈规划，跟周边中小城市形成一体化发展的态势，破题可以从沪苏同城化开始。 观见： 前不久召开的长三角主要领导人座谈会，就强调了都市圈同城化。过去与上海相邻的城市一直有个口号叫 “ 对接大上海 ” ，似乎他们对 “ 同城化 ” 更积极、更渴切。现在是否到了上海更主动的时候？ 陆铭： 首先从思维方式上，同城化也好、对接也好， 不能单纯理解为“把你的产业搬到我这里来”。这不是对接。真正要追求的是，在规划上、土地供应上、基础设施上充分对接，并且相互形成产业链上下游分工。 最近的华为就是个非常好的例子，华为研发总部是落在上海境内的，但对临近的江苏省内区域，在房地产、消费等方面都产生了拉动作用。还有生物医药产业，越来越多的医药研发在上海做，但生产基地落到苏州或者江苏其他地方。这就是通过产业链上下游的合理分工，形成中心城市与周边中小城市的梯度发展格局，就不是 “ 分蛋糕 ” 思维了。 观见： 是共同 “ 做蛋糕 ” 。 陆铭： 现在国家也在讲统一大市场，地方政府破除恶性竞争式的招商引资，如果往这个方向，上海要主动对接周边中小城市，要主动去牵头分工合作。这个结果一定是共赢的。 我们看一下长三角，全世界还有哪个地方有这样的优势？在制造业大国，加一条能当海来用的长江，国内是长江的龙头，国际是亚太城市带的中间节点。可以说，在自然条件方面，纽约、东京、欧洲的一些大城市，都比我们差远了。有这么好的条件，在长三角城市群内部，几个城市之间就能有一条完整的产业链，这件事做好了，再加上珠三角，全球范围内制造业就稳在中国了，哪怕劳动力成本、土地成本再提升一点，我们的市场一体化的优势也可以抵消部分成本。 “ 一盘棋 ” 要解决动力机制 观见： 你的这些观点说的是上海和长三角，其实适用于全国很多地方，把优势地区进一步做大，也需要全国性的政策支持。 “ 十四五 ” 前夕，你曾反复呼吁解决经济资源空间错配问题，现在中央已经明确提出 “ 增强土地要素对优势地区高质量发展的保障能力 ” ，如果为 “ 十五五", "url": "https://mp.weixin.qq.com/s/hf8SulhtXhMK9cJVurj37Q"}, {"id": "recvgfiJOu9ONw", "title": "上海迪士尼迎泼天流量背后，解码全球品牌与中国市场的“同频成长”", "categories": ["本埠热点"], "cover_url": "'covers//covers/recvgfiJOu9ONw.jpg", "date": "2026-04-09", "author": "唐玮婕", "author_unit": "文汇报经济部记者", "source": "上观新闻", "summary": "\"原汁原味迪士尼，别具一格中国风\"已融入上海迪士尼的每一处细节。中国国际经济交流中心发布报告，深入剖析上海迪士尼度假区十年本土化运营的成长路径。报告指出，上海迪士尼把中国文化深度融入建筑设计、故事讲述、节庆活动等各个维度，本土原创IP玲娜贝儿更是现象级成功。截至2025年10月，上海迪士尼累计接待游客突破1亿人次，2024年接待游客达1470万人次，稳居全球主题乐园排行榜第五位，生动诠释全球品牌与中国市场的\"同频成长\"释放出的强劲活力。", "content": "截至2025年10月，上海迪士尼乐园累计接待游客已突破1亿人次；乐园的带动效应持续外溢，以此为主要景点的上海国际旅游度假区去年客流量再创新高，全年接待游客达2616万人次……\n\n这般泼天流量的背后，究竟藏着什么密码？中国国际经济交流中心昨天发布题为《\"原汁原味迪士尼，别具一格中国风\"国际品牌本土化运营的成功实践——以上海迪士尼度假区十年发展为例》的报告，深入剖析一座主题乐园深度本土化运营的成长路径。\n\n把中国文化深度融入乐园各个维度\n\n2011年4月8日，在上海迪士尼度假区的破土动工仪式上，\"原汁原味迪士尼，别具一格中国风\"理念被首次提出。报告分析认为，上海迪士尼并未停留于表层文化符号的借用，而是努力把中国文化深度融入建筑设计、故事讲述、节庆活动、餐饮体验、服务设计及IP开发等各个维度，尝试与中国游客建立深厚的情感联结。\n\n本土原创IP玲娜贝儿正是其中的一个生动例证。上海迪士尼延续了迪士尼标志性的故事讲述和沉浸式体验的传统，充分融合本地消费者的深层需求与偏好，由此成就了玲娜贝儿的现象级成功。玲娜贝儿亮相前，度假区团队展开了深入的中国市场调研，捕捉到一系列既能戳中中国消费者\"萌点\"，又能与消费者建立情感联结的元素。\n\n与此同时，上海迪士尼积极助力上海非物质文化遗产的传承与推广。自2024年起，度假区与上海沪剧院携手，在达菲月呈现特别演出，让独具魅力的迪士尼娱乐体验与海派文化韵味充分融合。\n\n在上海财经大学商学院教授何建民看来，\"原汁原味迪士尼，别具一格中国风\"的精髓就是要把全球先进的文化创意IP、迪士尼的运营管理模式和中国本地实际情况深度结合起来，更好满足不同游客的实际需求。\n\n上海迪士尼度假区总裁及总经理包兆天表示：\"自项目伊始，上海迪士尼度假区就在探索打造一个让迪士尼神奇与中华文化的深厚底蕴相交融之地。'原汁原味迪士尼，别具一格中国风'的愿景早已融入游客体验的每一处细节，助力度假区与游客建立起情感共鸣。\"\n\n助力上海打造世界知名旅游目的地\n\n报告提到，作为中国服务业迄今规模最大的中外合资项目之一，上海迪士尼度假区不仅是一个热门的旅游目的地，更是国际交流的重要平台。度假区已在设计、建筑及运营管理等方面广泛开展国际合作，推动知识与技术的交流，促进全球协作与创新。这也彰显了上海迪士尼作为\"人文交流\"重要实践范例的独特价值。\n\n值得一提的是，从连续第12年参与上海旅游节，到推出迪士尼×F1\"奇速全开\"体验……上海迪士尼\"高频\"参与上海各类重大文化与体育活动，助力城市打造世界知名旅游目的地，并成为中国入境旅游第一站。\n\n\"15年前，上海一家最主要的主题乐园年接待人次为300万；而如今，我们早已拥有了上海迪士尼、海昌海洋公园、上海乐高乐园等多家各具特色的主题乐园，\"何建民记者，2024年上海迪士尼乐园接待游客达到了1470万人次，稳居全球主题乐园排行榜第五位，\"迪士尼成了上海吸引全球游客的一张'世界名片'。\"\n\n报告还显示，得益于国际游客来华便利化政策等红利，度假区入境客流量显著增长。例如，有韩国游客专门利用周末飞来上海，将上海迪士尼乐园与其他旅游景点一同列为打卡目的地。上海迪士尼的海外游客占比持续攀升，其中来自马来西亚、泰国、新加坡等周边地区的游客增长尤为显著，日本和韩国游客的占比也呈上升态势。\n\n2026年，上海迪士尼度假区迎来十周年，并迈入全新扩建阶段。度假区将新增蜘蛛侠主题园区、两家全新主题酒店，并升级现有景点。度假区开幕以来首个十年的深度本土化运营实践，正生动诠释全球品牌与中国市场的\"同频成长\"释放出的强劲活力。", "url": "https://www.shobserver.cn/news/detail?fm=app&id=1093805"}, {"id": "recvgfjlZjyE3e", "title": "解·析｜CDS落地上海，迈出沪港合作新一步", "categories": ["本埠热点"], "cover_url": "'covers//covers/recvgfjlZjyE3e.jpg", "date": "2026-04-09", "author": "倪外", "author_unit": "上观新闻记者", "source": "上观新闻", "summary": "香港大学张江基地正式启用，率先引入香港大学计算与数据科学学院（CDS），打造世界级科研与人才培养平台。CDS落地上海，展现出沪港联动为国育才、选才、用才的新气象。依托张江科学城完善的创新生态与产业配套，CDS有望在促进产学研深度融合上实现更多突破，催生起带有张江特质的硅谷式创新创业生态环境。沪港两地可以在发挥各自优势的基础上，不断提升合作强度、创新浓度和高质量发展程度，深化沪港合作，更好服务于创新型国家建设。", "content": "日前，香港大学张江基地正式启用，率先引入香港大学计算与数据科学学院（CDS），打造世界级科研与人才培养平台。上海“十五五”规划纲要强调，引进世界一流教育资源和创新要素，支持境外高水平理工类大学来沪合作办学，加强国际科研合作。CDS落地上海，展现出沪港联动为国育才、选才、用才的新气象，跳跃着深化沪港合作、推动高质量发展的时代脉动。\n\n打造硅谷式创新创业生态环境——\n\n21世纪，金融和科技成为全球竞争的关键领域，对高端人才的素质、规模与结构提出了更高的要求。CDS落地上海，预计会带来130多位数据科学、人工智能、统计决策科学、金融科技及精算科学等领域的专家学者，超过200名本科及研究生，以及元宇宙创新实验室、企业级GPU（图形处理器）等先进教学资源。国际化的教育、研究、交流与合作以及国际知名高校的人才培养模式与经验，在日趋保守的国际科研交流环境中，有望进一步丰富上海的高等教育资源，并提供一个近距离观察全球前沿发展态势的窗口。\n\n香港大学张江基地所在的张江科学城，是上海建设国际科创中心的核心引擎之一。这里集聚了众多国家实验室和基地、大科学设施等各类研发机构以及100多个孵化器，初步构建起“科创策源—成果转化—创新生态—企业成长—科学普及”的“科创五环”体系。依托浦东叠加的引领区、自贸试验区、综合改革试点等国家战略优势以及张江完善的创新生态与产业配套，CDS有望在促进产学研深度融合上实现更多突破，催生起带有张江特质的硅谷式创新创业生态环境，助力建设教育强国、科技强国、人才强国。\n\n比如，张江科学城以生物医药、人工智能、集成电路三大先导产业为核心，集聚了2万多家企业。高科技产业集群和行业领先企业为CDS科研及教学奠定扎实的产业基础。\n\n又如，CDS通过张江科学城进一步融入国家科研体系。张江科学城作为综合性国家科学中心之一，集聚世界一流的重大科技基础设施集群，构建跨学科、跨领域的协同创新网络，开展交叉前沿领域关键基础科学研究。通过参与重大科学装置建设、联合重大科技项目攻关等，CDS可以更深入地理解、把握与服务国家科创战略。\n\n从更宏观的角度看，香港的一大优势和特点是国际化的创新资源整合能力，以国际通行的创新规则、标准、机制等制度软环境为基础，集聚全球顶尖的研发人才，创办全球顶级水平的实验室，进而在全球范围内组织、布局或集聚研发资源与创新要素。“十五五”时期，沪港两地可以在发挥各自优势的基础上，深入探索重大科技项目联合攻关、国际化科技专利交易与市场转化、创新人才培育与交流、科技金融与创投资本融通等多领域、多层面的合作，不断提升合作强度、创新浓度和高质量发展程度。\n\n在上海（长三角）国际科技创新中心、粤港澳大湾区国际科技创新中心的联动发展中，还有必要积极打造“上海创新”+“香港服务”、“香港创意”+“上海产业”等合作模式，引领传统的基于产业链上下游的垂直式分工合作转向基于创新链、功能链的水平式分工合作，更好服务于创新型国家建设。\n\n深化沪港合作，下一步有哪些发力重点——\n\n先看营商环境发展示范。\n\n深化沪港合作，以市场经济规则与制度为最大公约数。“十五五”时期，上海可以学习、借鉴香港打造一流营商环境的经验，有序开放相关行业准入类型及门槛限制，并在法律适用、资质认证、规则对接等方面构建更适合高科技企业孕育、发展与引进的政策体系与制度环境，继而吸引全球创新资本、企业、人才和技术等进入长三角市场，全面提升区域经济发展能级和质量。\n\n面向全球，标准竞争不弱于技术竞争，其实质是争夺产业制高点。经验表明，标准和知识产权交易需要依托严格的市场机制与法律体系。香港的市场经济体系、法律体系、商事规则以及专业的国际化企业与人才，容易得到全球企业、国际市场乃至地缘政治主体的认可与接受。深化沪港合作，联手推进全球标准和知识产权保护交易中心建设，能够为进一步融入全球主流创新经济及高端服务经济市场发挥特殊的作用。相关产业市场空间和潜力巨大，将进一步培育沪港两地新的经济增长点，提升经济能级和城市影响力。\n\n再看完善供应链、产业链体系。\n\n深化沪港合作，重点要基于既有科技与产业基础，对接“十五五”时期国家战略性新兴产业发展目标，选择具有行业垄断突破、核心技术突破和新兴科技领域突破特性的产业领域，建立、强化与完善新的产业链、供应链联系。\n\n比如，以工业园区、高新技术产业园区升级为契机，研究试点香港科技城、香港新兴技术工业园、香港再工业化基地等飞地型实体经济，加速创新成果的市场化、产业化步伐。同时，沪港两地可以协调发挥资本、技术、服务等优势，“走出去”布局具有高增长潜力的地区及行业，构建新的跨境供应链、产业链。\n\n接着看上海科创企业的国际化发展。\n\n“企业出海”是一个自主探索、学习和成长的过程。“十五五”时期，上海科创企业国际化发展不妨以香港为一个重要的投融资平台，有序开展海外投资并购，实现全球业务发展；以香港为一个重要的海外总部，集中管理境外资产，建立国际化管控体系；以香港为一个重要的企业研发平台，整合全球科研资源，构建国际创新网络。\n\n在此基础上，以香港为一个重要的区域总部，辐射周边新兴市场，提升品牌国际形象；以香港为一个重要的合作基地，建设境外产业园区；以香港为一个重要的试验场，基于国际标准对企业及管理团队进行国际化规则、商业文化、市场机制的全方位合规培养，进而深度参与全球合作与竞争。\n\n（作者为上海社会科学院港澳研究中心研究员倪外）\n\n栏目主编：王多\n文字编辑：理论君\n题图来源：海沙尔 摄\n题图说明：“张江科学小镇”（人工智能创新小镇）2平方公里规划区聚焦AI大模型全产业链，构建\"研发—应用—生活\"一体化生态。", "url": "https://www.shobserver.cn/news/detail?fm=app&id=1092529"}, {"id": "recvgfsh6fZMg4", "title": "上海浦东：解锁脑机接口“全球首证”\n加速育成生物医药“热带雨林”", "categories": ["行业观察", "本埠热点"], "cover_url": "'covers//covers/recvgfsh6fZMg4.jpg", "date": "2026-04-07", "author": "姜微 何欣荣", "author_unit": "作者系新华每日电讯记者", "source": "新华每日电讯", "summary": "国家药品监督管理局批准博睷康医疗科技（上海）有限公司的“植入式脑机接口手部运动功能代偿系统”创新产品注册申请，实现脑机接口医疗器械全球首发上市。这张具有标志意义的“全球首证”，背后是浦东新区多年来精心耗修的生物医药“热带雨林”产业生态。浦东已底层肥沃的六大创新平台成为生物医药创新连接器，“下一个大药”的元益中心、可堆积的同类小分子药、细胞治疗工厂、阿斯利康全球级细肃疗法中心陈列陆续落地。从实验室走向临床，从“中国新”走向“全球新”，浦东正以脑机接口等未来产业为新引擎，持续锅造世界级生物医药产业集群，助力中国生物医药从“跟跑并跑”迈向“全球领跑”。", "content": "　　近期，国家药品监督管理局发布消息，批准博睿康医疗科技（上海）有限公司的“植入式脑机接口手部运动功能代偿系统”创新产品（NEO）注册申请，实现脑机接口医疗器械全球首发上市。一张具有标志意义的“全球首证”就此花落上海浦东新区。\n\n　　脑机接口是“十五五”期间我国重点发力的未来产业之一。在这一领域，马斯克创立的Neuralink吸引了全球关注。博睿康取得的重大突破，既给国内外众多患者带来康复希望，也显示出中国在脑机接口领域的厚积薄发。包括脑机接口在内，上海浦东正在持续涌现全球首创（First-in-Class）、中国首发（First-in-China）、临床首用（First-in-Human）的“3F”创新产品，加速打造世界级生物医药产业集群。\n\n## 竞速脑机接口创新“全赛道”\n\n　　5年前，一场车祸导致河南小伙小董高位截瘫。2024年11月，复旦大学附属华山医院将一个约硬币大小的设备植入小董头部——也就是此次获批的博睿康植入式脑机接口系统。这是上海首例植入式脑机接口手术。\n\n　　术后一周，小董出院居家康复。训练中，脑机接口将采集到的脑电信号精准解码，先“听懂”小董意图，再化为指令驱动气囊手套。很快，小董就能凭意念控制气囊手套抓取木块。半年后，他可以自己举杯喝水。随着康复训练的持续开展，一年后小董又迎来新的变化，在没有脑机接口设备帮助的前提下，他通过两只手相互辅助，写下了“谢谢”两个字。\n\n　　“这是一次质的飞跃，意味着患者在借助外部设备恢复手部运动功能的前提下，还取得了更大的神经功能恢复。”复旦大学附属华山医院院长毛颖说。\n\n　　让小董受益的脑机接口，是一项通过采集和分析大脑的电信号，实现大脑与外部设备信息交换的前沿技术。在这个领域，根据电极与大脑组织的接触程度，存在侵入式、半侵入式、非侵入式等多条技术路线。各种路线在创伤程度、信号质量与稳定应用三个因素之间存在复杂的权衡关系，被称为“三角难题”。脑机接口产业联盟秘书长李文宇告诉记者：“各条技术路线瞄准的市场需求并不相同，并不是非此即彼的替代关系，有望在未来实现相互促进、融合发展。”\n\n　　作为国内生物医药产业高地，上海浦东已经集聚近10家脑机接口及相关神经科技企业，全面覆盖主流技术路线。其中，半侵入式路线率先实现历史性突破——博睿康的获批产品NEO正属此列。与此同时，侵入式路线也在加速冲刺。位于浦东外高桥的阶梯医疗已于2025年3月完成首例柔性电极植入手术，目前临床进展位居全球前列。在公众更为熟悉的非侵入式领域，浦东企业正以AI赋能技术落地，加速进军日常消费端。如位于浦东张江科学城的岩思类脑构建了参数量达50亿的多模态脑机大模型，显著提升对语言、情绪等复杂神经活动的解码能力。目前，非侵入式技术已在睡眠障碍干预、注意力调控等场景中展开探索。\n\n　　“探测脑、康复脑、增强脑”——在博睿康位于张江科学城的办公室里，这三个探索方向格外醒目。脑机接口的应用前景，不止于帮助截瘫患者，更在于“让碳基大脑与硅基芯片直接对话”。在更广义的神经功能重建领域，浦东也已全面落子、多点突破：如应和脑科学加速推进脑深部电刺激术（俗称“脑起搏器”）国产替代，相关产品已进入临床试验阶段。听觉重建领域，全球仅有5家企业拥有获批上市的半植入式产品，其中就包括浦东新区的力声特。运动重建赛道，美生医疗的脑脊接口（BSI）技术也处于研究者发起的临床试验（IIT）阶段，目前已率先进入美国FDA的“突破性疗法”通道。\n\n　　《上海市脑机接口未来产业培育行动方案（2025-2030年）》提出：2030年前，上海将实现高质量控脑，脑机接口产品全面实现临床应用，打造全球脑机接口产品创新高地。“脑机接口领域，浦东新区不是靠一家企业或一种技术‘单点突破’，而是多技术路线并行、多应用场景覆盖的‘全面出击’，助力上海全球脑机接口产品创新高地建设。”浦东新区科经委生物医药处处长林建飞表示。\n\n\n## 构建热带雨林式创新生态\n\n　　2026年3月13日，博睿康植入式脑机接口产品获国家药监局批准全球首发上市；3月23日，上海市医保部门将该产品纳入本市医保医用耗材目录——从获批上市到落地临床仅用时11天，显示出创新生态对前沿技术探索和未来产业培育的重要意义。\n\n　　从技术角度看，脑机接口横跨神经科学、临床医学、材料学、微电子等多个学科，“技术创新”与“商业落地”之间往往横亘着一条鸿沟。浦东新区科经委副主任凌刚表示，浦东正在构建制度引领、创新策源、产业协同、平台赋能、临床及审评支撑的热带雨林式创新生态，助力脑机接口企业跨越创新鸿沟。\n\n　　这一雨林生态的源头“活水”，来自顶尖科研机构持续释放的创新动能。作为国家“一体两翼”脑科学计划的重要支点，复旦大学张江校区的类脑智能科学与技术研究院是国内高校中首批布局脑科学研究的机构之一，技术与人才溢出效应明显，现已孵化出5家企业。上海科技大学则在脑影像算法、脑功能解码等方向优势明显。据悉，上海科技大学正与临港实验室开展合作，进一步为技术创新提供支撑。\n\n　　要让科创幼苗长成参天大树，离不开专业服务的托举。建立行业规范和标准非常关键。位于浦东新区的上海市医疗器械检验研究院，建成了国内最先进、最专业的脑机接口检测服务平台，更牵头制定我国首项脑机接口医疗器械行业标准，于2026年1月1日正式实施，为这一未来产业划定清晰边界。\n\n　　上海市医疗器械检验研究院院长郁红漪告诉记者，在脑机接口领域，该院有6项国家标准正在同步推进，并计划到2028年底前完成并发布30余项相关国家标准。外文版标准也在筹备之中，将在国家标准体系正式确立后同步推出，旨在推动中国标准走向世界。\n\n　　产业雨林的繁茂，更有赖于肥沃的创新“土壤”。脑机接口技术具有鲜明的多学科交叉特征，而集成电路、生物医药、人工智能这三大先导产业，正是其发展的核心支撑。\n\n　　作为上海国际科创中心核心承载区，近年来浦东持续培育新质生产力，形成了以三大先导产业为引领、先进制造业为骨干、现代服务业为支撑的现代化产业体系。2025年，浦东新区集成电路、生物医药、人工智能三大先导产业规模超过9000亿元，占上海全市的比重预计超过45%，为脑机接口技术的发展提供沃土。\n\n　　产业雨林中所有“枝叶”的伸展，都要奔赴市场这片广阔天空。当前，浦东新区正在建立脑机接口应用研究基地，加快打通“技术研发-临床验证-产品优化”的闭环。\n\n　　位于浦东外高桥的上海市第七人民医院院长胡聃告诉记者，依托医院康复专科的核心优势，该院正与浦东新区脑机接口企业开展深度合作，积极参与脑机接口专属康复方案制定、临床应用基地建设等工作。\n\n　　美生医疗负责人宓懿华说，该企业主攻脑脊接口（BSI）技术，国内外临床需求巨大。依托自贸区，企业研发可享受跨境医疗和出入境便利等政策红利。\n\n\n## 锻造世界级生物医药产业集群\n\n　　脑机接口的蓬勃发展，是浦东锻造世界级生物医药产业集群的一个缩影。\n\n　　来自浦东科经委的数据显示，作为国内生物医药产业链最完整、生态最优良、人才最集聚、创新最活跃、研发最高效的区域之一，浦东新区已集聚生物医药上下游企业4000余家，2025年产业规模达到4494亿元，占上海全市的比重提升至43%。\n\n　　厚积方能薄发。浦东新区多年的系统性布局，正转化为源源不断的创新成果。统计显示，浦东新区已累计获批一类创新药31款，整体数量位居全国前列。2025年当年有8款一类创新药、6款创新三类医疗器械获批上市。今年以来，又有1款一类创新药、7款三类创新医疗器械注册上市。\n\n　　浦东生物医药产业的国际化步伐也显著加快。2025年，浦东新区共有42起对外授权及商务合作交易，总交易额达255亿美元，深度嵌入全球生物医药创新研发与商业化网络。\n\n　　“以制度创新引领科技创新，以精准服务破解产业痛点。”浦东新区政府相关负责人一语道出浦东发展生物医药产业的“心法”。从率先试点药品上市许可持有人制度，到推动医药研发用物品“白名单”便利化通关，再到当前推进的商业医疗补充保险改革、进口转产管理制度研究，浦东始终以企业需求为导向推进制度创新。一系列政策举措，最终转化为实实在在的创新效率：在浦东研发一款创新药平均仅需76个月、投入6.2亿元，显著低于发达国家超10亿美元的成本。\n\n　　浦东正在打造的世界级生物医药产业集群，呵护前沿探索和技术创新。在阶梯医疗的实验室里，全球最小尺寸、柔性最强的神经电极还在迭代中。团队研制的侵入式脑机接口系统，已进入国家药监局创新医疗器械审评“绿色通道”。“未来的目标是将植入变得像‘打耳钉’一样简单。”阶梯医疗创始人李雪说，企业在浦东创立短短5年来，增长斜率一直很高，发展速度持续攀升。\n\n　　世界级的生物医药产业集群，也持续释放强大的“磁场效应”。跨国医药巨头阿斯利康近日宣布，在浦东的张江科学城建设细胞疗法创新中心。这个全链条创新平台，将成为阿斯利康全球细胞疗法版图的关键枢纽，也标志着中国在下一代细胞治疗领域的创新地位再获提升。目前，全球前50大药企中，有16家在浦东布局，其中12家设立中国区总部、7家建立研发中心。\n\n　　从实验室走向临床，从“中国新”走向“全球新”。以脑机接口等未来产业为新引擎，浦东将持续锻造世界级生物医药产业集群，助力中国生物医药从“跟跑并跑”迈向“全球领跑”。", "url": "http://mrdx.cn/h5/mrdx/content/20260407/Articel05001NR.htm"}, {"id": "recvfTMDNaDgl1", "title": "“游戏沪十条”助力“全球电竞之都”建设", "categories": ["行业观察", "政策解读"], "cover_url": "'covers//covers/recvfTMDNaDgl1.jpg", "date": "2026-04-05", "author": "张熠", "author_unit": "解放日报", "source": "上观新闻", "summary": "上海发布《上海市关于支持游戏电竞产业发展的若干举措》（\"游戏沪十条\"），聚焦四大核心方向推动游戏电竞产业高质量发展：一是强化集聚区引导，在徐汇、杨浦、静安三大核心区给予资金支持，完善全链条生态配套；二是优化资本与人才要素供给，成立首期5亿元游戏产业投资基金，推进产教融合；三是深化游戏跨界融合，支持人工智能等前沿技术在游戏研发中应用，推动游戏科技赋能医疗、教育等行业；四是搭建高能级出海服务平台，提供产品本地化、法律合规等一站式服务，推动上海成为全球游戏电竞资源战略枢纽。上海2025年网络游戏产业销售收入已达1707亿元，获批版号数量全国第一，\"游戏沪十条\"将进一步巩固其\"全球电竞之都\"的领先地位。", "content": "为推动上海游戏电竞产业高质量发展，构建具有全球影响力的产业生态体系，《上海市关于支持游戏电竞产业发展的若干举措》（以下简称“游戏沪十条”）于近日印发。4月7日，市文创办将发布2026年度上海市文化创意产业发展专项资金申报指南，其中包含“游戏沪十条”支持项目申报方式。\n\n近年来，上海多项首创性举措极大激发了游戏电竞产业市场主体的活力，获批网络游戏版号数量始终排名全国第一；游戏电竞产业发展能级持续提升，核心指标领跑全国。2025年，上海网络游戏产业实现销售收入1707亿元，同比增长9.57%，高于全国8.41%的平均水平；海外市场表现突出，实现销售收入303亿元，同比增长13.7%，高于全国10.23%的增速。《崩坏：星穹铁道》《无限暖暖》等一批“上海出品”精品游戏接连捧回国际大奖，体现出“上海原创”的全球影响力。\n\n此次发布的“游戏沪十条”聚焦产业发展核心要素与关键环节，力求在多方面实现进一步突破。主要特点有以下四个方面：\n\n**一是强化集聚区引导，激活多点支撑的产业布局。**在现有已形成集聚效应的徐汇、杨浦、静安三个核心区内，对符合条件的产业园区、孵化器给予每年最高500万元的资金支持，并引导三区制定配套扶持政策。同时夯实“产业根基”，在集聚区内积极培育引进美术、音乐、IP运营等全链条生态企业，为初创团队提供一站式服务和“创作+展示+生活”的空间供给新模式，全力筑巢引凤。\n\n**二是优化资本与人才要素供给，构筑产业发展强劲引擎。**在金融支持方面，成立上海游戏产业投资基金，用国有资本撬动社会资本，首期募资预计达到5亿元人民币，重点支持小微团队创新创业，并依托“文创特色支行”等机制，对符合条件的企业给予贷款贴息，精准破解“轻资产、融资难”瓶颈。在人才引育方面，深化产教融合，支持高校设立游戏专业，每年提供超千个大学生实习岗位；建立上海电竞产业优秀人才库，努力构筑吸引全球顶尖人才的“强磁场”。\n\n**三是深化“游戏+”跨界融合，释放产业赋能的溢出价值。**在文化传承方面，鼓励创作更多融入中华优秀传统文化和上海城市元素的“上海出品”。在科技赋能方面，重点支持人工智能等前沿技术在游戏研发中的应用，并对游戏开发引擎等底层工具投入、与国产图形处理器等核心硬件的协同适配予以支持。在价值拓展方面，大力实施“游戏+”战略，支持游戏科技赋能医疗、教育等行业，并鼓励与上海老字号等实体经济跨界联动。通过强化知识产权保护，全力护航产业持续创新。\n\n**四是搭建高能级出海服务平台，打造全球资源配置战略枢纽。**上海在全国率先提出搭建“游戏出海服务平台”，为企业提供涵盖产品本地化、法律合规、金融支付、数据分析等全链条、一站式服务。同时，支持将ChinaJoy、中国国际游戏开发者大会（CIGDC）等品牌活动打造成链接全球智慧的“世界会客厅”，吸引更多优秀海外企业和国际组织来沪发展，推动上海从单一的“产品输出地”，向全球游戏电竞资源的战略枢纽跃升。\n\n另据介绍，在上海已成为全球首个集齐三大顶级电竞赛事城市的基础上，未来将继续提升电竞赛事体系能级，进一步奠定“全球电竞之都”的领先地位。一方面，将持续引进DOTA2国际邀请赛（TI）等全球头部赛事，并对单个项目给予最高300万元支持；另一方面，将着力培育“上海电竞大师赛”等自有品牌赛事。同时，将通过支持俱乐部发展、推动电竞标准制定、将优质休闲电竞赛事纳入公共文化服务体系等，全方位巩固和提升上海在全球电竞版图中的核心地位。", "url": "https://www.shobserver.cn/journal/article/share?id=502254"}, {"id": "recvgj8UfIMWS9", "title": "上海“人造太阳”实现千秒级长脉冲运行刷新纪录", "categories": ["行业观察", "本埠热点"], "cover_url": "'covers//covers/recvgj8UfIMWS9.jpg", "date": "2026-04-04", "author": "曹博文", "author_unit": "作者曹博文，系新民晚报记者", "source": "新民晚报", "summary": "上海“人造太阳”实现千秒级长脉冲运行刷新纪录 2026-04-04 作者：曹博文 2026年春，上海临港新片区传来核聚变领域的重磅突破，能量奇点能源科技（上海）有限公司自主研发的全球首台全高温超导托卡马克装置“洪荒70”，成功实现1337秒稳态长脉冲等离子体运行。” 曹博文 摄 核聚变因模仿太阳热核", "content": "上海“人造太阳”实现千秒级长脉冲运行刷新纪录\n2026-04-04\n作者：曹博文\n2026年春，上海临港新片区传来核聚变领域的重磅突破，能量奇点能源科技（上海）有限公司自主研发的全球首台全高温超导托卡马克装置“洪荒70”，成功实现1337秒稳态长脉冲等离子体运行。这一成果让能量奇点成为全球唯一实现千秒级长脉冲运行的商业核聚变企业，远超此前商业公司百秒级的运行上限，为核聚变商业化落地按下关键的“加速键”，也让上海布局的未来能源产业向“能源自由”再迈近一步。\n全球首台全高温超导托卡马克装置“洪荒70” 曹博文 摄\n核聚变因模仿太阳热核反应原理，被科学家称作“人造太阳”，其燃料氘、氚可从海水中无限提取，聚变产物又无放射性，是人类解决能源与碳排放问题的终极方案，而托卡马克装置则是实现磁约束核聚变的核心设备。“洪荒70”的核心原理，是通过高温超导材料制成的线圈形成强大稳定的磁场，构筑无形“磁笼”，将超高温聚变燃料约束在真空腔体中央，避免其接触装置内壁引发损耗。\n全球目前已建成超百台托卡马克装置，正在运行的全超导装置仅有4台，其中3台采用上一代低温超导材料，“洪荒70”是唯一一台全高温超导材质的设备。相较于低温超导装置存在体型巨大、工艺受限的问题，高温超导材料具备高临界温度、高临界磁场、高载流能力等优势，可将聚变堆体积缩小至传统装置的几十分之一，大幅提速商用进程。此次千秒级运行，不仅回应了行业对高温超导材料的质疑，更实证了该技术路线在聚变装置上的工程可行性与稳定性。\n值得关注的是，“洪荒70”国产化率接近96%，实现了完全自主知识产权，从整体设计到磁体、控制算法等核心环节均由能量奇点团队自主完成。其真空室、冷屏等关键设备由临港本地的上海电气核电集团提供，超导磁体材料来自上海超导科技，临港的产业链优势为其突破国外技术卡脖子风险奠定了基础。截至突破千秒级运行前，“洪荒70”已开展5755次实验，AI等离子体反馈控制技术的应用，更实现了对等离子体参数的毫秒级精准调控，让装置运行更稳定。\n这一技术突破的背后，是一支年轻的科研团队。能量奇点创始人、CEO杨钊是32岁的90后科学家，拥有北大物理系本科、斯坦福大学理论物理博士学历，2021年他创立了我国首家聚变能源商业公司。其带领的技术攻关团队现有约150人，博士占比13%、硕士占比24%，平均年龄不到35岁，这支年轻队伍创下了全球超导托卡马克装置研发建造的最快纪录。\n“洪荒70”项目2022年3月正式启动，2024年3月在临港完成建设，同年6月实现首次等离子体放电，尽管彼时运行不足1秒，却验证了装置所有子系统的基础可行性。为实现长脉冲运行，团队随即启动二期升级，完成了耐热辐射第一壁部件、电流驱动与加热系统、诊断与控制算法三大关键系统的优化，让装置脉冲时长从1秒逐步提升至100秒、300秒，直至2026年2月突破1337秒。\n在杨钊看来，千秒级突破是对团队全系统能力的综合检验，但核聚变商业化仍有诸多关卡待破，等离子体精准控制、能量净增益、耐辐照材料等仍是核心挑战。Q值是衡量核聚变能量增益的核心指标，输出与输入能量持平为Q=1，而Q＞10才有商业价值。目前能量奇点正对“洪荒70”进行算法与设备升级，同时启动下一代装置“洪荒170”的设计，计划2028年建成，核心目标是实现Q＞2的高能量增益。\n临港新片区正全力打造核聚变产业生态，除能量奇点外，还落地了诺瓦聚变等企业，同时引入上下游企业完善全产业链。杨钊表示，若一切顺利，10年内人类或将迎来可控核聚变发出的第一度电，这群中国青年正以技术攻坚，将“人造太阳”的科幻愿景一步步变为现实。\n责任编辑：刘松明  胥柳曼 吴强", "url": "https://article.xuexi.cn/articles/index.html?art_id=3236510866647894559&item_id=3236510866647894559&study_style_id=feeds_opaque&study_comment_enable=1&study_comment_read_enable=0&favor_type=0&source=share&share_to=copylink"}, {"id": "recvfGQm4rE2KW", "title": "浦东创投集团旗下浦东AI种子基金领投裸眼3D领先解决方案商联访智能", "categories": ["行业观察", "本埠热点"], "cover_url": "'covers//covers/recvfGQm4rE2KW.jpg", "date": "2026-04-03", "author": "浦东创投", "author_unit": "浦东创投集团", "source": "浦东创投", "summary": "联访智能科技（上海）有限公司宣布完成数百万元天使轮融资，由浦东创投集团旗下浦东人工智能种子基金领投。公司源自上海理工大学和上海交通大学医学院共建的医工交叉创新研究院科技成果转化，致力于推动裸眼3D显示从展示型产品向生产力工具演进。本轮资金将用于技术迭代与市场拓展，加速成为行业领先的立体视觉交互解决方案服务商。", "content": "**近日，联访智能科技（上海）有限公司（以下简称“联访智能”）宣布完成数百万元人民币天使轮融资，由浦东创投集团旗下浦东人工智能种子基金领投。**本轮资金将主要用于技术迭代与市场拓展，推动裸眼3D显示从“展示型产品”向“生产力工具”演进，加速成为行业领先的立体视觉交互解决方案服务商。\n\n## 源于在沪高校医工交叉平台 科技成果转化再结硕果\n\n**联访智能源自上海理工大学和上海交通大学医学院共建的医工交叉创新研究院科技成果转化。**上海理工大学在光学工程、系统科学、高端制造、医疗器械、康复工程等交叉学科领域实力突出，拥有多位院士及国内顶尖的光学技术资源，形成了从基础研究到产业转化的完整创新链条。\n\n依托学校的科研平台与人才储备，联访智能自诞生之初便具备扎实的技术根基。公司将裸眼3D显示、光学设计、医疗器械等领域的核心技术成果，通过工程化开发转化为可落地、可复制的商业化产品，是“产学研用”深度融合的典型案例。\n\n## 定位“解决方案商” 以工程化能力破解行业落地难题\n\n裸眼3D显示技术被视为下一代人机交互的关键入口，但行业长期面临“技术强、落地难”的困境——硬件参数与场景需求脱节、系统集成复杂、成本控制难等问题制约规模化应用。\n\n联访智能自成立之初便明确自身定位：不做单纯的硬件供应商，而是聚焦场景的“裸眼3D显示系统解决方案商”。公司依托光学设计、图像算法、结构工程等领域的综合能力，打造从显示终端、内容生成到场景适配的一体化解决方案，显著降低部署门槛，实现降本与精准显示（无眩晕感）的平衡。\n\n目前，联访智能核心产品3D体视显微镜为国内唯一量产方案；医疗级3D显示屏正与头部器械机构合作，进入牙科、眼科及神外领域；工业级3D显示屏及平板价格降幅超50%，商用普及提速。公司目前已启动A轮融资，重点开发裸眼3D专用ASIC芯片，以支持4K游戏显示器在裸眼3D模式下以165Hz刷新率流畅运行，进一步降低裸眼3D高速渲染成本。\n\n未来，企业将依托浦东新区在人工智能、集成电路、新型显示等领域的产业集群优势，深化上下游协同，共同拓展裸眼3D显示技术的商业化边界，致力于在浦东这片创新热土上成长为细分领域的标杆企业。", "url": "https://mp.weixin.qq.com/s/XN0e5aIdlayF0KkMSVu7aw"}, {"id": "recvfy11zyk5D1", "title": "量子城市空间智能建设如何探索全球超大城市治理新路径", "categories": ["行业观察", "广域视野"], "cover_url": "'covers//covers/recvfy11zyk5D1.jpg", "date": "2026-03-27", "author": "焦永利", "author_unit": "系中国浦东干部学院公共政策创新研究中心", "source": "澎湃新闻", "summary": "上海发布量子城市空间智能建设实施方案，以量子城市技术体系赋能城市治理，推进空间治理智慧化。文章系统阐述量子城市的总体设计框架，包括新尺度（构建空间法则和计算元规则）、新范式（开发空间治理大模型和城市操作系统）、新生态（迈向精细敏捷和开放共享的治理生态）、新场景（开发创新场景和美好生活场景）。同时指出面临技术集成、算法透明、制度创新等挑战。", "content": "上海作为中国最大的经济中心城市、重要的全球城市，常住人口达到2500万左右，瞬时高峰人口达到3000万量级，人多、车多、建筑多、管线多，面临着规模巨大、结构复杂、风险叠加等治理挑战，传统范式下基于经验判断、宏观分区、线性应对的规划建设与治理模式越来越难以应对超大城市的复杂度和不确定性。基于以上背景，上海谋划开展了量子城市空间智能建设。2024年底在复兴岛正式启动“上海量子城市时空创新基地”。2025年7月，上海市政府常务会议审议通过了《上海城市空间治理领域人工智能应用暨量子城市空间智能建设实施方案（2026—2027年）》（下文简称《实施方案》），部署以“量子城市”技术体系赋能城市治理，推进空间治理智慧化。\n\n这是上海建设现代化人民城市、探索中国特色城市现代化新路子的最新实践，标志着“量子城市”这一充满前沿科技色彩的概念从理念设想走向系统化的政策实践，也标志着上海在探索未来城市空间治理模式上迈出了重要一步。这一创新实践不仅关乎上海城市治理的未来走向，也对全球超大城市治理具有重要意义。\n\n# **上海量子城市空间智能建设总体设计与工作进展**\n\n量子城市并非单纯的概念创新，而是上海把握城市进化机遇、应对超大城市治理挑战提出的系统性方案，其核心是系统借鉴量子力学的量子化、叠加、纠缠等特性和原理，探索实现“四个革命”的工作路径，构建“微观解析—动态感知—智能决策—精准调控”完整链条的城市空间规划与治理新范式。\n\n上海是超大城市，“五个中心”建设已经达到很高能级，城市集聚的人口、要素、流量高度密集（表1）。\n\n表1 上海超大城市生命体征重要参数（2024年）\n\n数据来源：公开数据、上海“一网统管”平台。\n\n对应“四个革命”（见图1），上海量子城市空间智能建设的总体设计主要包括4个方面内容：（1）致力于推动尺度革命，探索新尺度下的空间法则和空间计算元规则，让城市空间变得可感知、可计算；（2）致力于推动范式革命，建设城市空间治理大模型和新的空间治理操作系统，探索人工智能赋能城市空间治理的“上海构型”；（3）致力于推动敏捷革命，实现广泛的垂类应用和开放包容的创新生态；（4）致力于推动能动革命，开发先导落地场景和标志性空间，争取早期收获，积累可持续动能。\n\n## **1.新尺度：构建新的空间法则和空间计算元规则**\n\n在传统规划中，容积率等指标构成了城市空间的强联系规则，但在量子城市的语境下，需要深入到更精细、更基本的空间单元尺度对规则进行重新梳理和整合，构建一套新的元规则体系，涵盖时空基准、空间类型、空间单元、空间编码等多方面的定义，这些法则如同未来城市运行的“基本法”，为后续的平台建设和应用提供基础。\n\n在这方面，《实施方案》提出要定义量子城市基本法、编码标准等，形成量子城市建设时空基本法则。构建三维空间网格和时空底板，建立上海“空中、地表、地下”全覆盖、自适应剖分、智能编码的三维空间网格体系。集成多源时空信息，研发空间营造技法、数据算法和软件程法的“三法合一”通用型智算工具。\n\n在建筑层面，以建筑的“间”为最小空间单元，打造房（建筑）、城（城镇）、空间米料。以空间编码为载体，映射各类安全运行感知数据，实现空间安全信息实时更新、智能计算。在基础设施领域，系统识别市政介质的产端、传输段、转换节点及出口端，根据不同类型市政管线的运行流程和营造规则，分类明确“源—段—接—转—用”最小空间单元的具体定义并实时监测运行状态。这些将为城市建立标准化的时空身份标识系统，通过空间位置结合时间、类型和状态，生成唯一的空间身份证，打通并联结系统中的各类历时特征，支持全生命周期数据融合、智能分析与跨领域协同，推动多元场景的实时联动。\n\n以上基础性工作将为城市空间从“可描述”走向“可计算”奠定坚实基础，而“可计算性”恰是量子力学与人工智能共享的核心特征。当城市空间通过精细的数字化映射成为可计算的系统时，便能运用AI等先进计算技术对其进行仿真、优化与智能调控，从而释放出巨大的科学价值与应用潜力，引领城市空间治理进入由数据和计算驱动的新范式。\n\n## **2.新范式：开发空间治理大模型和新型城市空间操作系统**\n\n空间是城市的基础资源和运行载体，各方面要素和功能都要跑在这样一个平台之上。类似开发鸿蒙系统，未来需要打造一个新的城市空间操作系统，为城市各类应用场景提供基础运行环境。这个平台需要具备强大的感知能力和算力，支撑城市全量数据的实时分析与应用，加快形成人工智能赋能城市空间治理的“上海构型”。\n\n上海初步构建的量子城市空间智能建设主体架构是“135981”：“1”即1个主体目标——着眼未来、令人向往、让人民倍感幸福的卓越之城、量子之城。“3”即3个层次境界——现实物理城市空间的“实境”，数字孪生、泛在感知和虚实互联的“数境”，更高层次的文化、精神、科幻等抽象空间的“悟境”。“5”即5个大域导向——全量复刻现实物理空间，防控现实空间安全底线风险，全息感知现实空间运行，仿真推演现实空间治理决策，共享众创数字梦幻场景。“9”即强化“三九”营造。“8”即聚焦都市8景——围绕人民的美好生活需要，实现幼有所育、学有所教、劳有所得、病有所医、老有所养、住有所居、弱有所扶、业有所乐。“1”即推进10方应用——面向城市治理、时空经济、城市安全、人民生活等，从供给侧给出解决方案，首期开发28个场景。\n\n支撑上述架构的底层能力是空间治理领域的人工智能垂类大模型。在这方面，上海《实施方案》提出要研发具备知识检索、时空理解能力，架构可扩展、模型可插拔的云宇星空行业基座大模型。以基座大模型为核心构建“1+5+3+N”的空间智能模型和应用生态体系：“1”即城市空间治理基座大模型；“5”即5个分域垂类模型，包括空间遥感与监测、城市体检评估、城市和建筑空间生成、城市安全韧性、空间确权和资产交易服务等能力模型；“3”即3大应用领域，包括服务规划资源主责主业、政府部门、社会公众；“N”即N个可拓展、可复合的场景应用智能体。\n\n从底层逻辑看，人工智能领域的规模定律（Scaling Law）面临发展瓶颈，核心原因是互联网公开语料已经被充分挖掘，优化大语言模型所需的计算“养料”逐渐枯竭。同时，人类语言作为现实世界的抽象，与真实世界的“语言”存在一定隔阂，再经过大模型的抽象，难免有“梦中说梦两重虚”之忧。在这一点看，物理世界、空间领域还有大量养料可供挖掘，无论是李飞飞教授团队提出的空间智能（Spatial intelligence），还是英伟达黄仁勋所提出的“人工智能下一个浪潮是物理AI（Physical AI）”，都体现了这一判断。\n\n2025年11月10日，李飞飞教授发表长文《从语言到世界：空间智能是AI的下一个前沿》（From Words to Worlds: Spatial Intelligence is AI&#39;s Next Frontier），引起全世界关注。该文主要观点是：以大语言模型为核心的AI系统缺乏像人类一样理解现实世界中空间关系与动态变化的能力。人类对世界的理解是整体性的，不仅是“看见”，还包括事物在空间上的意义以及关联关系。空间智能是人类理解、导航并与三维世界交互的底层能力，将成为机器真正实现智能的突破口。为此，需要构建新的“世界模型”并使其具备3种核心能力——生成性、多模态性、交互性。\n\n城市空间及其承载的活动、功能将是人工智能进一步发展的重要养料，仍有大量“米料”可供挖掘，是“scaling law”继续发挥作用的“蓝海”。人类城市空间营造涉及的大量产权、制度、标准规范等层面内容属于非开源的公共数据。因此，通过发展包含上述内容在内的空间治理大模型才能构建更全面的世界模型，更好反映城市有机生命体的深层基因和运行规律。\n\n## **3.新生态：迈向精细敏捷和开放共享的治理生态**\n\n基于云宇星空行业基座大模型和共享的数据资源，政府、企业、居民等各类主体能够研发更加丰富的垂类应用场景，共同参与城市治理，实现快速创新和更高水平的敏捷治理。对此，《实施方案》提出建设城市时空智能共享服务平台，利用上海集约化建设的“一张图”能力，实现跨层级、跨区域、跨部门数据融通与共享，提供城市时空领域的垂类模型训练和应用服务。分类有序开放数据共享，搭建轻量化共创平台，构建众智众创生态机制。\n\n在感知方面，以复兴岛作为创新实验基地，岛上将实验时空智能感知映射技术，形成感知基础设施体系标准导则，完成覆盖全岛的智能感知基础设施体系建设，实现对现实世界的全息感知、动态孪生与交互反馈。这将为城市空间的精细感知搭建基础。\n\n在治理应用方面，一些垂类领域能够推进数据和算力支撑下的敏捷治理。比如商务楼宇管理中可以支撑以间或层为空间单位，挂载区域条件、建筑情况、商务服务、社会贡献与经济效益等多项指标，通过实时监测楼龄、空置率、租金等数据，为相关部门和企业提供决策依据，实现楼宇资源的敏捷更新和高效利用。\n\n## ** 4.新场景：开发更多创新场景和美好生活场景**\n\n新范式、新生态将为城市空间各类使用主体进一步发挥主观能动性开辟更加广阔的空间。以复兴岛、曹杨新村等为代表，上海正在打造一批标志性的先行空间和可感可及的场景应用。\n\n在创新发展方面，2024年12月，上海量子城市时空创新基地在复兴岛正式揭牌运营。《实施方案》进一步部署了建设内容，要求探索复兴岛战略空间有机更新和科创策源功能 耦合共生的一体化模式，构建未来城市实验区、创新创业和人才集聚区、时空智能创新先行区。复兴岛将为青年创新创业人才提供低成本的创新载体和丰富的创新生态，探索“低成本、快创新”的新模式新路径。\n\n在生活应用领域，“美好生活掌中宝”曹杨场景、“申银智联——数字时空一券通”等已经落地，是量子城市空间智能建设的早期收获成果。例如，“掌中宝”应用深度融入“随申办市民云”，构建起“掌上生活圈+社区议事厅”双核驱动模式，通过6大核心功能板块、20项高频民生服务，居民只需1部手机、1个应用，就能实现从文娱活动预约到社区食堂订餐、从民生诉求提交到公共事务票选的全场景智慧化服务，使生活圈从导航工具蜕变为社区治理中枢。\n\n以上探索表明量子城市空间智能不仅是高科技的应用，更是服务老百姓急难愁盼问题的有效工具，是人民城市建设的有力抓手。可以预见，基于空间治理大模型的开放生态将有助于构建一个打通不同领域、不同层级空间数据的架构，引导各类主体广泛参与，持续营造更为丰富的空间应用场景。\n\n#**挑战与对策**\n\n量子城市空间智能建设是一项全新的探索，是融合城市空间、人工智能、制度创新等多维要素和任务于一体的系统工程，在发展完善的道路上不可避免将会面临诸多挑战，需要前瞻思考并加以应对。\n\n##** 1.量子城市建设面临3类挑战**\n\n一是技术集成与数据安全挑战。在技术集成方面，量子城市建设需要整合物联网、人工智能、大数据、云计算等多种前沿技术，构建统一的技术平台和标准体系，不同技术系统之间的兼容性与协同性是一个重大挑战。在数据安全方面，量子城市建设依赖海量数据的采集、传输和处理，其中包括大量产权、时空位置等敏感信息和个人隐私数据，如何确保数据安全和隐私保护成为关键问题。\n\n二是算法透明与伦理治理挑战。量子城市建设依赖人工智能算法进行感知和决策支持，但算法存在的透明度不足和幻觉、偏见等问题可能带来治理风险。算法决策过程往往是不透明的“黑箱”，难以理解和审查，可能导致决策偏差和歧视问题。同时，算法训练数据本身可能包含社会固有偏见，这些偏见被算法放大后可能加剧社会不公。尤其是城市空间资源作为基础性、战略性资源，其规划、分配、使用、交易、运营等各个环节都潜藏着治理风险乃至公共安全风险。这就要求基座大模型和分领域模型一定要具有更高的透明度和可解析度，增强这一方面治理应用的可信度和鲁棒性（Robustness）。\n\n三是制度创新与能力建设挑战。量子城市建设对现有城市治理体制和人才队伍提出许多新的要求。在治理体制方面，传统的部门化、科层制治理结构与基座大模型所需的全量精细数据需求存在矛盾，部门壁垒和数据孤岛现象难以短时间内消除。在人才队伍能力方面，量子城市建设需要既懂城市治理又懂数字技术的复合型人才，现有人才队伍存在能力匹配和能力融合的缺口。\n\n##** 2.应对策略与政策建议**\n\n为了应对上述挑战、更好推进量子城市空间智能建设，需要采取以下对策：\n\n一是加快构建统一的技术标准体系，明确各技术系统的接口标准和数据格式，促进系统互联互通。在时空智能大模型训练和应用过程中制定严格的数据分类分级管理制度，根据数据敏感程度采取不同的管理措施。加强隐私计算等技术应用，提升数据端到端的溯源能力，在数据开发利用的同时保护隐私。\n\n二是建立算法审计机制，定期对关键算法进行透明度和公平性评估。构建多方参与的算法治理框架，政府、企业、专家和公众共同参与算法规则制定和监督，对重要算法应用进行伦理审查和评估。积极开发可解释空间大模型技术，提高算法决策的透明度和可理解性。\n\n三是推动组织架构优化，建立跨部门协同工作机制，打破数据壁垒，归集更加全量和精细的数据。创新政企合作机制，充分发挥企业在技术创新和应用开发方面的支撑作用。加强参与量子城市空间智能建设各领域队伍的数字能力培训和业务能力培训，提升专业条线人员的数字素养和技术应用能力，提升数字技术条线人员对城市、空间、规划的理解和融合能力，促进懂城市、懂规划、懂智能的深度融合。\n\n四是深化拓展基座大模型的能力域。未来，在空间法则和空间计算元规则中还可以引入在以往规划中未得到充分重视和体现的空间联系弱规则，如人文、伦理规则，这些因素在城市发展中起着潜移默化的作用，影响着城市空间的使用方式和居民的生活体验，但由于理念、工具、算力等制约，比较难以纳入空间治理的范畴。量子城市技术体系可以探索将强规则与弱规则统一纳入新的元规则体系，例如，基于人工智能技术开展城市空间情感识别，使城市规划治理更加全面、深入、精细。\n\n部署推动量子城市空间智能建设是践行使命的前沿探索，其本质是以数字化、智能化思维重塑城市基因，推动城市规划、空间治理从工业化时代的“经典范式”向智能时代“量子范式”总体跃迁，通过推动“四个革命”构建人工智能赋能城市空间治理的综合性方案。通过构建量子城市技术体系，进而将实践升维为理论体系和自主知识体系，上海有望在全球超大城市空间治理中走出一条创新之路，为未来城市发展和空间治理提供上海样本、中国方案。\n\n（作者焦永利系中国浦东干部学院教授，公共政策创新研究中心主任，中国城市规划学会规划实施分会委员。本文首发于《国际大都市发展研究（中英文）》2025年第6期，原题：“量子城市空间智能建设赋能上海超大城市治理：理论框架与创新实践”，澎湃新闻经授权刊发，刊发时有编辑和删节。）\n\n智能标签：#上海、量子城市、城市治理、人工智能、超大城市、空间治理、智能建设、城市规划", "url": "https://www.celap.org.cn/art/2026/3/27/art_2806_54073.html"}, {"id": "recvfjKouT82wY", "title": "深化文旅融合  发展全域旅游", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfjKouT82wY.jpg", "date": "2026-03-24", "author": "秦国伟", "author_unit": "作者秦国伟，系安徽省六安市文化和旅游局党组书记、局长", "source": "解放日报", "summary": "本文探讨文旅融合的内涵深化、外延拓展与价值升华。文旅融合需从'物理相加'到'化学相融'，实现理念、职能、产业、市场、服务融合；外延从狭义文化资源拓展到广义生态，发展全域旅游。其价值在于培育增长新引擎、增强文化自信、促进协调共享、践行绿色发展、展示国家形象。应坚持创新驱动、深化改革开放、健全实施机制，保障融合发展战略落地见效。", "content": "    文化是旅游的灵魂，旅游是文化的载体。通过文化和旅游深度融合，可以将沉睡的文化资源转化为可体验、可消费的旅游产品，延长产业链、提升价值链，使文化“活”起来、旅游“旺”起来。\n\n    “十五五”时期，面对扩内需、促消费的紧迫任务以及发展新质生产力、构建全国统一大市场的战略部署，深化文旅融合、发展全域旅游能够有效释放文化消费和旅游消费潜力，带动相关产业创新发展，为经济持续健康发展注入强劲动能。\n\n    ## **何以融  以何融**\n\n    文旅融合并非文化与旅游的简单叠加，而是在理念、功能、市场、产业、服务等多维度、深层次的化学反应与共生共融。其核心在于以文塑旅、以旅彰文，让文化通过旅游落地生根、开花结果，让旅游因文化而底蕴深厚、魅力持久。\n\n    内涵深化：从“物理相加”到“化学相融”。文旅融合的初级形态是“文化+旅游”或“旅游+文化”，表现为在旅游线路中增加文化景点，在文化场所开展旅游活动；深层次的融合，则要求打破行业壁垒和思维定式，实现理念融合、职能融合、产业融合、市场融合、服务融合。\n\n    理念融合，是将文化传承创新与旅游高质量发展统一于满足人民美好生活需要的目标之下；职能融合，是推动文化事业、文化产业与旅游业在规划、管理、政策等方面的协同；产业融合，是催生研学旅行、文化遗产旅游、演艺旅游、文创产品开发等新业态、新模式；市场融合，是培育既懂文化又懂旅游的复合型市场主体，打造统一的品牌形象和营销体系；服务融合，是建设覆盖更广、体验更优、主客共享的公共服务体系。\n\n    新时代的文旅融合，就是要让文化内涵渗透到旅游的“吃、住、行、游、购、娱”各环节，让旅游体验成为感知文化、理解文化、传播文化的过程，实现“1+1>2”的协同效应。\n\n    外延拓展：从“狭义资源”到“广义生态”。传统的文旅融合常聚焦于文物古迹、非物质文化遗产、博物馆、美术馆等狭义文化资源。新时代的文旅融合，其外延极大拓展，涵盖几乎所有的文化形态和空间载体。它不仅包括优秀传统文化资源的旅游化利用，也包括红色文化、社会主义先进文化的旅游表达；不仅关注历史文化遗产，也关注当代城市文化、乡村文化、社区文化、工业文化、科技文化等；不仅依托固定的文化场馆和景区，也深入街区、社区、乡村、工厂等生活与生产空间。\n\n    这意味着，整个城乡空间、社会生产生活领域，都可以成为文旅融合的场域。发展全域旅游，正是这一拓展的必然要求。它强调将一定区域作为完整旅游目的地进行整体规划布局、综合统筹管理、一体化营销推广，实现旅游业全域共建、全域共融、全域共享。由此，文旅融合的外延从具体的“资源点”扩展到区域的“生态面”，要求以更广阔的视野整合资源、创新产品、优化环境。\n\n    价值升华：多维意义的时代彰显。深化文旅融合、发展全域旅游的价值意蕴远超经济范畴，具有多重战略意义。\n\n    一是培育增长新引擎。文旅产业关联度高、带动性强。深度融合能有效拉动消费、投资和出口，促进餐饮、住宿、交通、商业、农业、手工业等相关产业发展，创造大量就业岗位。特别是在乡村振兴进程中，它还能进一步将生态和文化优势转化为经济优势。在“十五五”扩内需背景下，文旅消费可以说是潜力最大的领域之一。\n\n    二是增强自信与认同。旅游是文化传播最生动、最有效的途径之一。通过旅游，人民群众在亲身体验中感知中华文化的博大精深和独特魅力，增进对民族文化和社会主义核心价值观的认同，文化自信在潜移默化中得以坚定和提升。其间，文化遗产在利用中得到更好保护、在保护中实现价值传承。\n\n    三是促进协调与共享。深化文旅融合、发展全域旅游有助于推动基础设施和公共服务向乡村延伸，改善城乡人居环境，促进城乡要素流动，缩小城乡差距。它倡导“主客共享”，既让游客获得优质体验，也让当地居民提升生活品质、共享发展成果，促进社会和谐。\n\n    四是践行绿色发展。好的文化和旅游产品，本身依赖于优美的自然环境和文化生态。深化文旅融合、发展全域旅游内在要求坚持生态优先、绿色发展，保护自然景观和文化遗产的原真性、完整性，是“绿水青山就是金山银山”理念的生动实践。\n\n    五是展示国家形象。文旅产品是展示国家形象的直接窗口。推动文旅融合高质量发展，打造具有中国特色、中国风格、中国气派的文旅品牌，能够向世界生动展现真实、立体、全面的中国，提升国家文化软实力和中华文化影响力。\n\n    ## **保障部署落地见效**\n\n    ### 坚持创新驱动，以新质生产力赋能文旅深度融合——\n\n    比如，强化科技赋能，打造智慧文旅新体验。积极应用5G、大数据、人工智能、虚拟现实、增强现实、元宇宙等前沿技术，建设智慧旅游平台，实现“一机游全域”。开发数字化文旅产品，如虚拟博物馆、云游景区、沉浸式演艺、数字文物展览等，突破时空限制，拓展消费场景。运用大数据精准分析客源市场、游客行为，实现个性化推荐、精细化管理、智慧化服务。\n\n    又如，深化创意引领，培育文旅融合新业态。鼓励文创产品开发，将文化符号、故事元素转化为具有高附加值的旅游商品和纪念品。大力发展文化遗产旅游、研学旅行、演艺旅游、体育旅游、康养旅游、工业旅游、低空旅游等“文旅+”新业态。支持城市更新和乡村振兴中的文旅场景营造，将历史街区、老旧厂房、传统村落转化为创意空间和文旅目的地。\n\n    再如，突出品质提升，构建高标准服务体系。对标国际一流，完善旅游交通网络、旅游厕所、游客中心、标识系统等基础设施。提升住宿、餐饮、导游等服务品质，发展精品民宿、主题酒店、特色餐饮。建立健全旅游服务质量标准和评价体系，加强市场监管和信用建设，营造放心消费环境。\n\n    ### 深化改革开放，在统一大市场中优化资源配置——\n\n    比如，加强规划统筹，优化全域空间布局。国家层面可加强文旅融合与全域旅游发展的顶层设计和战略引导。各地可因地制宜，编制实施全域旅游发展规划，与国土空间规划、生态环境保护规划等有效衔接。同时，明确功能分区，避免同质化竞争，形成特色鲜明、互补发展的区域旅游格局，特别要支持革命老区、民族地区、边疆地区依托特色资源发展旅游业。\n\n    又如，促进区域协同，共建文旅发展共同体。深化长三角等重点区域文旅一体化合作，联合打造跨区域精品线路，推行旅游惠民便民政策“一卡通”。加强东西部协作，推动客源互送、市场共享。鼓励沿长江、黄河、大运河、长征国家文化公园等线性文化遗产廊道开展旅游协作。\n\n    再如，拓展内外市场，促进消费升级扩容。深化“放管服”改革，降低市场准入门槛，营造公平竞争环境。深耕国内市场，针对不同群体需求开发差异化产品，释放研学、银发、亲子、青年等细分市场潜力。发展入境旅游，优化签证、通关、支付等服务，推出更多适合外国游客的产品和线路。\n\n    ### 健全实施机制，保障融合发展战略落地见效——\n\n    比如，强化组织领导，完善协同推进机制。坚持和加强党对文旅工作的全面领导，建立健全党委领导、政府负责、部门协同、社会参与的工作格局。强化文旅部门与宣传、发展改革、财政、自然资源、交通、农业等部门的协调联动，形成政策合力，并将文旅融合发展纳入地方经济社会发展考核评价体系。\n\n    又如，加大政策支持，创新要素保障机制。加大财政投入，优化支出结构，重点支持基础设施建设、公共服务提升、新业态培育和宣传推广。创新金融支持，发展文旅特色信贷产品，鼓励社会资本设立文旅产业基金。合理保障旅游项目建设用地需求，科学探索点状供地、弹性年期等灵活用地方式。加强文旅人才培养和引进，建设高素质专业化队伍。\n\n    再如，夯实法治基础，构建共建共享机制。完善文化和旅游领域法律法规体系，加强涉及文化遗产保护、旅游资源开发、旅游服务质量、安全生产等方面的执法监管，健全旅游投诉处理和市场纠纷调解机制。尊重当地居民在旅游发展中的知情权、参与权和受益权，探索建立利益联结机制，并发挥好行业协会、志愿者组织等社会力量的作用。\n\n    （作者为安徽省六安市文化和旅游局党组书记、局长）", "url": "https://www.jfdaily.com/staticsg/res/html/journal/detail.html?date=2026-03-24&id=499998&page=10"}, {"id": "recvfkaQeA91EA", "title": "建设现代化人民城市 需要仔细地去观察去琢磨\n——伍江教授在“悦见人文·立信”系列讲座的演讲", "categories": ["专家视点"], "cover_url": "'covers//covers/recvfkaQeA91EA.jpg", "date": "2026-03-24", "author": "伍江", "author_unit": "作者伍江，系同济大学建筑与城市规划学院教授，同济大学超大城市精细化治理研究院院长", "source": "解放日报", "summary": "本文阐述城市的三大基本属性：物质属性、社会属性、文化属性。物质属性体现在生产、生活和安全，需珍视'烟火气'与'市井味'；社会属性要求城市公平正义，从'形象好'转向'功能好'，加强空间复合使用；文化属性是最高层次，城市是承载集体记忆的最大文化产品，应在保护前提下活化利用历史遗存，让艺术创新渗透城市肌理。三者辩证统一，城市才能让生活更美好。", "content": "    ■城市空间具有鲜明的时代性，不同的生产方式导致不同的城市空间。互联网、人工智能的到来，一定会给城市空间带来改变。现代化城市需要持续的服务功能补缺、提升和维护\n\n    ■“烟火气”和“市井味”是城市空间最为宝贵的人性化标志。过去觉得城市脏乱差要整治，现在发现大家反而更喜欢那种看上去不那么整齐、有生活气息的地方。这就是时代的变化\n\n    ■城市是承载集体记忆的最大文化产品。城市的历史文化不是城市发展的包袱，而是激发城市活力的源泉。重要历史遗存不同于一般文物，必须在保护的前提下进行适应性活化利用\n\n    ■城市进入内涵式发展阶段，需要更多关注建筑的艺术属性和高品质公共空间。这不仅仅是建筑师的事。期待有更多艺术创新渗透进城市日常肌理，以增强城市的场所感与文化认同\n\n    “十五五”规划纲要提出“推动城市发展方式转变，建设创新、宜居、美丽、韧性、文明、智慧的现代化人民城市”，标志着中国的城镇化进入“下半场”。从大规模增量扩张阶段转向以存量提质增效为主的阶段，必须深入研究城市的基本属性，正确理解城市发展的基本价值导向，确保城市朝着健康的方向发展。\n\n    当你看一座城市的时候，你看到了什么？有建筑，有各种各样的基础设施。这是我们看得到的城市，但还有我们看不到的，需要仔细地去观察、去琢磨才会有所发现。这次演讲，我就围绕城市的三大基本属性——物质属性、社会属性、文化属性，与大家作分享交流。\n\n  ##  “烟火气”和“市井味”是城市空间最为宝贵的人性化标志\n\n    城市是最大的人造物。城市空间的物质属性首先表现在，城市空间由建筑物、公共设施等可被人直接感受到的物质空间构成，物质性与经济性是城市运行的基石。为什么我要加一个“经济性”？因为城市空间是人口及其所形成的各类经济活动高度集聚的地理区域，经济活动及其所积聚的经济能量是城市一切活动的物质基础。城市的物质性主要体现在三个方面：生产、生活和安全。\n\n    为什么说生产是最基本的？城市本来就是人口相对集中，并由这些人口形成各种高度密集的经济活动的区域。在人类生产力水平低下的时候，这个区域相对较小，城市化程度低，数量也少。当经济生产能力提高了，人口多了，城市里面集聚的人就更多，规模也更大。中国现在正好在这个时期，所以中国不仅快速进入城市化时代，甚至成为一个改写城市化定义的国家。\n\n    在我念书的时候，教材上给城市的定义是：100万以上人口叫特大城市，50万以上人口叫大城市，10万以下人口叫小城市。现在这个标准显然不能反映实际了。我们给城市重新作了定义：1000万以上人口叫超大城市，500万到1000万人口叫特大城市，100万到500万人口叫大城市，50万到100万人口叫中等城市，50万以下人口叫小城市。今天中国除了那些“镇”，只要叫“市”的，已经很少低于50万人口了。\n\n    当然，我们对城市的定义不仅是自然属性，还根据行政级别。很多年前为了适应快速城市化，我们实行“地改市”，省和县之间设了一级行政单位叫“市”。这个“市”指的是行政区域，不同于我们讲的“城市”概念。\n\n    大家可能发现，在我的演讲中，常常会同时使用“城市化”与“城镇化”。国际上一般使用“城市化”这个概念。那么，中国为什么叫“城镇化”？因为中国有一种城市形态是介于城市与乡村之间的“镇”，这可以说是中国特有的一种城市定义。西方也有小城市，但西方不管城市大小统统都叫城市，而中国给它定义了不同的行政级别。但是不管大城市、超大城市还是小城市，它都是脱离了农业生产和农民居住方式的一种城市生活形态，都应该被统计在“城市化”中。\n\n    在城市这样一个区域里，经济活动及其集聚的能量是一切活动的物质基础。离开了物质基础，城市的所有功能都无从谈起。现在的城市之所以变得这么大，主要是因为快速工业化的带动。虽然西方国家比中国起步早，但因为中国的地域和人口规模，使得我们的城市化规模和速度是历史上任何国家都无法同日而语的。改革开放初期，我们国家的城镇化率才百分之十几，现在城镇化率已近70%，这意味着超过50%的人口在短短40年里实现了城市化。这么巨量的人口，其生产活动和生活空间发生转移，是人类历史上十分重要的一件事情。\n\n    城市化是工业化的伴生。现在，我们的科学技术、生产技术跟100年前完全不能同日而语。如果说改革开放前30年是一个追赶过程，今天不一样了，在数字网络时代，人工智能技术发展很快，新质生产力不断涌现。这在给我们带来机遇的同时，也带来了极大挑战。\n\n    我们需要思考的是：在这样的时代背景下，城市发生了哪些变化？今天城市建得越来越好，但这样的城市所适应的其实并不是未来的生产方式。它适应的是100多年前工业化大生产的方式。那么，以后怎么办？各个国家都面临挑战。城市空间具有鲜明的时代性，不同的生产方式导致不同的城市空间。互联网、人工智能的到来，一定会给城市空间带来改变。\n\n    同时，我们往往会被技术的进步所蒙蔽。手机两年一换，各种App层出不穷，在这种情况下，我们往往容易掉入陷阱，以为城市就是一个生产机器，是为了推动生产力提高而存在的。但别忘了，科学进步、财富积累、城市建设最终是为了什么。所以，国家开始强调“人民城市”，城市是为人服务的。中国特色新型城镇化是“以人为核心的新型城镇化”，我们要建设的是“现代化人民城市”，这就引出了物质属性的第二个维度：生活。\n\n    作为人口与经济活动的集聚地，城市需要以人为本，需要创造宜居、宜业的生活空间，以提升居民的幸福感。其间，尤其需要珍视并守护那份“烟火气”与“市井味”。\n\n    幸福感的核心是物质生活的富足、城市公共服务的供给，特别是日常生活的便利。现代化城市需要持续的服务功能补缺、提升和维护。在不同时代，幸福感是不一样的。吃不饱的时候，吃饱就是幸福。全面小康了，吃饱不再成为问题，人们对于幸福的感知也有了新的变化。现在不是吃得越多越幸福，相反为了健康，我们需要克制这种欲望。\n\n    城市空间尺度的人性化，是高品质城市的重要内容。“烟火气”和“市井味”是城市空间最为宝贵的人性化标志。比如，现在不少文化、体育设施造得很好，但仍难言满意。为什么？因为很多是为“抽象的人”服务，不是为“具体的人”服务。或者说，硬件水平提高了，却没考虑到公平公正和个性化。\n\n    在我看来，尊重市民的生活便利与生存空间比城市“整洁统一”更重要，城市管理要避免过于犯“洁癖”。比如，“烟火气”是从哪里来的？是大家集中在一起，每家烧一顿饭形成的。随着现代化建设，人们发现这种“自我服务”带来的烟火气开始变得宝贵。过去觉得城市脏乱差要整治，现在发现大家反而更喜欢那种看上去不那么整齐、有生活气息的地方。这就是时代的变化。我们不能因为追求城市美观，而失去了日常生活的便利性。很多时候，城市是需要一点“乱”的。\n\n    当然，生产和生活是有底线的，这就是物质属性的第三个维度：安全。\n\n    安全是城市发展的绝对底线与幸福指数的首要指标，也是建设人民城市的基本前提。城市的现代化往往使城市更加脆弱。我们需要建立健全城市防灾设施体系，提高城市抗击各类灾害的能力；建立健全城市紧急避难系统，减少各类灾害来临时的伤亡损失；建立健全城市紧急状态应对机制，不断提高城市韧性。\n\n    新形势下，特别需要加强健康城市建设，推进城市应对各类环境变化特别是气候变化的适应性规划和建设。一个安全的城市不等于美好的城市，但一个不安全的城市肯定是不美好的。\n\n    ##城市公平正义要从“形象好”转向“功能好”\n\n    我们再来看城市的社会属性。\n\n    城市空间的使用者是人，城市空间因而具有强烈的社会属性。人和人之间怎么相处，是文明持续的决定性因素。人类创造财富的能力很强，但毁灭财富的能力也很强，比如战争。在城市内部，虽然有法律制度，但不等于每个人的利益都得到同等保障。一旦群体产生矛盾，就会带来社会动荡，最终影响生产和生活。因此，城市必须有能力协调各种矛盾，保证城市始终在比较和谐的状态中运行。\n\n    社会和谐的最重要因素就是公平正义。城市公平正义应更多表现为对弱势群体的照顾和宽容，要从“形象好”转向“功能好”。比如，对于老年群体，应更多考虑坡道、扶手等公共设施建设；对低收入阶层，要给他们提供有尊严且可接受的生活空间。\n\n    城市空间的社会属性还体现在对社会多样性的尊重上。城市由不同的个人、家庭、群体组成不同的乡土、经济、文化、宗教等联系，形成不同的人群和不同的族群，也就带来城市生活方式、行为习惯、文化传统的多样性。城市文化的多样性，既表现在城市经济活动的巨大活力和创新能力上，也表现在社会对公共服务需求越来越多样化的需求上。城市的社会性很大程度体现在公共性上，公共空间建设集中体现城市的公共服务水平。\n\n    这里，想特别强调一下，我们要加强城市空间的复合使用。以上海“一江一河”为例，通过打造普惠的公共开放空间，将滨水、临绿等优质城市资源还给市民，这是人民城市理念的生动体现。\n\n    还有一个典型的例子，就是世博会。通过举办世博会，我们把相关区域的生产型空间转化为生活型空间。有人问：世博会最大的遗产是什么？在我看来，不是建筑，而是留下了这一片公共空间。\n\n    ##城市最深邃的魅力在于其精神性与文化性\n\n    最后谈谈城市的文化属性。\n\n    城市不仅仅是生产、生活的容器，更是精神生活的载体。习近平总书记说要“记得住乡愁”，乡愁就是对生活空间的记忆。城市不同的物质空间形态会给人们带来不同的空间感受，让人们产生不同的空间认同。城市空间形象以及在其中发生的活动与事件，使城市空间产生厚重的历史感、场所感，从而成为人们的集体记忆与精神寄托。城市的空间认同是文化认同的重要组成部分，并可以加强人们的文化认同，最终让城市成为人们的灵魂归属。\n\n    城市本身就是一个文化产品。任何物质产品都有双重属性：物质属性和精神属性。在产品刚生产出来时，物质价值最高，精神价值最低。随着时间推移，物质价值会归零（不能用了），但如果它幸存下来，精神价值会变得无穷大。城市的重要历史遗存属于建成文化遗产，是重要的文化遗产，必须认真呵护与保存。城市更新是持续不断的，是城市永恒的主题。过去是大建设时代，现在进入存量更新时代。城市像生命体，新陈代谢是内部发生的，要小规模、渐进式地进行有机更新。\n\n    我们还要珍惜历史，把每一代人的历史传承下去。保护历史遗产的本质是文化传承。文明的积累极其不容易，要像爱护眼睛一样爱护老建筑。好的城市，因丰富而有个性的历史而产生吸引力，让我们爱上它。这种爱让我们的灵魂找到归属感。\n\n    城市最深邃的魅力，在于其精神性与文化性。城市是承载集体记忆的最大文化产品。保护这份记忆，需要坚实的制度保障。上海已构建由各级文物保护单位、历史文化风貌区、优秀历史建筑等构成的多层级保护体系，为城市文脉的存续筑牢根基。\n\n    城市的历史文化不是城市发展的包袱，而是激发城市活力的源泉。城市的重要历史遗存不同于一般文物，必须在保护的前提下进行适应性活化利用，最重要的是激发历史空间的当代活力。比如，上海世博会的发电厂改造为当代艺术馆，代表了工业记忆，又适应了新需求。\n\n    艺术是人类精神生活最高、最直接的表达。为什么现在有些城市不那么美？一方面是因为发展太快了，在城市建设中为了满足短期需求，缺乏精神追求；另一方面是因为我们赋予城市的文化诉求还不够。城市进入内涵式发展阶段，需要更多关注建筑的艺术属性和高品质公共空间。这需要全社会关注，而不仅仅是建筑师的事。我们从2015年开始办“城市空间艺术季”，让市民、艺术家进入讨论，大家发现“原来我们对城市是有发言权的”。期待未来有更多艺术创新参与城市空间规划，渗透进城市日常肌理，以增强城市的场所感与文化认同。\n\n    有人问我：在全球化背景下，如何避免城市文化趋同？坦率地说，全球化时代信息沟通太便利，很难完全阻断趋同。但是，我们依然可以有所作为。我的建议是：\n\n    第一，保护好已经存在的、由于历史原因形成的特色。不要因为房子破就拆，而是在最大限度保存历史信息的前提下，通过谨慎修缮和适度改造让历史空间继续适用于新的功能。越是质量不好的建筑越需要保护好，就像生病的人才需要治。\n\n    第二，尊重所有文化遗存。历史是不容选择的，所有带有集体记忆的历史遗存都是我们宝贵的文化遗产。\n\n    第三，鼓励艺术创造。高品质的城市空间需要设计感。现在一说追求高品质建设，就聚焦在昂贵材料和高端设施上。其实，建筑真正的艺术价值在于设计。我们要建立更好的机制，让大家认识到设计的增值和历史文化的溢价。\n\n    城市的三大属性中，最高层次是文化属性。人类的文化、文明，相当一部分是通过城市沉淀下来的。现代化建设本质上是在延续传承民族文化，保护和传承好历史文化是题中应有之义。不能保护、传承和创造文化的现代化，不是真正的现代化。\n\n    应该看到，人类创造财富的能力越来越强，破坏和毁灭财富的能力也越来越强。城市在持续创造物质财富的同时，要警惕将经济生产活动异化为城市的唯一目的甚至终极意义。物质属性、社会属性、文化属性三者是辩证统一、不可偏废的。由此，城市才能真正让生活变得更美好。\n\n伍江  同济大学建筑与城市规划学院教授，同济大学超大城市精细化治理研究院院长，联合国环境规划署同济大学环境与可持续发展学院院长，中国城市规划学会副理事长，亚洲建筑师协会第23届主席（2026年—2027年）\n", "url": "https://www.jfdaily.com/staticsg/res/html/journal/detail.html?date=2026-03-24&id=500002&page=11"}, {"id": "recvfkaY0ey5fg", "title": "AI音乐“狂飙”，行业正在遭遇怎样的冲击？", "categories": ["行业观察"], "cover_url": "'covers//covers/v6_1.jpg", "date": "2026-03-24", "author": "束涵/余敏之", "author_unit": "作者束涵，系解放日报记者；作者余敏之，系解放日报见习记者", "source": "解放日报", "summary": "本文报道AI音乐对行业的冲击与重构。生成式AI正淘汰低技术含量、可批量复制的功能性音乐创作，词曲作者失业增多，但混音等主观判断环节仍有抗压性。资深玩家用AI作灵感催化剂，平台降低创作门槛。AI音乐商业化面临版权规则不清、内容质量参差的困境。行业可能形成哑铃型结构，审美、情感和独立品格成为稀缺能力，人的连接性工种抗风险能力更强。", "content": "    ■AI正在淘汰的不是创作本身，而是低技术含量、可批量复制的工作，比如用于短视频配乐、商业广告等的功能性音乐\n\n    ■在歌曲领域，真实的表达来自人类的情感与经历。AI时常表现得循规蹈矩，而真人演绎时不免会有一些小瑕疵——而那些瑕疵背后，是很鲜活的东西\n\n    ■站在平台视角，AI也在不断推动行业发展、优化行业生态，让大量过去没有专业音乐创作能力的人也能创作出还不错的音乐，反推更多专业从业者去产出比AI创作更好的音乐作品和内容\n\n\n    AI音乐，正以惊人的速度涌入市场。数据显示，2025年，仅Suno一个制作软件，用户每天生成的歌曲就超过700万首，相当于两周就能生成近亿首歌曲，体量惊人。\n\n    创作的门槛正变得史无前例地低。不久前，谷歌在旗下亿级用户产品Gemini中上线音乐生成功能：一句话、一张照片，数十秒就能生成一段完整音乐。去年年底，腾讯音乐旗下的AI创作工具“VEMUS未音”正式发布，主打让零基础的人也能轻松发歌。\n\n    在这股AI音乐洪流中，大量歌曲被打上“AI感强”“粗糙”的标签，但也有一批作品让人真假难辨，甚至被认为比真人演绎更有味道。当人与AI的听感边界日渐模糊，音乐制作行业会遭遇怎样的冲击？\n\n## 谁在被取代？\n\n    在传统音乐创作链条上，生成式AI的冲击并非“平均用力”。\n\n    首当其冲的，是那些为平台量产歌曲的作词、编曲的工种。“Suno这些平台确实很厉害，比很多词曲作者高效得多。”广东某唱片公司的音乐制作人Rey说。他口中的Suno，是目前全球最火的AI音乐生成平台之一。用户只需输入简单的歌词和风格提示，几十秒就能生成一首包含人声、旋律、编曲的完整歌曲。“我认识的一些词曲作者，要不就回老家了，要不就改行学别的了。”\n\n    音乐制作人莫芷铭身边也有人因此失业。他注意到这背后创作模式的变化——以前一个公司要制作10首歌，需要找5个编曲人，每人编两首。现在，公司用Suno10分钟就能生成10首，快速筛选出两首有潜力的，再让人去临摹和精修。“本来5个人的活，现在两个人就能干。”\n\n    但产业链并非全线遇冷，某些工种反而表现出一定的抗压性。比如混音。这是将多轨音频通过专业处理，融合成富有层次和空间感的最终成品的环节。“其实混音行情反而更好了，有些人甚至转行去做了混音。”Rey解释，由于AI混音技术不成熟，在词曲价格普降的情况下，制作公司更愿意在混音这个仍需人工精雕细琢的环节上投入更多。\n\n    混音为何能守住阵地？Cashmere Studios是一家位于上海静安区的专业音频制作工作室，主理人卡卡告诉记者，混音涉及极为主观的感性判断，难以被算法完全量化。“客户找混音师，就像买衣服时找闺蜜参谋，需要的是带有个人审美和情感导向的建议，而非标准化的技术输出。”\n\n    从技术角度看，混音这个环节尚未出现强有力的AI工具，其核心在于数据壁垒。“很多历史数据难以获得，比如某些专业软件的混音插件、硬件设备的具体操作参数，第三方很难批量采集，整个混音过程类似一个‘黑盒’。”卡卡解释。也就是说，要训练一个能媲美顶级混音师的AI，需要海量、高质量且开放的操作数据，目前很难实现。\n\n    采访中，几名音乐人对AI的共识是：它正在淘汰的不是创作本身，而是低技术含量、可批量复制的工作，比如用于短视频配乐、商业广告等的功能性音乐。按照AI目前的技术水平，生成的歌曲就像一张大众脸，工整、合格，但缺少辨识度与灵魂。而市场对这部分内容的需求，正在被AI高效满足。\n\n    卡卡说，最近两年一些独立音乐人的收入来源明显减少。“因为和企业合作的商单少了，比如企业内部的活动歌曲制作，企业改为直接用AI软件生成。”Cashmere Studios自身的业务结构也在发生变化，与影视、游戏公司的合作也有一定程度的收缩。“以前大多数公司会采买一些版权音乐，或找乐手合作来做演奏尝试，现在越来越多公司直接借助AI找灵感、做小样。”\n\n## 资深玩家进化\n\n    技术跃迁的速度，决定着行业震荡的程度。资深玩家正在进化。Suno V5付费使用的Suno Studio专业模式，能实现对生成歌曲的精细化调整。用户能在不影响其他部分的情况下，重新生成歌曲的特定片段，无论是主歌、副歌还是桥段。同时，模型支持一键拆分最多12条原始音轨，可精准提取生成音频中吉他、鼓、贝斯、合成器等多种乐器轨道。这大大方便了音乐工作者，无论是二次编曲，还是后期混音，都能直接应用，效率倍增。\n\n    更大的变量，在于平台方的入局。今年2月，谷歌宣布其Gemini应用正式集成DeepMind旗下音乐生成模型Lyria 3。用户可以“描述一个想法”，指定某种风格、情绪或节奏，模型就能自动生成歌曲；用户也可以上传照片或视频，Lyria 3会通过分析画面氛围，创作出契合场景的配乐。所有生成的曲目都使用SynthID技术添加了不易察觉的水印，便于检测AI创作内容。\n\n    谷歌之外，国内音乐平台也未缺席这场竞赛。比如，QQ音乐内嵌“AI作歌”功能，用户可搜索直达，提供“一句话”“填词”“图片”“哼唱”等生成方式。“这类用户有自我表达的诉求，就像过去写日记、拍照一样，音乐也成了他们的一种记录方式。”腾讯音乐VEMUS未音业务负责人Lillian说。\n\n    去年年底，腾讯音乐旗下AI创作工具“VEMUS未音”正式发布，定位与Suno形成微妙错位——Suno逐渐向专业生产者倾斜，而VEMUS希望降低音乐创作门槛，让更多人有机会用音乐进行自我表达。“很多用户内心想写歌，但不太会定义风格，就像现在很多人不太会问AI问题一样。”Lillian说。为此，VEMUS给用户做了更简单的设计：用户可以参考自己常听的歌曲，让模型从中提取风格灵感。系统会总结当前热点的风格配方，一键调配，甚至可以通过对话的方式，聊着聊着就作出一首歌。\n\n    随着AI工具的“狂飙”，有人被迫出局，也有人奋力追赶。莫芷铭将AI用作灵感催化剂，“如果自己要创作一首歌，能想到的元素肯定没有AI多，速度也没有AI快，那就让它生成五六个版本，来刺激我的大脑。”而Rey选择深入技术的腹地，研究如何“跑本地模型”。从电力系统专业出身，到转行做音乐，再到如今研究代码，他一直没有停下。\n\n## 重构收益规则\n\n    当AI生成的海量作品试图流向市场换取回报时，它们会撞上一堵墙——一套尚未适配、仍在重构的收益规则。\n\n    曾经，AI音乐在国内平台基本处于零分成状态。现实正在发生变化：部分平台已开始试水AI音乐商业分配。比如，网易云音乐推出AI歌曲专属激励金活动，符合要求的AI作品可参与收益分配；抖音旗下汽水音乐则依托短视频生态，为AI音乐提供播放收益与BGM使用分成。\n\n    即便如此，AI音乐的商业化仍面临双重困境：一是版权与收益规则不清，二是内容质量参差不齐。\n\n    业内人士解释，现有的商业模式、合作协议、版权授权机制，都是基于传统音乐创作模式建立的。AI音乐的出现，打破了这一体系。同时，内容质量也是绕不开的门槛。大量AI生成的歌曲仍带有明显的机器味，难以与真人作品竞争主流商业市场。\n\n    实际上，AI音乐能不能赚钱这个问题，不只在于规则制定。莫芷铭提出疑问：“如果一首歌明显是百分之百AI生成的，为什么要分成？”\n\n    在海外，甚至有平台明确对AI音乐说“不”。今年1月，知名独立音乐平台Bandcamp宣布，禁止AI生成的音乐上架，还规定“完全或主要由AI生成的音乐和音频”不允许发布，任何使用AI工具模仿其他艺术家或风格的行为也被严格禁止。Bandcamp在声明中强调，此举是为了保护真实的人类创作者社群，让乐迷能够确信他们在平台上听到的音乐“是由人类创作的”。\n\n    争议之下，行业并未停下脚步。尽管AI音乐收益机制尚不成熟，仍有不少机构和创作者在持续布局AI音乐，部分作品进入热门榜单，还有平台已经捧出了自己的AI音乐人。为什么？\n\n    “这背后有几个驱动因素。”Lillian分析，一是占位，很多公司或个人认为AI音乐是未来方向，提前布局，尝试跑出爆款；二是内容试验，有些人用AI生成大量歌曲，测试用户反馈，甚至有些作品质量不错；三是自我表达，普通用户用AI工具创作音乐，更多是情感记录或社交分享，而非商业目的。\n\n    与此同时，AI音乐的普及也带来“洗歌”“刷量”等滥用行为。对此，平台也在不断升级技术能力，来识别和治理低质量、侵权内容。\n\n    “我们正在观察用户的选择和行业的发展。如果AI音乐足够优质，能够被用户喜爱，它自然会进入榜单。未来，我们也可能为AI音乐设立专属榜单，甚至探索新的广告模式、商业化路径。”Lillian说。\n\n## 回归人的价值\n\n    这场AI对音乐行业的重塑，正触及一个更深层的结构性问题——职业阶梯的断裂。\n\n    卡卡观察到：“AI可能会导致严重的人才断档。”过去，音乐人可以从接小型项目、写定制化的商业歌曲起步，慢慢积累经验爬升到金字塔顶端。但现在，这些“练手级”的机会正在被AI生成的音乐大规模蚕食。“成为专家的那条路径变窄了，很多人开始考虑转行，或者加入AI音乐制作的大军。”\n\n    这意味着，未来的音乐行业可能呈现出哑铃型结构——一端是拥有个人IP和不可替代审美的少数人，另一端是使用AI工具批量生产的人，而中间层的生存空间正被急剧压缩。站在平台视角，Lillian则认为，AI在不断推动行业发展、优化行业生态，让大量过去没有专业音乐创作能力的人也能创作出还不错的音乐，也反推更多专业从业者去产出比AI创作更好的音乐作品和内容。\n\n    这两种观察并非矛盾，而是同一枚硬币的两面：传统的职业中间层或许在缩小，但一个由AI赋能的新手和跨界者构成的大众创作中间层正在出现。这背后，指向专业从业者角色的深刻迁移——从“如何做”的执行者，被推向“做什么、为什么做”的决策者。审美、情感和独立品格，正在成为更稀缺的核心能力。正如硅谷著名天使投资人纳瓦尔在一档播客中所言，AI没有肉身，没有欲望，没有生存本能，本质上依然是“人类知识压缩机和模仿者”。\n\n    “在歌曲领域，真实的表达来自人类的情感与经历。AI时常表现得循规蹈矩，而真人演绎时不免会有一些小瑕疵——而那些瑕疵背后，是很鲜活的东西。”卡卡说。\n\n    一个明显的趋势是，越强调人的连接性的工种，抗风险能力越强。\n\n    身兼多职的音乐人莫芷铭在采访中展现得很从容，他的主要精力放在需要深度沟通的专辑制作和艺人演唱会演出上，这类工作高度依赖个性化沟通。“艺人有明确的表达意图，音乐需要与现场的视频、灯光、特效以及很多工种紧密协作。像Suno这类工具，目前还处理不了如此细致、综合的创作需求。”\n\n    卡卡决定将工作室的未来方向锚定在“人与人的深度交流”上，计划打造更大的公共活动空间。“当套路化音乐充斥市场，人们过度沉浸在虚拟世界中，‘物极必反’的规律将会生效。”他依然希望，大家能回归真实的、面对面的线下沟通。", "url": "https://www.jfdaily.com/staticsg/res/html/journal/detail.html?date=2026-03-24&id=499978&page=05"}, {"id": "recvfkbeMndPkU", "title": "在创新中国看到发展机遇", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/v6_2.jpg", "date": "2026-03-24", "author": "李心萍 吴燕 刘温馨", "author_unit": "作者李心萍、吴燕、刘温馨，系人民日报记者", "source": "人民日报", "summary": "2026年中国发展高层论坛以\"'十五五'的中国：高质量发展与共创新机遇\"为主题，与会国际嘉宾将\"确定性\"\"创新\"\"机遇\"视为认识当下中国的三个关键词。在\"确定性\"方面，\"十五五\"规划展现宏观经济政策与结构性改革协同发力，积极财政政策、适度宽松货币政策同步推进，中国正成为全球\"确定性基石\"和\"稳定性港湾\"。在\"创新\"方面，苹果、阿里巴巴等企业高度肯定中国开发者社区的创新活力，中国在人工智能开源模型、量子科技、生物制造、6G等未来产业领域持续突破，并致力于全球技术共享。在\"机遇\"方面，西门子、梅赛德斯-奔驰、美敦力等跨国企业纷纷表示将继续深耕中国市场，中国既是战略要地，也是创新策源地和消费潜力市场。郭孔丰强调，30多年来累计在华投资约1000亿元，仅2018年至今就达600亿元。罗兰贝格联席总裁将中国比喻为\"健身房\"，外资在此提升竞争力。", "content": "当前，国际局势正在经历深刻复杂变化，在这样一个充满挑战也充满希望的时代，世界经济何去何从？中国经济又将为世界提供哪些机遇？让我们一起听听与会嘉宾们的观点。\n\n“本次活动发生在一个持续变化、动荡不安的时期。贸易、地缘政治、技术、人口形势，各种重塑全球经济的力量正以前所未有的速度影响着我们。”国际货币基金组织第一副总裁丹·卡茨一语道出了世界经济发展面临的挑战。\n\n在与会嘉宾眼中，中国是全球稳定与增长、贸易及技术变革的稳定力量和核心引擎，正以自身的稳定发展，日益成为世界的“确定性基石”和“稳定性港湾”。中国的“十五五”规划纲要充分展现了宏观经济政策、结构性改革与长期规划如何协同发力，这种一致性与适应性的结合是中国长期发展的关键驱动力，也为其他国家提供了宝贵的借鉴。\n\n“十五五”时期，中国将在结构优化和质量提升基础上，力争国内生产总值增长保持在合理区间。\n\n“当前，中国每年的经济增量相当于一个中等经济体一年的经济总量。”中国人民银行行长潘功胜表示。这样的经济增量，将为全球企业带来巨大的发展机遇。\n\n先看财政政策。财政部部长蓝佛安表示，未来5年，财政政策将坚持积极的政策基调，既保持必要的赤字水平和支出规模，加强逆周期和跨周期调节，又持续优化支出结构，强化财政科学管理，不断提高政策精准度和有效性。\n\n再看货币政策。“我们将继续实施适度宽松的货币政策。”潘功胜表示，将平衡好短期与长期、支持实体经济增长与保持金融体系自身健康性、内部均衡与外部均衡之间的关系，保持流动性充裕。\n\n“改革开放40多年来的历史、经验充分表明，中国拥有长期、稳定、安全的发展环境，是最优良的国际资本安全避风港。”中央财经委员会办公室分管日常工作的副主任韩文秀表示，中国将持续打造市场化、法治化、国际化一流营商环境。\n\n韩文秀总结道，中国的“十五五”规划是一个全面贯彻新发展理念、着力推动高质量发展的规划，是与世界各国共同创造和发展新机遇的规划，既是中国新蓝图，也是世界新机遇。\n\n论坛外方主席、苹果公司首席执行官蒂姆·库克认为，中国的开发者社区每天都在拓展创新的边界，他们合力打造出强劲的发展引擎，持续创造新的机会。\n\n阿里巴巴集团主席蔡崇信表示，如果说过去几十年是中国科技的“积累期”，那么今天则进入“百花齐放”的爆发期。从新能源、电动汽车、高端制造，到机器人和人工智能的突破，中国正处于与世界共享科技发展和成果的最佳时刻。\n\n人工智能开源模型成为最佳例证。2025年，中国开源模型的全球下载量领先世界，让全球各地的开发者都能免费获取、微调并部署这些强大的模型，大大降低了全球使用AI（人工智能）的门槛，让智能技术真正成为全人类的公共产品。\n\n当前，新一轮科技革命与产业变革深入演进。加强科技创新，布局未来产业，成为全球共同关注的课题。\n\n工业和信息化部部长李乐成介绍，中国积极培育发展未来产业，取得了系列成效，未来产业赛道布局不断完善、前沿技术供给不断加强、企业活力不断释放、生态体系不断优化。\n\n“未来产业不是某一个国家的‘独奏’，而是全球创新合作的‘协奏曲’。”李乐成强调，中国正同世界各国共享技术创新成果，携手推动未来产业发展，造福全人类。\n\n“我们正在通过人工智能技术，赋能小微经营主体，助力他们更便捷地获取金融支持。”奇富科技首席执行官吴海生介绍，海量多元的真实应用场景、高价值的数据积累，以及超大规模市场，是人工智能在中国金融领域应用的独特优势，“今年我们将带着中国市场的经验，加速海外市场布局，让人工智能更好服务实体经济。”\n\n小米集团创始人、董事长兼首席执行官雷军表示，未来产业天然有着创新协同发展的全球化属性，中国正在成为全球技术创新的主要策源地，“未来产业的生态建设既需要用好全球资源，又需向全球开放共享成果，小米一直致力于全球的技术创新与共享。”目前，小米已向全球的开发者开源了自研的全栈大模型和具身智能模型。\n\n论坛上，量子科技、生物制造、氢能和核聚变能、脑机接口、具身智能、6G等产业，成为讨论的焦点。与会企业家们表示，这些产业，未来有望形成数个万亿级甚至更大规模的市场，企业市场空间广阔。\n\n韩文秀介绍，经过多年努力，中国的自主创新能力已经越过了某个拐点，“我们相信，中国的科技创新和产业创新将产生日益增大的全球溢出效应，世界会因为中国的创新而更加丰富多彩。”\n\n来到中国、观察中国、研究中国，跨国企业们看到了机遇，坚定了信心。\n\n有的，相中了战略机遇。“中国的新战略正在为我们敞开机遇之门。”西门子股份公司董事会主席、总裁、首席执行官博乐仁说，如今西门子的足迹遍布中国，拥有3万多名员工，服务各行各业超过5万家客户。\n\n“中国是我们最重要的合作伙伴之一。中国拥有我们全球最大的生产基地、重要的创新布局，以及充满活力的人才与技术生态体系。”梅赛德斯—奔驰集团股份公司董事会主席康林松介绍，我们坚定致力于“在华发展，与华共进”。\n\n有的，相中了创新的活力。美敦力董事长兼首席执行官杰夫·马萨则表示，我们相信中国不仅将成为全球最大的医疗科技市场之一，更将成为全球医疗创新的重要策源地。美敦力将坚定扎根中国市场，共同构建医疗创新生态，推动中国创新走向全球。\n\n有的，看到了市场的潜力。天丝集团首席执行官许馨雄表示，在促消费政策与“健康中国”战略的双重牵引下，中国的健康饮品行业正迎来前所未有的发展机遇。天丝集团将持续以产品创新、场景创新、产业协同助力全民健身事业发展。\n\n“我们始终坚定看好中国，这是因为中国有巨大的消费市场、有勤劳的人民、有强大的创新能力，经济增长排名前列。”新加坡丰益国际集团董事局主席、首席执行官郭孔丰表示，“30多年来，我们累计在中国投资约1000亿元，特别是2018年至今，投资达600亿元，超过此前多年的总和。”\n\n作为一家德国的管理咨询公司，罗兰贝格全球管委会联席总裁戴璞表示，在一个非常不稳定的世界中，中国传递出的稳定性对跨国企业非常重要，“对外国投资者而言，这里就像是一个‘健身房’，外企必须具备竞争力，必须行动迅速，但所有企业有序竞争、切磋交流，都能得到锻炼，提升竞争力。”\n\n前方的路虽然充满挑战，但美好未来更加可期。韩文秀表示，今年以来，中国经济起势有力，开局良好。“我们将乘势而上、稳中求进，保持经济向新向优向好发展态势，为动荡不安的世界注入更多稳定性、确定性、正能量。”", "url": "http://paper.people.com.cn/rmrb/pc/content/202603/24/content_30147022.html"}, {"id": "recvfkc5pwUezS", "title": "航空总人口超五亿见证高质量发展", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/v7_1.jpg", "date": "2026-03-24", "author": "李晓津", "author_unit": "中国民航大学航空经济与发展研究所所长", "source": "人民日报", "summary": "我国航空人口超5亿，成为全球第一航空人口大国，这一成就源于经济高质量发展与民航业持续进步。航空人口规模反映经济发展水平和居民收入，验证民航服务品质。成为航空人口大国带来多重利好：助推航空工业升级、促进消费增长、辐射区域发展。未来应在安全、服务、效率、效益方面持续提升，让更多人共享民航发展成果。", "content": "中国民航局数据显示：2026年春运期间，全国民航累计运输旅客9439万人次，比2025年春运同期增长4.6%，创历史同期新高。算起来，这已经是2024年以来民航春运旅客运输量第三次创新高了。\n\n增长的民航客流里，有一条数据引人注目：截至2025年，我国航空总人口超5亿，成为全球第一航空人口大国。\n\n啥是航空人口？它指的是在统计期内至少乘坐过一次民航航班的人口数量。航空人口规模是国家和区域经济发展的“晴雨表”，可以从侧面反映国家经济运行、居民可支配收入情况。微观上看，该指标也是民航产品质量的“检验尺”，能够验证民航在安全水平、供给能力、服务品质等方面是否能满足消费者的出行需求。\n\n我国之所以能在当下成为全球第一航空人口大国，除了人口基数大，更与我国经济高质量发展、民航业自身发展高度相关。\n\n得益于我国消费“主引擎”作用不断增强，跨区域商务往来、文旅出行等经济活动持续活跃，直接催生民航市场需求增长，特别是不少三、四线城市及偏远地区依托民航迎来了更多旅客。比如今年春运期间，出行平台数据显示，前往新疆阿勒泰、广西北海、云南芒市的机票预订量同比增幅分别为44%、24%、22%。同时，民航业积极承接客流，持续提升飞行安全和航班正点水平，织密航线网络，推出“航空+文旅”、航空快线和空铁联运等差异化产品，更好匹配了消费者个性化、多元化的出行需求。\n\n成为航空人口大国，对我国经济社会发展具有多方面积极影响，有利于塑造诸多新优势。\n\n从航空工业看，民航市场稳步发展直接利好航空装备制造企业，截至2025年底，中国民航使用的国产民机达220架，比2024年增长约30架，由此带动航空发动机、航材、机载设备等配套产业链同步升级，牵引我国航空工业快速发展。\n\n从扩大内需看，安全、便捷、经济的民航服务使商务文旅、外贸物流行业持续受益，例如2025年江苏城市足球联赛期间，在比赛日前后，南京禄口国际机场旅客量同比增长约29%，扬州泰州国际机场同比增长约21%，促消费效果明显。\n\n从辐射效应看，机场所在区域经济发展速度较快。根据中国民航大学统计，2025年前三季度全国机场所在城区地区生产总值平均增速为7.5%，这背后，离不开机场对高附加值临空产业的拉动和支撑作用。\n\n从市场潜力看，未来我国航空人口依然有较大增长空间。一方面，年轻旅客成为“民航新势力”，13—18岁青少年“首乘”比例增幅显著；同时，银发族旅游出行频率和距离稳步提升，今年春节假期，在一些出行平台上，60岁以上乘客购买“人生第一张机票”的数量增长两成。\n\n尽管我国航空人口规模已经领先，但与一些世界航空运输强国相比，我们在运行效率、经济效益上仍具有改进提升空间。\n\n比如，在安全生产方面，必须将安全作为不可动摇的底线；在改善服务方面，以旅客和货主为中心，以智慧民航服务为牵引，提供更多个性化、多样化、品质化服务；在运行效率方面，以人工智能等技术赋能航空公司、机场、空中交通管理系统，增强空域资源保障能力；在经济效益方面，通过综合整治“内卷式”竞争，规范市场秩序，提升单位收益。\n\n长远看，超5亿航空人口只是一个新的起点。中国航信数据显示，今年前两个月，民航“首乘”旅客又新增838万人。随着我国内需加快释放、产业更加完备、开放水平更高，“世界各国中航空人口最多”的纪录，我们有信心领跑更久。\n\n（作者为中国民航大学航空经济与发展研究所所长，本报记者邱超奕采访整理）", "url": "http://paper.people.com.cn/rmrb/pc/content/202603/24/content_30147023.html"}, {"id": "recvfkcnICnXfS", "title": "外资参与我国资本市场意愿增强", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfkcnICnXfS.jpg", "date": "2026-03-24", "author": "", "author_unit": "", "source": "中国经济网", "summary": "新'国九条'发布以来，外资参与我国资本市场意愿显著提升。'十四五'期间新增14家外资控股机构，今年255家外资机构调研688次。外资流入注入长期资金、改善流动性、带来成熟投资理念、推动估值优化。证监会提出以开放促改革，营造透明稳定可预期的市场环境，提升资本市场对外资吸引力。", "content": "新“国九条”发布实施以来，随着我国资本市场在完善基础制度、健全市场功能、提升上市公司投资价值、扩大高水平开放等方面取得积极成效，外资机构参与我国资本市场的意愿和积极性明显提升。数据显示，“十四五”期间，我国累计新增核准14家外资控股证券基金期货机构来华展业兴业。今年以来，外资机构调研A股的热情持续高涨，累计已有255家外资机构参与调研，总次数达到688次。在当前全球经济格局深度调整、国际资本流动复杂多变的背景下，如何进一步提升资本市场对外资吸引力，是“十五五”时期的重要课题，也是我国资本市场实现高质量发展的必由之路。\n\n外资机构是我国资本市场的重要参与者和见证者。从战略层面看，外资的持续流入具有多重价值。一方面，外资为市场注入长期稳定的增量资金，有效改善了市场流动性，增强了资本市场的深度与韧性。另一方面，外资带来国际成熟市场的先进投资理念与精细化管理经验，有助于推动资本市场投资者结构、估值体系的优化完善，并通过竞争效应倒逼境内金融机构与实体企业提升专业能力与核心竞争力，对提升本土机构的市场化运作水平和风险管理能力具有积极意义。\n\n近年来，外资配置需求逐步引导资本流向科技创新等国家战略重点领域，对人工智能、半导体、高端制造等新质生产力领域的关注度持续提升，这与我国经济转型升级的方向高度契合。从今年外资机构对A股上市公司的调研情况看，科技成长类企业成为重点关注标的，半导体、机器人、电子设备等领域频繁现身调研榜单前列。\n\n外资机构对我国资本市场展现出浓厚兴趣的背后，离不开政策开放持续加码。“十四五”期间，我国资本市场对外开放取得显著成效。在制度层面，全面取消了行业机构外资持股比例限制，完善合格境外投资者制度，优化沪深港通、沪伦通等互联互通机制。在产品层面，境内交易型开放式指数基金产品以存托凭证形式登陆泰国、新加坡等交易所，逐步形成覆盖亚洲、欧洲、南美洲的跨境产品网络。在市场层面，新“国九条”发布实施以来，资本市场基础制度系统性重构，多层次市场体系更加完备，上市公司质量持续提升。上海证券交易所数据显示，“十四五”期间沪市科技创新公司数量占比从32%升至41%，新上市公司中近七成为科技创新企业。\n\n在证监会近日召开的资本市场“十五五”规划外资机构座谈会上，证监会主席吴清与8家在华外资证券基金期货机构代表深入交流。参会机构一致表示，对中国经济和中国资本市场长期向好发展充满信心，并提出多项意见建议，包括：持续提升资本市场服务实体经济的适配性和覆盖面，提高政策的连续性和可预期性；进一步提升上市公司投资价值，强化投资者保护和公司治理；不断提高跨境投融资便利化水平，加强与国际标准和监管规则对接；推动行业机构“引进来”和“走出去”双向开放，支持外资机构差异化、特色化发展，提升本土机构全球资源配置能力等。\n\n吴清表示，要坚持以开放促改革、促发展，着力推动资本市场对外开放迈向更深层次、更高水平，积极参与和推进全球金融治理改革，持续营造透明、稳定、可预期的市场环境。", "url": "http://finance.ce.cn/stock/gsgdbd/202603/t20260324_2850465.shtml"}, {"id": "recvfkcAwNwNFf", "title": "科技金融支持创新创造", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfkcAwNwNFf.jpg", "date": "2026-03-24", "author": "", "author_unit": "", "source": "中国经济网", "summary": "科技金融作为金融'五篇大文章'之首，支持创新创造成效显著。科技型中小企业贷款余额3.63万亿元，同比增长19.8%。政策引导创业投资'投早投小投硬科技'，推动银行信贷加大支持。金融机构从'看抵押'转向'看技术'，创新评估体系。资本市场通过科创板'绿色通道'等制度，构建与科技创新规律匹配的资本供给体系。", "content": "今年《政府工作报告》提出，“以科技金融支持创新创造”。作为金融“五篇大文章”之首，科技金融是推动科技发展的关键要素，也是推进金融高质量发展、加快建设金融强国的重要举措。当前科技金融落地情况如何？未来怎样更好地推进科技金融高质量发展？对此，经济日报记者采访了有关机构和业内人士。\n\n我国金融支持科技创新的强度和水平持续提升。中国人民银行统计数据显示，2025年四季度末，获得贷款支持的科技型中小企业27.5万家，获贷率为50.2%，比上年末高2个百分点。本外币科技型中小企业贷款余额3.63万亿元，同比增长19.8%，增速比各项贷款高13.6个百分点。2025年四季度末，获得贷款支持的高新技术企业26.54万家，获贷率为57.3%，比上年末高0.4个百分点。本外币高新技术企业贷款余额18.61万亿元，同比增长7.5%，增速比各项贷款高1.3个百分点。\n\n科技金融贷款余额的增长与政策引领有关。2025年3月份，国家金融监督管理总局、科技部、国家发展改革委联合印发的《银行业保险业科技金融高质量发展实施方案》明确提出，构建与科技创新相适应的金融服务体制机制，实现科技信贷和科技保险扩面、提质、增效。2025年5月份，科技部等部门发布《加快构建科技金融体制 有力支撑高水平科技自立自强的若干政策举措》，重点围绕创业投资、货币信贷、资本市场、科技保险支持科技创新，加强财政政策引导，健全科技金融统筹推进机制以及完善科技金融生态等7个方面内容，提出了15项科技金融政策举措。\n\n“我们会同人民银行等部门建立科技金融统筹推进机制，加强科金协同、央地联动，取得了良好成效。”科学技术部党组成员潘晓东说，一是引导创业投资“投早、投小、投长期、投硬科技”。国家创业投资引导基金启动实施，总规模预计达1万亿元。联合社保基金会、大型银行和地方政府，推动设立科技产业融合基金、科创协同母基金、创投二级市场基金等，规模将超3500亿元，为创业投资“引流”“疏堵”。二是推动银行信贷更大力度支持科技创新。科技创新和技术改造再贷款规模增至1.2万亿元，利率降至1.25%，支持范围进一步扩大。联动实施“创新积分制2.0”和科技创新专项担保计划，26家银行与企业签约超3900亿元，企业融资获得感显著提升。截至2025年底，科技型中小企业贷款余额3.63万亿元，同比增长19.8%。\n\n多地加大了支持科技创新力度。国家金融监督管理总局江苏监管局坚持试点探路、多方联动，以机制建设为抓手，引导银行业保险业聚焦科技创新、产业创新，着力打造多元服务体系，努力探索科技金融江苏实践。截至2025年末，江苏全省科技贷款余额5.46万亿元，较年初增加8003亿元，增速为17.18%。\n\n国家金融监督管理总局温州监管分局持续深化“政企金”协同，推进“数据得贷”改革，推动辖内机构围绕泵阀、电气等产业个性评价维度，精准画像科技企业创新能力和产业化水平。日前，建行温州龙湾支行依托“科创指数”融资模式，针对国家级专精特新“小巨人”企业方正阀门集团“轻资产、高研发、强成长”的特点，将专利技术、研发投入、行业标准纳入授信评价体系，为企业批复5000万元综合融资，破解传统抵押物不足难题。\n\n金融机构需要聚焦科技型企业融资开展合作，完善科技型企业融资增信措施和担保体系，积极探索银行与保险机构合作互动。人保财险平阳支公司与浙江农商联合银行辖内平阳农商银行创新“保贷联动”模式，由保险公司为重点企业科技研发定制专属保障方案，银行将科技企业投保信息纳入信贷审批核心参考，实现优先放贷与政策倾斜的精准对接。\n\n“下一步，要健全科技金融统筹推进机制，完善科技创新、产业发展、金融服务相互支撑的一体化政策框架和政策体系，加强部门协调、政策联动和信息共享，形成政策合力。”国家金融与发展实验室国际政治经济学研究中心主任董昀表示。\n\n科技创新普遍存在投入大、周期长的难题。面临研发不确定性和较长的产业链条，金融机构要针对产业特点加大中长期贷款投放，创新金融产品与服务，着力解决资金需求与偿债周期的错配问题。从“看抵押”转向“看技术”，从“做产品”转向“做服务”，真正成为科技创新的长期伙伴。\n\n民生银行将科技金融纳入全行中长期战略核心，以“全周期、全产品、全场景、全数字、全链条”的“五全”服务模式为指引，通过体系化、数智化、专业化的战略部署，为商业航天与半导体等硬核科技产业高质量发展提供金融服务。\n\n据介绍，商业航天产业具有典型的“三高一长”特性——高技术门槛、高风险系数、高资金投入、长周期回报。火箭型号研发动辄需要数亿元资金，研发周期长达3年以上，其间几乎无商业化收入，且企业多以技术专利、研发团队等轻资产为主，缺乏传统信贷所需的抵押物，融资难成为制约行业发展的瓶颈。针对行业痛点，民生银行以数智化“萤火平台”整合多维数据画像企业，组建专业团队深入产业一线，摒弃传统“重财报”逻辑，创新评估体系，研判技术价值。以中科宇航为例，民生银行在2个月内完成全流程审批，从流动资金贷款升级至5亿元大额授信，精准匹配力箭系列火箭研发需求。\n\n科技公司的核心资产是专利、技术、数据库，而不是厂房、土地、设备等传统抵押物，需要将科技创新的无形价值变成银行放贷的依据。金融机构需要完善抵押评估体系，畅通从知识产权到资产的转化路径。商业银行创新推出“知识产权质押贷”，有效助力科技型企业融资。浙江渔老大农业科技有限公司是国家级高新技术企业，企业因研发投入缺少资金，浙江农商联合银行辖内龙游农商银行通过知识产权质押贷发放贷款240万元。浙江汉至蓝特种装备有限公司是从事压力容器、医药化工设备制造的省级专精特新企业，企业缺少传统不动产抵押，浙江农商联合银行辖内兰溪农商银行通过知识产权质押贷发放贷款500万元。\n\n更好地推动金融机构支持科技创新离不开政策配套支持。“政府部门以及监管部门需要出台各类支持政策，完善金融法律和监管制度。提高科技型企业贷款不良率容忍度，支持中小银行加快不良资产处置；积极落实容错纠错、尽职免责制度，减少金融机构支持科技创新的后顾之忧。”招联首席经济学家董希淼说。\n\n作为牵一发而动全身的枢纽，资本市场能够有效促进创新资本形成，赋能科技成果转化，在畅通“科技—产业—金融”良性循环等方面发挥关键作用。目前资本市场服务科技创新的能力得到有效提升，随着科创板改革“1+6”措施落地实施，对科技创新的包容性、适应性进一步增强。债券市场“科技板”，为金融机构、科技型企业、私募股权投资机构提供长期、低利率的直接融资渠道，2025年各类主体发行科技创新债券1.8万亿元。\n\n资本市场正逐步提升并购重组制度对上市公司发展新质生产力的适配性。目前并购重组市场活跃度明显提升，上市公司通过并购重组转型升级、产业整合的积极性明显增强，尤其是集成电路等硬科技行业领域并购重组活动显著增多，收购未盈利科技型资产、“A并H”等标志性案例不断落地。\n\n今年《政府工作报告》明确提出，对关键核心技术领域科技型企业，常态化实施上市融资、并购重组“绿色通道”机制。南开大学金融学教授田利辉认为，“绿色通道”机制是对过往“一事一议”特殊安排的制度升级，将例外变为规则，将临时变为长效。构建与科技创新规律相匹配的资本供给体系。符合国家战略的关键核心技术企业，将获得从审核到融资的优先权，引导资源向“硬科技”集聚。\n\n科技创新企业具有“迭代快、风险高、轻资产”特征，企业的不同发展阶段、不同行业的科创企业所需资金类型不同，建设完善多层次的资本市场，是更好满足科创企业融资需求的重要一环。\n\n“资本市场需要创新发展。推出多元化金融解决方案，满足企业全生命周期融资需求。科创板坚持‘硬科技’定位，创业板服务成长型创新创业企业，北交所打造服务创新型中小企业主阵地。围绕创业投资、私募股权投资‘募投管退’全链条优化支持政策，引导更好投早、投小、投硬科技。”田利辉说，要以关键制度创新为引领，各板块通过差异化发展，精准对接企业不同阶段的需求，优化资源配置，提升整体服务效能。", "url": "http://finance.ce.cn/bank12/scroll/202603/t20260324_2850474.shtml"}, {"id": "recvfjKldbXEc8", "title": "坚持智能化绿色化融合化 驱动上海产业提质升级", "categories": ["行业观察", "本埠热点"], "cover_url": "'covers//covers/recvfjKldbXEc8.jpg", "date": "2026-03-24", "author": "汤文侃", "author_unit": "作者系上海市经济和信息化委员会主任", "source": "解放日报", "summary": "本文分析上海产业'三化'转型的必然选择、探索实践与未来路径。智能化、绿色化、融合化是巩固壮大实体经济根基、培育新质生产力、赢得未来竞争主动的关键所在。近年来上海在智能工厂培育、绿色园区创建、服务型制造发展等方面取得积极成效。未来应以'数智+绿色'优化重点产业，以'场景+应用'加快转型成势，以'链条+集群'优化转型生态，推动产业高质量发展。", "content": "    国家“十五五”规划纲要明确要求，坚持把发展经济的着力点放在实体经济上，坚持智能化、绿色化、融合化方向，加快建设制造强国、质量强国、航天强国、交通强国、网络强国，保持制造业合理比重，构建以先进制造业为骨干的现代化产业体系。\n\n    上海市“十五五”规划纲要进一步提出，把握智能化、绿色化、融合化发展趋势，促进各类先进生产要素向发展新质生产力加快集聚，强化高端产业引领功能，牵引带动具有更强韧性和竞争力的现代化产业体系建设。\n\n    作为经济中心城市和现代工业集聚地、先进制造新高地，上海必须胸怀“国之大者”、立足“四个放在”、聚焦“五个中心”、强化使命担当，以“三化”转型驱动产业提质升级，为加快建成具有世界影响力的社会主义现代化国际大都市筑牢物质技术基础。\n\n## **必然选择**\n\n    当前，以人工智能、绿色低碳等为特征的新一轮科技革命和产业变革加速演进，正在重组全球要素资源、重塑全球经济结构、重构全球竞争格局。坚持智能化、绿色化、融合化方向，是上海顺应全球产业浪潮、抢抓国家战略机遇、放大自身禀赋优势、实现产业能级和核心竞争力跃升的关键所在。\n\n### 第一，“三化”转型是巩固壮大实体经济根基、推动制造业高质量发展的重要着力点。\n\n    上海是中国近代工业发源地，工业始终是城市综合实力跃升的重要支撑。新形势下，“三化”转型是实体经济提质增效的关键路径：智能化推动“制造”向“智造”跃升、提高全要素生产率，绿色化推动制造体系绿色转型、实现降本增效，融合化深化拓展产业边界、提升价值空间。三者相互赋能、协同演进，实现成本优势、速度优势向技术优势、产业链整体优势的转变，推动工业经济实现质的有效提升和量的合理增长。\n\n    ### 第二，“三化”转型是建设现代化产业体系、培育发展新质生产力的重要动力源。\n\n    总体看，传统要素驱动增长模式面临边际效应递减和资源环境约束。上海作为超大型城市，亟须转变发展方式、培育壮大新质生产力。一方面，以“三化”为引擎，围绕技术革命性突破、生产要素创新性配置，推动传统产业全过程、全周期深度转型升级，实现高效率、精益化、柔性化生产。另一方面，以“三化”为引领，推动产业链、创新链、价值链深度融合，加速培育壮大低空经济、商业航天、具身智能、生物制造、智能终端等新增长点。\n\n    ### 第三，“三化”转型是强化高端产业引领功能、赢得未来竞争主动的重要先手棋。\n\n    以人工智能为代表的智能技术深度赋能生产力，以“双碳”为目标的绿色规则重塑竞争边界，以制造服务的深度融合打破产业壁垒、延伸产业链条，深刻变革产业的组织形式、生产模式、创新范式。近年来，多个国家加快制度创新和技术革新步伐，推动全球产业链供应链加速重构。以“三化”为抓手，率先探索、参与乃至引领全球技术标准、产业规则、组织体系，是未来五年乃至更长时间提升产业比较优势和安全能力、掌握产业链核心环节、占据价值链高端地位，进而在产业分工中实现“跟跑并跑”向“创新领跑”关键跃升的战略支点。\n\n## **探索实践**\n\n    近年来，面对外部环境和自身条件的深刻变化，全市上下把思想和行动统一到党中央对国内外形势的基本判断上来，把握好新一轮科技革命加速突破、数字化智能化绿色化浪潮蓬勃兴起、国家重大战略牵引赋能、国内需求潜力加快释放、企业出海布局全球等历史机遇，着力发挥好上海龙头带动优势、改革开放优势、科技和人才优势、治理现代化优势，在下大力气推动“三化”转型上取得积极成效。\n\n    ### 比如，智能化转型纵深推进。\n\n    培育42家“工赋链主”，发挥带动产业链供应链上下游数智化转型的作用，链接企业超过36万家、工业设备230多万台套，开发工业软件1800多个，构建工业机理模型700余个，助力企业运维成本降低20%、设备能耗下降10%，累计培育超150个专业数字化、智能化服务商。同时，实施智能工厂梯度培育行动，累计培育国家领航级智能工厂2家、卓越级智能工厂28家，重点领域工业企业机器人密度达500台/万人。\n\n    ### 又如，绿色化转型步伐坚实。\n\n    创建国家级绿色工厂196家、绿色园区8家、绿色供应链管理企业17家，临港零碳湾入选首批国家级零碳园区；推动上海市工业碳管理公共服务平台上线168个产品标准模型，160余家企业近316个产品完成碳足迹核算；加快发展新型绿色能源，首套10万吨级绿色甲醇项目正式投产，建成“一中心一平台一电站”新型储能测试基地，具备全流程验证能力。再如，融合化转型生态蓬勃。\n\n    坚持以数字化赋能绿色化、以绿色化带动数字化，加快推动“工业互联网+绿色制造”；积极发展服务型制造，培育国家级服务型制造示范单位45家，数量位居全国城市第一；率先发布10个服务型制造典型应用场景，推进服务型制造模式创新与场景应用，服务型制造区域发展水平保持全国第一梯队。\n\n## **谱写新篇**\n\n    面对新形势、新任务，应当把智能化、绿色化、融合化作为有机整体系统推进，加强政策协同、要素联动，放大转型叠加效能，推动产业高质量发展。\n\n    ### 一是以“数智+绿色”优化提升重点产业。\n\n    聚焦化工、钢铁、轻工、船舶等行业，通过技术融合与范式创新，重构生产函数，增强竞争优势。通过打造工业智算云平台、工业语料公共服务平台等，支撑开展全方位、全链条数智技术改造和产线升级，推动多场景协同、多智能体联动的AI技术综合集成应用，探索人形机器人在智能产线等核心制造环节应用，打造“大模型+智能体+具身智能”融合赋能的“AI+制造”样板工厂，新培育一批国家领航级、卓越级智能工厂。\n\n    同时，深化重点领域绿色转型，加快先进适用的绿色技术对传统产业的节能降碳改造，推动工业领域用能设备更新，推广高效节能设备与创新低碳产品，实现生产过程清洁化、原料使用绿色化、资源配置高效化，并推动供应链链主企业开展碳足迹核算，带动上下游企业协同减排，新培育一批标杆零碳工厂、零碳园区。\n\n    ### 二是以“场景+应用”加快产业转型成势。\n\n    强化智能产品供给能力，用好上海“IC+AI（芯智融合）”领先优势，探索具身智能、自动驾驶、卫星互联网等技术创新应用场景，加快发展智能终端、智能网联新能源汽车等新兴产业，提升装备制造智能化水平，打造材料智能引擎。\n\n    创新发展新能源及绿色低碳产业，聚焦能源装备、新型绿色能源、绿色低碳服务等领域，持续丰富应用场景，稳步推进示范项目建设，加快新型储能、碳捕集利用与封存等绿色低碳技术研发应用，推动第四代核电、燃气轮机、生物质制甲醇等产业规模化发展。\n\n    增创制造和服务价值优势，支持制造企业从以加工组装为主向“制造+服务”转型，从单纯出售产品向提供“产品+服务”转变，支持推动个性化定制、共享制造、全生命周期管理、产品服务集成等产业模式发展，提升工业专业服务水平。\n\n    ### 三是以“链条+集群”持续优化转型生态。\n\n    发挥“链主”企业牵引带动作用，将智能化改造方案、绿色供应链标准、数字化管理工具向上下游配套企业开放赋能，带动全链条智能升级、绿色协同和价值跃升。\n\n    推动工业园区和产业集聚区、中小企业特色产业集群等深度转型，建设面向产业集群的智能算力中心、行业数据集、产品碳足迹核算等公共服务平台，并发挥好专精特新企业的示范带动作用，推动中小制造企业工艺流程优化、技术装备改造升级。\n\n    加快培育综合集成服务商，围绕智能制造、绿色制造、服务型制造等需求，发布技术攻关与集成应用需求清单，鼓励与支持链主企业、高校、科研院所组建创新联合体揭榜攻关，加快培育一批链接技术与市场、制造与服务的综合解决方案服务商，打造更多“即插即用”的“硬件+软件+服务”整体转型方案。\n\n   **（作者为上海市经济和信息化委员会主任）**", "url": "https://www.jfdaily.com/staticsg/res/html/journal/detail.html?date=2026-03-24&id=499996&page=09"}, {"id": "recvfkdqAxpVxD", "title": "用好数字机遇促文旅融合", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfkdqAxpVxD.jpg", "date": "2026-03-23", "author": "金文珊", "author_unit": "作者系经济日报记者", "source": "中国经济网", "summary": "数字技术正深度融入文旅肌理，重塑产业发展逻辑。新技术打破时空壁垒、重构呈现逻辑，让文化更'潮'；创新载体形式、孵化文旅IP，让传播更广；推动跨界融合、完善产业链条，让价值更高。关键在于利用新技术搭建普惠性服务体系，推动文化全民共创共享，将文旅发展与文化惠民深度绑定。", "content": "广州新春灯会XR超感球幕剧场创新呈现广府文化，重庆千架无人机演绎“赛博年味”，四川成都东郊记忆园区智慧旅游沉浸式体验空间令人耳目一新……在新技术赋能下，各地以新场景、新体验激活春节假期文旅消费新动能，让传统年味更具现代感。\n\n数字技术正以“润物细无声”的姿态深度融入文旅肌理，重塑文旅产业的发展逻辑与消费生态。如何更好乘着数字浪潮推动文旅融合，值得各地进一步思考。\n\n新技术让文化更“潮”。文化是文旅融合发展的精神内核与核心竞争力，数字技术的发展为破解文化传承瓶颈、激活文化时代发展动能提供了可能。一方面，新技术打破了文化传承的时空壁垒与载体局限，通过高清采集、数字建模等方式对文物、古籍文献等脆弱文化载体进行精准复现、永久留存。另一方面，新技术重构了文化的呈现与衍生逻辑，将抽象的文化内涵转化为可感知、可互动的数字内容，使得文化本身更具时代气息。比如，敦煌“数字藏经洞”在人工智能赋能下，令古老的文化景观重焕新生。\n\n新思维让传播更广。数字化浪潮为文旅融合发展提供了多元路径。文旅传播既要创新载体，运用数字技术、沉浸式演艺等多元形式，让文化从静态展示转为动态体验；又要善用短视频、直播等新平台新方式，孵化兼具文化内核与网感特质的文旅IP，推动线下体验与线上引流双向赋能、同频共振。河南卫视“端午奇妙游”“中秋奇妙游”等节目以数字技术结合传统美学，带动大量游客慕名打卡。\n\n新业态让价值更高。迭代升级是文旅深度融合的重要抓手，单一观光型业态已难以适配大众品质化、个性化消费需求。新技术催生出越来越多文旅新业态，要以“文旅+”为纽带，善用XR、AI、数字孪生等技术搭建跨界融合桥梁，推动文旅与数字经济、康养休闲、研学教育、非遗传承等业态深度融合，完善文旅产业链条与价值体系。聚焦消费场景升级，开发复合型、全周期文旅产品，实现文旅消费从“走马观花式打卡”向“深度沉浸体验”转型，以新技术助力培育新业态、新场景、新动能，实现产业能级与核心竞争力的同步提升。\n\n更为重要的是，要利用新技术推动文旅融合成果惠及全体群众，实现文化的全民共创共享。要以数字平台、云端服务等技术为支撑搭建普惠性文旅服务体系，比如山东枣庄“全景枣庄一码通”，让群众足不出户畅享线上文旅资源、便捷享受线下服务，还能自主参与本土文化内容创作。要始终坚持文化共享与民生福祉双向赋能，将文旅发展与文化惠民、乡村振兴深度绑定，依托非遗工坊、民俗市集等载体搭建共享平台，让更多群众变成文化的参与者、传承者、共享者。（本文来源：经济日报 作者：金文珊）", "url": "http://www.ce.cn/xwzx/gnsz/gdxw/202603/t20260323_2847276.shtml"}, {"id": "recvfkeZWAlzH2", "title": "新时代人工智能治理的伦理向度", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recvfkeZWAlzH2.jpg", "date": "2026-03-23", "author": "路向峰", "author_unit": "作者路向峰，系天津医科大学马克思主义学院教授", "source": "光明日报", "summary": "在人工智能技术加速渗透全球经济社会的背景下，如何构建可嵌入、可验证、可持续的伦理规范已成为时代课题。作者认为，人工智能伦理建构需应对算法不透明、数据滥用、深度伪造等系统性风险，《北京AI安全国际共识》《人工智能全球治理上海宣言》《上海合作组织成员国元首理事会天津宣言》等文件密集出台，标志着国际社会在人工智能伦理治理方面逐步形成关键共识。文章从伦理学视角系统分析人工智能治理的四个向度：价值坐标的塑造、道德基底的铸就、伦理秩序的建构，以及危机意识与价值韧性的培育。作者强调，必须将伦理构建、伦理治理与伦理创新有机结合，避免止步于让机器对齐静态的人类价值推演，始终保持对人工智能治理的清醒态度，根据发展实际不断丰富伦理学理论，唯此才能促进人工智能向上向善发展，实现科技健康发展与社会持续进步的双赢。", "content": "作者：路向峰（天津医科大学马克思主义学院教授）\n\n习近平总书记在主持中共中央政治局第二十次集体学习时强调，“全面推进人工智能科技创新、产业发展和赋能应用，完善人工智能监管体制机制，牢牢掌握人工智能发展和治理主动权”。人工智能时代，人工智能治理问题已超越技术范畴的界限，成为牵动人类未来发展的全球治理核心议题。从人工智能产生伊始，其制造、应用及自身作为一种颠覆性技术就伴生着关于伦理的隐忧，使传统道德治理框架面临一系列新挑战，在人工智能赋能千行百业的现实境况中，也催生了全域性、前瞻性的伦理治理需求。可以说，人工智能伦理及其治理路径的建构不仅是一项技术治理的阶段性任务，更是未来数智社会伦理边界厘定的题中应有之义。\n\n## **建构人工智能治理的伦理规范**\n\n建构人工智能伦理规范的核心目标是为智能系统嵌入符合人类社会发展规律的道德判断与行动准则，确保其在赋能经济社会发展的全过程中始终以维护人类整体利益为根本遵循。实质上，在应用伦理学的诸多领域中，没有任何一个领域像科技伦理那样同责任概念联系如此紧密。为了实现这一愿景，伦理学界经历了从阿西莫夫的“机器人三定律”，到维纳的“机器应服务人类需求”，再到迈内尔等人倡导的“价值对齐”的理论演进。这些研究不仅指明了人机价值对齐的难点，更凸显了从“价值对齐”迈向“价值共生”的关键作用。然而，由于人类认知的时空局限、价值编码的固有困难及算法运行的技术边界，人工智能伦理理论面临显著的运行局限。毫无疑问，人工智能伦理规范的建构不能止步于让机器对齐静态的人类价值，而应前瞻性地迈向人与机器在互动中实现共同理解、共同调适与共同演进的协同发展新阶段。\n\n我们如何在技术复杂性、算法不透明性与价值观念多样性的时代背景下，探索出一套可嵌入、可验证、可持续的人工智能伦理规范成为问题的核心。这要求相关责任主体超越单纯的技术边界，构建一个需要技术突破、哲学反思、制度创新与社会对话协同推进的系统工程。2024年以来，《北京AI安全国际共识》《人工智能全球治理上海宣言》《上海合作组织成员国元首理事会天津宣言》等全球性文件的密集出台，标志着国际社会在人工智能伦理认同上形成关键共识，意在以人权保障、社会公正与人格尊严为核心，共同构筑人工智能时代的伦理治理框架。然而，共识的落地面临深层挑战，传统“价值对齐”观念根深蒂固，而现实中的价值协同实为动态双向的调适共生。有鉴于此，形而上层面的人工智能伦理规范的建构必须追溯人工智能伦理何以成形、回应人工智能伦理何以立本、破解人工智能伦理何以克难、架构人工智能伦理何以应变的时代之问。这些关涉人工智能伦理的追问构成人工智能体内在的“价值罗盘”，使其有可能真正成为人类可信赖的文明伙伴，进而构筑人机共荣、智能向善的未来。\n\n在人工智能伦理的实践建构中，有三种可能性，即自上而下的规范贯彻、自下而上的经验学习以及融合二者的混合。这三种人工智能伦理构建的可能性不仅塑造了人工智能伦理理论的发展方向，也深刻影响着全球范围内的人工智能伦理实践。自上而下的规范贯彻是将人类既有的伦理原则编码为计算符号，通过算法指令嵌入人工智能系统，达到规范人工智能体行为的目的。自下而上的经验学习是通过模拟进化与道德习得，借助机器学习与系统组织演化，使人工智能从具体情境中归纳道德原则、形成决策能力，最终完成从经验到规范的自主演进。混合进路是综合自上而下与自下而上的方法，基于伦理理论指导，通过模拟、训练与试错动态生成并优化伦理准则，同时融入情感、认知等功能来增强道德决策能力，并强调哲学、计算机科学等多学科协同研究。\n\n## **人工智能治理的伦理本质**\n\n日益向我们走来的数智时代已经使人工智能及其伦理问题不再仅仅是形而上层面的哲学思辨，而是日益紧迫的应用伦理问题。人工智能作为一种颠覆性技术，在技术演进与社会化应用的过程中，必然产生复杂的伦理争议与治理难题。\n\n回望人工智能伦理建构的主流理论路径与治理实践，不难辨识出三个贯穿始终、相互关联的本质问题：首先，人工智能伦理建构模糊了“以利己为出发点的利他”与“纯粹的利他”这两种根本不同的行为动机之间的界限。在人工智能时代，信息资本主义加剧了数据垄断。少数掌握信息优势的主体存在滥用权力的行为，在权责不对等的情况下规避责任，将技术风险与灾难性后果转嫁给公众，最终形成少数人获利、多数人承担代价的系统性风险。其次，人工智能伦理建构未能引导技术演化中文化观念的动态流变，未将人类文明中最崇高的精神价值转化为机器可理解、可遵循的内在原则。最后，人工智能伦理建构的过程未能充分辨识并响应人类生存所面临的根本性、紧迫性威胁，陷入集体无意识和历史虚无主义。换言之，人工智能对人类精神主体性的消解，将导致人的存在意义模糊与价值感虚化，使人失去对生命意义的探索。\n\n现有研究在回应人工智能伦理风险时，有意无意地回避了两个根本性问题：一方面，当人工智能全面融入人类生产生活过程，其既受科学探索内在逻辑的规制，亦受资本增殖与社会权力的外在塑造，而如何处理这个既对立又统一的矛盾是人工智能伦理建构无法回避的本质性问题。技术发展的根本驱动力——究竟源于科学自主性还是受制于资本与权力逻辑的塑造，直接决定了人工智能伦理建构的基点。科学技术进步带来的结构性“劳动替代”与“能力剥夺”重塑了传统劳动价值与生存根基；智能设计主体性的技术异化让少数利益主体的垄断性成为可能，但多数人的利益却因技术排斥陷入功能性失能。公众对智能系统的日益依赖，认知鸿沟持续消解着人的自主性与尊严。另一方面，当人类社会因人工智能过度应用而陷入价值困境与道德挑战时，我们能否构建起人工智能伦理准则，成为另一个亟待破解的本质问题。简言之，技术领域的伦理规则是否异化为某种形式的人机“游戏规则”？若人工智能伦理建构仅停留在技术层面的风险管控，视其背后深刻的资本逻辑规制与结构性不平等于不顾，“用算法防作弊”之类的治理悖论将不断重现。\n\n总体而言，破解人工智能伦理建构的疑难问题的过程也是审视人类“存在论”与“共存论”的过程，更是对人类精神世界与生存困境的深度觉察与主动回应。有效的人工智能伦理建构必须兼顾对技术工具的批判性审视与人类自身价值实践的持续革新。只有人工智能体在伦理设计中表现为利他行为，自反性的生成式人工智能治理过程才能真正开启。\n\n## **人工智能治理的伦理创新**\n\n人工智能伦理建构的过程实质上是人类凭借道德理性主动塑造科学技术演进的伦理方向的过程。具体而言，破解人工智能伦理疑难问题需要与之相适配的创新举措，可以通过提倡风险共担原则应对伦理风险形成“内共生”结构。同时，秉承“共存论”视角回应人类生存危难，进而实现人工智能伦理建构从被动适应到主动共构的转变。\n\n首先，提倡“风险共担”原则应对伦理风险。现今人工智能技术的应用仅是将人类大脑的特定功能合成、模拟以及转化出来。在这个阶段，机器人设计者、制造商实质上为前置的伦理行为主体，必须共同承担人机风险，如信息不对称、权责不对称、认知不对称等，避免产生风险转移现象。其次，形成“内共生”结构引导模因突变。在应对模因突变的挑战时，人类与人工智能技术必须建构一种紧密依存的共生系统。在此系统中，二者并非简单的主客关系，而是持续互动的协同关系，共同构成一个动态调整的“内共生”生态系统。这种共生关系不仅可以改变人们的生活方式，而且有助于推动人类社会的进步。最后，秉承“共存论”视角回应人类生存危难。在人工智能伦理建构的过程中，必须将责任与风险共存作为最高价值目标，系统性地预防与应对那些可能危及人类整体存续的极端性、生存性风险。实质上，为了分担道德责任，人工智能的行为主体大至国家、民族，小至设计制造者都必须在某种意义上控制其行为并在整体上考量其道德责任。\n\n在人工智能受到高度关注，同时衍生较大争议的时代背景下，我们必须冷静地思考人工智能治理中的伦理问题，合理规划人工智能的发展方向，为其套上“伦理”规则的缰绳。随着人工智能技术的深刻变革，人类的存在方式和道德实践正经历从稳固的主体性向流动的共生性转变。人类作为认知与行动唯一中心的传统地位逐渐消解，个体的自主性与尊严面临深刻挑战，社会公平和正义的基石受到侵蚀。面对人工智能带来的系统性伦理风险，迫切需要一种能塑造价值坐标、铸就道德基底、建构伦理秩序的应急伦理。未来社会，无论是人机协同，还是人机共生，都需要彰显人性光辉，深刻洞察人类未来发展方向，积极防范人类社会发展疑难问题，引导智能社会的发展步入一个更为健康文明的轨道。由此，破解人工智能伦理建构及其治理难题，通过培育深刻的危机意识与价值韧性，为人机共生的未来筑牢动态稳定、值得信赖的伦理基线。\n\n无论从人工智能引领科研范式变革的趋势来看，还是从国家治理体系和治理能力现代化的需求来看，人工智能治理都必须在伦理学的视域中加以考量。通过对人工智能伦理构建的有效阐明，避免止步于让机器对齐静态的人类价值推演；通过对人工智能伦理本质及其边界的分析和把握，始终保持对人工智能及其治理的清醒态度；根据人工智能的发展实际，不断丰富和创新伦理学理论，理解、包容和指导人工智能发展，使伦理学学科发展紧跟科技创新步伐。唯有将伦理构建、伦理治理与伦理创新有机结合起来，才能促进人工智能向上向善发展，形成科技健康发展与社会持续进步的双赢局面。\n\n《光明日报》（2026年03月23日 15版）", "url": "https://news.gmw.cn/2026-03/23/content_38662086.htm"}, {"id": "recvfkgcg2Lrcm", "title": "中办国办印发《国有企业领导人员廉洁从业规定》", "categories": ["政策解读"], "cover_url": "'covers//covers/v4_1.jpg", "date": "2026-03-23", "author": "", "author_unit": "", "source": "中国经济网", "summary": "中共中央办公厅、国务院办公厅印发《国有企业领导人员廉洁从业规定》，明确廉洁从业'五应当'：对党忠诚、担当作为、依规依法、保障民生、作风过硬。规定禁止滥用职权、谋取私利、违规营利、为亲属谋利、盲目追求政绩、违规选人用人、搞'四风'等七类行为。建立党内监督主导、各类监督贯通协调机制，为做强做优做大国有企业提供坚强保障。", "content": "新华社北京3月22日电 近日，中共中央办公厅、国务院办公厅印发了《国有企业领导人员廉洁从业规定》，并发出通知，要求各地区各部门认真遵照执行。\n\n《国有企业领导人员廉洁从业规定》全文如下。\n\n（2009年5月22日中共中央政治局会议审议批准 2009年7月1日中共中央办公厅、国务院办公厅发布 2026年2月28日中共中央修订 2026年2月28日中共中央办公厅、国务院办公厅发布）\n\n第一条 为了规范国有企业领导人员廉洁从业行为，加强国有企业党风廉政建设和反腐败工作，根据《中国共产党廉洁自律准则》、《中国共产党党内监督条例》等党内法规和《中华人民共和国监察法》等法律，制定本规定。\n\n第二条 本规定适用于国有独资、全资企业和国有控股企业、国有实际控制企业（含国有独资、全资金融企业和国有控股金融企业、国有实际控制金融企业）及其分支机构的下列领导人员：\n\n（二）列入上级党组织管理的董事会成员、经理层成员；\n\n（三）列入上级党组织管理或者由本企业党组织管理的其他高级管理人员。\n\n第三条 加强国有企业领导人员廉洁从业工作，必须坚持以习近平新时代中国特色社会主义思想为指导，坚持和加强党的全面领导，纵深推进全面从严治党，强化对国有企业领导人员履行职责、行使权力、廉洁自律的监督，一体推进不敢腐、不能腐、不想腐，为做强做优做大国有企业和国有资本提供坚强保障。\n\n第四条 国有企业领导人员廉洁从业应当做到：\n\n（一）对党忠诚，坚定理想信念，坚决贯彻党中央重大决策部署，积极服务国家发展战略，切实维护国家利益；\n\n（二）担当作为，勇于创新、锐意进取，践行正确政绩观，推动企业不断增强核心功能、提升核心竞争力，实现国有资产保值增值；\n\n（三）依规依法，遵守党章党规党纪、国家法律法规和企业规章制度，谨慎用权、严守底线，公私分明、诚实守信，防范和化解风险；\n\n（四）保障民生，履行社会责任，维护社会公共利益和职工合法权益；\n\n（五）作风过硬，深入贯彻中央八项规定精神，厉行节约反对浪费，传承弘扬国有企业优良传统和作风。\n\n第五条 各级党委（党组）应当加强对国有企业全面从严治党工作的领导，强化党的工作机关具体责任，把促进国有企业领导人员廉洁从业作为一项重要工作抓紧抓实，营造国有企业良好政治生态和发展环境。各级纪检监察机关应当协助党委（党组）加强对国有企业领导人员廉洁从业情况的监督检查，着力惩治靠企吃企、设租寻租等系统性腐败行为。\n\n各级人民政府及其履行国有资产出资人职责的部门、机构和其他有关主管部门应当加强国有资产管理，按照职能职责强化对国有企业领导人员的管理监督。\n\n第六条 禁止滥用职权损害国有资产权益。不准有下列行为：\n\n（一）违反决策原则、程序和职责权限决定企业生产经营的重大决策、重要人事任免、重大项目安排及大额度资金运作事项；\n\n（二）违反规定办理企业改制、并购、重组、破产、资产评估和处置、产权登记和交易等事项；\n\n（三）违反规定投资、发放贷款、融资、担保、拆借资金、委托理财、为他人代开信用证、购销商品和服务、招标投标等；\n\n（四）授意、指使、强令有关人员进行违反国家财经纪律和企业财务、会计制度的活动；\n\n（五）未经履行国有资产出资人职责的部门、机构和其他有关主管部门，或者有管理权限的上级企业批准，决定本级领导人员的薪酬、奖励、津贴、补贴和其他福利性货币收入；\n\n（六）将企业拥有的资产以个人名义对外捐赠、赞助，或者未经企业领导班子集体研究，决定捐赠、赞助事项，或者虽经企业领导班子集体研究，但未经履行国有资产出资人职责的部门、机构和其他有关主管部门，或者有管理权限的上级企业批准或者备案，决定大额捐赠、赞助事项；\n\n（七）其他滥用职权损害国有资产权益的行为。\n\n第七条 禁止利用职权或者职务上的影响谋取私利。不准有下列行为：\n\n（一）接受、索取本企业的关联企业、与本企业及其出资企业有业务关系的企业，以及管理和服务对象提供的礼品、礼金、有价证券、虚拟货币等财物，或者约定在离职或者退休后接受；\n\n（二）以明显低于市场的价格向他人购买、租赁或者以明显高于市场的价格向他人出售、出租房屋、汽车等物品，以及以其他交易形式非法收受他人财物；\n\n（三）委托他人投资证券、期货、基金或者以其他委托理财名义，未实际出资而获取收益，或者虽然实际出资，但获取收益明显高于出资应得收益或者亏损后由他人补偿损失；\n\n（四）以隐名入股、由他人代持股权或者代理开展经营活动等方式进行权钱交易；\n\n（五）通过可能影响公正履职的民间借贷等金融活动获取大额回报；\n\n（六）利用企业内幕信息或者其他未公开的信息，商业秘密以及企业的知识产权、业务渠道等无形资产或者资源谋取私利；\n\n（七）监守自盗、暗箱操作或者巧立名目、虚增商业环节，非法占有、挪用本企业以及关联企业的财物、客户资产等；\n\n（八）将企业经济往来中的折扣费、中介费，因企业行为受到有关部门和单位奖励、返还的财物等据为己有或者私分；\n\n（九）离职或者退休后利用原职权或者职务上的影响谋取私利；\n\n（十）其他利用职权或者职务上的影响谋取私利的行为。\n\n第八条 禁止违反规定从事营利活动。不准有下列行为：\n\n（一）个人或者以他人名义从事营利性经营活动和有偿中介活动；\n\n（二）个人直接或者以委托代持、隐名投资等形式在本企业的同类经营企业、关联企业或者与本企业及其出资企业有业务关系的企业投资入股；\n\n（三）未经批准或者备案在本企业所出资企业或者其他企业、事业单位、社会团体、中介机构、基金会、国际组织等单位中兼职，或者经批准或者备案兼职，但领取薪酬、奖金、津贴、补贴等额外利益；\n\n（四）离职或者退休后3年内，在与原任职企业及其出资企业有业务关系的企业和中介机构等单位担任职务、投资入股，或者在上述单位从事、代理与原任职企业及其出资企业经营业务相关的经营活动；\n\n（五）其他违反规定从事营利活动的行为。\n\n第九条 禁止利用职权或者职务上的影响为配偶、子女及其配偶等亲属和其他特定关系人谋取利益。不准有下列行为：\n\n（一）本人的配偶、子女及其配偶和其他特定关系人，在本企业的关联企业、与本企业及其出资企业有业务关系的企业投资入股；\n\n（二）将国有资产委托、租赁、承包给配偶、子女及其配偶等亲属和其他特定关系人经营；\n\n（三）为配偶、子女及其配偶等亲属和其他特定关系人从事营利活动提供便利条件；\n\n（四）相互为对方配偶、子女及其配偶等亲属和其他特定关系人从事营利活动提供便利条件；\n\n（五）本人的配偶、子女及其配偶和其他特定关系人投资或者经营的企业与本企业及其出资企业发生可能侵害公共利益、企业利益的经济业务往来；\n\n（六）为配偶、子女及其配偶等亲属和其他特定关系人吸收存款、发放贷款、推销金融产品提供帮助；\n\n（七）因涉及配偶、子女及其配偶等亲属，按照规定应当实行任职回避和公务回避而没有回避；\n\n（八）离职或者退休后利用原职权或者职务上的影响，为配偶、子女及其配偶等亲属和其他特定关系人谋取利益；\n\n（九）其他利用职权或者职务上的影响为配偶、子女及其配偶等亲属和其他特定关系人谋取利益的行为。\n\n第十条 禁止盲目追求政绩损害国家利益。不准有下列行为：\n\n（一）突破合理资产负债率水平和资产负债结构，导致过度负债；\n\n（二）偏离主责主业，搞无关多元经营；\n\n（三）设立多层企业组织架构规避监管，进行无序扩张；\n\n（四）在企业并购、混合所有制改革中控股不控权或者参股不行权，导致企业失管失控；\n\n（五）在企业合作中搞虚假控股，虚增经营业绩；\n\n（六）进行数据造假，掩饰企业真实状况；\n\n（七）开展融资性贸易或者虚假交易；\n\n（八）通过出租出借国有企业名称、企业名称中的字号、资质证明文件或者虚假合资等方式开展挂靠经营，拼凑企业规模；\n\n（九）违反合规和廉洁要求拓展境外业务；\n\n（十）其他盲目追求政绩损害国家利益的行为。\n\n第十一条 禁止违反规定选人用人。不准有下列行为：\n\n（一）在企业选人用人工作中任人唯亲、排斥异己、封官许愿；\n\n（二）在企业重组，主要领导成员即将达到任职年龄界限、退休年龄界限或者已经明确即将离任时，突击提拔、调整企业人员；\n\n（三）不按照规定的职数、资格条件选拔任用企业人员；\n\n（四）不按照程序动议、推荐、考察、讨论决定任免企业人员，或者由主要领导成员个人决定任免企业人员；\n\n（五）私自泄露研判、动议、民主推荐、民主测评、考察、酝酿、讨论决定人事任免等有关情况；\n\n（六）不按照要求履行重要人事任免请示报告、备案审批等程序；\n\n（七）违规招聘、安排本人或者其他领导人员的配偶、子女及其配偶等亲属和其他特定关系人在本企业或者本系统内从业；\n\n（八）随岗位变动打招呼调用原任职企业人员；\n\n（九）私自干预本企业所出资企业或者原任职企业选人用人工作；\n\n（十）其他违反规定选人用人的行为。\n\n第十二条 禁止搞形式主义、官僚主义、享乐主义和奢靡之风。不准有下列行为：\n\n（一）在培训活动、办公用房、公务用车、业务招待、差旅费用等履职待遇、业务支出方面超过规定的标准、范围；\n\n（二）用公款支付或者向本企业所出资企业和其他单位、个人转嫁应当由个人承担的费用；\n\n（三）接受、提供可能影响公正履职的宴请或者旅游、健身、娱乐等活动安排；\n\n（四）搞文山会海、表面文章，层层加码、过度留痕，督查检查考核过多过频，加重基层负担；\n\n（五）工作中空喊口号、敷衍应付、推诿扯皮，或者机械执行上级部署要求；\n\n（六）漠视职工正当要求，侵害职工合法权益；\n\n（七）其他搞形式主义、官僚主义、享乐主义和奢靡之风的行为。\n\n第十三条 各级党委（党组）应当每年至少听取1次国有企业领导人员廉洁从业情况的工作汇报，及时研究解决重大问题。\n\n各级党委（党组）在对国有企业党组织开展巡视巡察工作中，应当将企业党组织领导班子成员特别是“一把手”履职用权、廉洁自律等情况作为重点检查内容，并督促企业党组织抓好巡视巡察反馈问题的整改落实。\n\n各级党委（党组）应当建立健全以党内监督为主导，出资人监督、主管部门监督、审计监督、财会监督、职工民主监督等各类监督有机贯通、相互协调的工作机制。\n\n第十四条 各级党委（党组）及其组织（人事）部门、纪检监察机关，履行国有资产出资人职责的部门、机构和其他有关主管部门，应当拓宽教育平台渠道，丰富教育方式方法，对管辖范围内国有企业领导人员进行经常性的教育，强化理想信念、党的宗旨、革命传统和党风廉政教育，常态长效推进党纪学习教育、作风教育，深入开展警示教育。\n\n第十五条 各级纪检监察机关应当发挥党和国家监督专责机关作用，强化对国有企业的政治监督，做细做实日常监督，针对突出问题开展专项监督；发挥查办案件的带动作用，深化风腐同查同治，强化受贿行贿一起查，深入查处新型腐败和隐性腐败，增强以案促改促治实效。派驻国有企业纪检监察机构应当将驻在企业领导班子及其成员廉洁从业方面的重要问题、重要事项及时向派出机关报告。\n\n国有企业内设纪检机构、纪检委员应当在职责范围内加强对本企业领导人员廉洁从业情况的监督，重要问题、重要事项及时向同级（所在）党组织和上级纪检机关报告。\n\n第十六条 各级组织（人事）部门，履行国有资产出资人职责的部门、机构和其他有关主管部门，应当将廉洁从业情况作为对国有企业领导人员考察、考核的重要内容和选拔任用、评先评优的重要依据。\n\n履行国有资产出资人职责的部门、机构和其他有关主管部门，应当结合实际完善国有企业领导人员的经营业绩考核、薪酬管理、责任追究等制度，完善激励和约束机制。\n\n履行国有资产出资人职责的部门、机构和其他有关主管部门，应当加强监督信息化建设，依规依法运用大数据和信息化手段监督国有企业领导人员廉洁从业情况，强化数据综合分析和动态研判，重点关注投资经营风险背后的腐败问题，提升穿透式监督能力。\n\n第十七条 履行国有资产出资人职责的部门、机构和其他有关主管部门，应当注重发挥其聘任或者派出的外部董事监督作用，建立健全外部董事向其报告国有企业领导人员廉洁从业异常情况机制。\n\n第十八条 审计机关应当依规依法开展各项审计监督，严格执行国有企业领导人员经济责任审计等制度规定，揭示反映国有企业领导人员履行经济责任过程中存在的重大问题、关键问题、典型问题。\n\n第十九条 财政部门应当加强对国有企业财务、会计行为的监督，严肃查处国有企业财务数据造假、内部监督失效等问题。\n\n第二十条 国有企业党组织对本企业实施本规定负主体责任，书记履行第一责任人职责，领导班子其他成员履行“一岗双责”，结合业务分工抓好国有企业领导人员廉洁从业工作。\n\n国有企业应当依据本规定制定规章制度或者将落实本规定的要求纳入公司章程，融入公司治理、经营管理全过程，建立健全内部控制、合规管理、风险管理、内部审计、防止利益冲突等监督制约机制，保证本规定的贯彻执行。\n\n第二十一条 国有企业应当明确决策原则和程序，在规定期限内将生产经营的重大决策、重要人事任免、重大项目安排及大额度资金运作事项的决策情况报告履行国有资产出资人职责的部门、机构和其他有关主管部门。\n\n第二十二条 国有企业应当建立健全本企业领导人员履职待遇、业务支出管理制度，按照规定报履行国有资产出资人职责的部门、机构和其他有关主管部门备案。\n\n第二十三条 国有企业应当完善以职工代表大会为基本形式的企业民主管理制度，重大决策听取职工意见，涉及职工切身利益的重大问题必须经过职工代表大会或者职工大会审议。\n\n国有企业应当推进厂务公开，将本企业领导人员薪酬信息和履职待遇、业务支出管理制度以及执行情况等向职工公开。\n\n国有企业应当健全职工董事制度，支持和鼓励职工董事在董事会研究决定企业重大问题时充分发表意见、反映职工合理诉求。\n\n第二十四条 国有企业应当建立健全关联交易管理制度机制，强化对关联方的识别、报告、信息收集与管理，明确关联交易的定价、审查、回避、报告、披露等内容，防止利用关联交易输送利益。\n\n第二十五条 国有企业应当根据企业规模、业务范围、营业收入等，合理设置合规管理部门或者人员，针对反商业贿赂、涉外业务等重点领域以及合规风险较高的业务，制定廉洁合规管理制度，完善廉洁合规运行机制，将廉洁合规管理贯穿经营业务决策、执行、监督全过程。\n\n第二十六条 国有企业应当加强对境外重点岗位、重大资金、重大项目的廉洁风险防控，按照规定采取直派境外财务负责人、驻外人员轮岗轮换等措施，加强对境外人员、资金、项目的监督管理。\n\n第二十七条 国有企业应当结合本规定建立健全领导人员廉洁从业承诺制度，规范领导人员从业行为以及离职和退休后的相关行为。\n\n国有企业领导人员因个人原因辞职的，应当严格审批。对经批准离职的，国有企业应当加强跟踪管理，发现问题及
