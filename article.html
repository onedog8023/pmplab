时向组织（人事）部门以及履行国有资产出资人职责的部门、机构和其他有关主管部门报告，并向离职人员新任职单位通报。\n\n第二十八条 国有企业应当加强新时代廉洁文化建设，将廉洁要求融入企业日常管理、内控合规、业务经营等工作以及职业道德建设，充分发挥廉洁文化价值导向作用，引导国有企业领导人员修身律己，加强家庭家教家风建设，筑牢思想道德防线。\n\n第二十九条 国有企业领导人员应当强化纪律意识、规矩意识和组织观念，按照规定向组织如实报告个人有关事项。\n\n国有企业领导人员应当将贯彻落实本规定的情况作为民主生活会对照检查、年度述责述廉和职工代表大会民主评议的重要内容，接受监督和民主评议。\n\n第三十条 国有企业领导人员违反本规定的，有关党组织、单位和纪检监察机关应当按照管理权限，根据其行为性质和情节轻重，依规依纪依法给予谈话提醒、批评教育、责令检查、诫勉、组织处理或者党纪政务处分等；构成犯罪的，依法追究刑事责任。\n\n对违反本规定的国有企业领导人员，需要解任或者解聘的，依法予以解任或者解聘。\n\n国有企业党组织应当定期将其管理的领导人员受处理情况，向上级党委（党组）组织（人事）部门报备。\n\n第三十一条 国有企业领导人员违反本规定受到处理的，应当由所在企业按照规定扣减、追索绩效年薪或者任期激励收入，终止或者收回中长期激励收益，或者取消参加中长期激励资格等。\n\n第三十二条 国有企业领导人员违反本规定获取的不正当经济利益，应当依规依纪依法予以没收、追缴或者责令退赔；给国有企业造成经济损失的，应当依据国家或者企业的有关规定承担经济赔偿责任。\n\n国有企业领导人员因违反本规定获取的职务、岗位等级、奖励、资格等其他利益，应当按照有关规定予以纠正。\n\n第三十三条 国有企业领导人员违反本规定受到降职处理的，2年内不得晋升职务、岗位等级或者进一步使用。\n\n受到免职处理的，2年内不得担任国有企业的领导职务；造成国有资产重大损失被免职的，5年内不得担任国有企业的领导职务。\n\n造成国有资产特别重大损失，或者构成犯罪被判处刑罚的，终身不得担任国有企业的领导职务。\n\n第三十四条 国有企业领导人员履行职责行为虽然造成损失或者后果，但不是出于故意或者过失，而是由于不可抗力等原因所引起的，不追究责任。\n\n国有企业领导人员受到诬告、错告，有必要予以澄清的，有关党组织、单位和纪检监察机关应当按照规定进行澄清。\n\n第三十五条 国有独资、全资企业和国有控股企业、国有实际控制企业（含国有独资、全资金融企业和国有控股金融企业、国有实际控制金融企业）及其分支机构中，对国有资产负有经营管理责任的本规定第二条规定范围以外的人员，以及所属事业单位的领导人员参照本规定执行。\n\n国有参股企业（含国有参股金融企业）中对国有资产负有经营管理责任的人员参照本规定执行。\n\n第三十六条 中央金融工委、国务院国资委，各省、自治区、直辖市，可以根据本规定制定实施办法。\n\n第三十七条 本规定由中央纪委国家监委商中央组织部解释。\n\n第三十八条 本规定自发布之日起施行。\n\n32997310http://paper.ce.cn/pc/content/202603/23/content_329973.htmlhttp://paper.ce.cn/pad/content/202603/23/content_329973.html11 中办国办印发《国有企业领导人员廉洁从业规定》", "url": "http://paper.ce.cn/pc/content/202603/23/content_329973.html"}, {"id": "recvfkd1zNHkVj", "title": "从溯源到展望，读懂中国经济脉络", "categories": ["行业观察"], "cover_url": "'covers//covers/v7_4.jpg", "date": "2026-03-21", "author": "陈新光", "author_unit": "上海大学经济学院特聘教授", "source": "解放日报", "summary": "陆丁、杨锡怡合著的《话说中国特色经济》，以深邃洞察与通俗表达，构建'溯源—探索—实践—展望'的逻辑闭环。创新性将'中国特色经济'形成界定为自组织过程，突破传统转型理论框架。全书兼顾底层逻辑挖掘与通俗化表达，既服务高校教学，又推动经济知识社会普及，堪称理解中国经济的'必读指南'。", "content": "解读中国经济发展脉络，明晰特色发展道路内涵，是时代赋予的重要命题。陆丁教授与杨锡怡副教授合著的《话说中国特色经济》，以深邃的学术洞察力与通俗化的表达，串联起中国经济的溯源、探索、实践与展望，破解了晦涩的经济理论与体制逻辑，为广大读者打开了读懂中国经济的大门。\n\n    ■陈新光\n\n    马年春节读了陆丁教授、杨锡怡副教授刚出版的新作《话说中国特色经济》有感而作此书评。该书作者之一陆丁教授是经济学家，1983年毕业于复旦大学世界经济系，后远赴美国西北大学深造，获经济学博士学位，有多年在北美和东亚多所知名大学任教和研究的经历，由此奠定了扎实的比较经济学与国际金融研究根基。其深厚的学术积淀、丰富的职业履历，堪称兼具理论深度与实践广度的经济学大家。另一位作者杨锡怡是香港大学经济学博士，现任上海科技大学副教授。这本书的写作缘起于两位作者在上海科技大学合作开设的一门有关中国经济发展和改革进程的通识课。\n\n    《话说中国特色经济》一书，以深邃的洞察力与通俗晓畅的笔触，为读者提供了一把解读中国经济体制演变与当代发展议题的“金钥匙”。该书从近代中国错失工业革命先机的历史语境切入，系统梳理了改革开放以来中国经济体制的形成脉络与发展逻辑，聚焦“创新、协调、绿色、开放、共享”五大发展理念，分专题展开深入阐释。在笔者看来，这部著作的价值，不仅在于其学术上严谨的治学态度与深厚的学术功底，更在于它成功搭建起专业学术与大众认知之间的桥梁，将晦涩复杂的经济议题，转化为可触可感、易于理解的通俗表达。\n\n    该书中最具创新性的观点，集中体现为将“中国特色经济”的形成，界定为一个基于历史积淀、渐进演化、制度自适应的自组织过程，而非简单照搬西方模式，或依赖顶层设计的线性推进。这一视角突破了传统经济转型理论的固有框架，构建了更具解释力的分析范式，具体体现在三个方面：其一，结构精巧，实现历史逻辑与现实关切的深度融合。著作整体架构清晰严谨，分为四个相互关联的部分，构成“溯源—探索—实践—展望”的完整逻辑闭环，各章节层层递进、各有侧重又浑然一体，既尊重历史发展的客观脉络，又直面当下经济发展的痛点难点，为未来的研究与探索留下了开放性的思考空间。\n\n    其二，视角独特，兼顾底层逻辑的深度挖掘与通俗化表达。全书以“问题导向”为核心脉络，每一章均从重大现实经济议题切入，引导读者立足事实与数据展开理性思辨，既增强了文本的可读性，更着力培养读者的批判性思维。不同于许多经济学著作堆砌数据、纠结于专业术语的晦涩写法，作者陆丁与杨锡怡充分融合自身研究积淀：陆丁教授深耕经济与哲学交叉领域，擅长以思辨视角解构经济现象、挖掘本质；杨锡怡副教授长期致力于创新经济学、科技管理与政策研究，注重以数据支撑分析结论。两人携手，将深奥的经济理论转化为贴近生活的通俗解读，将复杂的体制机制拆解为清晰可循的逻辑链条，让专业知识走出象牙塔。\n\n    其三，影响深远，实现学术价值与社会意义的双重赋能。作为高校通识课程的核心参考书，该书已被成功纳入教学体系，同时其通俗化的表达也吸引了广大普通读者，有效推动了经济知识的社会普及。\n\n    从更广阔的视角来看，书中对“中国特色”发展道路的系统解读，精准呼应了当前中国经济转型的迫切需求，为读者理解“中国特色社会主义理论体系”提供了坚实的微观支撑，也让读者对全球科技竞争背景下中国自主创新战略的内涵，产生了深刻的思想共鸣。\n\n    《话说中国特色经济》的出版，对世界经济研究领域也产生了多维度的深远影响。该书以扎实的核心论述、翔实的中国经济发展实证分析为支撑，以“开放发展”理念为引领，向世界清晰展现了中国经济的真实发展图景，传递出“中国发展与世界共赢”的核心内涵，具体可概括为四个方面：一是世界经济增长的“稳定锚”与“动力源”。中国特色经济的持续健康发展，对世界经济增长的贡献率长期保持在30%左右，远超全球平均水平，无论是应对国际金融危机，还是缓解全球经济波动，都发挥了不可替代的稳定作用。二是全球产业链供应链的“压舱石”与“连接器”。中国是全世界唯一拥有联合国产业分类全部工业门类的国家。依托这一独特优势，中国特色经济深度融入全球生产体系，成为全球价值链与供应链的核心参与者、重要组织者，为全球产业分工的稳定与畅通提供了坚实保障。三是经济全球化的“践行者”与“推动者”。中国特色经济始终坚持全方位对外开放，坚定践行“开放共赢”理念，既是经济全球化的坚定维护者，也是积极推动者；同时，中国主动参与全球经济治理体系改革，以共商共建共享的全球治理观，为完善全球经贸规则，推动经济全球化朝着更加开放、包容、普惠、平衡、共赢的方向发展，贡献了中国智慧与中国方案。四是全球发展转型的“引领者”与“赋能者”。中国特色经济深入践行五大发展理念，在创新、绿色等领域的实践探索，为世界经济转型提供了新路径、新动能、新赛道。在创新发展领域，中国全球创新指数排名从2012年的第34位跃升至2025年的第10位，成为前10位中唯一的发展中国家；同时，中国在数字经济、新质生产力、“AI+”产业融合以及共同富裕等领域的实践，也为世界各国破解经济发展难题、实现可持续发展提供了极具价值的参考借鉴。\n\n    站在宏观的视角，笔者读后意犹未尽的是国际对比的维度不足，特色优势凸显不够。中国特色经济的“特色”，需通过与其他国家经济发展模式的对比才能更清晰地凸显。但本书多聚焦于中国自身的发展历程与实践，缺乏与西方市场经济模式、其他发展中国家经济发展模式的系统性对比，未能充分阐释中国特色经济在全球经济格局中的独特性、优势所在，使得读者难以全面理解中国经济发展模式对世界的借鉴意义，但仍然不失该书高质量的学术水准。\n\n    《话说中国特色经济》不仅是一部兼具专业性与通俗性的经济学读本，更是一面映照中国发展道路的“明镜”。其核心学术突破，在于构建了一个理解中国改革的关系性、过程性与情境化分析框架，强调制度变迁的内生性与适应性，而非外源性模仿，深刻映照出中国发展道路的独特性与普适性。这一视角不仅丰富了发展经济学的理论图谱，也为其他国家的经济转型实践，提供了差异化的参考样本。可以预见，在当今全球不确定性持续加剧的背景下，这部著作的价值将愈发凸显——它既帮助读者回望“来时路”的艰辛与坚守，也为人们照亮“向未来”的前行方向。陆丁与杨锡怡两位学者，以扎实的学理功底、深厚的人文关怀，完成了这项看似通俗、实则深邃的学术书写，这部著作无疑堪称当下理解中国经济的“必读指南”。（作者系上海大学经济学院特聘教授）", "url": "https://www.jfdaily.com/staticsg/res/html/journal/detail.html?date=2026-03-21&id=499446&page=06"}, {"id": "recvfkdpI9mjIw", "title": "精准滴灌发展银发经济", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfkdpI9mjIw.jpg", "date": "2026-03-21", "author": "王山", "author_unit": "作者系中国社会科学院经济研究所研究员", "source": "中国经济网", "summary": "银发经济是培育新质生产力的重要途径，当前仍处于起步阶段，面临供需错位、政策支持不完善、标准化水平低等问题。应优化供给结构，推动'精准滴灌'；完善政策支持体系；建立质量标准和认证体系；营造友好型消费环境，释放市场潜力。通过系统思维和多方协同，助力经济发展与民生改善形成良性循环。", "content": "“十五五”规划纲要提出，“积极开发老年人力资源，大力发展银发经济”，凸显了银发经济在促进人口高质量发展中的重要作用。2025年12月，民政部等8部门联合印发《关于培育养老服务经营主体 促进银发经济发展的若干措施》，提出“促进银发经济发展，更好满足老年人多层次多样化养老服务需求”，从培育经营主体、完善服务供给体系、优化发展环境等层面，为银发经济持续健康发展提供了制度保障。\n\n发展银发经济是培育新质生产力的重要途径。银发经济既是短板产业也是优势产业，既是传统产业也是新兴产业，这为新技术、新模式、新业态的创新应用提供了广阔实践空间。发展新质生产力可推动银发经济产业高端化、智能化、绿色化发展，将科技创新成果应用在银发经济产业链上，可改造提升传统业态，培育壮大新兴业态，推动银发经济相关产业发展，实现银发经济的转型升级。\n\n发展银发经济是满足老年人美好生活需要的现实需求。银发经济直接关系亿万老年人的生活质量，涵盖养老服务、健康管理、康复护理、文化娱乐以及适老化产品等多个领域。推动银发经济高质量发展，有助于补齐养老服务体系短板，优化养老产品和服务供给结构，不断增强老年群体的获得感、幸福感、安全感，维护社会和谐稳定。\n\n当前，我国银发经济仍处于起步阶段，市场潜力尚未充分释放，发展过程中供需错位、细分领域产业支持政策不够完善、标准化和品牌化水平较低、消费环境有待优化等问题相互叠加，制约了银发经济高质量发展。为此，应坚持问题导向和系统思维，从多方面推进银发经济提质扩容，助力经济发展和民生改善形成良性循环。\n\n优化供给结构，提升银发经济产品和服务的适配性。推动供给方式由“大水漫灌”向“精准滴灌”转变，围绕老年群体多层次、多样化、个性化需求，细分消费场景和服务对象，丰富产品和服务类型，提高供给质量和供需匹配度，更好满足老年人多样化需求。\n\n完善细分领域的政策支持体系。加强顶层设计和统筹协调，研究制定银发经济发展专项规划，在财政支持、税收优惠、土地供应等方面加大政策支持力度，推动银发经济各细分领域协调有序发展。\n\n完善银发经济相关产品和服务质量标准。建立完善的老龄产品（服务）技术标准体系和行业认证标准体系，加强标准实施与认证应用。引导和支持经营主体提升创新能力和产品服务质量，培育一批创新力强、品质优良、具有全国影响力的银发经济产品和服务品牌，提升行业市场竞争力。\n\n营造友好型银发消费环境，释放银发市场潜力。引导各类商业设施提供老年友好服务，鼓励保留现金、刷卡等多样化支付方式，推动智能设备适老化改造，提升老年人消费的便利性、安全感和获得感。健全老年消费者权益保护机制，依法严厉打击侵害老年人合法权益的违法行为，着力营造安全、便利、可信赖的银发消费环境，激发银发消费活力。\n\n（本文来源：经济日报 作者：王 山 作者系中国社会科学院经济研究所研究员）", "url": "http://www.ce.cn/xwzx/gnsz/gdxw/202603/t20260321_2844384.shtml"}, {"id": "recvfkfbAGhS5P", "title": "为“十五五”开局做好自然资源要素保障", "categories": ["政策解读"], "cover_url": "'covers//covers/recvfkfbAGhS5P.jpg", "date": "2026-03-20", "author": "常钦", "author_unit": "作者常钦，系人民日报记者", "source": "人民日报", "summary": "自然资源部、国家林草局印发《关于进一步做好自然资源要素保障的通知》，13条政策为'十五五'开局提供要素保障。建立规划动态维护机制，实现空间规划与国家发展规划同频共振；推行'一张图'审批，减少层级、提高效率、降低成本；设定'盘活一亩才能新增一亩'硬指标；新增建设用地原则上不用于经营性房地产开发。", "content": "“十五五”规划纲要宏伟蓝图已经绘就，109项重大工程如何扎实落地？重点项目如何快开工、早见效？3月16日，自然资源部召开例行新闻发布会，对自然资源部、国家林草局于本月联合印发的《关于进一步做好自然资源要素保障的通知》（以下简称《通知》）进行深入解读。这份重磅文件，聚焦现阶段地方发展的共性问题，用13条含金量十足的政策举措，为“十五五”开局提供了坚实有力的要素保障。\n\n规划动态维护机制，成为《通知》的亮点之一。自然资源部国土空间规划局局长谢海霞介绍，当前各级国土空间规划的目标年是2035年，横跨了长达15年的实施周期。依据每五年国家发展规划的任务部署，动态优化国土空间规划，是遵循经济规律和城市发展规律的必然要求。这一机制的建立，意味着空间规划与国家发展规划将实现真正的同频共振。\n\n谢海霞也强调了不可逾越的红线：地方必须确保耕地和永久基本农田“数量不减、质量提高、生态改善”，生态保护红线“面积稳定、功能提升、性质不改”，城镇开发边界节约集约、集中集聚，以及符合自然灾害防治、历史文化保护等管控要求。在此前提下，结合定期体检评估，方能开展规划的年度动态维护。\n\n《通知》中，“一张图”是被提及11次的高频词。这张“多规合一”的国土空间规划体系数智化底图，将改变传统的审批模式。《通知》明确，在“一张图”上落图落位的国家和省级单独选址项目，由省级自然资源主管部门审核后出具符合国土空间规划的许可意见，不再办理用地预审和选址手续。取得意见后，企业即可先行用地。\n\n自然资源部国土空间用途管制司司长刘彦，用3个“更”总结了《通知》带来的审批流程变化。\n\n审批层级更少。《通知》将原本属于自然资源部权限内的用地预审和先行用地项目，委托给省级自然资源主管部门办理。以往需要报部审批的项目，如今在省内就能闭环解决，同时部里依托“一张图”进行远程穿透式监管。\n\n审批效率更高。《通知》全面推行用地、用林、用草、用海的联动审批，改部门的“串联审批”为“并联审批”，实现“一个窗口进”。更具实操性的，是推广了“四个同步做”：同步勘测定界、同步现场查验、同步公示公告、同步费用缴纳，变“企业多头跑”为“部门协同跑”，极大压缩了审批时间。\n\n成本费用更省。通过实行自然资源要素的“多论合一”，将原本繁杂的各类论证合并，实现“只论一次、只评一次”。\n\n在要素保障方面，林草要素的创新同样引人瞩目。国家林草局森林资源管理司副司长张敏介绍，针对公路、铁路等线性基础设施项目覆盖面广、工期长的特点，《通知》将分段申请办理林草用地手续的权限，由地市级进一步放宽到了市县级，增强了灵活性。\n\n自然资源部自然资源开发利用司司长孔维东介绍，《通知》设定了一个“硬指标”：除能源交通水利等单独选址项目外，各地年度新增建设用地不得超过盘活存量土地的面积，“盘活一亩才能新增一亩”。\n\n孔维东表示，土地要素配置必须算好市场效益账、国家发展账和民生福祉账这“三本账”。新增建设用地，要优先保障重大基础设施、新质生产力产业体系以及城中村改造等民生事业。\n\n立足房地产市场供求关系发生重大变化的新形势，《通知》作出了明确的结构性调整：新增建设用地，原则上不用于经营性房地产开发。这绝不意味着停止供应房地产用地，而是要重点用好存量资源，进行“精供优供”。孔维东介绍了一组数据：2025年，自然资源部积极配合财政部，指导各地发行地方政府专项债券5400余亿元，主要用于收储存量闲置土地。\n\n在陆海统筹方面，海洋海岛作为高质量发展的重要战略空间，受到广泛关注。自然资源部海域海岛管理司司长许国栋表示，自然资源部始终严守大陆自然岸线保有率不低于35%的刚性底线。\n\n随着居民消费升级，游艇、海钓等休闲活动正快速崛起。为解决沿海城市游艇泊位短缺问题，《通知》支持地方结合国土空间规划，优化游艇、海钓产业基础设施布局。许国栋表示：“期待邮轮、游艇、海钓等成为今后文旅产业的新增长点。”", "url": "http://paper.people.com.cn/rmrb/pc/content/202603/20/content_30146260.html"}, {"id": "recveGZSBEtoEt", "title": "中国规划为发展中国家提供重要启示（国际论坛）", "categories": ["行业观察", "专家视点", "广域视野"], "cover_url": "'covers//covers/v4_2.jpg", "date": "2026-03-16", "author": "爱德华多·雷加拉多", "author_unit": "作者爱德华多·雷加拉多，系古巴国际政治研究中心中国问题专家", "source": "人民日报", "summary": "中国通过制度化的长期发展规划体系，实现了政策的连续性和可预期性，为改革开放、科技创新、减贫事业等取得重大成就奠定了坚实基础。五年规划已成为中国治理体系的核心环节，有效衔接现实需求与未来投资，为市场和社会提供清晰指引。这一独特的规划制度为全球南方国家提供了重要启示，表明稳定的发展规划需要制度化的长期框架，而非短期政策摆动。中国的规划体系既体现了战略远见，也确保了执行的连贯性和有效性。", "content": "一个稳定的发展规划需要制度化的长期框架，而不能仅仅依赖短期政策安排。中国数十年来持续推进改革开放，科技创新、减贫事业等取得重要成就，正是得益于政策连续性带来的累积效应\n\n中国全国两会对中国未来五年经济社会发展作出顶层设计和战略擘画，在国家治理进程中具有重要意义。这是中国治理模式的重要体现，即把发展规划作为推进现代化的重要制度工具。这也反映出中国对发展的深刻理解：发展需要制度保障和具有长期连续性的自觉实践。\n\n长期以来，中国逐步形成了一套独特的发展规划体系。在这一体系中，规划不仅是技术性文件，更是统筹短期、中期与长期发展的综合治理机制。十四届全国人大四次会议批准“十五五”规划纲要，意味着发展规划已被嵌入公共治理的核心环节。通过这种制度性实践，中国能够将远景目标和民族复兴蓝图转化为兼具连续性和可行性的具体行动路线图。\n\n五年规划在中国治理体系中发挥着重要作用，有效衔接了现实需求与未来投资。与某些受短期政策摆动影响的治理模式不同，中国注重发展的稳定性与可预期性。在实践中，五年规划成为凝聚国家、市场和社会共识的重要载体，为投资布局、结构性改革和民生改善等提供清晰指引。自1953年开始，中国已经制定实施了14个五年规划（计划），形成了兼具战略引导与政策灵活性的制度优势。\n\n“十五五”时期在中国式现代化进程中具有重要意义，承担着进一步巩固转型成果、优化经济增长结构、加快构建新发展格局等重要任务。面向未来，中国强调推动科技创新和产业创新深度融合，建设现代化产业体系。在科技创新方面，中国注重推动创新成果向现实生产力转化，在半导体、人工智能、生物技术和新能源等各领域加快形成产业能力。这一思路紧扣新质生产力发展要求，强调通过创新驱动、绿色转型和产业升级推动经济结构优化。\n\n“十五五”规划纲要还对扩大高水平对外开放作出新的部署。中国将继续深化与世界各国的经济联系，更加注重合作质量与产业链协同发展。通过推进制度型开放和多层次国际合作，中国努力构建更加稳定、互利的经济伙伴关系。高质量共建“一带一路”是推动国际合作的重要平台，通过基础设施建设、贸易往来和产业合作等，为全球经济合作提供新的动力。\n\n中国将进一步推动构建以国内大循环为主体、国内国际双循环相互促进的新发展格局。扩大内需、促进消费升级、加强科技创新等将为中国经济增长提供引擎，增强中国经济的韧性，为长期稳定增长提供坚实基础。\n\n国家发展规划法同样具有重要意义。这部法律把中国共产党领导制定和实施国家发展规划的成熟做法以法律形式固定下来，使规划从政策实践上升为具有法律约束力的制度安排。\n\n从更宽广的视角看，中国规划为许多发展中国家提供了重要启示。一个稳定的发展规划需要制度化的长期框架，而不能仅仅依赖短期政策安排。中国数十年来持续推进改革开放，科技创新、减贫事业等取得重要成就，正是得益于政策连续性带来的累积效应。\n\n无论是“十五五”规划纲要，还是国家发展规划法，都彰显了中国将规划和执行相结合的发展优势。面向未来，中国正以更加完善的规划体系推动高质量发展，为基本实现社会主义现代化目标奠定更加坚实的基础。", "url": "http://paper.people.com.cn/rmrb/pc/content/202603/16/content_30145474.html"}, {"id": "recveC3AEwXQmg", "title": "以中国人的智慧培养人工智能", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recveC3AEwXQmg.jpg", "date": "2026-03-12", "author": "田沁鑫", "author_unit": "作者田沁鑫，系全国政协常委、中国国家话剧院院长", "source": "人民日报", "summary": "田沁鑫从文化创作者视角探讨如何以中国人的智慧培养人工智能。她认为，文化原创力的彰显并非技术叠加或传统复刻，而是在理解技术潜力与局限的基础上，坚守人的创造与体验、独特性与伦理价值，智慧运用科技手段，让优秀传统文化基因在新时代焕发新生。在实践层面，中国国家话剧院借助AI技术高效整理海量历史典籍，同时利用AI辅助生成北宋美学画卷，与17组高清LED屏幕和全息纱幕构成超大屏风，呈现话剧《苏堤春晓》的壮阔叙事；并首次尝试\"第二现场\"新业态，与6个城市同步演播，让科技与艺术的协奏带给观众真切的获得感与幸福感。作者强调，无论科技如何发展，人类的创造力与思想价值都无可替代，要在数智时代凝聚共识，将技术作为驱动文化创新的引擎与孕育创造的土壤，激发文化原创力。", "content": "近年来，科技领域的创新突破持续引发关注，科技与艺术的深度融合正不断产生新的内容与审美，也带来关于人机协同的新思考。\n\n科技浪潮奔涌向前的今天，如何借助其磅礴力量激发深层次的文化原创力？文化原创力的彰显，并非简单的技术叠加或传统复刻，而是在深刻理解技术潜力与局限的基础上，坚守人的创造与体验、独特性与伦理价值，智慧地运用科技手段，让优秀传统文化基因在新时代焕发新生。文化原创力的未来，注定是科技与艺术“跨界”“共生”的协奏——我们要积极拥抱技术进步，更要坚持弘扬中华优秀传统文化精神，以中国人的智慧培养人工智能（AI）。\n\n运用技术，我们正在努力编织新的美学语言和叙事体系，拓宽艺术表达的维度和视野。2024年12月，中国国家话剧院原创音乐话剧《受到召唤·敦煌》在国家速滑馆“冰丝带”演出三场，全部满座，深受观众喜爱。我们运用人工智能生成内容（AIGC）技术，生动再现敦煌跨越千年的历史盛景，从西汉末年作为丝绸之路的重要节点，到南北朝时期名士大德隐居敦煌，“古林葱郁”“水渠纵横”“二月含青绿，三秋带紫花”，再到唐代文化商贸交流频繁，敦煌成为“华戎所交一都会”。由AI生成的千年敦煌盛景呈现在60米高色阶巨幕上，“AI+3D+二维动画+即时拍摄”等多重视觉方式，用震撼力十足的视听效果呈现过去和未来多个时空盛景，观众从AI新样态的创造中获得满足。\n\nAI辅助人类创作，除了在数据收集和资料整理上的高效便捷，还可能会产生更丰富的主题内涵、更多元的艺术形态。由于戏剧观剧场域限制，戏剧精品不容易实现广泛传播。中国国家话剧院开启“第二现场”新业态尝试，当话剧在北京首演，观众可以在不同城市的剧场看到当晚演出的直播，做到“同时共在，千里共赏”。\n\n“第二现场”这种靠传输传播的新业态，需要优质的内容和完备的可视画面。原创话剧《苏堤春晓》是中国国家话剧院的首次尝试。该剧讲述了苏东坡波澜壮阔的一生，在AI技术的辅助下，内容资料的搜集与整理工作得以高效推进，传统上需由4人耗费数周时间翻阅典籍的繁琐流程，借助AI工具仅需数秒至十几秒即可完成。其次，AI技术帮助呈现北宋美学。当17组高清LED屏幕和全息纱幕构成的超大屏风出现在舞台上，AI技术辅助生成的蔚为壮观的北宋画卷徐徐展开，无论朝堂还是民间，杭州还是成都。以“第二现场”方式，我们第一次尝试在6个城镇——上海、成都、南京、深圳、杭州、乌镇，与北京演出同步演播。当“第二现场”新业态呈现的时候，观众能够真切感受到“科技+艺术”带来的获得感、幸福感。\n\n科技赋能舞台艺术，目前正处于积极实践阶段。当前，关于“AI颠覆艺术创作思维”的讨论不绝于耳，但我认为，仍需在审慎前行中不断深化我们的认识。这需要我们在数智时代凝聚共识，将技术作为驱动文化创新的引擎、孕育创新创造的土壤，激发文化原创力。无论科技如何发展、带来怎样的变革，我对人类的创造力与思想价值永怀信心。", "url": "http://paper.people.com.cn/rmrb/pc/content/202603/12/content_30144908.html"}, {"id": "recveGZSBEDhmz", "title": "【思享家】海南自贸港“封关”何以撬动亚太经贸棋局", "categories": ["专家视点"], "cover_url": "'covers//covers/recveGZSBEDhmz.jpg", "date": "2026-03-12", "author": "符大海", "author_unit": "作者符大海系中央财经大学国际经济与贸易学院，中央财经大学全球经济与可持续发展研究中心副主任", "source": "光明网", "summary": "面对全球经贸格局深刻变化和保护主义抬头，海南自由贸易港全岛封关运作启动，通过\"一线放开、二线管住、岛内自由\"的制度创新，实现从地理枢纽向亚太经贸战略节点的跃升。这一制度型开放的突破之举，不仅为中国对外开放写下新注脚，更为区域经济一体化注入强劲动能，有力应对全球供应链挑战。海南自贸港的封关运作标志着中国开放战略的新阶段。", "content": "当前，全球经贸格局正经历深刻而复杂的变化，保护主义与单边主义抬头，传统的多边贸易体制面临严峻挑战，全球供应链的稳定性和安全性受到前所未有的冲击。在这一背景下，世界经济的重心正加速向亚太地区转移，以《区域全面经济伙伴关系协定》（RCEP）为代表的区域性合作框架成为推动经济全球化和贸易自由化的关键力量。这种结构性变迁不仅为区域经济一体化带来了新的机遇，也对各国的对外开放战略提出了更高要求。中国作为世界第二大经济体和全球贸易的重要引擎，正处于从“要素型开放”向更高水平“制度型开放”转型的关键时期。面对外部环境的不确定性，中国亟需通过构建新的高水平开放平台，深度参与并引领全球经贸规则的重塑，从而巩固和拓展自身在全球价值链中的地位。\n\n2025年12月18日，海南自由贸易港全岛封关运作正式启动，这一标志性事件不仅为中国对外开放写下全新注脚，更以制度型开放的突破之力，撬动着亚太地区经贸格局的深层变革。当3.39万平方公里的海岛成为全球最大的“海关监管特殊区域”，“一线放开、二线管住、岛内自由”的政策体系落地生根，海南正从地理枢纽跃升为亚太经贸循环的战略节点，为区域经济一体化注入强劲动能。海南自贸港的“封关”运作，不仅是中国向世界展示扩大开放决心的“制度型公共产品”，更是服务于构建“国内国际双循环”新发展格局的重要枢纽，旨在通过打造一个面向太平洋和印度洋的重要开放门户，为中国经济的持续增长和高质量发展注入新的动力，同时为动荡的世界经济注入稳定性和确定性。\n\n##**封关：不是封闭，而是更高水平的开放**\n\n海南自贸港封关运作的核心内涵，并非传统意义上的“封闭”，而是构建一种更高水平、更深层次的“制度型开放”新模式。其制度设计的精髓在于“一线放开、二线管住、岛内自由”。“一线”指的是海南自贸港与关境外的国家和地区之间的界线，在“一线”，政策目标是最大限度地放开，实现货物、资金、人员等生产要素的高效自由流动，打造一个与国际市场高度接轨的区域。“二线”则是指海南自贸港与中国内地其他地区之间的界线，在“二线”，核心任务是实施精准有效的监管，防止税收流失和各类经济风险向内地传导，确保国家经济安全和国内统一大市场的完整性。“岛内自由”则是在这一特殊监管区域内，通过简化的行政审批、自由的贸易和投资政策，保障各类要素在岛内能够顺畅、高效地流通和配置。这一制度框架的本质，是在国家主权和安全底线的前提下，将海南全岛打造成为一个“境内关外”的特殊海关监管区域，从而在对标国际最高水平开放形态的同时，有效隔离风险。这种制度创新是中国对外开放从“政策优惠型”向“制度保障型”转变的里程碑，它不再仅仅是给予某些产业或企业税收减免，而是通过一整套系统性的制度安排，为全球投资者和市场主体提供一个稳定、透明、可预期的营商环境，从根本上重塑开放的边界和内涵。\n\n更深层次的撬动作用，体现在海南为亚太制度型开放提供了“试验田”与“参照系”。从全国首张跨境服务贸易负面清单，到首个自贸港数据出境管理负面清单，再到国际商事法庭的设立，海南在服务贸易开放、数据跨境流动、知识产权保护等领域的先行先试，为区域规则融合提供了可复制的实践经验。特别是在数字经济、绿色贸易等新兴领域，海南的压力测试能够降低中国—东盟自贸区3.0版等区域协定谈判的试错成本，推动亚太经贸合作从传统商品流动型开放，向更高水平的制度型开放转型升级。\n\n##**撬动亚太经贸棋局的三大支点**\n\n**其一，区域价值链重构支点。**在“一线放开、二线管住”的宏观框架下，海南自贸港推出了一系列具有突破性的政策创新，这些政策共同构成了其核心竞争力的基石。首先是“零关税”制度的全面升级。封关运作后，进口商品管理从此前的正面清单转为负面清单管理，这意味着清单之外的绝大多数商品进口都将享受零关税待遇。据统计，“零关税”商品的税目从之前的约1900项大幅增加到6600项，占比从封关前的约21%大幅提升至74%左右，基本覆盖了企业生产经营所需的原材料、辅料和生产设备，这将极大降低企业的生产成本，激发市场主体的活力。其次是加工增值免关税政策的优化。该政策允许在海南岛内加工增值超过30%的货物进入内地时免征进口关税，封关后进一步降低了享惠门槛，扩大了增值计算范围，这将有力吸引高端制造业和加工贸易企业向海南集聚，促进产业链的延伸和升级。比如企业在海南用进口咖啡豆加工成速溶咖啡，或者把进口坚果进行分装烘焙，只要增值达标，进入内地市场就不用交关税。再者，对符合条件的企业和个人分别实行15%的企业所得税和个人所得税上限，这在全球范围内都具有极强的竞争力，是吸引全球资本和高端人才的关键举措。此外，在金融开放领域，海南自贸港在跨境资金自由便利流动方面进行了大胆探索，为跨境投融资活动提供了极大便利。这些政策相互叠加、协同发力，形成了一个完整的、具有国际竞争力的制度体系，催生了“东南亚原料—海南加工—中国内地市场分销”的新型分工模式，让海南成为区域产业链的重要增值节点。\n\n**其二，服务贸易创新试验田。**与传统的货物贸易自贸区不同，海南自贸港更侧重服务贸易与数字贸易的制度突破。海南地处南海要冲，4小时飞行圈可覆盖亚洲21个国家和地区，囊括全球约47%的人口和30%的国内生产总值，天然具备成为区域经贸桥梁的基础条件。封关后，59国人员入境免签、第五和第七航权开放等政策持续落地，进一步强化了海南与亚太各国的互联互通。随着新型离岸国际贸易的蓬勃发展，海南正从货物中转站升级为全球贸易服务枢纽，让亚太各国得以更便捷地共享中国超大规模市场红利，推动区域市场从“物理联通”迈向“要素融通”。 同时，海南还在全国率先推行跨境服务贸易负面清单管理模式，并在数字贸易、数据跨境流动等前沿领域进行制度探索，旨在建立一套与国际高标准经贸规则相衔接的治理体系。这些制度层面的建设，使得海南自贸港的开放具有了更强的系统性和韧性，它不仅是一个政策洼地，更是一个制度高地。\n\n**其三，绿色与蓝色经济纽带。**海南作为海洋大省，其自贸港建设与海洋经济、绿色发展深度绑定，并已通过一系列制度安排将“绿水青山”转化为“金山银山”。2022年5月，海南完成全国首单蓝碳生态产品交易（3424吨红树林碳汇），由紫金国际控股认购用于企业碳中和，标志着蓝碳资源价值转化实质性落地；同年10月，海南又在香港成功发行50亿元离岸人民币地方政府债券，其中24亿元为蓝色债券和可持续发展债券，募集资金专项用于红树林修复、海草床保护等海洋环保项目，成为国内首个在境外发行蓝色债券的省份。\n\n产业层面，“5+4+2”现代海洋产业体系将海上风电、海洋生物医药、海洋信息列为五大新兴产业之首：近海风电技术开发潜力超过2000万千瓦，三亚崖州湾科技城已集聚上千家海洋高新技术企业，2024年海南高新技术产品出口增长45%，其中医疗器械、新能源汽车零部件成为新增长点；陵水、文昌等地正建设面向东盟的海产品精深加工与中转基地，计划通过“零关税+保税加工”模式，把东盟输入的初级海产品加工成高附加值商品再销向全国，预计仅陵水一地年加工产值即可达150亿元。\n\n通过“蓝碳+绿色金融+高附加值海工产品”的组合输出，海南不仅回应了亚太各国共同关注的减排与可持续发展议题，也树立了区别于传统以转口贸易为主的自贸港的差异化竞争力，为构建亚太绿色经济走廊提供可复制、可推广的“海南方案”。\n\n##**落子海南，锚定亚太**\n\n海南自贸港封关运作，不是封闭的“围墙”，而是面向亚太的“开放之门”；不是孤立的“试验”，而是引领区域合作的“示范之举”。它以制度创新为杠杆，优化着亚太供应链布局，激活着区域市场潜力，推动着规则标准融合，正在重塑亚太经贸合作的新生态。\n\n当前，国际经贸规则的竞争日益激烈，焦点已经从传统的关税壁垒转向服务贸易、数字贸易、知识产权保护、竞争中立等“边境后”议题。海南自贸港在这些领域的大胆探索和压力测试，有助于中国更好地理解和适应新一代国际经贸规则，并在未来的全球规则制定中发出“中国声音”，提出“中国方案”。通过构建一个面向太平洋和印度洋的重要开放门户，海南自贸港不仅将成为吸引全球资本、技术、人才的新高地，更将成为中国深度参与和塑造区域经济一体化进程的战略支点。因此，海南自贸港的意义已远超一地一域的经济发展，它承载着引领中国新时代对外开放、推动构建人类命运共同体的国家使命，是中国在新征程上坚定不移扩大开放、与世界共享发展机遇的有力证明。\n\n当前，全球治理面临赤字，原有的国际经贸规则难以完全适应数字经济、绿色贸易等新兴领域的发展需求。中国通过在海南自贸港先行先试，探索数据跨境流动、绿色金融、知识产权保护等方面的新规则、新机制。通过这些制度创新，海南自贸港将不仅仅是一个商品和资本的集散地，更有可能成为新一代国际经贸规则的孕育地和实践场。这标志着中国的对外开放正在从被动接受和适应国际规则，转向主动参与和塑造国际规则。这种角色的转变，对于提升中国在国际事务中的影响力和话语权至关重要。通过海南这个“试验田”，中国可以在一个可控的环境内，与国际社会共同探索解决全球性问题的有效路径，推动构建更加公正、合理、包容的全球经济治理体系，这既体现了一个大国应有的责任与担当，也符合中国自身长远发展的战略利益。\n\n【本文系国家社会科学基金一般项目（25BJL080）的阶段性成果。】\n\n“理响中国·铿锵有理|在改革开放中开辟广阔前景暨党校公开课第十二季”", "url": "https://theory.gmw.cn/2026-03/12/content_38644255.htm"}, {"id": "recveEmxJgPA4x", "title": "消费新场景：惠民生、促发展的新空间", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recveEmxJgPA4x.jpg", "date": "2026-03-11", "author": "陈之殷 陈恒", "author_unit": "作者陈之殷、陈恒，系光明日报记者", "source": "光明日报", "summary": "近年来，消费市场涌现出大量有声有色的新场景，在促消费、惠民生中发挥着日益重要的作用。本期光明智库民生论坛聚焦“以场景创新激活消费需求”，刘志彪、刘奕、张瑾三位专家深入探讨。专家们指出，消费新场景本质上是用“环境营造+需求匹配”实现消费体验具象化、沉浸式升级，其关键在于从资源思维转向用户思维，精准供给满足本地市民、国内游客、境外游客的差异化需求。在具体路径上，应以文化IP为核心整合商业、旅游、娱乐，延伸消费链条；通过数智赋能提升场景传播力和运营效率；从景区商圈向社区社群延伸，将服务触角嵌入养老、特色小店等民生业态。政策层面需建立“沙盒+信用+标准”三位一体治理，引导“好场景”低成本扩张，形成“空间内容IP”的可持续循环。", "content": "近年来，消费市场中涌现了许多有声有色的新场景，在促消费、惠民生中发挥着日益重要的作用。2026年政府工作报告提出，打造一批带动面广、显示度高的消费新场景，加快培育消费新增长点。打造消费新场景，能够持续提升居民消费能力和消费意愿，在促消费与惠民生的良性循环中实现高质量发展。本期光明智库民生论坛继续聚焦“在满足民生需求中拓展发展空间”这一主题，邀请相关领域专家探讨如何以场景创新激活消费需求、增进民生福祉。\n\n刘志彪 南京大学长江产业发展研究院常务院长、教授\n\n刘 奕 中国社会科学院财经战略研究院服务经济与互联网发展研究室主任\n\n张 瑾 习近平经济思想研究中心研究三部研究员\n\n本报记者 陈之殷 陈 恒\n\n##场景和消费之间有何关联\n\n**光明智库：何谓消费新场景？新场景何以能够激活消费需求？**\n\n张瑾：消费新场景是在数字技术赋能、居民消费需求升级的大背景下，以物理或者虚拟空间为载体，融合数字技术、情感需求与相关主题，打破传统消费时空限制和供需结构，通过“环境营造+需求匹配”实现消费体验具象化、沉浸式升级，形成兼具创新性、体验性、个性化的新型消费实现形式。其重点在于体验价值的重构，实现从“卖商品”到“卖体验”的转变。它具有感官和情感深度参与的强沉浸感、需求精准匹配的高适配性、跨领域叠加的多业态融合和数智技术赋能的高效供给等鲜明特征，让消费者的个性需求可匹配、随时随地可满足。\n\n刘奕：2024年国家发展改革委等部门印发的《关于打造消费新场景培育消费新增长点的措施》对消费新场景的内涵做了清晰界定，即消费新场景是消费新业态、新模式、新产品的系统集成。它顺应了消费结构的变化趋势，突破了传统“人—货—场”的简单交易逻辑，实现要素重构与效用叠加，通过空间、文化、技术等多要素融合实现“1+1>2”的效果，形成“消费者—生产者—场景搭建者”三位一体的价值共创生态。消费新场景可以实现价值共创与体验优化，消费者从单纯注重“性价比”转向情感共鸣、社交属性、个性化体验。消费者从被动接受者转变为价值共创者，如剧本杀、互动展览等沉浸式体验让消费者从旁观者变为参与者，这种高互动性增强了消费的趣味性和记忆点，促使消费者重复光顾、主动分享，从而持续扩大消费效应。\n\n刘志彪：场景与消费的关联可以从三个方面来看：其一，场景触发消费者的消费动机与需求。场景把产品、服务、环境、内容等打包集成为一种可体验的故事，让消费者动心而下单。其二，场景可以放大消费者的消费效用与价值。在同一场景里，商品的功能价值与体验价值、符号价值叠加，客单价随之提升。其三，场景可以转化为消费者的重复购买与再消费。通过沉浸式的五感设计和社群化运营，把一次性的购买行为转化为持续的生活方式认同，进而形成圈层裂变与重复消费。场景提供了“为什么买”，消费给出了“买多少、买多久、推荐给谁”的市场答案。\n\n**光明智库：目前，消费新场景已出现哪些代表性领域？**\n\n刘奕：《关于打造消费新场景培育消费新增长点的措施》归纳了六大类消费新场景，即餐饮消费新场景、文旅体育消费新场景、购物消费新场景、大宗商品消费新场景、健康养老托育消费新场景、社区消费新场景，每个领域都呈现出鲜明的创新特征。近年来，市场自发创新催生的新型消费场景不断涌现，其中首发经济、体育经济等很有代表性。社交媒体的全域渗透，让这些新型消费场景能够快速传播、快速迭代，同时也加速了场景的更新换代，倒逼市场主体持续创新。今年1月国务院办公厅印发的《加快培育服务消费新增长点工作方案》进一步拓宽了消费新场景的发展空间，包括交通服务、家政服务、网络视听服务、旅居服务、汽车后市场服务、入境消费、演出服务、体育赛事服务、情绪式体验式服务等9大领域，既涵盖了此前的核心场景，又新增了情绪式体验式服务等新型场景。\n\n张瑾：此外，夜间经济和银发经济也很有代表性。在夜间经济中，上海博物馆创新夜游消费是一个典型案例，通过“AR寻宝+剧本杀+文创”重构消费场景，“金字塔之巅：古埃及文明大展”创下全球博物馆单个收费展参观人数、总营收世界纪录，带动城市综合消费超过350亿元。在银发消费新场景中，如长沙东茅街茶馆火爆，还原老长沙茶馆的市井生态，融合本地艺术家策展、非遗传承人驻场表演，将饮茶从单纯的休闲行为，升级为可体验、可社交、可传播的沉浸式文化场景。虽然主要客源是周围老年人，但也吸引到不少年轻人拍照体验，形成了一种银发经济与Z世代消费的双向引流。\n\n##消费新场景如何惠民生\n\n**光明智库：消费一头连着民生福祉、一头连着经济发展。消费新场景在惠民生中具体发挥哪些作用？结合“十五五”民生需求升级趋势，哪些消费新场景可以作为重点培育方向？**\n\n刘奕：从实践来看，消费新场景在惠民生方面的作用集中体现在带动就业增收、推动公共服务均等化、提升居民生活品质三大维度。\n\n消费新场景成为新职业新岗位的摇篮。消费新场景不仅催生了一大批新职业、新岗位，更拓宽了就业渠道、提升了就业质量，成为吸纳就业的重要阵地。与传统产业就业岗位相比，消费新场景催生的新职业更贴合新生代、网生代的就业偏好，容易实现“专业能力、个人爱好、收入增长”的良性循环。比如，文旅消费场景带动汉服妆造师、旅拍摄影师、虚拟现实工程技术人员等职业崛起；社区消费场景培育出社区管家、托育师、养老服务师等岗位；户外休闲、潮流娱乐场景中，轰趴管家、攀岩定线员、滑雪巡救员等职业快速成长。\n\n消费新场景推动公共服务均等化。消费新场景逐步打破城市中心集聚的格局，加速向下沉市场延伸、向社区渗透，将优质消费资源、便民服务资源送到群众家门口，有效缩小了城乡、区域间的消费供给差距，提升了公共服务的可及性和均等化水平。在下沉市场延伸方面，主题乐园、县域沉浸式文旅场景、乡镇智慧零售门店等相继落地，让农村居民享受到沉浸式文旅体验、便捷的智慧购物服务。在社区服务渗透方面，各地打造的一刻钟便民生活圈，整合了生鲜配送、家政服务、托育养老、健康咨询等优质资源，将幼儿园、老年食堂、便民诊所、生鲜超市等纳入场景范围，在步行15分钟的时间内满足居民日常消费和民生服务需求，尤其便利了老年人、婴幼儿等特殊群体。\n\n消费新场景提升居民生活品质。消费新场景通过沉浸式体验、个性化服务、文化化融合，精准契合了“品质化、个性化、精神化”的需求转型，让居民的生活更有品质、更有温度、更有内涵。比如，VR场景让居民足不出户就能“走进”博物馆，体验虚拟文物修复、宫廷礼仪等活动，在休闲娱乐中感受传统文化魅力；各地打造的潮流市集、社区文化广场、书店咖啡馆等场景，打破了传统消费的边界，不仅具备消费功能，更成为居民交流互动、放松身心的“第三空间”，丰富了居民的精神文化生活。\n\n张瑾：我国民生需求已从基础保障型向品质服务型、从普惠供给型向精准适配型等方向全面升级，除了社区便民服务集成场景、智慧养老托育普惠场景，以下民生导向型消费新场景也可以作为重点培育方向。\n\n普惠文旅体育融合场景。以“低成本、广覆盖”为重点，盘活城市公园、老旧厂房等空间，打造非遗体验街区、社区运动中心、城市书房等场景。推动文旅体与商业融合，开发平价研学、社区赛事、非遗市集等业态，降低文旅体消费门槛，丰富群众精神生活，同时带动非遗传承人、文创从业者、体育教练等岗位就业，助力公共文化服务提质增效。\n\n绿色健康消费场景。为实现健康中国和“双碳”目标，培育绿色智能家电、低碳餐饮、智慧健身、精准健康管理等场景。推广无接触诊疗、居家康复、健康监测等“AI+健康”服务，开设社区绿色超市、低碳市集，鼓励以旧换新，发放绿色消费补贴，满足群众健康与环保需求，同时推动相关产业转型升级。\n\n刘志彪：此外，还有一批消费场景既能直接回应民生需求和社会痛点，又能以场景创新实现普惠与品质兼顾，可以作为重要培育方向：\n\n微度假+运动疗愈场景。利用城市“金角银边”和郊野公园，植入可移动智能健身房、亲子无动力乐园、城市露营地、夜间荧光跑道，配套运动康复、营养餐、体育保险零售。政府以体育消费券和赛事引流，企业以会员制和装备租售实现盈利。\n\n非遗、老字号“国潮”体验街区。推动老旧厂房、步行街改造升级为“前店后坊”式手作体验+直播电商+国潮零售+主题餐饮的模式，带动夜间经济与入境消费，通过租金减免、流量补贴等形式鼓励首店、首秀、国潮品牌集聚。\n\n县域客货邮商融合便民站。乡镇客运站叠加快递共配、冷链前置仓、新能源汽车充换电、绿色家电展示、以旧换新及回收等功能，解决农村买优质商品难、卖特产难、退货更难等问题，释放消费潜力。\n\n##消费新场景如何促发展\n\n**光明智库：作为扩大内需这一战略基点的重要环节，消费新场景在促进高质量发展中可以发挥哪些积极作用？**\n\n刘志彪：消费新场景的意义体现在需求—供给—生态三个层面，将一次简单的消费行为变成技术、资本、数据等高端要素持续循环的动力源泉。\n\n在需求端，把潜在需求变成可定价市场。场景通过沉浸式、社交化、内容化体验，满足消费者碎片化、情感化、个性化需求，为高端、智能、绿色产品打开价格天花板，培育愿意为高品质商品和服务付费的市场，为上游制造企业提供稳定的高附加值订单，以需求升级倒逼产业升级。\n\n在供给端，把单点技术突破变成系统升级。场景是新技术、新产品、新模式的集成试验场，场景的落地会倒逼整条产业链同步升级。比如，移动互联网场景下，产品端从功能机升级到智能机，从贴牌到品牌化；制造端的柔性生产、数字孪生、工业互联网带动装备、原材料、核心零部件同步高端化；服务端的支付、物流、数据、内容、金融等配套措施，被场景打包集成化升级，形成新的产业共生网络。\n\n在生态端，把市场优势变成创新优势。中国超大规模市场本身就是全球最大的场景库，为产业升级提供了广阔的通道，成为新技术转化的加速器。例如，低空经济、商业航天、自动驾驶等产业，必须先找到可落地的场景才能完成“0到1”的突变，以及后续“1到N”的产品与技术迭代。又如，文化、旅游、体育、健康等传统服务业，通过场景再造与数字技术嫁接，衍生出线上医疗、云健身、沉浸式演艺等新赛道。最终，场景数据回流到研发端，形成“用户—产品—数据—再研发”的闭环，推动产业持续向高端化、智能化、绿色化跃迁。\n\n刘奕：消费新场景之于高质量发展，其意义体现在促进供需适配、推动产业创新两大维度。一方面，消费新场景的出现，为优化产业产能、破解供需失衡提供了精准解决方案，其核心在于通过增加消费者参与度和共创度，精准识别不断变动的消费偏好，重塑生产流程和供给模式，从源头上提升供需双方的适配度。在零售领域，智慧零售、沉浸式卖场等新场景的兴起，倒逼传统零售企业打破“线下单一场景”的局限，加快线上线下融合转型，通过大数据、人工智能等技术分析消费者偏好，实现精准供货、个性化推荐，破解传统零售业“库存积压、供需错位”的难题。数字文旅、沉浸式体验等新场景，倒逼传统文旅产业加快数字化改造，推动景区、文博机构引入VR、AR等技术，打造沉浸式文旅产品，实现传统文旅产业从“观光型”向“体验型”转型升级。另一方面，消费新场景的核心优势，在于能够让消费者深度参与产业创新全过程，依托消费新场景建设，消费者的偏好能够被精准挖掘、及时反馈，让用户的真实需求直接驱动新产品、新技术、新模式的开发。此外，消费新场景还能推动跨产业融合创新，催生新产业、新业态、新模式，拓展产业发展空间，为高质量发展注入新活力。消费新场景的本质是打破产业边界、实现跨界融合，这种融合不仅能够丰富消费体验，更能推动不同产业的技术、人才、资源相互渗透、协同创新，催生新的产业增长点。\n\n光明智库：什么是培育消费新场景的核心因素？如何打造一批带动面广、显示度高的消费新场景？\n\n张瑾：技术是培育消费新场景的关键支撑。科技赋能可以提高效率，比如用AI眼镜购物，顾客看商品立刻显示其相关所有信息，从人找货转变为信息找人，提高决策效率；助力跨界体验，比如“健身房+健康餐吧”可以同时拉动健康食品和服务消费。很多消费新场景依赖网络传播，因此需要支持超高清关键核心技术攻关和产业化应用、制播能力提升、网络升级改造及终端更新升级，推进超高清端到端全链条贯通。\n\n刘志彪：培育消费新场景，要建立“以人为锚”的三位一体机制。一是需求锚点。场景因人而生，如果脱离对“一老一小”、健康、便利、情绪价值的深度洞察，将无法找到技术的落地之处。例如，社区长者最需要的不是“AI语音交互”，而是吃得上热饭、看病便捷、找得到人陪护；年轻父母最急需的不是元宇宙乐园，而是百米内、可负担、可信任的托育服务。二是成本锚点。只有普惠才能实现规模化，场景如果只服务少数高净值人群，就无法形成大规模发展的产业。可通过政府补贴、空间共用、轻资产运营、供应链集采、数据复用等形式降低成本。三是盈利锚点。一次性项目和流量都无法支撑大规模产业发展，场景只有形成商业闭环才可持续。可通过增值服务、数据变现、品牌联名、资产证券化等方式，让运营方、资本方、居民方都能持续获得应有收益，实现场景自我成长、迭代与循环。\n\n刘奕：打造有品质、有特色、有效率、可持续的高质量消费新场景，必须聚焦因地制宜、跨界融合、数字赋能、生态构建四大关键方向，形成“政府引导、市场主导、社会参与”的良性循环。一是以差异化定位筑牢消费新场景根基。将本土独特优势与消费需求深度结合，形成差异化竞争，让消费场景既有“烟火气”，又有“文化味”，更有“辨识度”，形成“本土特色+消费体验”的独特模式。二是以边界打破激活高质量消费新场景活力。消费者追求“一站式、沉浸式、复合型”的消费体验，“商旅文体健”多业态融合已成为发展趋势。为了实现“1+1>2”的协同效应，应以创新业态融合丰富消费内容、延伸消费链条。三是以技术适配提升消费新场景运行效率。政府应牵头完善数字基础设施，推动技术普及应用，引导企业开展数字化转型；企业应合理运用数字技术创新场景模式，优化消费流程，提升体验感和使用效率；社会组织应普及数字消费知识，引导消费者适应智慧消费场景。四是以多方联动构建消费新场景生态。消费新场景是一个完整的生态系统，涵盖基础设施、产品供给、服务保障、行业规范等多个层面，必须构建“多方协同、多元参与、共建共享”的完整产业生态，明确各主体的职责定位，形成推动场景高质量发展的强大合力。\n\n光明智库：应以哪些措施促进消费新场景的长效发展？\n\n刘奕：促进消费新场景长效发展，关键在于建立起可持续的商业模式和运营机制。一是持续迭代动态升级。构建可持续商业模式首要是让消费新场景始终保持新鲜感和竞争力。要建立常态化的需求调研机制，通过大数据分析、用户反馈、市场调研等方式，精准捕捉消费者的新痛点、新需求，明确迭代方向；加大内容创新和产品研发投入，持续优化场景体验、更新产品供给、丰富服务内容。二是深耕运营提升黏性。必须跳出“重营销、轻运营”的误区，深耕用户运营，建立完善的用户服务体系，提升用户黏性和复购率。建立精细化的用户运营体系，针对不同消费习惯、不同需求的用户，推出个性化的服务和活动，增强用户的归属感；优化服务体验，从场景环境、服务流程、售后保障等各个环节入手，提升用户的消费体验，进而形成口碑传播。三是构建可持续的营利模式。一些消费新场景之所以难以持续，关键在于营利模式过度依赖某一种收入来源，比如门票收入、摊位费等。要搭建多元收入结构，通过“多点开花”分散经营风险，保障长期稳定盈利。可围绕场景核心优势，拓展基础收入（如门票、停车费、租金等）、餐饮收入、商品销售收入、相关活动收入、品牌授权收入等多元结构，实现长期稳定盈利。四是形成长效发展机制。完善顶层设计，制定中长期发展规划，明确发展目标、重点领域和保障措施，将消费新场景培育纳入制度化、规范化轨道；加大对商业模式创新、内容研发、品牌建设、人才培养等方面的支持力度，引导市场主体聚焦长期发展；加强消费者权益保护，建立健全消费纠纷快速解决机制，严厉打击虚假宣传、假冒伪劣等违法行为，探索建立消费投诉先行赔付制度，营造放心、安心、舒心的消费环境。\n\n刘志彪：第一，把场景纳入城市更新和民生规划，将新场景与一刻钟便民生活圈、完整社区、城市更新、乡村振兴等长期规划绑定，同步立项、同步验收，确保场地、财政、编制长期留位。第二，通过财政金融创新工具把投入变为长期资产。对社区嵌入式服务、文体场馆、老旧厂房改造等可产生稳定现金流的场景，打包发行基础设施REITs，或申请超长期特别国债，实现“建设—运营—退出—再投资”的滚动开发。推广“政府提供空间、企业轻资产运营、金融提供工具”的复合创新模式，把一次性补贴变成按绩效付费，让运营方对场景的中长期运营负责。第三，统一接入省级社区服务、托育、养老、健康等平台，形成居民画像、需求预测、服务匹配的数据闭环，降低重复获客成本，提高复购率。鼓励平台企业把消费券、会员积分等短期补贴转化为长期用户资产，破解“停补即流失”的运营魔咒。第四，将场景搭建从一次性转变为可移动、可重组、可循环模式。将赛事、演艺、市集等短时场景的搭建模块化，实现可装配、可重复利用，结束后组件转入“场景银行”循环使用。把废旧厂房、高架桥下、闲置裙楼纳入“场景备选库”，实行从有到新的再生策略，形成“空间—内容—IP”的可持续循环。第五，建立“沙盒+信用+标准”三位一体治理。对虚拟消费、沉浸式体验、直播电商等新业态实行“沙盒监管”，柔性执法、允许试错，成熟后转入常规监管。制定场景服务、安全、绿色、数据等地方标准，引入第三方信用评价，与财政补贴、金融利率、政府购买挂钩，引导“好场景”低成本扩张。", "url": "https://epaper.gmw.cn/gmrb/html/content/202603/11/content_8175.html"}, {"id": "recveH72rBNxF0", "title": "“超碳”登场，发电不再“烧开水”", "categories": ["专家视点"], "cover_url": "'covers//covers/v5_2.jpg", "date": "2026-03-11", "author": "黄彦平", "author_unit": "作者黄彦平，系中核集团首席科学家、中国核动力研究设计院超碳一号总设计师", "source": "光明日报", "summary": "本文分析：从首次蒸汽发电至今，人类利用“烧开水”获取电力已有140余年。截至目前，蒸汽发电仍是现代火力发电厂与核电厂的主要发电方式，即便在现役的核动力航母等尖端装备上，同样离不开“蒸汽做功”。难怪网友调侃：人类科技的尽头就是烧开水。\n\n然而，以蒸汽为循环工质的发电技术面临效率瓶颈，而体积大、系统复杂的固有特点又限制了其在中小功率领域的应用。但随着超临界二氧化碳发电技术的出现，“烧开水”发电将迎来质变。", "content": "从首次蒸汽发电至今，人类利用“烧开水”获取电力已有140余年。截至目前，蒸汽发电仍是现代火力发电厂与核电厂的主要发电方式，即便在现役的核动力航母等尖端装备上，同样离不开“蒸汽做功”。难怪网友调侃：人类科技的尽头就是烧开水。\n\n然而，以蒸汽为循环工质的发电技术面临效率瓶颈，而体积大、系统复杂的固有特点又限制了其在中小功率领域的应用。但随着超临界二氧化碳发电技术的出现，“烧开水”发电将迎来质变。\n\n什么是超临界二氧化碳？它有何厉害之处，能胜过发电元老——蒸汽？\n\n物质的常见状态有固、液、气三态，对于二氧化碳而言，当温度超过31℃、压力升高至73个大气压以上时，就会进入超临界状态，此时的二氧化碳既像液体一样密度高，做功能力强，又像气体一样黏度低，流动阻力小。\n\n超临界二氧化碳发电技术就是以超临界态的二氧化碳作为工质，实现从热能到电能的转换。由于超临界二氧化碳工质的特殊物质属性，该发电技术具有高效率的核心技术优势。其理论发电效率可以突破50%。我们的研发经验表明，该技术可填补世界范围内中小功率规模、中高温热源场景的高效发电技术空白，实现节能降碳，推动能源结构的优化和可持续发展。\n\n得益于超临界二氧化碳的独特物性，该发电技术的机组体积小、能量密度高，可有效减少设备数量和体积，有助于模块化集成部署。以我国自主研发的“超碳一号”系统为例，主要设备仅有压气机、膨胀机、冷却器、回热器和热源换热器，机组体积较传统蒸汽发电机组减少一半，且操控简单、运维成本低。更重要的是，超临界二氧化碳发电技术应用范围非常广泛，是光热发电、工业余热利用、新型储能等多个先进能源领域的共性前沿技术。\n\n既然超临界二氧化碳发电有诸多优势，为何蒸汽发电却“独领风骚”百余年？简言之，该技术要实现工业应用存在三大挑战。\n\n首先是热传递难。超临界二氧化碳的表面换热能力较差，只有水的1/3左右，需要采用高比表面积、高承压能力、耐腐蚀性强的换热器来弥补其换热能力不足的短板。这不仅需要设计全新的换热构型，还要解决毫米级薄板的高强度大面积非连续焊接问题。为此，我们采用真空扩散焊工艺，自主研制系列化工业母机——大尺寸扩散焊机，实现了超临界二氧化碳换热设备全国产、型谱化研制，攻克了高效、紧凑换热设备的工程级研制难题。\n\n其次是密封难。发电过程中，高温高压的超临界二氧化碳推动涡轮机高速旋转，要保障它尽可能少地向环境泄漏工质，系统的密封结构必须做到耐高温高压、耐磨损。我们研发了“特种材料+内冷却”专用干气密封技术，通过气流控制建立稳定气隙，解决了这个全球性难题。\n\n最后是控制难。在闭式热力循环系统中，某个设备得“流感”，别的设备也会被“传染”。超临界二氧化碳发电响应速度快，如何控制好设备间的协同关系，阻断“流感”的传播？我们研制并验证了面向多应用场景，具备多功能、多型式的型谱化样机，根据设备特性量身定制控制方案，开发出一套综合动态控制系统，打通了创新技术走向工程应用的全路径。\n\n前不久，全球首台商用超临界二氧化碳发电机组——超碳一号成功商运。作为全球首台15兆瓦超临界二氧化碳发电示范机组，相比现役烧结余热蒸汽发电机组，超碳一号的场地占用减少50%，净发电量提升50%以上，每年可多发7000余万度电。如果将其应用于全国的烧结余热发电机组改造，预计每年可节约标准煤约483万吨，减少二氧化碳排放约1285万吨。\n\n助力传统工业全面绿色转型的同时，超临界二氧化碳发电技术正在新型能源体系构建中大展拳脚。\n\n太阳能与风能等新能源具有间歇性和波动性特点，不仅存在弃风、弃光现象，也给电网调度安全带来挑战。为破解这一难题，我们启动了“熔盐储能+超临界二氧化碳发电”示范项目。该项目充分利用风光大基地弃电，将低温熔盐加热至近600摄氏度，储存热能；再通过高温熔盐驱动超临界二氧化碳动力循环，将热能转化为电能，充分利用超临界二氧化碳发电技术具有的响应迅速、转换效率高等优势，为新型电网提供调峰调频调惯量的新手段，进一步提升电网运行的稳定性与安全性。\n\n当前，超临界二氧化碳发电技术已成为全球能源科技攻关的前沿领域。面对日趋激烈的国际竞争，我们必须持续攻关新技术，在保持技术水平国际领先地位的同时，发掘更多应用场景，为传统工业绿色转型和能源科技自立自强贡献力量。\n\n（作者：黄彦平，系中核集团首席科学家、中国核动力研究设计院超碳一号总设计师）\n\n817410https://epaper.gmw.cn/gmrb/html/content/202603/11/content_8174.htmlhttps://null.com.cn/gmrb/htmlpad/content/202603/11/content_8174.html11光明日报“超碳”登场，发电不再“烧开水”", "url": "https://epaper.gmw.cn/gmrb/html/content/202603/11/content_8174.html"}, {"id": "recveH72rBWGcn", "title": "中国AI的当下与未来", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/v5_1.jpg", "date": "2026-03-11", "author": "余有成 张立华 吴 飞", "author_unit": "作者余有成，系中国人工智能学会副秘书长；作者张立华，系复旦大学智能机器人研究院常务副院长、特聘教授；作者吴飞，系浙江大学本科生院院长、教授", "source": "光明日报", "summary": "本文分析：2025年年初，DeepSeek以“高性能、低成本”的双重震撼力亮相世界舞台，被国际上称为“DeepSeek时刻”……我国开源模型全球下载量首度实现历史性超越，在新兴市场呈现“爆炸式增长”态势……我们正在见证的，不仅仅是一次技术突破，更是一个智能文明新极的加速崛起。中国的人工智能，正以其独特的路径与节奏，在全球坐标系中刻下越来越深的印记，展现从追赶者到定义者的转变。", "content": "2025年年初，DeepSeek以“高性能、低成本”的双重震撼力亮相世界舞台，被国际上称为“DeepSeek时刻”……我国开源模型全球下载量首度实现历史性超越，在新兴市场呈现“爆炸式增长”态势……我们正在见证的，不仅仅是一次技术突破，更是一个智能文明新极的加速崛起。中国的人工智能，正以其独特的路径与节奏，在全球坐标系中刻下越来越深的印记，展现从追赶者到定义者的转变。\n\n**算力、数据与算法，“铁三角”破局与超越**\n\n人工智能的竞争，本质是算力、数据与算法“铁三角”的竞争。中国在这场竞争中，经历了从“大力出奇迹”到“精益求精”的转变，在基础研究层面实现了系统性突破。\n\n算力层面，实现了从“卡脖子”到“软硬协同”的突围。国外凭借英伟达GPU硬件与CUDA（统一计算设备架构）构筑的技术“护城河”，牢牢掌控全球高端训练算力的制高点。客观来看，我国与国外存在硬件代差，然而，我国在2025年展现出了强大的战略韧性，以华为昇腾（Ascend）为代表的国产算力芯片和CANN（神经网络计算架构）软件生态，通过“芯片+集群+软件栈”的系统工程，已在政务、金融等核心领域推理场景实现广泛替代，在部分典型场景训练任务上达到可用乃至好用的水平，如DeepSeek-R2在昇腾910B集群训练、微调。\n\n我国的独特优势，在于探索出一条“软件定义算力、算法驱动效能、人工智能+赋能场景”的创新路径。DeepSeek-R1的成功证明：通过算法优化（如MoE架构、稀疏注意力机制），可以在既定算力约束下显著提升模型效能上限，为算力受限条件下的大模型训练提供了可验证路径。这种“低资源消耗、工程能力引领、高智力产出”的研究方向，正是我国对全球AI基础研究的最大贡献。\n\n数据层面，我国正从“规模红利”迈向“合成质量”。数据是AI的“燃料”，燃料的质量决定引擎的效能。国外依托其全球互联网主导地位，在高质量英文语料、科学文献及代码库积累上拥有天然优势。我国则拥有全球最庞大的数字化应用场景与用户群体，但在面向大模型训练的优质中文语料库构建上曾面临结构性挑战。\n\n破局之道在于技术创新和工程突破。过去一年，我国科研力量在“合成数据”与“数据课程学习”领域取得引领性进展。针对中文数据质量不均的痛点，国内团队开发了先进的数据清洗与合成管线，通过AI生成教科书级的高质量数据反哺训练，显著提升了数据效率与模型性能，使我国在该技术方向上跻身全球第一梯队。美国麻省理工学院与开源平台Hugging Face的联合报告显示，2025年中国开源模型全球下载量占比17.1%，反超美国的15.8%，位居全球第一。这进一步证实，我国将形成引领全球人工智能工程创新的中国方阵，为世界人工智能的健康发展作出更大贡献。\n\n算法与模型层面，告别“套壳”，确定“中国流派”。两年前，业界诟病我国AI多为Llama架构的微调，如今这一论调已成历史。DeepSeek-V3/R1、阿里Qwen2.5等模型，在网络架构、多头隐式注意力机制（MLA）、混合专家（MoE）负载均衡等，对生成式大语言模型架构变革方面作出了原创性贡献。我国在推理效率优化和长文本处理上展现了惊人的创新力。\n\n相比国外模型一味追求模型规模化法则的做法，我国研究更侧重于“性价比”，即如何用更小的参数、更少的显存，实现同等的效果，这使得国产模型在端侧部署和中小企业应用中极具竞争力。\n\n综观“铁三角”的竞争，我国已在算力基建规模、算法效能优化及数据治理技术上初步形成独特优势。当然，客观差距依然存在：国产单卡性能与互联带宽仍落后于英伟达H200/B200等前沿产品，大规模万卡集群的稳定性仍需持续攻坚，但我国在算力基建规模与系统集成能力上已形成独特优势，为后续突破奠定了坚实基础。\n\n**全球人工智能形成“双核驱动”竞争格局**\n\n全球人工智能已形成我国与国外“双核驱动”的竞争格局，各自的技术发展路径，显现出明显分野。\n\n在基础模型架构领域，国外继续扮演基础性、颠覆性架构主要定义者的角色。从Transformer深度学习模型架构到潜在的下一代范式，其原始创新活力依然强劲。我国的代表性技术则体现在对主流架构的增量式深度优化与效能革新上，如在注意力机制加速、训练稳定性提升等方面取得了突出进展。\n\n在多模态与通用大模型领域，国外OpenAI、谷歌等持续在复杂推理与多模态深度整合上设立标杆。我国模型在性能逼近的同时，突出特点在于对训练与推理成本效益的极致追求，以及在特定领域应用的突破。目前，总体处于“并跑”与“追赶”并存的状态。除了研发大模型超级通用智能技术，中国也在发展差异化技术路线：分布式智能体系统，以通专融合、大小协同、端云组合、群体协作等技术，面向物理世界和硬件终端发展执行智能。\n\n在前沿与交叉探索领域，各国侧重明显。国外在AI安全与对齐、量子计算与AI的结合以及受神经科学启发的新范式等前沿基础探索上更为活跃。我国则在具身智能、科学智能（AI for Science）及存算一体芯片、光子计算芯片等硬件基础方向，实现了世界级的点状突破，展现出强大的任务攻坚能力。\n\n在“人工智能+”产业应用技术层面，我国展现出全球领先的优势。得益于庞大的市场、丰富的场景和海量的数据，在计算机视觉、自然语言处理、语音对话、知识图谱构建与应用，以及移动支付、智能推荐等商业化落地方面，我国形成了强大的工程化能力和快速迭代优势。相比之下，国外在机器人智能、企业级解决方案平台以及基础算法框架的生态建设上根基更深。这种差异不是简单的“领先”与“追随”，而是不同创新模式的体现。国外擅长“从0到1”的原始创造，我国精于“从1到N”的工程优化与场景适配。\n\n在企业生态维度，竞争已升维至全栈体系。国外企业形成以微软、谷歌、OpenAI、英伟达为核心的强大闭环生态，从芯片设计、云计算基础设施、基础大模型研发到最终的应用商店，构筑了“护城河”。我国企业则呈现多元化、差异化发展态势：华为、浪潮等聚焦AI算力基础设施的突破；百度、阿里、腾讯依托云服务与数据优势，构建大模型及产业赋能平台；科大讯飞、商汤、思必驰、云知声等在垂直领域持续深耕；而联想集团等，正通过“混合式人工智能”战略，将AI深度嵌入智能终端与实体经济，探索规模化落地新路径。以DeepSeek、智谱AI为代表的开源力量，则通过高性价比、易获取的技术，在发展中国家开辟新航道，成为AI软实力出海的亮眼名片。其次，我国大模型在搜索方面的应用独具特色：豆包、Kimi、元宝、DeepSeek App等AI助手，已经成为人们日常搜索和解决常见问题的得力帮手。\n\n**产业应用深度融合与规模化爆发**\n\n刚刚过去的2025年，被业界定义为“大模型应用落地元年”，人工智能进入“深耕”之年。当下，我国AI技术正以前所未有的深度和广度，系统性地融入经济社会各领域，呈现出从试点探索向规模化、深度融合方向发展的鲜明特征。\n\n金融领域，AI已从效率工具演进为业务内核。智能风控借助大模型解析海量非结构化数据，风险评估愈发精准。为跨越“数字鸿沟”，AI数字人柜员能以自然语言交互办理业务，极大提升服务可及性与温度。“大模型+金融”全链路解决方案，已贯穿投资顾问、营销获客、风控全流程。\n\n教育领域，AI正推动教育走向个性化和智能化。AI不仅能辅助教师生成高质量教案，还能实现因材施教，帮助学生高效个性化学习。北京等地发布的“AI+教育”典型案例，显示了该技术从单点工具向系统性教学解决方案的演进。此外，在企业内部，AI知识库功能将企业专属知识与大模型深度结合，可大幅缩短新员工培训时间，提升整体专业水平与组织智慧。\n\n医疗领域，推动优质医疗资源下沉，破解分布不均的长期痛点。以中国科学院自动化研究所研发的“机器人+AI+掌上超声”系统为例，该设备能实现甲状腺、颈动脉等部位的标准化扫描，并由AI进行实时分析，将检测时间从15分钟缩短至5分钟，让基层医生也能完成精准筛查。此外，在手术机器人、临床辅助诊断、新药研发、中医药现代化及全生命周期健康管理等方面，AI的深度融合正在打开新的价值空间。\n\n能源领域，AI正驱动新型能源体系和新型电力系统向安全、绿色、高效、智能加速演进。国家电网研发的“光明”电力大模型已在27省应用，月调用量近亿次，支撑负荷转供等智能化业务；南方电网研发的“大瓦特”大模型为电网运维与调度注入了智能化新动能。在AI技术的深度赋能下，我国能源体系正加速构建智能化发展新格局。从新能源的消纳、电网的运行优化、到全面赋能发电、矿山、油气与氢能等多种能源主体，为能源绿色转型和能源强国战略奠定坚实的技术基石。\n\n置于全球视野，产业应用层面呈现“创新引领、路径各异”的格局。基于AI技术的变革性作用，在AI赋能新药发现等科学智能领域、火箭发动机等高端研发、自动驾驶汽车、人形机器人、自动代码生成、自主智能体等领域深度探索的同时，AI技术也正面临数字鸿沟、算法公平等治理挑战。\n\n欧洲在AI产业应用上，更侧重于在强化技术主权和伦理规范的前提下推动落地。2025年，欧盟委员会推出《应用人工智能战略》，标志着其政策从监管为主转向“监管与促发展”并重，通过立法引导与公共采购，强力推动AI在医疗、交通、能源等关键领域落地，寻求在规范中确立“技术主权”。\n\n相比之下，我国的产业融合以其落地速度、应用规模及解决实际发展痛点的精准性而独树一帜，形成了市场内生驱动与国家战略引导紧密互动的鲜明模式。\n\n**从追求技术参数转向定义技术发展**\n\n基于坚实的政策与产业生态基础，我国AI的发展愿景正实现历史性跨越：从追求技术参数，转向定义技术发展的目的与价值。\n\n人工智能的长期竞争，最终是生态体系的竞争。在人才、科研产出与治理规则等决定未来高度的关键生态要素上，我国的位置正在发生根本性变化。\n\n人才储备上，从“回流”到“本土造血”的转变。过去，我国AI顶尖人才严重依赖具有海外背景的“海归”。如今，这一局面正在改变。根据最新数据，我国培养的AI相关专业毕业生数量居全球第一。虽然在顶级（Top0.1%，以高被引论文作者、重大原创模型/算法首创者及顶级实验室负责人等为代表性指标衡量）战略科学家数量上仍逊于国外，但在中坚工程师力量上已形成压倒性优势。DeepSeek团队平均年龄仅20多岁即取得世界级突破，这表明，我国高等教育体系与科研环境已具备培养、吸引并成就世界级AI人才的良好土壤。\n\n科研产出上，呈现量质齐升的强劲态势。近5年来，我国在AI领域的学术论文发表量和有效发明专利授权量已连续位居全球首位。更为关键的是，论文质量显著提升，在NeurIPS（神经信息处理系统大会）、ICML（国际机器学习会议）、CVPR（国际计算机视觉与模式识别会议）等顶级学术会议的论文录用率与高影响力工作占比持续攀升，我国正成为全球AI知识创新体系中不可或缺的重要策源地。\n\n监管与治理上，探索出特色道路。全球AI治理大致形成三种模式：“创新优先、行业主导”模式，“风险预防、严格立法”模式，以及我国的“发展与安全并重、敏捷响应、分类治理”模式。我国不仅出台了生成式AI管理办法，更创新性地建立了“算法备案”等制度，在鼓励创新的同时有效管控安全风险。随着国产AI模型与技术出海，我国的治理理念与技术标准也开始影响广大发展中国家，为全球AI治理提供了更多选择。\n\n“十五五”规划纲要草案提出，要培育壮大新兴产业和未来产业、前瞻布局未来产业。强化产业协同，推动未来产业同新兴产业、传统产业相得益彰。这为中国AI发展指明了清晰方向：\n\n第一，夯实核心基础换道超车。在基础算法原理与模型架构上加快原始创新，我们将死磕“能效比”，在算力受限的客观条件下，将算法优化做到极致，同时前瞻布局类脑计算、光子计算等颠覆性技术，唯有在未来的技术方向上提前卡位、重点突破，才能在新一轮技术浪潮中实现换道超车。\n\n第二，加速场景驱动产业向“实”而生。全球人工智能“下半场”的价值，重在解决产业实际问题的核心需求，抢抓AI赋能实体经济这个应用根基制高点；推进“技术进化”和“场景落地”的双重变革，亟待在现实场景中检验，与新质生产力对接迭代，加速实用化、普惠化落地。\n\n第三，构建“全球AI共生生态圈”。巩固在发展中国家市场的先发优势，通过开源协作、技术共享、能力共建，让技术进步惠及更多人群，切实弥合数字鸿沟。\n\n第四，注入东方文明“中国智慧”。我国的AI发展旨在定义“好的AI”“善的智能”，它不仅聪明高效，更是普惠包容、安全可控，是促进社会和谐的技术力量，充分体现我国对技术发展目的与人类终极福祉的深刻思考。未来，随着国产算力芯片的进一步突破和产业应用的全面爆发，中国AI必将为人类智能文明贡献独特的“东方智慧”。\n\n（作者：余有成 张立华 吴 飞，分别系中国人工智能学会副秘书长；复旦大学智能机器人研究院常务副院长、特聘教授；浙江大学本科生院院长、教授）\n\n817310https://epaper.gmw.cn/gmrb/html/content/202603/11/content_8173.htmlhttps://null.com.cn/gmrb/htmlpad/content/202603/11/content_8173.html11光明日报中国AI的当下与未来", "url": "https://epaper.gmw.cn/gmrb/html/content/202603/11/content_8173.html"}, {"id": "recvfy0P1C4qOU", "title": "从“心”出发 向“实”而行——正确政绩观的党性逻辑与实践向度", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recvfy0P1C4qOU.jpg", "date": "2026-03-11", "author": "吴涛", "author_unit": "系中国浦东干部学院基层党建研究中心主任、教授", "source": "北京日报", "summary": "习近平总书记强调引导党员干部树立和践行正确政绩观，创造经得起实践、人民、历史检验的实绩。文章从党性自觉、历史耐心、求是务实、科学考评四个维度系统阐述：以坚强党性为核，通过党性自觉校准政绩观坐标，以为民造福为原点，以对党忠诚为底色；以历史耐心为度，在显绩与潜绩、数量与质量的辩证统一中重塑政绩标尺；以求是务实为本，通过调查研究、攻坚克难、力戒虚功践行政绩观真谛；以科学考评为矩。", "content": "春节前夕，习近平总书记在北京看望慰问基层干部群众时强调，要“引导党员干部树立和践行正确政绩观，努力创造经得起实践、人民、历史检验的实绩”。中共中央办公厅印发的《关于在全党开展树立和践行正确政绩观学习教育的通知》指出，“经党中央同意，在全党开展树立和践行正确政绩观学习教育”。习近平总书记在参加十四届全国人大四次会议江苏代表团审议时指出：“要认真组织开展树立和践行正确政绩观学习教育，引导广大党员干部落实‘立党为公、为民造福、科学决策、真抓实干’总要求，创造经得起实践、人民、历史检验的实绩。”政绩观，非一时一事之考量，乃一世一生的课题。它是党员干部的世界观、人生观、价值观在政治实践中的集中投射，关乎人心向背，关乎事业兴衰。这一重大部署，不仅是巩固拓展主题教育成果的题中应有之义，更是回应时代之问、人民之问，确保“十五五”顺利开局、推动中国式现代化行稳致远的战略之举。\n\n政绩为谁而树？树什么样的政绩？靠什么树政绩？这三个根本性问题，贯穿于党性修养的全过程，折射出党员干部的政治站位与人格境界。正确的政绩观，从来不是抽象的理论教条，而是具体的实践遵循。它要求我们在纷繁复杂的利益诱惑面前，守住初心；在急难险重的任务面前，扛起责任；在“显绩”与“潜绩”的权衡中，经得起历史检验。\n\n以坚强党性为核，在“我是谁”的根本追问中校准政绩观“坐标”\n\n党性是党员干部立身、立业、立言、立德的基石。习近平总书记深刻指出：“树立和践行正确政绩观，起决定性作用的是党性。”这一论断，一针见血地指出了政绩观问题的本质——它首先是一个政治问题，核心是党性问题。政绩观的偏差，归根结底是党性的弱化、虚化、淡化。\n\n党性自觉是政绩观的“定盘星”。有什么样的党性，就有什么样的政绩观。党性坚强，则政绩观端正；党性不纯，则政绩观必然扭曲。现实中，少数干部搞“形象工程”“政绩工程”，盲目举债、铺摊子，甚至数据造假、欺上瞒下，这些行为看似是工作方法问题，实则是政绩观走偏，根子在于理想信念动摇，忘记了“我是谁、为了谁、依靠谁”。他们往往把个人的升迁荣辱置于党和人民的事业之上，把“为民造福”异化为“为自己造势”。实践这种“私”字作祟的政绩观，不仅劳民伤财，更严重损害了党同人民群众的血肉联系，侵蚀党的执政根基。因此，树立和践行正确政绩观，必须把加强党性修养作为必修课，坚持不懈用习近平新时代中国特色社会主义思想凝心铸魂，深刻领悟“两个确立”的决定性意义，增强“四个意识”、坚定“四个自信”、做到“两个维护”，在思想上政治上行动上同党中央保持高度一致。唯有党性上的“定盘星”稳了，政绩观的“航向”才能正。\n\n为民造福是政绩观的“原点”。“人民对美好生活的向往，就是我们的奋斗目标。”这是正确政绩观的根本价值取向。共产党人的政绩，不在高楼大厦的堆砌，不在GDP数字的虚高，而在老百姓的口碑里，在民生的改善中。为民造福，不是一句空洞的口号，而是要落实到解决人民群众急难愁盼问题的具体行动上。从脱贫攻坚的全面胜利，到乡村振兴的有效衔接；从教育、医疗、养老等民生短板的补齐，到生态环境的持续改善，每一项实绩都应经得起人民的检验。党员干部要时刻牢记“江山就是人民，人民就是江山”，把为民办事、为民造福作为最重要的政绩，把为老百姓做了多少好事实事作为检验政绩的重要标准。要坚决摒弃“官本位”思想，真正俯下身子、沉下心来，问政于民、问需于民、问计于民，把群众的“脸色”作为检验政绩的“成色”，把群众的“笑脸”作为政绩的“奖杯”。\n\n对党忠诚是政绩观的“底色”。树立和践行正确政绩观，是对党忠诚的直接体现。对党忠诚，不是看口号喊得响不响，而是看行动实不实，看是否坚决贯彻落实党中央决策部署。有的干部口头上喊着“两个维护”，行动上却搞“选择性执行”，对自己有利的就快干，不利的就拖延；有的搞“上有政策、下有对策”，阳奉阴违，这些都暴露出忠诚的不纯粹。真正的忠诚，体现为对党的事业的赤诚之心，体现为对党的纪律规矩的敬畏之心，体现为对党组织的坦诚之心。要将政绩观置于对党忠诚的政治坐标中考量，做到党中央提倡的坚决响应、党中央决定的坚决执行、党中央禁止的坚决不做，确保政绩经得起政治的检验。\n\n以历史耐心为度，在“求何绩”的辩证思维中重塑政绩观“标尺”\n\n政绩的内涵，随着时代的发展而不断丰富与深化。在全面建设社会主义现代化国家的新征程上，高质量发展是硬道理。这就要求党员干部跳出“一亩三分地”的狭隘视野，破除“数字出官、官出数字”的路径依赖，确立大历史观和正确的时间观、空间观，在“显”与“潜”、“近”与“远”、“局部”与“全局”的辩证统一中，把握政绩的时代内涵。\n\n“显绩”与“潜绩”的辩证统一。“功成不必在我，功成必定有我。”这是正确处理“显绩”与“潜绩”关系的至理名言。显绩，是看得见、摸得着的成绩，容易立竿见影、引人注目；潜绩，是打基础、利长远的工作，往往需要较长时间才能显现成效。正确的政绩观，既要有“显绩”的追求，更要有“潜绩”的定力。只抓显绩、不抓潜绩，是短视行为，如同竭泽而渔、杀鸡取卵，不仅不能持续发展，反而会留下无穷隐患。只抓潜绩、忽视显绩，则容易导致工作缺乏抓手，难以回应群众迫切期待。党员干部要学会算大账、算长远账，甘于坐“冷板凳”，多做打基础、利长远、惠民生的实事，不贪一时之功，不图一时之名。那种搞“短平快”、留“烂摊子”的做法，那种“新官不理旧账”的现象，都是政绩观扭曲的表现。要树立“接力赛”意识，一任接着一任干，一张蓝图绘到底，既做显功，也做潜功，让“潜绩”积淀为发展的基石，让“显绩”在“潜绩”的沃土上开花结果。\n\n“数量”与“质量”的协同共进。长期以来，一些地方和干部存在“唯GDP论英雄”的思维惯性，片面追求经济增速和规模扩张，忽视了发展的质量和效益，甚至不惜牺牲环境、透支资源。这种粗放型的发展模式，已不适应当前高质量发展的要求。正确政绩观要求我们，必须完整、准确、全面贯彻新发展理念，不再简单以GDP论英雄，而是要看发展的协调性、可持续性、创新性。要统筹好速度与效益、局部与全局、当前与长远的关系，坚决摒弃形式主义、官僚主义，不搞花拳绣腿，不搞繁文缛节。在考核评价中，要更加注重科技创新、生态环保、民生改善、风险防控等指标，引导干部把精力集中到提高发展质量上来。要树立“绿色政绩观”，把保护生态环境作为政绩的重要内容，像保护眼睛一样保护生态环境，让青山常在、绿水长流。\n\n“过程”与“结果”的有机结合。重结果不唯结果，重过程不走过场。政绩的产生，是一个过程与结果相统一的过程。只重结果、忽视过程，容易导致急功近利、弄虚作假；只重过程、忽视结果，则容易导致形式主义、效率低下。正确的政绩观，既要看最终取得的成果，也要看工作的出发点、过程和方法。要看是否遵循客观规律，是否依法依规办事，是否尊重群众意愿。对于经过科学论证、符合长远利益的工作，即使短期内看不到明显成效，也要坚定不移地推进；对于违背客观规律、脱离实际的项目，即使短期内能带来“亮点”，也要坚决叫停。要建立健全全过程监督机制，加强对权力运行过程的制约和监督，确保政绩经得起实践和历史的检验。\n\n以求是务实为本，在“如何为”的奋斗姿态中践行政绩观“真谛”\n\n大道至简，实干为要。树立和践行正确政绩观，关键在“行”，落点在“实”。它不是停留在纸面上的口号，而是体现在每一次科学决策、每一项务实举措、每一个担当行为之中。必须把正确政绩观转化为推动工作的强大动力，以实干创实绩，以担当显作为。\n\n调查研究：谋事之基与成事之道。没有调查，就没有发言权，更没有决策权。深入扎实的调查研究，是树立和践行正确政绩观的前提和基础。当前，一些干部习惯于坐在办公室里看材料、听汇报，下基层也是“坐着车子转、隔着玻璃看”，导致决策脱离实际，政绩观出现偏差。要大兴调查研究之风，坚持党的群众路线，深入基层一线，听真话、察实情，解剖麻雀、寻找规律。调研要沉得下身、静得下心，既看“高楼大厦”，也看“背阴胡同”，真正把情况摸清、把问题找准、把对策提实。要坚决防止调研中的形式主义，不搞“作秀式”调研、“盆景式”调研，避免“调而不研、研而不行”。通过高质量的调查研究，找准制约发展的堵点痛点，找到解决问题的“金钥匙”，确保各项决策部署符合客观实际、符合群众利益。\n\n攻坚克难：敢于斗争与善于斗争。政绩是在攻坚克难中干出来的。当前，改革发展稳定任务艰巨繁重，风险挑战严峻复杂。这就要求党员干部必须具备担当精神，敢于直面矛盾、敢于较真碰硬。树立正确政绩观，就是要敢于接“烫手山芋”，敢于做“热锅蚂蚁”，在解决历史遗留问题、化解重大风险隐患、推动重点领域改革中显身手、见真章。那种遇到矛盾绕着走、遇到困难躲着走、遇到责任推着走的“躺平”心态，是与正确政绩观背道而驰的。要发扬斗争精神，增强斗争本领，面对大是大非敢于亮剑，面对歪风邪气敢于抵制，面对急难险重任务敢于挺身而出。同时，要善于斗争，讲究策略方法，把握时度效，在法治轨道上解决问题、推动工作，实现政治效果、社会效果、法律效果的有机统一。\n\n力戒虚功：整治形式主义与官僚主义。形式主义、官僚主义是正确政绩观的大敌。它们只重“形”不重“效”，只唯“上”不唯“实”，严重浪费资源、贻误时机、损害党群关系。树立和践行正确政绩观，必须坚决整治形式主义、官僚主义。要切实为基层减负，精文减会，规范督查检查考核，让干部从文山会海、填表报数中解脱出来，把更多时间和精力投入到抓落实、干实事上来。要坚持实事求是，不提不切实际的口号，不制定超越阶段的目标，不搞劳民伤财的“形象工程”。要树立“过紧日子”的思想，厉行节约，把有限的资金用在刀刃上。要以实实在在的行动、实实在在的成效取信于民，让“实”字成为党员干部的鲜明底色。\n\n以科学考评为矩，在“谁来评”的闭环体系中确立政绩观“导向”\n\n制度管根本、管长远。树立和践行正确政绩观，既要靠党员干部的内生自觉，也要靠外在的制度约束。必须充分发挥考核评价“指挥棒”作用，构建科学规范、运行有效的制度体系，形成鲜明的用人导向，激励干部担当作为，倒逼政绩观校准归位。\n\n完善多维评价体系：从“单向度”向“全维度”转变。考核评价体系具有导向作用。有什么样的考核“指挥棒”，就有什么样的政绩观。要改变过去单纯以经济增长速度评定政绩的偏向，建立体现新发展理念的评价体系。坚持定性评价与定量评价相结合，将民生改善、生态效益、科技创新、乡村振兴、社会治理等纳入考核范围，全面客观评价干部政绩。坚持平时考核与年度考核相结合，注重在重大任务、关键时刻考察识别干部，近距离、多角度、全方位了解干部表现。坚持组织评价与群众评价相结合，扩大群众知情权、参与权、监督权，让群众成为政绩的“主考官”。特别是要贯彻落实《关于在全党开展树立和践行正确政绩观学习教育的通知》精神，将树立和践行正确政绩观情况作为领导班子和领导干部政绩考核的重要内容，作为巡视巡察、干部考察、审计整改监督的重要内容，形成全方位、全链条的评价闭环。\n\n划定负面清单红线：从“模糊地”向“警戒线”转变。“法无禁止即自由”，但对于党员干部的政绩观而言，必须划出清晰的红线。要依据相关党内法规和国家法律法规，结合实际制定政绩观负面清单。明确禁止盲目举债搞建设、违规干预市场经济活动、破坏生态环境、统计数据造假、搞劳民伤财的“形象工程”“政绩工程”等行为。对于触碰红线、底线的干部，要严肃执纪问责，决不姑息迁就。负面清单不仅要“挂在墙上”，更要“落在地上”，成为干部心中时刻警醒的“高压线”。要通过典型案例开展警示教育，用身边事教育身边人，让干部知敬畏、存戒惧、守底线，自觉校正政绩观偏差。\n\n健全激励约束机制：从“大锅饭”向“差异化”转变。制度的生命力在于执行。要健全激励约束机制，推动形成能者上、优者奖、庸者下、劣者汰的正确导向。对树立和践行正确政绩观、工作实绩突出的干部，要大胆提拔重用，优先晋升职级，给予表彰奖励；对政绩观存在偏差、工作不力的干部，要及时进行谈话提醒、批评教育；对因政绩观扭曲导致严重后果的干部，要依规依纪依法严肃追责问责。要落实“三个区分开来”要求，建立健全容错纠错机制，旗帜鲜明为敢于担当、踏实做事、不谋私利的干部撑腰鼓劲。要通过正向激励与反向约束相结合，营造想干事、能干事、干成事、不出事的良好氛围，让正确政绩观在制度土壤中生根发芽、开花结果。\n\n政绩观，是一面镜子，照出的是干部的党性与品行；是一把尺子，量出的是干部的担当与作为。从“心”出发，向“实”而行。每一名党员干部都应将正确政绩观内化于心、外化于行，以“功成不必在我”的精神境界和“功成必定有我”的历史担当，在“党性自觉”的修炼中筑牢根基，在“时空格局”的拓展中提升境界，在“实干担当”的实践中书写答卷，在“制度笼子”的规范中行稳致远，创造出无愧于党、无愧于人民、无愧于时代的实绩，为强国建设、民族复兴伟业贡献磅礴力量。\n\n（作者为中国浦东干部学院基层党建研究中心主任、教授，上海市习近平新时代中国特色社会主义思想研究中心研究员）", "url": "https://www.celap.org.cn/art/2026/3/11/art_2806_54045.html"}, {"id": "recveGZSBESbqb", "title": "建设绿色智慧的数字生态文明（深入学习贯彻习近平新时代中国特色社会主义思想·学习《习近平生态文明文选》第一卷专家谈）", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recveGZSBESbqb.jpg", "date": "2026-03-10", "author": "岳宗伟", "author_unit": "作者岳宗伟，系国务院发展研究中心公共管理与人力资源研究所副所长", "source": "人民日报", "summary": "人工智能等数字技术的快速发展，为生态文明建设提供了全新动能。作者系统阐述了建设绿色智慧数字生态文明的重大意义与实践路径。文章指出，数字化与绿色化深度融合是推进中国式现代化的必然要求，有助于抢抓新一轮科技革命机遇，推动生态文明建设进入智能时代。在实践路径上，文章从四个维度提出系统方案：一是构建智慧高效的生态环境信息化体系，运用大数据和AI技术，整合山水林田湖草沙一体化治理数据；二是推动数智赋能生态治理模式，建立天空地海一体化监测网络，完善智能预测预警与辅助决策机制；三是推进数字化绿色化协同转型，以高品质生态环境支撑高质量发展；四是完善保障体系，从理念、政策、人才、安全等多维度为美丽中国数字化治理提供支撑。", "content": "当前，人工智能等数字技术正在给人类社会的生产方式、生活方式和治理方式带来深层次变革，我国数字化与绿色化的深度融合、协同转型已进入全方位、高水平深入推进的新阶段。在《习近平生态文明文选》第一卷中，习近平总书记强调：“深化人工智能等数字技术应用，构建美丽中国数字化治理体系，建设绿色智慧的数字生态文明。”这一重要论述深刻把握世界科技发展大势，着眼数字中国建设整体布局，对人工智能等数字技术赋能生态文明建设提出明确要求。构建美丽中国数字化治理体系，建设绿色智慧的数字生态文明，是当前我国生态文明建设的一项重要内容，也是绘就美丽中国新画卷的战略任务。\n\n建设绿色智慧的数字生态文明，推动人工智能等数字技术赋能生态文明建设，是顺应大势、着眼长远的战略之举，是推进中国式现代化的必然要求，意义重大而深远。\n\n助力抢抓新一轮科技革命和产业变革机遇，推动生态文明建设进入智能时代。习近平总书记指出，人工智能正“推动人类社会迎来人机协同、跨界融合、共创分享的智能时代”。继蒸汽机、电力、互联网之后，人工智能等数字技术作为又一划时代的变革性技术，正加速驱动经济社会发展迈向智能化新阶段。以习近平同志为核心的党中央把加快发展新一代人工智能作为事关我国能否抓住新一轮科技革命和产业变革机遇的战略问题，及早谋划、超前布局。中共中央、国务院印发的《数字中国建设整体布局规划》提出，推进数字技术与经济、政治、文化、社会、生态文明建设“五位一体”深度融合。党的二十届四中全会通过的《中共中央关于制定国民经济和社会发展第十五个五年规划的建议》（以下简称《建议》），把“深入推进数字中国建设”作为重要内容，强调让人工智能全方位赋能千行百业。数字生态文明建设是数字中国建设的题中应有之义。当前，我国正在长江流域等一些重点区域建设跨区域数字化治理体系，但数字生态文明建设尚处在起步阶段，在数字基础设施建设、数据标准规范体系建设、科技成果转化应用以及数字生态文明人才培养等方面与实际需求相比还有不小差距。构建美丽中国数字化治理体系，建设绿色智慧的数字生态文明，有利于抢抓人工智能等数字技术蓬勃发展的重大机遇，大力发展新质生产力，加快建设以实体经济为支撑的智能化、绿色化、融合化的现代化产业体系，积极探索生态环境治理的新技术、新产业、新业态、新模式，推动生态文明建设早日进入智能时代。\n\n助力全面推进美丽中国建设，推动实现人与自然和谐共生的现代化。中国式现代化是人与自然和谐共生的现代化。新时代以来，以习近平同志为核心的党中央把生态文明建设摆在全局工作的突出位置，美丽中国建设迈出重大步伐，我国生态环境保护发生历史性、转折性、全局性变化，创造了举世瞩目的生态奇迹和绿色发展奇迹。当前，我国经济社会发展已进入加快绿色化、低碳化的高质量发展阶段，但生态环境保护结构性、根源性、趋势性压力尚未根本缓解，绿色低碳发展长效机制有待健全，生态文明建设仍处于压力叠加、负重前行的关键期，美丽中国建设任务依然艰巨。因此，必须加快推进人工智能等数字技术融入生态环境治理体系，不断提升生态文明建设的科学化、精细化、智能化水平，为绿水青山筑牢“数智屏障”，让生态产品富含“数智养分”，推动城乡人居环境明显改善、美丽中国“颜值”高效提升，为实现人与自然和谐共生的中国式现代化提供高品质的生态环境支撑。\n\n助力提升生态环境治理能力，推进国家治理体系和治理能力现代化。生态环境治理是美丽中国建设的核心环节，生态环境治理体系和治理能力现代化是国家治理体系和治理能力现代化的重要组成部分。新时代以来，经过锻造环保督察利剑、落实生态环保责任、完善政策制度体系、构建“大环保”工作格局等实践，我国生态环境治理能力得到有效提升。传统治理方式往往受限于信息总量少、信息过滤多、层级传递慢等因素，存在信息不对称、响应不及时、效率较低、成本较高等局限性。构建美丽中国数字化治理体系，通过高效科学的数据汇聚和人工智能等数字技术赋能生态环境治理，可有效提升顶层设计、统筹协调、监测感知、预警预报、应急处置等能力，为生态环境治理提供全方位、全流程、全天候的智慧支撑。数字化赋能生态环境治理，推进生态环境治理体系和治理能力现代化，必将打开我国生态文明领域治理的新天地，助推国家治理体系和治理能力现代化迈上新台阶。\n\n助力形成绿色智慧生产生活方式，满足人民群众美好绿色生活需要。进入新时代，我国社会主要矛盾已经转化为人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾，人民群众对绿色生产、智慧生活、优美生态的需要愈发强烈。我国以数字化和绿色化双轮驱动，系统深入推进经济社会发展转型，实现生态效益、经济效益和社会效益的协同提升，人民群众的获得感、幸福感显著增强。与此同时，数字化绿色化协同转型仍面临不少挑战，高耗能产业占比依然较高，公众绿色低碳意识仍有待提高，绿色智慧生产生活方式的形成还有很大空间。习近平总书记强调：“从保障和改善民生、为人民创造美好生活的需要出发，推动人工智能在人们日常工作、学习、生活中的深度运用，创造更加智能的工作方式和生活方式。”党的二十届四中全会《建议》对“加快形成绿色生产生活方式”作出重要部署。建设绿色智慧的数字生态文明，深化经济社会发展数字化绿色化协同转型，用人工智能等数字技术赋能生产生活，让人民群众更便捷地学习、更高效地工作、更舒适地生活，让天更蓝、地更绿、水更清，万里河山更加多姿多彩，是促进人民群众共享生态福祉、提高幸福指数、过上更加美好生活的重要途径。\n\n建设绿色智慧的数字生态文明没有先例可循、缺少经验支持，既应鼓励积极探索，也要注意加强引导，在发展方向、制度保障、支撑动力、工作布局上加以规范。\n\n坚持以人为本、智能向善，确保正确方向。习近平总书记指出：“打造开放、包容、非歧视的数字经济环境，坚持以人为本、智能向善”“推动人工智能朝着有益、安全、公平方向健康有序发展”“确保人工智能向善、造福全人类”。这些重要论述是以人民为中心的发展思想的深刻体现，是人工智能等数字技术规则治理的重要依据，也是构建美丽中国数字化治理体系，建设绿色智慧的数字生态文明的基本遵循。要坚持以人为本，通过数字技术有效赋能生态环境治理水平提升，让广大人民群众充分享有技术进步福利、享受生态文明福祉。要突出智能向善，以“有益、安全、公平”为发展方向，加快建设更加绿色智慧的数字生态文明，精准防范化解安全风险，增强人工智能赋能可持续发展的普惠性。要按照“造福全人类”的目标，加强国际生态环境数字化治理合作，以数字生态文明建设的中国方案、中国智慧，更好助推人类文明进步、构建人类命运共同体。\n\n坚持政策引领、完善机制，加强制度保障。以习近平同志为核心的党中央深刻洞察发展人工智能等数字技术的战略意义，推出一系列重大战略举措，下好了构建美丽中国数字化治理体系、建设绿色智慧的数字生态文明“先手棋”。中共中央、国务院印发的《数字中国建设整体布局规划》把建设绿色智慧的数字生态文明作为重要内容。国务院印发的《关于深入实施“人工智能+”行动的意见》提出“共绘美丽中国生态治理新画卷”“推动构建智能协同的精准治理模式”等要求。党的二十届四中全会《建议》对加快人工智能等数智技术创新，加强人工智能同产业发展、文化建设、民生保障、社会治理相结合，全方位赋能千行百业等作出部署。要抓住人工智能赋能生态文明建设的切入点和关键阀，进一步提出符合实际的政策体系、工作机制和落实举措，为构建美丽中国数字化治理体系，建设绿色智慧的数字生态文明提供更有力的政策支持和制度保障。\n\n坚持科技创新、培育动能，夯实技术支撑。当前，人工智能等数字技术发展一日千里，各国在人工智能领域的竞争日趋激烈。科学技术是第一生产力、第一竞争力。谁的技术创新速度快，谁就拥有了抢占制高点的优势。我国人工智能综合实力近年来已实现整体性、系统性跃升，人工智能专利数量占全球总量的60%，人工智能整体发展跻身全球第一梯队，人工智能等数字技术正以前所未有的速度、广度和深度向千行百业渗透赋能。要进一步推动人工智能等数字技术加速迭代，加快推出更多绿色低碳的新技术、新产业、新业态，开辟生态环境治理多元化的创新应用场景，推动传统治理模式向数智化转型，为建设绿色智慧的数字生态文明夯实技术基础。\n\n坚持系统观念、协同发展，推进同步发力。建设绿色智慧的数字生态文明，是数字中国建设整体布局的有机组成。要坚持系统观念、协同发展，把握好一域与全局、部分与整体、个体与系统的关系。积极推动构建美丽中国数字化治理体系，不断探索路子、积累经验。推动数字生态文明建设融入国家发展大局，与全局工作同步发力、协同发展。以美丽中国数字化治理能力提升、制度建设和工作推进的显著成效，有力支撑绿色智慧的数字生态文明建设，有效助推国家治理体系和治理能力现代化，更好服务“五位一体”总体布局，服务强国建设、民族复兴伟业。\n\n以构建美丽中国数字化治理体系为抓手，推动建设绿色智慧的数字生态文明\n\n“十五五”时期，人工智能等数字技术将迅猛发展，得到更为广泛和深入的应用。为此，要以构建美丽中国数字化治理体系为抓手，推动建设绿色智慧的数字生态文明。\n\n构建智慧高效的生态环境信息化体系，强化美丽中国数字化治理基础设施。习近平总书记强调：“加快完善数字基础设施”“构建全国信息资源共享体系”。《中共中央国务院关于全面推进美丽中国建设的意见》提出“实施生态环境信息化工程”。美丽中国治理是一项系统工程，大数据和信息化是这项系统工程的底座。要采用大数据、人工智能和区块链等技术，深入挖掘、生成、集成、共享生态环境数据资源，丰富生态治理领域数字应用，加快构建智慧高效的生态环境信息化体系。重点是运用数字技术推动山水林田湖草沙一体化保护和系统治理，完善自然资源三维立体“一张图”和国土空间基础信息平台，构建以数字孪生流域为核心的智慧水利体系，打造从山顶到海洋的生态环境智能治理信息体系，提高数字生态文明建设的整体性、系统性、协同性。\n\n推动数智赋能生态环境治理模式，建立健全美丽中国数字化治理工作机制。运用数字技术赋能生态环境监测、分析、预测、预警、决策、监管，构建全流程智能化治理模式，推进治理的高效、协同、精准。要建立智能监测分析体系，构建天空地海一体化监测网络，打造生态环境“千里眼”“顺风耳”，实时感知PM2.5、水质、土壤、生物多样性等关键要素，及时精准识别污染源和生态风险点。完善智能预测预警机制，根据不同场景研发相关数据大模型，在一些重点区域试行大气污染、水质变化、土壤环境、生态风险等“一张图”“一张网”“一盘棋”，提升预测精度和预警速度。健全智能辅助决策机制，在信息整合基础上开展综合研判，多角度、全方面分析和掌握实际情况，运用大数据技术和数字孪生技术对生态治理方案进行“沙盘推演”，为生态环境治理提供科学依据，提高决策的科学性、精准度。积极探索智能监管机制，多层面推进“人工智能+监管”模式应用，推广非现场、全时段、穿透式、无感式等智慧监管执法，让监管手段更丰富、过程更迅捷、结果更精准。\n\n推进数字化绿色化协同转型，深化美丽中国数字化治理综合效益。建设绿色智慧的数字生态文明，要求将数字技术与生态环境治理相结合，推进数字化绿色化深度融合、协同转型，提高生态环境治理能力，以高品质生态环境支撑高质量发展。一体推进数字升级和绿色转型，不断提升高质量发展的科技成色、绿色底色。要通过数字化赋能、绿色化改造，持续深入打好污染防治攻坚战，更好精准治污、科学治污；加快推动发展方式绿色低碳转型，加快形成绿色生产方式和生活方式；不断提升生态系统的多样性、稳定性、持续性，加大生态系统智能保护力度；大力发展生态领域新兴产业和未来产业，拓宽绿水青山转化金山银山的路径；积极稳妥推进碳达峰碳中和，落实碳达峰碳中和“1+N”政策体系，同步实现降碳、减污、扩绿、增长。以数字化绿色化协同转型的显著成效，实现高质量发展和高水平保护的同步推进。\n\n统筹资源汇聚力量打好“组合拳”，完善美丽中国数字化治理保障体系。美丽中国数字化治理线长面广，要从理念、政策、市场、人才、安全等多维度提供坚实保障。完整准确全面贯彻新发展理念，加强国民数智素质教育，倡导绿色智慧生活方式，让绿色理念、数智观念真正融入千家万户的生活日常，夯实美丽中国数字化治理的社会基础。健全数字生态文明建设政策体系，完善相关法律法规和规章制度，促进数字技术和生态环境治理深度融合，推动生态环境领域数智成果竞相涌现，在确保安全的前提下推进数据开放共享。通过有效市场和有为政府相结合，调动市场力量积极参与生态环境领域智能治理，推动生态文明建设进入政府引导、市场参与、全民行动、数智助力的崭新阶段。加大数字生态文明领域人才培养力度，加强相关交叉学科建设，创造有利于前沿研究的良好环境，造就一支既懂数字技术又擅长生态环境治理的高素质复合型人才队伍。贯彻总体国家安全观，筑牢数字化治理的安全底线，有效应对各种风险挑战，有力保障数字生态文明建设成果，奋力谱写美丽中国建设的璀璨新篇。", "url": "http://paper.people.com.cn/rmrb/pc/content/202603/10/content_30144427.html"}, {"id": "recvfy02E3bmgQ", "title": "改革开放创辉煌 扬帆起航正当时", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfy02E3bmgQ.jpg", "date": "2026-03-10", "author": "李鹏", "author_unit": "系中国浦东干部学院教学研究部", "source": "中国浦东干部学院", "summary": "中国浦东干部学院依托厅局级干部培训班，与上海市社会科学界联合会联合举办学术茶座，聚焦习近平总书记关于全面深化改革的重要论述，围绕深圳、浦东、雄安的改革开放实践经验展开深入研讨。刘靖北、沈斐、焦永利等教授作理论阐述，学员代表分享福建职务科技成果改革、人工智能标识方案、跨境电商发展等最新实践案例。与会学员表示，学术茶座内容丰富、针对性强，有助于提升改革认识、坚定改革信心、启发改革思路。学院地处浦东改革开放最前沿，将持续凝练最新实践案例，深化改革开放精神的科学内涵和时代价值。", "content": "习近平总书记指出，新时代新征程上，要开创中国式现代化建设新局面，仍然要靠改革开放。为帮助学员深入理解习近平总书记关于全面深化改革的重要论述，3月4日，学院依托厅局级干部弘扬改革开放精神专题培训班，与上海市社会科学界联合会联合举办“以改革开放精神引领中国式现代化：从深圳到雄安的启示”学术茶座。\n\n学术茶座聚焦学习贯彻习近平总书记关于全面深化改革的一系列新思想、新观点、新论断和改革开放精神在深圳、浦东、雄安的伟大实践、历史经验和未来进路开展了深入研讨。学院原副院长刘靖北教授、浦东新区党校胡云华教授、学院马克思主义（党史党建）教研分部副主任沈斐教授、管理学教研分部焦永利教授，围绕进一步全面深化改革要大力弘扬改革开放精神，浦东开发开放在改革开放历史进程中的重大意义和时代启示，中国式现代化阶梯式递进的必然性及其规律，雄安新区建设展示未来城市发展新范式等方面进行理论阐述。专题培训班学员代表祝维剑、宋光辉、张光耀、崔长征、王雪皓等，分别围绕福建全面深化改革的最新实践探索，四川正在推进的职务科技成果权属改革等改革举措，人工智能标识方案中存在的问题、原因和对策建议，“走出去”战略背景下发展跨境电商中存在的问题和对策建议，以及优化营商环境为海南自贸港封关运作保驾护航的具体做法等进行了经验介绍。\n\n学员们评价学术茶座特色鲜明、内容丰富，大家收获颇丰、深受启发。学员邓为指出，从深圳到浦东，再到雄安新区建设的伟大实践，再次证明实践发展永无止境，改革开放也永无止境。我们要以习近平总书记关于全面深化改革的一系列重要论述为指引，不断丰富改革开放精神的理论内涵和时代特征。学员李福荣谈到，80年代看深圳，90年代看浦东，21世纪看雄安。通过大家发言，深切感受到雄安新区牢记习近平总书记嘱托，坚持以改革促发展、以改革促创新、以改革促开放，特别是“雄才十六条”、“院士工作站”等人才战略落地雄安，真正体现了一体推进教育科技人才发展的创新举措，以创新不断开创国家新区和城市发展的全新模式。学员李建光提到，学术茶座发言既有理论高度，同时又聚焦问题，对积极探索具有可行性和可操作性的改革举措帮助很大。通过学术茶座这种教学方式，在较短的时间里进行了一次改革开放的头脑风暴，提升了改革认识，了解了改革实践，坚定了改革信心，启发了改革思路。要坚持这种教学方式创新，不断推进教学培训走深走实。\n\n“国际性、时代性、开放性”是学院重要的办学定位，改革开放是引领中国式现代化的必由之路，学院地处浦东改革开放最前沿，开展改革开放和社会主义现代化建设最新经验的教育培训，具有得天独厚的资源优势和不可替代性。下一步，学院将不断凝练新时代改革开放的最新实践案例，开展多种教学形式深入讨论交流改革开放精神，特别是习近平总书记在上海及长三角地区的改革实践案例，以最新改革实践不断深化改革开放精神的科学内涵和时代价值。\n\n（文/教学研究部 李鹏 图/机关党委 沈超）", "url": "https://www.celap.org.cn/art/2026/3/10/art_2804_54044.html"}, {"id": "recveEmsxulZzm", "title": "具身智能：从场景落地到产业崛起", "categories": ["行业观察"], "cover_url": "'covers//covers/recveEmsxulZzm.jpg", "date": "2026-03-09", "author": "孙广见", "author_unit": "作者孙广见，系新华社记者", "source": "新华网", "summary": "&emsp;&emsp;从春晚舞台的灵动表演到银行大堂的贴心服务，从工业车间的高效作业到训练中心的家务练习，具身智能正走进越来越多的生产生活场景，推动人工智能与机器人技术深度耦合。 &emsp;&emsp;今年的政府工作报告提出，建立未来产业投入增长和风险分担机制，培育发展未来能源、量子科技、具身智能、脑机接口、6G等未来产业。全国两会期间多位代表委员和一些业内人士表示十五五期间国产人形机器人有望在技术突破场景落地产业化进程等多方面。", "content": "从春晚舞台的灵动表演到银行大堂的贴心服务，从工业车间的高效作业到训练中心的家务练习，具身智能正走进越来越多的生产生活场景，推动人工智能与机器人技术深度耦合。\n\n今年的政府工作报告提出，建立未来产业投入增长和风险分担机制，培育发展未来能源、量子科技、具身智能、脑机接口、6G等未来产业。\n\n全国两会期间，多位代表委员和一些业内人士表示，“十五五”期间，国产人形机器人有望在技术突破、场景落地、产业化进程等多方面取得跨越式发展，期待具身智能尽快实现“能想会做”，产业生态更趋完善。\n\n应用场景增多 期待“能想会做”\n\n在江苏银行，夸父机器人“热情”地为老年客户讲解业务流程；在浙江乐清珠城科技的生产车间，轮式人形机器人娴熟地搬运物料、完成车间流转，操作规范顺畅。\n\n从金融服务到工业制造，具身智能逐步打破了传统机器人与通用大模型的发展边界，正寻求实现从“思”到“行”的跨越。\n\n多位代表委员表示，探索人机协同的新型工作形态，推动具身智能在劳动力紧缺、环境高危等岗位应用。\n\n乐聚（深圳）机器人技术有限公司董事长冷晓琨认为，具身智能是人工智能与机器人深度耦合的新兴产业。通用大模型是“大脑”，负责“去想”；机器人则是“身体”，解决“去做”。具身智能将两者打通，让机器人真正实现智能化和通用化。\n\n“人形机器人是具身智能的最佳载体。”深圳市优必选科技股份有限公司创始人周剑认为，具身智能可以完成从感知到执行的全链路动作，与存在于虚拟世界的通用大模型相比，实现了从“能想”到“会做”的闭环。\n\n然而，这种跨越很难一蹴而就。“具身智能正推动人形机器人从依赖预设程序的专用设备，迈向依托多模态感知大模型驱动的通用智能体。”全国人大代表、中国电子信息产业发展研究院院长张立分析，未来3到5年，人形机器人仍需在仿真环境和真实物理世界中持续学习，这一过程将逐步夯实“能思会行”深度融合的技术基础。\n\n全国政协委员、北京理工大学计算机学院院长王国仁认为，仿真训练、多模态感知与机器人决策是支撑具身智能从“思”到“行”的三大核心技术。其中，仿真训练成为头部企业的技术标配，多模态感知已在多个场景规模化应用，机器人决策正处于产线验证阶段。\n\n在原力灵机联合创始人唐文斌看来，具身智能的价值正在真实场景中加速显现：传统工业机器人按照预设程序“指哪儿打哪儿”，遇到变化只能停下来等指令；而具备大模型能力的具身智能机器人，可以在工作中根据现场情况自主判断、调整动作。这种从“只能执行”到“能想会做”的转变，才是具身智能给产业带来的真正价值。\n\n市场前景广阔 亟待打通产业堵点\n\n尽管具身智能的应用前景广阔，但在从实验室走向产业化的道路上，仍面临关键技术待突破、产业链需完善、数据支撑不足等多重挑战。\n\n多位代表委员建议，需锚定人形机器人关键零部件、通用大模型等“卡点”做深做透，同时构建完善的产业协同生态，以打通行业发展堵点。\n\n针对“大脑能力不足”这一共性难题，多位专家给出了破解思路。全国政协委员、京东集团技术委员会主席曹鹏认为，具身智能需要打通感知、决策、执行的全链路，而高质量数据是关键。\n\n冷晓琨认为，高质量数据并非简单的动作记录，而是人形机器人在真实环境中完成任务时，对感知、决策、执行全过程的系统性记录，需通过严格的后处理工序保障数据质量。规模化、标准化数据采集能力，是驱动人形机器人“学明白怎么干活”的重要数据支撑。\n\n全国人大代表、科大讯飞股份有限公司董事长刘庆峰建议，以“多模态大模型+具身智能”的“预训练+后训练”模式构建人形机器人大脑，打通从感知到执行的完整闭环。通过真实场景形成数据飞轮，先在高价值场景落地，再逐步走向通用应用。\n\n“乐聚通过自研及投资一体化关节、电机、灵巧手等10余家产业链企业，已实现核心零部件国产化率超95%。”在冷晓琨看来，硬件能力的自主可控，是产业实现规模化落地的先决条件。星尘智能创始人来杰介绍，企业正协同上下游加速关键环节国产化与工程化，推动供应链完善和产业集群化发展。\n\n规模化应用渐近 生态协同优化产业格局\n\n在北京人形机器人数据训练中心，夸父机器人正反复练习叠衣动作——抖开、对折、再对折，虽动作缓慢但已颇具章法。\n\n乐聚机器人具身训练中心技术负责人王强介绍，未来机器人能逐步承担起衣物整理、物品归位、地面清洁等各类琐碎事务，帮助人们从繁杂的家务中解放出来。\n\n从工厂到家庭，从技术验证到规模化应用，瓶颈正在突破，规模化落地的曙光已然显现。\n\n“2026年优必选工业人形机器人预计可达到万台产能。”周剑认为，现阶段人形机器人的供应链初步形成，硬件成本持续下降，行业已经站在规模化交付的门槛上。\n\n珠城科技家电连接器产品线总经理周书浩介绍，公司引入的4台优必选轮式人形机器人，已经在高噪音的生产车间内稳定运行4个月，车间的检验效率已从每次3小时提升至2小时。\n\n在全国政协委员、奇安信科技集团股份有限公司董事长齐向东眼中，具身智能技术和市场正在日趋成熟，以轮式、多足人形机器人为代表的具身智能市场正在逐渐打开。\n\n全国政协常委、中国电子学会理事长徐晓兰认为，具身智能将推动AI从“通用技术”向“场景化应用”升级，带动算力、数据、算法突破，形成“需求牵引技术、技术反哺应用”的正向循环。\n\n“产业协同生态日益成熟，这是产业实现自主可控的关键支撑。”徐晓兰从产业生态视角描绘了具身智能“3+3”发展格局：顶层是具备整机研发与生态能力的龙头企业，中层是专精特新企业，底层是技术与基础制造企业；同时配套安全、维修、标准三大体系。\n\n多位代表委员表示，从“串点成线”到“聚链成群”，从技术攻坚到生态协同，具身智能正以快速进化、大步跃升之势，优化产业格局，开启人机协同、虚实融合的发展新阶段。（记者 孙广见）", "url": "https://www.news.cn/tech/20260309/f25f9688d2e2470c8654ee4c2d107063/c.html"}, {"id": "recveEmxJgXbS3", "title": "两会特稿·中国经济问答丨开局之年，如何因地制宜发展新质生产力？", "categories": ["行业观察"], "cover_url": "'covers//covers/recveEmxJgXbS3.jpg", "date": "2026-03-08", "author": "新华网", "author_unit": "作者新华网，系新华社国家高端智库", "source": "新华网", "summary": "新质生产力是推动高质量发展、增强经济竞争力的关键。科技创新是核心要素，需要全链条推进关键核心技术攻关，提高基础研究投入比重。原始创新是创新的\"总开关\"，我国部分创新已踏足\"无人区\"，需坚持自主创新在国际竞争中赢得主动。因地制宜发展新质生产力，要深入破除体制机制障碍，建设现代化产业体系，推动产业转型升级，为\"十五五\"开局之年的高质量发展提供强劲动力。", "content": "新华社北京3月8日电 题：开局之年，如何因地制宜发展新质生产力？\n\n“发展新质生产力对于推动高质量发展、增强经济竞争力至关重要”。习近平总书记在参加十四届全国人大四次会议江苏代表团审议时作出这一重要论断，深刻揭示发展新质生产力的重要意义。\n\n今年政府工作报告强调因地制宜发展新质生产力，并就“建设现代化产业体系”“全面增强自主创新能力”“深入破除体制机制障碍”等作出具体部署。\n\n向“新”而行，以“质”致远。“十五五”开局之年，如何让新质生产力加速成长？今年全国两会期间，各界人士围绕这一话题建言献策。\n\n回首2025年，我国重大原创成果不断涌现，在全球创新指数排名中首次跻身前十，高质量发展的脚步更加自信从容。\n\n科技创新是发展新质生产力的核心要素。“全链条推进关键核心技术攻关”“继续提高基础研究投入比重”“优化有利于原创性、颠覆性创新的环境”……今年政府工作报告就加快高水平科技自立自强提出多项举措。\n\n“十五五”规划纲要草案明确，全社会研发经费投入年均增长7%以上，并提出实现基础研究经费投入占研发经费投入比重明显提高。\n\n“原始创新是创新的‘总开关’。”全国人大代表、中国工程院院士潘复生表示，过去我国许多创新是在已有技术路径上的追赶，现在部分创新已踏足“无人区”，只有坚持自主创新，才能在国际竞争中赢得主动。\n\n长期奋战在科研攻关一线，潘复生对原始创新投入大、风险高的特点深有体会。“2025年我国基础研究经费占比已经突破了7%，从政府工作报告到‘十五五’规划纲要草案，均释放了持续提高基础研究投入的信号，彰显了我国大力推动科技创新的决心，将为我们啃‘硬骨头’攻‘卡脖子’，加强原创性、引领性科技攻关注入持久动力。”他说。\n\n人才是科技创新的第一资源。全国政协委员、天津大学副校长明东注意到，政府工作报告就一体推进教育科技人才发展提出多项务实举措。\n\n“脑机接口属于‘硬科技’赛道，发展的核心瓶颈之一就是高水平人才供给不足。”作为来自高校的科研工作者，明东持续关注未来产业人才培养。据他介绍，2024年天津大学开设了脑机接口专业方向，未来将继续推动专业建设从“追着产业跑”转向“牵着产业飞”，加强交叉学科建设与前沿领域实践，努力培养能够贯通基础研究、技术攻关与产业应用的复合型人才。\n\n经过多年研发，潮州三环（集团）股份有限公司实现多层片式陶瓷电容器介质层从5微米到小于1微米的关键技术飞跃，产品在高端车载电子、AI服务器等市场中闯出了一片新天地。\n\n全国人大代表、三环集团研究院院长邱基华说，企业与国际先进技术水平仍有差距。“政府工作报告提出‘强化企业创新主体地位’，释放出把更多创新资源向企业集聚的鲜明信号，让我们更有信心加大研发力度、加快‘根技术’攻关，把发展主动权牢牢掌握在自己手中。”他说。\n\n产业是经济之本，是生产力的重要载体。发展新质生产力，如何加力做强现代化产业体系？\n\n“我们将统筹推进科技创新和产业创新、先进制造业和现代服务业深度融合，加快旧动能更新、新动能成长。”日前，国家发展改革委主任郑栅洁在十四届全国人大四次会议经济主题记者会上介绍今年重点工作时说。\n\n安排2000亿元超长期特别国债资金支持大规模设备更新、实施新一轮制造业重点产业链高质量发展行动、持续加大对中小企业数智化转型的支持……政府工作报告安排多项任务，优化提升传统产业。\n\n“这些有针对性的举措将推动我国传统产业从‘规模领先’到‘实力领跑’。”在全国政协委员、国机集团董事长张晓仑看来，传统产业体量大、链条长，其改造升级关乎现代化产业体系建设全局。他介绍，作为以装备制造为核心主业的企业，国机集团将实施产业基础提升、现代产业链链长建设等工程，不断锻长板、补短板。\n\n全国政协委员、重庆市涪陵区委书记黎勇表示，发展新质生产力不是要忽视、放弃传统产业，而是要因地制宜、分类指导，推动“老树发新枝”。“作为老工业基地，近年来涪陵培育出多家细分领域产品产量居全国乃至世界第一的标杆企业，下一步我们将努力抓住‘两新’政策机遇、发挥制造强区优势，跑出产业发展加速度。”\n\n发展新质生产力，既要稳住“基本盘”，也要发力“高精尖”。\n\n政府工作报告提出，打造集成电路、航空航天、生物医药、低空经济等新兴支柱产业，培育发展未来能源、量子科技、具身智能、脑机接口、6G等未来产业。\n\n“十五五”规划纲要草案在引领新质生产力发展方面，围绕产业基础能力和竞争力提升、新产业新赛道培育发展、前沿科技攻关、创新基础能力提升提出28项工程。\n\n全国人大代表、福建社会科学院副院长黄茂兴表示，从政府工作报告到“十五五”规划纲要草案，构建起战略性新兴产业、新兴支柱产业和未来产业组成的产业发展序列。要把握好不同产业的技术成熟度和产业创新周期规律，推动新质生产力发展蹄疾步稳，动能转换、结构升级有力有序。\n\n“打造智能经济新形态”——政府工作报告中首次出现的这一提法，引发关注。\n\n全国人大代表、小鹏汽车董事长何小鹏表示，当数字世界的AI能力，和物理世界移动的汽车、机器人等硬件相结合，会催生出“物理AI”，或将对生产力、生产关系产生颠覆性改变。\n\n因地制宜发展新质生产力，既是发展命题，也是改革命题。\n\n“新质生产力的发展呼唤新型生产关系的形成。”全国政协常委、中国企业财务管理协会会长张连起认为，“十五五”开局之年，强化改革攻坚，意在打通束缚新质生产力发展的堵点，有助于促进各类先进优质生产要素向发展新质生产力集聚流动。\n\n“建设北京（京津冀）、上海（长三角）、粤港澳大湾区国际科技创新中心，打造世界级科技创新策源地”，写入了今年的政府工作报告。\n\n“‘十四五’期间，北京流向津冀的技术合同成交额大幅增长。政府工作报告这一重要部署将过去‘北京研发、津冀转化’的单向模式，升级为‘创新铁三角’的闭环模式。”全国人大代表、北京市科学技术研究院创新发展战略研究所所长伊彤认为，通过一系列制度创新，破解当前存在的跨区域利益共享机制缺失、科技成果转化链条尚未完全贯通等难题，将进一步加速三地创新链与产业链、人才链、资金链的深度融合。\n\n金融是国民经济的血脉。政府工作报告提出，加强科技创新全链条全生命周期金融服务，对关键核心技术领域的科技型企业，常态化实施上市融资、并购重组“绿色通道”机制。\n\n中国证监会主席吴清日前表示，让资本市场服务产业变革和高质量发展跑出新的加速度，近期将推出两项新措施：一是深化创业板改革，二是优化再融资机制。\n\n“这些举措瞄准科技企业尤其是科技型初创企业的融资痛点，旨在为它们拓展更多样化、更低成本的融资途径，助力企业集中精力投入关键核心技术攻关、开辟新领域新赛道。”国务院发展研究中心创新发展研究部研究员熊鸿儒说。\n\n打造风电装备产业集群，建设海洋智算中心……地处黄海之滨的江苏盐城，正着力做大绿色产业规模，加快培育海洋新质生产力。\n\n改革攻坚，一路向前。“我们坚持用改革的办法，破解发展中面临的绿色贸易壁垒等问题。”全国人大代表、盐城市市长严汉平表示，要按照政府工作报告“进一步扩大高水平对外开放”的要求谋划和推进改革，加快产品碳足迹核算与认证，探索碳排放预算管理制度，助力企业在激烈的国际竞争中取得先机。", "url": "https://www.news.cn/20260308/77703b7b959f4944ac67ef7d8ba74ceb/c.html"}, {"id": "recveH72rB5AiB", "title": "两会特稿·中国经济问答丨开局之年，如何因地制宜发展新质生产力？", "categories": ["行业观察"], "cover_url": "'covers//covers/recveH72rB5AiB.jpg", "date": "2026-03-08", "author": "新华网", "author_unit": "", "source": "新华网", "summary": "新质生产力是推动高质量发展、增强经济竞争力的核心动力。科技创新是发展新质生产力的核心要素，需全链条推进关键核心技术攻关，提高基础研究投入比重。我国2025年重大原创成果不断涌现，在全球创新指数排名中首次趻身前十。因地制宜发展新质生产力，要深入破除体制机制障碍，建设现代化产业体系，推动产业转型升级。各地应根据自身条件找准新质生产力的发展方向，充分发挥比较优势。全国两会期间，各界代表委员围绕“建设现代化产业体系”“全面增强自主创新能力”“深入破除体制机制障碍”等读發献策，共同探讨如何让新质生产力加速成长。无论是干站在统笹第一线的大决策者，还是热情劳作的各界创新者，都把因地制宜发展新质生产力视为高质量发展的必由之路。", "content": "新华社北京3月8日电 题：开局之年，如何因地制宜发展新质生产力？\n\n“发展新质生产力对于推动高质量发展、增强经济竞争力至关重要”。习近平总书记在参加十四届全国人大四次会议江苏代表团审议时作出这一重要论断，深刻揭示发展新质生产力的重要意义。\n\n今年政府工作报告强调因地制宜发展新质生产力，并就“建设现代化产业体系”“全面增强自主创新能力”“深入破除体制机制障碍”等作出具体部署。\n\n向“新”而行，以“质”致远。“十五五”开局之年，如何让新质生产力加速成长？今年全国两会期间，各界人士围绕这一话题建言献策。\n\n回首2025年，我国重大原创成果不断涌现，在全球创新指数排名中首次跻身前十，高质量发展的脚步更加自信从容。\n\n科技创新是发展新质生产力的核心要素。“全链条推进关键核心技术攻关”“继续提高基础研究投入比重”“优化有利于原创性、颠覆性创新的环境”……今年政府工作报告就加快高水平科技自立自强提出多项举措。\n\n“十五五”规划纲要草案明确，全社会研发经费投入年均增长7%以上，并提出实现基础研究经费投入占研发经费投入比重明显提高。\n\n“原始创新是创新的‘总开关’。”全国人大代表、中国工程院院士潘复生表示，过去我国许多创新是在已有技术路径上的追赶，现在部分创新已踏足“无人区”，只有坚持自主创新，才能在国际竞争中赢得主动。\n\n长期奋战在科研攻关一线，潘复生对原始创新投入大、风险高的特点深有体会。“2025年我国基础研究经费占比已经突破了7%，从政府工作报告到‘十五五’规划纲要草案，均释放了持续提高基础研究投入的信号，彰显了我国大力推动科技创新的决心，将为我们啃‘硬骨头’攻‘卡脖子’，加强原创性、引领性科技攻关注入持久动力。”他说。\n\n人才是科技创新的第一资源。全国政协委员、天津大学副校长明东注意到，政府工作报告就一体推进教育科技人才发展提出多项务实举措。\n\n“脑机接口属于‘硬科技’赛道，发展的核心瓶颈之一就是高水平人才供给不足。”作为来自高校的科研工作者，明东持续关注未来产业人才培养。据他介绍，2024年天津大学开设了脑机接口专业方向，未来将继续推动专业建设从“追着产业跑”转向“牵着产业飞”，加强交叉学科建设与前沿领域实践，努力培养能够贯通基础研究、技术攻关与产业应用的复合型人才。\n\n经过多年研发，潮州三环（集团）股份有限公司实现多层片式陶瓷电容器介质层从5微米到小于1微米的关键技术飞跃，产品在高端车载电子、AI服务器等市场中闯出了一片新天地。\n\n全国人大代表、三环集团研究院院长邱基华说，企业与国际先进技术水平仍有差距。“政府工作报告提出‘强化企业创新主体地位’，释放出把更多创新资源向企业集聚的鲜明信号，让我们更有信心加大研发力度、加快‘根技术’攻关，把发展主动权牢牢掌握在自己手中。”他说。\n\n产业是经济之本，是生产力的重要载体。发展新质生产力，如何加力做强现代化产业体系？\n\n“我们将统筹推进科技创新和产业创新、先进制造业和现代服务业深度融合，加快旧动能更新、新动能成长。”日前，国家发展改革委主任郑栅洁在十四届全国人大四次会议经济主题记者会上介绍今年重点工作时说。\n\n安排2000亿元超长期特别国债资金支持大规模设备更新、实施新一轮制造业重点产业链高质量发展行动、持续加大对中小企业数智化转型的支持……政府工作报告安排多项任务，优化提升传统产业。\n\n“这些有针对性的举措将推动我国传统产业从‘规模领先’到‘实力领跑’。”在全国政协委员、国机集团董事长张晓仑看来，传统产业体量大、链条长，其改造升级关乎现代化产业体系建设全局。他介绍，作为以装备制造为核心主业的企业，国机集团将实施产业基础提升、现代产业链链长建设等工程，不断锻长板、补短板。\n\n全国政协委员、重庆市涪陵区委书记黎勇表示，发展新质生产力不是要忽视、放弃传统产业，而是要因地制宜、分类指导，推动“老树发新枝”。“作为老工业基地，近年来涪陵培育出多家细分领域产品产量居全国乃至世界第一的标杆企业，下一步我们将努力抓住‘两新’政策机遇、发挥制造强区优势，跑出产业发展加速度。”\n\n发展新质生产力，既要稳住“基本盘”，也要发力“高精尖”。\n\n政府工作报告提出，打造集成电路、航空航天、生物医药、低空经济等新兴支柱产业，培育发展未来能源、量子科技、具身智能、脑机接口、6G等未来产业。\n\n“十五五”规划纲要草案在引领新质生产力发展方面，围绕产业基础能力和竞争力提升、新产业新赛道培育发展、前沿科技攻关、创新基础能力提升提出28项工程。\n\n全国人大代表、福建社会科学院副院长黄茂兴表示，从政府工作报告到“十五五”规划纲要草案，构建起战略性新兴产业、新兴支柱产业和未来产业组成的产业发展序列。要把握好不同产业的技术成熟度和产业创新周期规律，推动新质生产力发展蹄疾步稳，动能转换、结构升级有力有序。\n\n“打造智能经济新形态”——政府工作报告中首次出现的这一提法，引发关注。\n\n全国人大代表、小鹏汽车董事长何小鹏表示，当数字世界的AI能力，和物理世界移动的汽车、机器人等硬件相结合，会催生出“物理AI”，或将对生产力、生产关系产生颠覆性改变。\n\n因地制宜发展新质生产力，既是发展命题，也是改革命题。\n\n“新质生产力的发展呼唤新型生产关系的形成。”全国政协常委、中国企业财务管理协会会长张连起认为，“十五五”开局之年，强化改革攻坚，意在打通束缚新质生产力发展的堵点，有助于促进各类先进优质生产要素向发展新质生产力集聚流动。\n\n“建设北京（京津冀）、上海（长三角）、粤港澳大湾区国际科技创新中心，打造世界级科技创新策源地”，写入了今年的政府工作报告。\n\n“‘十四五’期间，北京流向津冀的技术合同成交额大幅增长。政府工作报告这一重要部署将过去‘北京研发、津冀转化’的单向模式，升级为‘创新铁三角’的闭环模式。”全国人大代表、北京市科学技术研究院创新发展战略研究所所长伊彤认为，通过一系列制度创新，破解当前存在的跨区域利益共享机制缺失、科技成果转化链条尚未完全贯通等难题，将进一步加速三地创新链与产业链、人才链、资金链的深度融合。\n\n金融是国民经济的血脉。政府工作报告提出，加强科技创新全链条全生命周期金融服务，对关键核心技术领域的科技型企业，常态化实施上市融资、并购重组“绿色通道”机制。\n\n中国证监会主席吴清日前表示，让资本市场服务产业变革和高质量发展跑出新的加速度，近期将推出两项新措施：一是深化创业板改革，二是优化再融资机制。\n\n“这些举措瞄准科技企业尤其是科技型初创企业的融资痛点，旨在为它们拓展更多样化、更低成本的融资途径，助力企业集中精力投入关键核心技术攻关、开辟新领域新赛道。”国务院发展研究中心创新发展研究部研究员熊鸿儒说。\n\n打造风电装备产业集群，建设海洋智算中心……地处黄海之滨的江苏盐城，正着力做大绿色产业规模，加快培育海洋新质生产力。\n\n改革攻坚，一路向前。“我们坚持用改革的办法，破解发展中面临的绿色贸易壁垒等问题。”全国人大代表、盐城市市长严汉平表示，要按照政府工作报告“进一步扩大高水平对外开放”的要求谋划和推进改革，加快产品碳足迹核算与认证，探索碳排放预算管理制度，助力企业在激烈的国际竞争中取得先机。", "url": "https://www.news.cn/20260308/77703b7b959f4944ac67ef7d8ba74ceb/c.html"}, {"id": "recvfHa8A0qC5G", "title": "未来产业，场景赋能创新", "categories": ["行业观察"], "cover_url": "'covers//covers/recvfHa8A0qC5G.jpg", "date": "2026-03-08", "author": "孙冰、孙庭阳", "author_unit": "作者孙冰、孙庭阳，系中国经济周刊记者", "source": "中国经济周刊", "summary": "围绕“十五五”规划和政府工作报告提出的“培育壮大未来产业、鼓励央企国企开放应用场景”要求，文章聊聚场景如何赋能未来产业创新发展。场景作为连接技术与市场的关键资源，既是新技术验证的具体情境，也是开放创新生态的核心要素。文章汇集全国两会代表委员建言：浙江等地在22个领域谋划高价值场景已取得显著成效；代表建议推动形成“技术突破——场景验证——产业应用——体系升级”路径；新能源车、自动驾驶等领域的场景开放实践证明，真实应用场景是技术规模化落地的前提。文章同时指出，多地仍存在技术脱离市场、场景“专属资产化”等堆点，呼吁以开放共享的态度为未来产业提供优质成长环境。", "content": "今年的政府工作报告提出，“培育壮大新兴产业和未来产业”“鼓励央企国企带头开放应用场景”。“十五五”规划纲要草案提出，“加快构建应用场景和生态体系”。\n\n“场景”这一源于影视领域的概念，近年来被引入经济、社会、科技等领域，可以理解为系统性验证新技术、新产品、新业态产业化应用效果的具体情境等含义，成为关键创新资源，也是今年全国两会热点。如何让“场景”更好赋能创新，连接技术和产业、打通研发和市场？代表委员积极建言献策。\n\n自动识别集装箱号、自动进出空箱查验、发现异常自动报警……在“千万箱级”的浙江宁波梅东集装箱码头，宇树科技四足机器狗娴熟地执行空箱查验任务，单箱查验时间压缩至2分钟左右、异物发现率达95%。近年来，浙江省围绕数字经济、人工智能、清洁能源等22个领域，谋划了一系列标志性和高价值场景，大力推动场景培育、开放和应用工作。\n\n“大力构建需求牵引、场景驱动、上下游协同的产品研发体系，给钱给地更要给场景。”全国人大代表、安徽省政协经济委员会主任罗云峰表示，除了降低企业用地成本、完善政策奖励，还要搭建创新场景，架起研发与应用的桥梁。\n\n“场景创新为市场找技术，为技术找市场。”全国人大代表、长三角国家技术创新中心主任刘庆建议，推动形成“技术突破—场景验证—产业应用—体系升级”的路径，促进场景资源公平高效配置，为新技术规模化应用铺平道路。\n\n不久前，安徽云玺量子科技有限公司研发的量子云智能印章，助力当地一家跨国公司实现了“印章分散存放、审批权集中管控”的管理模式，有效化解“安全与效率”的矛盾。\n\n公司董事长童迎伟介绍，合肥市政府将量子云智能印章行政用印相关审批项目列入重点产业链首批场景清单，并联动合肥市场景应用创新促进中心有限公司举办多场场景供需对接会，帮助公司与市属10余家国资企业签订试用协议。\n\n“政企数字化转型中对安全和高效的需求日益提升，公司要根据应用反馈和市场验证不断优化产品服务，实现精准对接。”全国人大代表，中国移动上海公司党委书记、董事长、总经理楼向平建议，面向政务、能源、工业互联网等公共领域打造标杆引领级场景，深耕智能网联汽车、智慧医疗、个人隐私保护等民生领域构建规模推广级场景。\n\n在广东省广州市南沙区，小马智行全无人自动驾驶出租车畅行街头，市民打开手机软件就能体验。这得益于南沙区开放了单向里程近900公里的测试道路作为“练兵场”，涵盖城市道路、高快速路、城中村等多种复杂场景，让自动驾驶企业可以在真实场景中积累技术数据。\n\n“场景创新，推动着新兴业态经历‘技术关’和‘治理关’。”全国人大代表，广汽集团党委书记、董事长冯兴亚认为，广州创新提供优质场景服务，不仅为产业端提供技术验证环境，还为相关法律法规制度的制定提供案例依据，为进一步塑造未来产业健康生态打下良好基础。\n\n业界人士认为，多地在场景建设和应用开放中还存在一些堵点、卡点。比方，一些科研机构、科技企业手握先进技术，但对市场需求却缺乏精准洞察；个别地区和部门将高价值应用场景视为本地区、本系统“专属资产”，向市场开放意愿不强、力度不足。要对新事物、新产业持开放态度，加强交流共享，为未来产业发展提供更好的成长环境。", "url": "http://scitech.ce.cn/sy/zx/202603/t20260308_2812654.shtml"}, {"id": "recvfybNTcXsHq", "title": "从“上海故事”到“上海叙事”，不仅提高“知名度”，还要提高“美誉度”", "categories": ["本埠热点"], "cover_url": "'covers//covers/recvfybNTcXsHq.jpg", "date": "2026-03-05", "author": "李敏、蒋春柳", "author_unit": "系中国浦东干部学院城市治理研究中心、上海广播电视台", "source": "上观新闻", "summary": "上海提升全球叙事传播能力建设取得积极成效。2025年全市生产总值达5.67万亿元，跻身全球城市前五位；全球城市指数排名跃升至第8位。文章指出，全球新闻报道对上海的情绪值为正面积极。文章从四方面提出优化路径：落实人民城市理念，将人民性嵌入城市文化基因；激活多元主体参与动能，提升城市叙事传播效能；构建智慧传播矩阵，打造全球数字叙事中枢；加大全球叙事内容供给力度，讲好中国故事。文章强调，城市叙事能力与营商环境相互促进，已成为全球城市的战略资本，上海有望在全球城市竞争中占据更有利位置。", "content": "庞大的城市体量、海量的数据信息、超规模的叙事场景运用和互动体验，赋予上海提升全球叙事传播能力与影响力的底气。2016年2月，习近平总书记主持召开党的新闻舆论工作座谈会，强调要加强国际传播能力建设，增强国际话语权，集中讲好中国故事。这些年来，伴随国际传播能力建设进程，我们迈出了从“上海故事”到“上海叙事”、从“被动解读”到“主动叙述”的坚定步伐。\n\n有力的数字比简单的形容词更有说服力——\n\n在国际秩序加速调整的态势下，全球治理正积极寻求最稀缺的“确定性”。上海城市形象在全球影响力的提升，契合世界人民对中国高质量发展“稳健前行”的印象。\n\n2025年，上海综合经济实力持续进位，全市生产总值达到5.67万亿元，跻身全球城市前五位，仅次于纽约（约9.06万亿）、洛杉矶（约7.15万亿）、东京（约7.02万亿），超过伦敦（约5.23万亿）。上海在2025年全球城市指数（GPCI）的排名从2024年的第11位跃升为第8位，主要得益于研发表现强劲。上海在文商旅体展领域取得显著进展，基于更优质的景点、购物、时尚等体验，加之免签政策带动“外国访客数”指标上行，进一步提升城市吸引力。\n\n在全球新闻报道领域，上海不仅提高了“知名度”，更是在“美誉度”方面取得积极成效。一方面，根据全球新闻报道数据库（Global Online News Coverage）的分析，2025年有关上海的新闻报道篇数、报道占比较2024年分别增长了5.63%、12.84%。同期，东京分别下降了30.9%、26.8%，伦敦分别下降了10.2%、4.33%。另一方面，对相关报道进行情绪值（新闻语句中正面词与负面词的净强度，负值是负面报道，正值是正面报道）分析发现，2025年全球新闻报道对上海的情绪值是“+0.37”。相较之下，伦敦的情绪值是“-0.37”。由此看，有关上海的全球新闻报道呈现“正面”“积极”的倾向。\n\n有力的数字比简单的形容词更有说服力。城市叙事能力与营商环境相互促进，成为全球城市叙事的战略资本。在英文媒体占压倒性优势的国际舆论环境中，这一系列突破释放出一个明确信号：国际传播不仅是文明交流，还是全球资源链接。正如美国经济学家迈克尔·巴尔所强调的，“中国崛起不仅是经济事件，还是文化事件”。\n\n充分利用和优化全球城市叙事四要素——\n\n面对复杂的国际舆论环境与日益激烈的全球城市竞争，上海要推进叙事传播软实力与经济发展硬实力之间的联动发力，从被动的“被关注对象”进化为主动的“叙述者”，有必要对全球城市叙事的四要素（价值观、人物、情景、故事）进行充分利用和优化。\n\n第一，落实人民城市理念，将“人民性”嵌入城市文化基因。在一个超级复杂和喧嚣的世界，要让更多人记住一座城市、喜欢一个国家是一项具有挑战性的任务。从社会学视域看，经济活动的持续影响力会触动人们的信仰。舆论对社会行为的“翻译”不仅关乎“是什么”，更关乎价值观与思想。反思城市叙事不应是短期营销噱头，而应该注重价值主张，即把“城市是谁、想成为什么”转译为可被多元主体共识的叙事与实践。这样的反思在人民城市理念中可以找到启发乃至答案。\n\n第二，激活多元主体参与动能，提升城市叙事传播效能。数智化时代，人人都可以成为对外传播的主体。随着中国持续扩大过境免签政策，中国游愈加火爆。无论是顶流直播网红，还是“小众游”“深度游”玩家，很多人都将上海作为中国入境游的首选城市。出圈的国产游戏，出海的中国文化，进一步搭建起中西方“Z世代”的对话桥梁。这些年轻人具备跨文化交流的天然优势，正成为数智化时代的国际传播代言人。上海可积极搭建多层次、多维度的交流平台，抢抓数智化机遇，以高质量文化供给在国际传播新浪潮中抢占先机。\n\n第三，构建智慧传播矩阵，打造全球数字叙事中枢。数智化时代，有必要打造与完善具备智能化、精准化特征的数字传播体系。这一智慧传播组合模式应拥有跨越语言、跨越文化、跨越平台的传播能力，可依据不同受众群体的文化背景情况、兴趣爱好倾向以及消费习惯特点，生成具有个性化的内容推送计划。同时，探索创立跨文化话语转换实验室，研发智能语义适配引擎，保障中国故事、上海精彩在各种不同的文化环境中能被准确理解，并实现有效传播。\n\n第四，加大全球叙事内容供给力度，讲述生机勃勃的中国故事。讲好中国故事的关键是讲“实”中国力量，把握经济和治理的两条主线。比如，讲好“中国创造”与“上海技能”的故事，用好科技向善、平安城市、美丽上海等视角，展现可感、可知、可体验的社会主义现代化大都市新气象。\n\n（作者分别为中国浦东干部学院城市治理研究中心主任、教授李敏，上海广播电视台、上海音像资料馆副研究馆员蒋春柳）", "url": "https://www.celap.org.cn/art/2026/3/5/art_2806_54040.html"}, {"id": "recvfyckB87Vgp", "title": "“第二个结合”的学理、道理与哲理：推进马克思主义中国化时代化的内在逻辑与实践深耕", "categories": ["专家视点"], "cover_url": "'covers//covers/recvfyckB87Vgp.jpg", "date": "2026-03-04", "author": "吴涛", "author_unit": "系中国浦东干部学院基层党建研究中心", "source": "中国理论网", "summary": "文章系统阐释第二个结合的学理依据、内在道理与深层哲理。从学理层面，第二个结合是马克思主义扎根中国文化土壤的历史必然，彰显新时代中国共产党人高度的理论原创性。从内在道理看，其核心在于守正与创新、主体性与开放性的辩证统一：以马克思主义之矢射中华优秀传统文化之的，实现创造性转化。从深层哲理论，第二个结合既是中国式现代化道路的文明根基，又为构建人类命运共同体提供价值基石。文章建议，未来研究应深化学理辨析、强化体系建构、推动实践转化，为加快构建中国哲学社会科学自主知识体系提供理论支撑。", "content": "中国特色社会主义事业迈入新的发展阶段，中华民族伟大复兴的航船正以前所未有的姿态破浪前行。在这一宏阔的历史背景下，思想理论界的中心任务，愈发清晰地聚焦于对习近平新时代中国特色社会主义思想的体系化、学理化阐释。其中，“把马克思主义基本原理同中华优秀传统文化相结合”（即“第二个结合”）作为开辟和发展马克思主义中国化时代化新境界的重大理论命题，自提出以来，迅速成为学术研究的焦点。\n\n当前，学界围绕“第二个结合”的研究成果斐然，深刻揭示了其作为根本遵循的重大意义。然而，我们要清醒地看到，部分研究仍存在对命题进行概念性复述、结论性排列的倾向，对其何以可能、何以必然、何以成功的内在机理缺乏更深刻的学理洞察。一些讨论在“第一个结合”与“第二个结合”的关系上，未能完全摆脱并列式或递进式的简单化理解，从而遮蔽了二者之间更复杂的辩证统一关系。站在新的历史节点，为了更好地“续写马克思主义中国化时代化新篇章”，我们亟需超越对“第二个结合”的现象描述与价值颂扬，深入其思想内核，系统探究其深厚的学理依据、严密的内在道理与高远的实践哲理，从而为加快构建中国哲学社会科学自主知识体系提供坚实的理论支撑。\n\n“第二个结合”的学理依据：历史必然性与理论原创性的统一\n\n任何伟大的理论结合，都不是凭空产生的偶然现象，而是历史逻辑与理论逻辑演进的必然结果。“第二个结合”的提出，其学理根基深植于马克思主义中国化百余年的历史实践与中华文明五千多年的深厚底蕴之中。\n\n“第二个结合”是马克思主义扎根中国文化土壤的历史必然。回顾党的历史，从毛泽东同志提出“使马克思主义在中国具体化”，到今天我们强调的“两个结合”，贯穿着一条清晰的主线：马克思主义要想在中国发挥指导作用，就必须与中国的国情相结合。而中国的国情，绝非仅仅是经济、政治层面的“具体实际”，更是由数千年历史积淀而成的文化心理、价值观念、思维方式和民族精神共同构成的深层土壤。可以说，“第一个结合”自始至终都内含着与中华文化相遇、对话乃至融合的维度。正式提出“第二个结合”，是对这一历史实践规律的深刻总结与理论升华，它使得这一内隐的过程显性化、自觉化，标志着我们党对马克思主义中国化规律的认识达到了新的高度。\n\n“第二个结合”彰显了新时代中国共产党人高度的理论原创性。如果说“第一个结合”解决了马克思主义在中国的“落地”问题，那么“第二个结合”则深刻地回答了马克思主义如何在中国“生根”乃至“开花结果”的问题。这一结合，绝非简单的“物理拼接”或“文化点缀”，而是旨在激活马克思主义与中华优秀传统文化各自的优良基因，促成一场深刻的“化学反应”，最终造就一个有机统一的新的文化生命体。它深刻地表明，中国共产党人不仅是马克思主义的忠实继承者，更是中华优秀传统文化的忠实继承者和弘扬者。这种双重的忠实继承，共同构成了我们创立习近平新时代中国特色社会主义思想的文化根基，也为21世纪马克思主义的学理化阐释贡献了独特的中国智慧。这一过程让马克思主义呈现出鲜明的中国作风与中国气派，赋予了科学社会主义以浓郁的中华文化底色。\n\n深刻理解“第二个结合”，关键在于把握其内在的辩证逻辑。当前学术探讨中的一些分歧或模糊认识往往源于未能精准把握其间的张力与统一。其内在的“道理”，集中体现为守正与创新、主体性与开放性两对核心范畴的辩证统一。\n\n守正与创新的辩证统一。“第二个结合”的前提是“结合”，而不是“取代”。守正，就是要坚守马克思主义。马克思主义科学的世界观和方法论，特别是唯物史观和剩余价值学说等基本原理，是我们立党立国、兴党强国的根本指导思想。在与传统文化结合的过程中，若动摇了马克思主义的根本立场、观点和方法，就会迷失方向，陷入文化复古主义的泥潭。创新，则是在守好马克思主义真理之“正”的基础上，大胆汲取中华优秀传统文化中的思想精华。例如，“民为邦本、本固邦宁”的民本思想，为我们理解以人民为中心的发展思想提供了文化滋养；“天人合一、道法自然”的生态智慧，为我们阐释习近平生态文明思想提供了东方哲理；“天下为公、协和万邦”的治理理念，为推动构建人类命运共同体注入了深厚的文化基因。这种结合，是以马克思主义之“矢”去射中华优秀传统文化之“的”，通过创造性转化和创新性发展，让古老的智慧在现代社会焕发新的生机，同时也使马克思主义本身更加丰富、更具说服力。\n\n文化主体性与文明开放性的辩证统一。“第二个结合”是确立文化主体性的根本途径。近代以来，中华民族在精神上曾一度陷入被动。推进“第二个结合”，就是要从根本上解决“挨打”之后可能产生的“失语”问题，在马克思主义的指导下，重新激活中华文明的强大基因，塑造属于我们这个时代的、具有鲜明中国特色的理论形态和话语体系。这种主体性的确立，绝非走向文化保守或文明封闭。恰恰相反，一个拥有强大文化主体性的民族，才具备真正的文化自信，才能在世界文明的交流互鉴中保持从容与定力。因此，“第二个结合”铸就的文化主体性，是开放的、包容的。它让我们有底气、有能力在与世界各文明的对话中，既不照搬照抄，也不妄自尊大，而是以平等的姿态贡献中国智慧、中国方案，推动构建更加公正合理的全球治理体系。\n\n“第二个结合”的深层哲理：人类文明新形态与人类命运共同体的价值基石\n\n超越具体操作层面，“第二个结合”蕴含着更深邃的哲学意蕴和文明价值，它直接关乎中国式现代化的文明底色，并为人类文明的未来走向提供了一种全新的可能性。\n\n“第二个结合”是中国式现代化道路的文明根基。中国式现代化，是人口规模巨大的现代化，是全体人民共同富裕的现代化，是物质文明和精神文明相协调的现代化，是人与自然和谐共生的现代化，是走和平发展道路的现代化。这五大特征，无一不与中华优秀传统文化的价值内核深度契合。共同富裕蕴含着“不患寡而患不均”的朴素公平观和“大同世界”的社会理想；精神文明建设呼应着“文以化人、成风化俗”的教化传统；人与自然和谐共生源自“万物并育而不相害”的宇宙观；和平发展道路则是“亲仁善邻、讲信修睦”的国际关系哲学的现代体现。可以说，“第二个结合”为中国式现代化这条人类现代化历史上的崭新道路，提供了最坚实、最深厚的文明支撑，使其不仅具有科学社会主义的真理力量，更具有中华文明的道义力量。\n\n“第二个结合”是构建人类命运共同体理念的价值基石。当今世界正经历百年未有之大变局，人类社会面临着前所未有的共同挑战。马克思主义对人类解放的终极关怀，与中华文明“四海之内皆兄弟也”的博大胸襟和“和而不同”的包容智慧相结合，共同孕育了“人类命运共同体”这一超越民族国家和意识形态分歧的伟大构想。这种结合所产生的世界观，既反对资本主义的零和博弈逻辑，也超越了西方中心论的文明优越感。它倡导的“共商共建共享”全球治理观，正是马克思主义的平等、公正理想与中华文化的“和合”理念在当代全球问题上的创造性应用。因此，“第二个结合”的成功实践，不仅为中国的发展指明了方向，也为破解全球治理赤字、和平赤字、发展赤字、信任赤字提供了来自东方的哲学启示。\n\n“第二个结合”的提出，标志着我们党在推进马克思主义中国化时代化的征程中达到了新的理论自觉，是从理论自觉到实践深耕的时代呼唤。我们必须响应时代的呼唤，推动研究从宏观阐发转向微观深耕，从理论概括走向实践赋能。未来的研究，应当在以下三个方面持续发力：一是深化学理辨析，围绕“结合”的具体机制、转化路径、评判标准等核心问题，展开更精细的文本研究、概念史考察和比较哲学分析，厘清理论边界，回应实践困惑。二是强化体系建构，系统梳理中华优秀传统文化中与马克思主义基本原理相互贯通、相互成就的思想资源，并将其有机融入哲学、经济学、政治学、社会学等学科的自主知识体系构建中。三是推动实践转化，深入研究如何将“第二个结合”的理论成果，有效转化为思想政治教育的生动教材、国家治理现代化的具体方略、新质生产力发展的文化动力以及国际话语权提升的有力武器。\n\n“第二个结合”不仅是一个重大的理论创新，更是一场波澜壮阔的文明实践。对其学理、道理与哲理的不断探索，本身就是推进马克思主义中国化时代化的过程。我们有理由相信，随着这场伟大结合的不断深化，一个在21世纪闪耀着真理光芒和文明华彩的马克思主义，必将为实现中华民族伟大复兴、促进人类文明进步作出更辉煌的贡献。\n\n（吴涛，中国浦东干部学院基层党建研究中心主任、教授。）", "url": "https://www.celap.org.cn/art/2026/3/4/art_2806_54037.html"}, {"id": "recveMXFgQ0ale", "title": "以能力重塑与机制创新锻造卓越工程师", "categories": ["专家视点"], "cover_url": "'covers//covers/recveMXFgQ0ale.jpg", "date": "2026-03-03", "author": "付传清", "author_unit": "作者付传清，系浙江工业大学土木工程学院教授", "source": "光明日报", "summary": "本文分析：工程科技创新水平直接关系国家核心竞争力与高质量发展质效。卓越工程师作为工程科技活动的核心践行者，是破解“卡脖子”技术难题、推动产业转型升级的关键支撑。在建设教育强国、科技强国、人才强国进程中，加快建设一支规模宏大、结构优化、布局合理的卓越工程师及后备人才队伍，既是顺应产业发展需求的必然要求，也是支撑中国式现代化建设的长远大计。", "content": "工程科技创新水平直接关系国家核心竞争力与高质量发展质效。卓越工程师作为工程科技活动的核心践行者，是破解“卡脖子”技术难题、推动产业转型升级的关键支撑。在建设教育强国、科技强国、人才强国进程中，加快建设一支规模宏大、结构优化、布局合理的卓越工程师及后备人才队伍，既是顺应产业发展需求的必然要求，也是支撑中国式现代化建设的长远大计。\n\n当前，我国已建成世界最大规模的工程教育体系，为产业发展输送了大量工程技术人才。但面对新质生产力发展的迫切需求，工程人才培养仍存在与产业实际脱节、创新能力培育不足、跨领域整合能力欠缺等问题。在此背景下，重构卓越工程师培养体系，优化培养路径，提升人才培养质量，成为新时代工程教育改革的核心课题，更是推动工程科技事业持续进步的重要保障。\n\n## 突出技术创新与实践应用的核心导向\n\n培养卓越工程师，须基于工程实践本质与时代发展需求，构建多维度、复合型的能力体系，突出技术创新与实践应用的核心导向，推动其具备以下多方面能力：\n\n扎实的工程科学基础与技术应用能力。工程实践的复杂性，要求卓越工程师具备深厚的科学素养与扎实的专业功底。既要掌握工程领域的核心理论、关键技术与前沿动态，形成系统的知识体系，又要具备将理论知识转化为工程实践的能力，能熟练运用技术工具解决实际工程问题。这种能力不仅体现在对成熟技术的熟练应用，更表现为对新技术、新材料、新工艺的快速学习与灵活适配，以及确保工程方案的科学性、可行性与先进性等方面。\n\n突出的创新思维与攻坚突破能力。创新是工程科技发展的核心动力，也是卓越工程师的核心特质。面对日益复杂的工程挑战与技术瓶颈，卓越工程师需打破思维定式，具备从问题出发的逆向思维、跨学科融合的系统思维与面向未来的前瞻思维。在遵循工程规律的基础上，要大胆探索新技术路径、优化工程设计方案、创新管理运营模式，尤其在关键核心技术领域，具备敢于攻关、善于突破的勇气与能力，为技术革新与产业升级提供原创性支撑。\n\n系统的综合素养与协同协作能力。现代工程的综合性与复杂性，决定了“单打独斗”难以完成重大工程任务。因此，卓越工程师要具备多维度综合素养：在能力层面，应具备工程系统设计、资源统筹配置、风险预判防控等综合能力，可应对多目标、多约束条件；在协作层面，应善于与不同专业、不同领域的团队成员沟通协作，既要理解学术研究的前沿方向，又要把握产业应用的实际需求，还要兼顾市场反馈与社会诉求，形成跨领域、跨主体的协同创新合力。\n\n坚定的职业操守与责任担当意识。工程活动直接关系到公共利益、生态安全与社会发展，卓越工程师必须坚守职业操守与道德底线。在重大工程任务中，更要具备敬业奉献、艰苦奋斗的精神品质。\n\n## 创新卓越工程师实践培养路径\n\n锻造新时代卓越工程师队伍，需突破传统培养模式的局限，构建以需求为导向、以融合为核心、以创新为动力的培养体系，实现人才培养与产业需求、时代发展同频共振。\n\n构建产教深度融合的培养共同体。产教脱节是制约工程人才培养质量的关键瓶颈，高校与企业可尝试通过机制创新实现校企协同育人的深度融合。建立“四共四通”协同机制，推动校企共同招生、共同培养、共同选题、共享成果，实现师资互通、课程打通、平台融通、政策畅通，形成人才培养、科技创新、产业发展一体化的生态体系。聚焦关键核心技术领域，由企业提出真实技术需求与攻关课题，将产业前沿问题转化为人才培养的核心内容，确保培养目标与产业需求精准对接。搭建校企联合培养平台，建设一批实体化运行的卓越工程师学院与创新研究院，为学生提供长期稳定的工程实践场景，让学生在解决实际工程问题过程中提升技术应用能力与创新能力。同时，建立校企双向交流机制，吸引企业工程技术专家参与课程设计、教学指导，推动高校教师深入企业实践，实现师资队伍的“双师化”转型。\n\n创新模块化、项目制的培养模式。高校可尝试构建“基础模块+核心模块+前沿模块”的课程体系，基础模块强化科学素养与专业根基，核心模块聚焦工程实践与技术应用，前沿模块跟踪产业动态与技术革新，实现理论知识与行业前沿、技术创新、工程实践的深度融合。推行项目制培养模式，以重大工程项目、技术攻关任务为载体，跨专业、跨领域组建培养团队，让学生参与项目调研、方案设计、实践操作、成果转化等全流程，在项目推进中锻炼系统思维、协作能力与创新能力。优化实践教学环节，延长企业实践时长，确保工程硕士在企业科研实践累计不少于一年，工程博士累计不少于两年，通过工学交替实现理论学习与实践锻炼的有机结合。\n\n建立以能力为导向的评价激励机制。相关教育管理部门与高校应构建科学多元的卓越工程师评价体系，突出能力导向，将技术创新成果、工程实践成效、产业贡献度等作为核心评价指标，认可专利、工程设计报告、技术解决方案等实践成果的学术价值与培养价值，形成“重能力、重实践、重贡献”的评价导向。建立过程性评价与终结性评价相结合的机制，全程跟踪学生在课程学习、项目实践、团队协作中的表现，全面反映学生的综合能力与发展潜力。完善激励机制，对在技术攻关、工程实践中表现突出的学生给予重点支持，对积极参与育人工作的校企导师给予表彰奖励，形成多方联动、协同推进的良好育人氛围。\n\n构建全链条、多层次的保障体系。卓越工程师培养是一项系统性工程，需要构建全链条、多层次的保障体系。在标准建设方面，围绕关键领域，由院士、行业总师、资深工程师领衔组建专家团队，制定工程人才培养的能力标准、课程标准、实践标准，形成科学规范的培养指南。在资源整合方面，成立卓越工程师培养联合体，打造资源共享网络与交流合作平台，促进高校、企业、科研机构之间的资源互通与优势互补，实现教育、科技、人才融合发展。在国际合作方面，推进工程教育国际交流与标准互认，借鉴国际先进培养经验，引入全球优质教育资源，培养具备国际视野与跨文化协作能力的卓越工程师，提升我国工程教育的国际竞争力与影响力。\n\n（作者：付传清，系浙江工业大学土木工程学院教授）\n", "url": "https://epaper.gmw.cn/gmrb/html/content/202603/03/content_7456.html"}, {"id": "recveMXFgQWkT9", "title": "印度人工智能发展的雄心与羁绊", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recveMXFgQWkT9.jpg", "date": "2026-03-03", "author": "楼春豪", "author_unit": "作者楼春豪，系中国现代国际关系研究院副院长、研究员", "source": "光明日报", "summary": "本文分析：近日，印度人工智能影响力峰会在喧嚣声中落下帷幕。印度政府在峰会上积极营销印度发展人工智能的潜力与实力，大力宣介印度引领人工智能全球治理的理念与主张，展现其争当全球人工智能“第三极”的战略雄心。不过，组织混乱、机器狗造假事件等负面新闻也让峰会效果大打折扣，引起人们对印度能否顺利推进其人工智能战略的质疑。\n\n与中美两国相比，印度在人工智能领域明显落后，但其战略雄心却毫不逊色，明确将人工智能作为推动经济……", "content": "近日，印度人工智能影响力峰会在喧嚣声中落下帷幕。印度政府在峰会上积极营销印度发展人工智能的潜力与实力，大力宣介印度引领人工智能全球治理的理念与主张，展现其争当全球人工智能“第三极”的战略雄心。不过，组织混乱、机器狗造假事件等负面新闻也让峰会效果大打折扣，引起人们对印度能否顺利推进其人工智能战略的质疑。\n\n与中美两国相比，印度在人工智能领域明显落后，但其战略雄心却毫不逊色，明确将人工智能作为推动经济转型、破解发展难题、弥合数字鸿沟、提升国际话语权的重要抓手。印度总理莫迪在峰会召开前夕接受媒体采访时提出，“印度应跻身全球三大人工智能超级大国之列”。峰会期间，莫迪再次强调，“印度不仅是人工智能革命的一部分，更是在领导和塑造着人工智能革命”。\n\n印度的“雄心壮志”并非毫无依据，其在人工智能领域亦有诸多优势：印度将人工智能作为国家战略，2024年3月即启动《印度人工智能使命》，全面推进人工智能生态系统建设，并将人工智能战略与“印度制造”“数字印度”等国家战略深度融合；印度是拥有全球最大互联网用户群体的国家之一，绝大部分民众已建立数字身份系统，为人工智能技术的大规模部署和反馈优化提供了海量数据和真实场景测试基础；印度拥有巨大的市场潜力，人工智能市场规模预计以25%~35%的年复合增长率扩张，吸引国际科技巨头纷纷投资印度；印度拥有大量软件开发、数据处理、机器学习等领域专业人才，斯坦福大学2024年人工智能指数显示，印度人工智能技能渗透率以2.8分位居全球第一；印度在国际舞台上被认为是全球南方的重要成员，为其参与全球人工智能治理提供独特身份优势。\n\n依托上述优势，印度政府积极推进人工智能战略，在算力基础设施建设、高精尖人才选拔培养、数据资源开放共享、吸引国际科技巨头落地、全球人工智能治理参与、本土大语言模型研发等领域多措并举，且取得一定进展。比如，印度政府已整合3.8万个高端图形处理器（GPU），且仍要扩大规模，以优惠价格提供给印度初创企业和学术机构，以强化本土算力支撑；已建立27个印度数据与人工智能实验室，另有543个实验室选址已确定，助力提升本土研发水平；已遴选12支团队推进本土基础模型或大语言模型的开发项目，其中印度政府支持的BharatGen大语言模型能够支持20余种本土语言；启动“印度人工智能数据集平台”，提供高质量非个人数据的无缝访问；向超过8000名本科生、5000名研究生及500名博士生提供人才培养支持；推动谷歌、微软、亚马逊等科技巨头承诺对印投资百亿美元，加强这些企业在印度的数据中心和云基础设施建设；积极推动人工智能在医疗、农业等领域的应用，如2025年大壶节期间采用基于人工智能的人群管理系统，大幅降低了事故发生率。\n\n不过，印度人工智能发展之路并非坦途，诸多结构性短板弱项亟待解决。\n\n一是算力与基础设施瓶颈。算力是人工智能发展的关键指标，涉及高端芯片、高性能存储和网络设施、电力供应等，但印度在相关领域短板明显。印度本土尚无先进制程芯片制造能力，其半导体产业在软硬件方面都面临诸多掣肘，训练大模型所需高性能GPU几乎完全依赖进口。虽然印度政府积极扩大GPU规模，但与中美相比仍有很大差距，美国单家科技巨头的GPU储备就超过印度全国总量。此外，印度云算力和数据中心基础设施不足，本土云服务商规模有限，大规模训练更多依赖海外云资源，而印度电网稳定性不足、水资源短缺等问题又制约算力基础设施建设。\n\n二是高端人才流失与研发短板。印度虽然拥有庞大的信息通信（IT）人才群体，但存在高端研发人才严重短缺且流失率高、应用型人才过剩而研究型人才不足、IT劳动力规模大但核心工程师占比极小等问题。比如，印度研发人才主要集中在算法调优和应用开发，而非底层架构设计；顶尖科研人员更倾向于赴美深造就业，人才流失问题严重。研发投入不足更使这一问题雪上加霜，印度全国研发支出占国内生产总值（GDP）比重仅为0.6%，远低于人工智能强国3%左右的水平。这导致印度人工智能研发多集中在应用层和二次开发，原创性成果稀少，高端研究能力与应用开发能力之间存在断层。\n\n三是高质量数据供给与治理缺陷。印度数据资源丰富，但在数据质量、数据治理体系、跨境规则等方面存在明显掣肘。比如，印度已通过《数字个人数据保护法》，且积极搭建数据开放共享平台，但在跨部门数据共享、隐私保护与创新平衡等方面仍缺乏细则，数据使用、模型训练中的合规边界存在不确定性。此外，印度的多语言优势同时带来数据标注和标准化的难题，叠加数据碎片化、数据标注体系不健全、数据质量参差不齐等问题，导致高质量语料不足。\n\n四是产业生态培育效果有待提升。印度拥有活跃的人工智能初创生态，但许多企业和项目都停留在早期或概念验证阶段，在落地实施、商业化规模化、组织资源与资金匹配等方面仍面临明显瓶颈。2月19日，印度《经济时报》援引行业专家称，印度约75%的企业人工智能项目在概念验证阶段后就陷入停滞，难以进入生产部署和规模化阶段。印度“人工智能+”更多集中在服务业，与实体经济融合不足，工业自动化、智能制造应用场景不足。此外，印度IT巨头主要提供外包和系统集成业务，缺乏真正开展自主核心技术研发、构建本土底层人工智能平台的全球级人工智能龙头企业。显然，印度虽然有大量初创企业和示范项目，但真正实现大规模、可持续商业化仍存在难度。\n\n总之，印度在海量数据、独特的多语言场景、完善的数字公共基础设施和成本优势等方面有一定特色，有助于其在普惠性人工智能应用、多语言处理、开源生态构建等领域形成差异化竞争力。人工智能影响力峰会的举办，也有助于使其成为连接发达国家技术和资本资源与发展中国家应用需求的重要枢纽。但是，印度的人工智能实力目前更多体现在战略愿景和发展潜力上，其人工智能发展面临的结构性问题短期内难以得到根本解决，在核心技术、产业化规模和全球竞争力等方面仍处于“追赶”阶段，印度迈向全球人工智能“第三极”道阻且长。\n\n（作者：楼春豪，系中国现代国际关系研究院副院长、研究员）\n\n742410https://epaper.gmw.cn/gmrb/html/content/202603/03/content_7424.htmlhttps://null.com.cn/gmrb/htmlpad/content/202603/03/content_7424.html11光明日报印度人工智能发展的雄心与羁绊", "url": "https://epaper.gmw.cn/gmrb/html/content/202603/03/content_7424.html"}, {"id": "recveMXFgQJ3b5", "title": "归纳逻辑与人工智能的互构", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/v7_3.jpg", "date": "2026-03-02", "author": "金立", "author_unit": "作者金立，系浙江大学哲学学院教授", "source": "光明日报", "summary": "本文分析：哲学是时代精神的精华，哲学的发展离不开逻辑支撑。当前，人工智能技术已成为推动国家科技和经济高质量发展的新引擎，但从哲学上看，其发展也面临推理幻觉、意向性缺失等认知难题和挑战，因而，从逻辑学视角探讨计算建模和机器实现等深层次基础理论问题尤为必要。中国逻辑思想中蕴含的关联性归纳认知特质，能够为人工智能大语言模型的发展提供重要的推理论证框架。", "content": "哲学是时代精神的精华，哲学的发展离不开逻辑支撑。当前，人工智能技术已成为推动国家科技和经济高质量发展的新引擎，但从哲学上看，其发展也面临推理幻觉、意向性缺失等认知难题和挑战，因而，从逻辑学视角探讨计算建模和机器实现等深层次基础理论问题尤为必要。中国逻辑思想中蕴含的关联性归纳认知特质，能够为人工智能大语言模型的发展提供重要的推理论证框架。本刊特约请相关领域的专家学者聚焦归纳逻辑与人工智能的互构关系、中国古典“推类”思想助力破解大语言模型知识难题等问题进行深入阐发，以期引发学界更多关注与思考。\n\n人工智能的演进史，常被描绘为一幅技术征服的线性图景：从简单的逻辑推理，到深层的神经网络技术，再到今日吞吐万亿数据的大语言模型，机器的“智能”边界正以惊人的速度扩张。2025年8月，国务院印发的《关于深入实施“人工智能+”行动的意见》提出，深入实施“人工智能+”行动，“加快培育发展新质生产力，使全体人民共享人工智能发展成果”,“到2030年，我国人工智能全面赋能高质量发展”，“智能经济成为我国经济发展的重要增长极”。我们在为“人工智能+”所预示的高效与繁荣图景所鼓舞的同时，也必须清醒地直面其伴生的诸多难题：算法的“黑箱”遮蔽了决策的透明，数据的偏见可能固化为系统的歧视，大模型看似权威的输出潜伏着巨大的认知“幻觉”风险。这些挑战已非单纯的技术优化和算力堆叠所能解决，而是迫使我们从双重维度进行反思：一方面，必须重返“智能”的理论原点，梳理归纳逻辑为人工智能发展所提供的思想源泉和技术贡献，并直面当下人工智能之困境，推动归纳逻辑围绕推理机制、实践验证与价值伦理等方向进行理论突破。另一方面，亟须开启植根文化传统的新路径，从中国古典归纳智慧中汲取思想养分。这既是对理论原点的一种文化超越，更是对持续半个多世纪的“归纳—智能”互构历程的创造性拓展。二者的融合为人工智能的范式突破与价值建构开辟了新路径。\n\n归纳：人工智能的逻辑内核与演进动力\n\n人类智能的卓越之处，在于能从有限而特殊的经验中，提炼出应对无限未知的一般规则，此即归纳。纯粹的演绎逻辑无法创造新知，而人工智能要处理的真实世界恰恰充满了不确定性。因此，将人类的归纳能力形式化并赋予机器，构成了人工智能最根本的理论诉求与发展驱动力。无论是“机器类比人类”的元命题，还是人工智能的核心目标即对人类认知能力尤其是归纳能力的模拟实现，都决定了归纳逻辑不仅是其思想源泉，更是贯穿其技术演进的内在主线。\n\n近代，作为“发明的艺术”的归纳逻辑承担着科学发现的重任。在英国经验主义传统中，培根将自然现象的观察与归纳系统化，建立了以探索因果关系为核心的古典归纳逻辑。然而，休谟指出，所谓的因果恒常关联不过是人类心理习惯的投射，或是被观察到的先后顺序，归纳本身缺乏理性根基。\n\n现代，逻辑实证主义将归纳逻辑的任务从“发现”转向“验证”。英国学者凯恩斯将因果关系转化为“部分蕴含”的条件关系；美国学者卡尔纳普完成了对确证度的形式化量化；美国学者亨普尔通过反思“渡鸦悖论”建立了科学解释模型。上述改造使归纳逻辑的前提与结论间的因果关系具有了可计算性，并为早期符号主义奠定了理论基础：智能被视为对思维规则的模仿，可通过“If…then…”式的符号逻辑运算完全表征。基于精确的符号表征，早期人工智能得以在定理证明、棋类等确定性封闭领域表现出色。然而，一旦面对需要动态交互与模糊推理的现实世界，其“规则化归纳”路径的根本局限便暴露无遗：它试图依赖人力预先穷尽所有规则，用一个静态确定的逻辑框架去固化动态开放的归纳过程。这种模式注定无法解决其在哲学与实践上的困境。\n\n当代，归纳逻辑的研究重心发生了更为深刻的转向：从对“确证度”的静态评估，转向对“置信度”的动态更新。这一转向，既是对符号主义人工智能“寒冬”与归纳逻辑自身理论困境的回应，也标志着一场根本性变革——放弃为归纳逻辑寻求先验的、一劳永逸的理性辩护，转而承认其本质上是主体在充满不确定性的世界中更新信念的实践过程。贝叶斯推理正是这一变革的核心体现。它将主观概率引入归纳逻辑的系统内核，将推理从对静态频率的被动描述，转变为一种主动的、在连续证据流中“持续学习与迭代修正”的认知框架。这一框架所形式化的“动态迭代的经验理性”，恰好为联结主义人工智能的崛起提供了不可或缺的理论准备。与符号主义试图固化归纳结果不同，以神经网络为代表的联结主义的根本主张是放弃归纳规则化的方案，转而模拟归纳过程本身。其早期发展因单层网络的表达局限性而受阻，这恰恰暴露了简单统计关联的贫乏。而贝叶斯推理不仅为“深度置信网络”等关键架构提供了理论基石，其“先验—后验”的更新机制，更在理念上赋予了神经网络通过海量数据“预训练”来获得并优化其“先验知识”的合法性，从而完成了从机械关联到智能涌现的关键转变。\n\n当下，大语言模型的成功，正是归纳逻辑理论革新与联结主义技术优化相结合的工程化典范。在海量数据与强大算力的支持下，大语言模型得以不断开展高强度计算并给出在当下语境中概率最高的最优可能解，由此涌现出理解复杂上下文、依据新信息微调输出并生成看似合理的新内容等类人的认知能力。因此，大语言模型所展现的“涌现”能力，本质是在现代归纳逻辑的框架下，对人类社会语言经验之极端规模化的统计归纳与概率建构。\n\n总之，从“科学发现”到“确证度理论”再到“置信度科学”，从对思维规则的模仿转向对思维生成过程的模拟，人工智能的发展史本质上正是人类归纳思想不断寻求其理论与技术现实化的探索史。\n\n从哲学思辨到可计算化：归纳逻辑对人工智能的回应\n\n当代人工智能在生成任务上取得显著成功，这是对“智能源于归纳”的哲学命题的实践确证。然而，这一成功背后，却无法摆脱纯粹基于统计的经验理性的固有局限。因而，归纳逻辑只有不断拓展其理论基石，才能回应人工智能时代提出的核心诉求。\n\n首先，大语言模型“算法黑箱”的不可解释性，要求归纳逻辑发展出新型推理机制与表征理论。大语言模型的“智能”源于对海量语料统计模式的内化与涌现，它绕开了对“因果必然性”的追求，转而寻求概率意义上的“最合理”解。这一范式衍生出一个根本性问题：这种黑箱式的“涌现”，是对人类归纳认知的模仿，还是一种全新的归纳机制？大语言模型归纳规则的不透明所形成的“算法黑箱”，会引发诸如信任危机、问责困难等治理风险。对此，归纳逻辑必须突破经典框架，发展能够刻画分布式计算、整体性涌现的形式理论（如分布式归纳、涌现式归纳），从而为理解并规范人工智能的推理提供可形式化的解释基础，这在很大程度上拓展了归纳逻辑自身的边界。其次，大语言模型“幻觉”输出的生成性谬误，促使归纳逻辑重新确定其理论适用的边界。大语言模型输出的内容是基于训练数据生成的，其自身无法辨别数据真伪也无法核实生成内容的事实依据，这就使得基于统计关联所得出的结论容易出现“合理错误”（即符合其内部统计模式与逻辑自洽性，但脱离外部事实依据的谬误）的幻觉。这一问题倒逼归纳逻辑理论重新思考“古德曼悖论”（该悖论通过构造“蓝绿”与“绿蓝”等非常规颜色谓词，揭示传统枚举归纳法在相同观察证据下会推导出相互矛盾的预测结论），尤其是在缺乏真实世界指涉的符号系统中，如何链接语义以区分投射谓词与非投射谓词，进而为机器的归纳实践划清有效与无效的边界。最后，大语言模型隐含的算法偏见与伦理风险，亟须归纳逻辑融合价值理性以引导其向善发展。海量数据与超高算力在扩展模型能力的同时，也加剧了偏见固化和分布偏移的风险，这对提高归纳逻辑的可靠性、公平性与动态修正能力提出了迫切要求。将伦理规范转化为可计算的约束，通过设计价值敏感的注意力机制与训练目标来引导模型，这些工作有助于推动归纳逻辑超越单纯的经验理性范畴，将价值判断融入其理论内核，在处理“是”与“应当”之问上发挥独特作用。\n\n当前，学界正从多个维度积极探索应对上述困境：通过按复杂度排序的预训练方法或分步骤推理的思维链技术，将复杂问题拆解，从而提升推理的准确性；为概率驱动的模型套上可解释、可验证的逻辑框架，旨在将其基于统计关联的“直觉”转化为遵循结构化规则与证据更新的“理性”推理过程；借助基于人类反馈的强化学习技术，建立奖励模型与偏好模型，尝试将人类价值原则内化为模型生成与决策的内在约束；等等。然而，这些技术方案仍面临深层矛盾：思维链技术虽然能显著提升推理的准确性，但其代价往往是算力需求的急剧增加；价值规范的同时可能会引发跨文化的偏见与歧视。这揭示出一个根本性问题：单纯依靠“打补丁”式的技术方案，不能解决人工智能的真正“痛点”，人工智能的技术革新必须建立在归纳逻辑的理论更新之上。\n\n可以说，人工智能既为归纳逻辑提供了当代数字化的“试验场”，也“倒逼”其从哲学思辨走向可计算的模型。构建一种既能解释智能涌现、又能引导其向善并与实践深度互动的规范性归纳逻辑，既是应对人工智能挑战的必需，也是归纳理论在智能时代重获生命力的历史性机遇。\n\n中国古典归纳智慧：情境嵌入与价值理性\n\n人工智能当前困境产生的根源在于其赖以发展的西方现代归纳逻辑范式存在双重断裂。其一为符号与语义的脱节。无论是符号主义的规则运算还是联结主义的语义单元分析，都侧重于对智能的符号化模拟，如同“中文屋”实验所揭示的——精通句法操作不等于理解语义。这导致人工智能虽在可数据化的理性任务上表现优异，却因缺乏真正的语义理解和具身体验，而难以把握言外之意与情感等深层意图。其二为理论与价值的失序。现代归纳逻辑理论先行的历史进路使其缺乏实践的目标导引，容易沦为纯粹服务于技术效能的工具。在“分析—拆解—还原”的主导范式下，其优化往往局限于形式化的细节修补，难以将人类在具体动态的情境中对情、理与势综合权衡的实践智慧，转化为可计算、可遵循的规范性准则，从而陷入“价值失灵”的困境。\n\n面对全球大语言模型的迅猛发展，我们必须深刻认识到模型与语言之间并非简单的单向映射，而是一种复杂、动态的双向建构关系：模型在解析语言的同时，也必然被语言的深层结构所塑造。正如德国学者洪堡特所言，“语言是构成思想的器官”。每种语言的结构、语法与词汇，都编码着一个民族独特的思维模式与宇宙观念，决定了其使用者感知、理解世界的基本方式。\n\n汉语，作为中国哲学思想的语言载具，其独特性尤其显著：象形、意会、形声的方块字构筑了与拼音文字迥异的符号体系；表达中注重“言外之意”、讲求委婉含蓄，语法灵活重意合。这些特质共同承载着一种整体性、关联性与语境化的思维方式。因此，基于当今归纳理论发展出的人工智能技术，虽已取得显著成就，但在触及汉语所蕴含的深邃文化密码与思维特质时，便显露出根本性的解释力瓶颈与“水土不服”。中文大语言模型的实质性跃迁，迫切需要回归到汉语本身的思维母体，寻求与之同构的逻辑基础。\n\n中国古典归纳并非单一方法，而是一种以“推类”为核心的有机融合本体论、认识论与实践论的整全智慧体系，能有效弥补西方范式在情境理解与价值融合上的局限，从而促成一场深度的范式融合。其核心可凝练为三大原则：一是整体协同原则。人工智能长期面临的“框架问题”，即系统难以在动态情境中有效筛选相关知识的典型困境，其深层根源可追溯至西方归纳逻辑所依赖的还原论与线性因果预设。从《周易》蕴含的“天人合一”的整体性思维出发，将对因果关系的线性理解转化为在整体关联中把握事物规律，将传统“从特殊到一般”的归纳认知范式发展为一种基于多元关系、动态关联的归纳认知过程。同时，打破单一学科、单一领域的限制，推动归纳逻辑与多学科的合作，真正践行“万物互联、整体共生”的系统思维。二是语境化原则。中国古典归纳思想始终强调语境对推理的根本性约束：从儒家“正名”理论强调概念的规范与明晰，到墨家明确提出“异类不比”的推理准则，再到《淮南子》中记载的“类不可必推”的辩证认知，都共同指向一个核心——归纳的有效性必须置于具体的语境中才能被判定。因此，打破既往句法与语义分离的“去语境化”的技术方案，转而在不同语境、不同现实场景、多元文化背景之下探讨归纳规则的可投射性问题，有助于规避人工智能的“情景失察”问题。三是辩证平衡原则。与西方偏重“求真”的理性传统不同，东方崇尚“求真、求治、求善”目标的动态平衡。因此，从《道德经》相反相成的辩证思维出发，构建一个多元协同、辩证统一的人工智能归纳范式，统筹计算效率、资源经济、语义真实与价值伦理等核心诉求，能够从根本上拒绝“单一目标优先”的极端倾向，实现技术理性与价值理性的有机统一，从而在范式层面规避因目标失衡而导致的“价值失灵”问题。\n\n总之，人工智能的演进史，本质上是人类归纳能力持续形式化的历史，也是一部以归纳逻辑为内核的人类理性与人工智能系统在深层对话中相互定义、彼此塑造的“互构史”。中国古典归纳的逻辑智慧为推动人工智能超越其固有的工具效能、迈向一种合乎情境与价值的认知境界，提供了不可或缺的思想资源。人工智能技术的下一次革新，将不仅发生于实验室的算法迭代和算力升级中，还将激荡于人类不同文明智慧的深度对话间。当我们尝试以中国古典“推类”思想教导人工智能理解“分寸”、把握“意象”时，我们不仅是在解决一个技术难题，更是在参与塑造一个兼具计算效能、情感柔度与人文温度的智能未来。\n\n（作者：金立，系浙江大学哲学学院教授）\n\n736010https://epaper.gmw.cn/gmrb/html/content/202603/02/content_7360.htmlhttps://null.com.cn/gmrb/htmlpad/content/202603/02/content_7360.html11光明日报归纳逻辑与人工智能的互构", "url": "https://epaper.gmw.cn/gmrb/html/content/202603/02/content_7360.html"}, {"id": "recveMXFgQ4dr3", "title": "加强全球人工智能资源共享", "categories": ["行业观察", "广域视野"], "cover_url": "'covers//covers/recveMXFgQ4dr3.jpg", "date": "2026-03-02", "author": "本报记者 梁 桐", "author_unit": "", "source": "中国经济网", "summary": "日前，国际清算银行发布《人工智能对新兴市场的经济影响》报告指出，人工智能（AI）对生产力和经济发展的影响在不同国家和地区之间存在显著差异，这反映出各国在AI部门构成，以及采用和部署AI的能力等方面各不相同，同时，新兴经济体从AI中的受益程度存在较大异质性。\n\n报告指出，AI准备度是决定国家能否有效部署AI并从中受益的关键因素，其主要包括数字基础设施、技能和机构能力等。", "content": "日前，国际清算银行发布《人工智能对新兴市场的经济影响》报告指出，人工智能（AI）对生产力和经济发展的影响在不同国家和地区之间存在显著差异，这反映出各国在AI部门构成，以及采用和部署AI的能力等方面各不相同，同时，新兴经济体从AI中的受益程度存在较大异质性。\n\n报告指出，AI准备度是决定国家能否有效部署AI并从中受益的关键因素，其主要包括数字基础设施、技能和机构能力等。在AI准备度高的国家和地区，AI技术能更有效地被运用和部署，从而放大其对生产力的正面效应。例如，完善的数字基础设施可以降低AI的应用成本，提高数据传输和处理效率，高技能劳动力的存在则能加速AI技术的创新和应用；而在AI准备度不足的国家和地区，即使AI技术本身具有潜力，也可能由于基础设施落后、技能短缺或监管缺失而无法充分发挥作用，甚至可能带来负面效应。报告指出，与发达经济体相比，新兴经济体在AI准备度方面存在显著差异。一些亚洲和中东地区的新兴经济体在数字基础设施方面表现突出，但在技能和机构能力方面仍存在不足。这种异质性导致新兴经济体之间在采用和部署AI技术时面临不同挑战，其受益程度也因此存在差异。\n\n长期来看，受AI技术应用影响，不同新兴经济体经济增长差异将扩大，鉴于AI准备度的差距将持续存在，AI驱动的生产力提升对实际产出的影响在中长期内可能会进一步扩大跨国差异。报告指出，AI技术还将带来产业结构的深刻变革，随着AI技术的广泛应用，劳动力将在行业间发生再分配。其中，建筑业和医疗保健业可能受益较多，而采矿业和农业或将面临更大的就业减少压力。\n\n报告指出，针对发展中国家AI准备度较弱的问题，要优先投资数字基础建设，通过加大对5G、云计算等数字基础设施的投资力度，提高网络覆盖范围和质量，降低网络使用成本，为AI技术的普及和应用提供坚实的硬件支持。同时，还需要开展全民数字技能培训，通过面向不同年龄段、不同职业群体开展针对性的培训课程，提高全民的数字素养和AI技能水平，培养适应AI时代需求的高素质劳动力队伍。此外，发展中国家还应注重提升整体教育质量，加强科学、技术、工程和数学教育，培养创新型人才，为AI技术的研发和应用提供人才储备保障。\n\n报告还十分重视全球合作的重要性。报告指出，要打破技术与数据壁垒，通过在全球范围内加强资源共享和合作，促进AI技术的全球传播和应用，争取让所有国家和地区都能共享AI时代的发展红利。另外，国际社会还应共同建立普惠机制，确保发展中国家在AI技术发展中不被边缘化。例如，通过技术转让、人才交流等方式，帮助发展中国家提升AI准备度，缩小与发达国家的差距，实现全球AI发展的均衡与可持续。\n\n32880410http://paper.ce.cn/pc/content/202603/02/content_328804.htmlhttp://paper.ce.cn/pad/content/202603/02/content_328804.html11 加强全球人工智能资源共享", "url": "http://paper.ce.cn/pc/content/202603/02/content_328804.html"}, {"id": "recvfydkJphS1U", "title": "把治理根基深植于人民之中：新时代党建引领基层治理的理论逻辑与实践路径", "categories": ["行业观察", "专家视点"], "cover_url": "'covers//covers/recvfydkJphS1U.jpg", "date": "2026-02-26", "author": "吴涛", "author_unit": "系中国浦东干部学院基层党建研究中心主任", "source": "上观新闻", "summary": "党的二十届四中全会将党建引领基层治理提升到战略全局高度。文章从理论逻辑、战略部署、实践路径三维度展开论述。理论层面，党建引领是马克思主义国家学说的当代实践、百年奋斗经验的深刻昭示、应
