AR、VR等技术重构展陈与导览模式，城市级智慧文旅平台整合多维数据实现实时联动，推动文化传播从单向灌输转为双向互动。当前，文商旅融合从景区商圈延伸至社区社群，将服务触角嵌入养老、特色小店等民生业态，既激发社区经济活力，也留住了乡愁，成为以人民为中心定义美好生活的生动实践，兼顾提振消费与改善民生的双重目标。"}], "avatar": ""}, {"name": "谭涵文", "unit": "人民日报记者", "count": 1, "arts": [{"id": "recveC3AEwCbUP", "title": "全力打造人工智能产业发展新高地", "author": "谭涵文", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "具身智能"], "cover_url": "", "avatar_url": "", "date": "2026-02-13", "source": "人民日报", "unit": "人民日报记者", "summary": "返回目录 &nbsp;&nbsp; 放大 缩小 全文复制 &nbsp;&nbsp;&nbsp; &nbsp;&nbsp; 下一篇 黄海之滨，山东青岛正掀起一场人工智能的创新浪潮。立足国家人工智能创新应用先导区建设，这里汇聚了500多家相关企业，全力打造产业发展的新高地。 “十五五”规划建议提出，“推动科技创新和产业创新深度融合”“加大应用场景建设和开放力度”。青岛分批次研究制定支持人工智能和具身智能机器人产业发展的系列政策依托其在海洋资源工业制造基础设施等方面的特色优势推动人工智能产业发展。"}], "avatar": ""}, {"name": "田沁鑫", "unit": "全国政协常委、中国国家话剧院院长", "count": 1, "arts": [{"id": "recveC3AEwXQmg", "title": "以中国人的智慧培养人工智能", "author": "田沁鑫", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/recveC3AEwXQmg.jpg", "avatar_url": "", "date": "2026-03-12", "source": "人民日报", "unit": "全国政协常委、中国国家话剧院院长", "summary": "田沁鑫从文化创作者视角探讨如何以中国人的智慧培养人工智能。她认为，文化原创力的彰显并非技术叠加或传统复刻，而是在理解技术潜力与局限的基础上，坚守人的创造与体验、独特性与伦理价值，智慧运用科技手段，让优秀传统文化基因在新时代焕发新生。在实践层面，中国国家话剧院借助AI技术高效整理海量历史典籍，同时利用AI辅助生成北宋美学画卷，与17组高清LED屏幕和全息纱幕构成超大屏风，呈现话剧《苏堤春晓》的壮阔叙事；并首次尝试\"第二现场\"新业态，与6个城市同步演播，让科技与艺术的协奏带给观众真切的获得感与幸福感。作者强调，无论科技如何发展，人类的创造力与思想价值都无可替代，要在数智时代凝聚共识，将技术作为驱动文化创新的引擎与孕育创造的土壤，激发文化原创力。"}], "avatar": ""}, {"name": "陈之殷", "unit": "光明日报记者", "count": 1, "arts": [{"id": "recveEmxJgPA4x", "title": "消费新场景：惠民生、促发展的新空间", "author": "陈之殷 陈恒", "categories": ["行业观察", "专家视点"], "article_categories": ["文旅融合", "消费升级", "新质生产力"], "cover_url": "'covers//covers/recveEmxJgPA4x.jpg", "avatar_url": "", "date": "2026-03-11", "source": "光明日报", "unit": "光明日报记者", "summary": "近年来，消费市场涌现出大量有声有色的新场景，在促消费、惠民生中发挥着日益重要的作用。本期光明智库民生论坛聚焦“以场景创新激活消费需求”，刘志彪、刘奕、张瑾三位专家深入探讨。专家们指出，消费新场景本质上是用“环境营造+需求匹配”实现消费体验具象化、沉浸式升级，其关键在于从资源思维转向用户思维，精准供给满足本地市民、国内游客、境外游客的差异化需求。在具体路径上，应以文化IP为核心整合商业、旅游、娱乐，延伸消费链条；通过数智赋能提升场景传播力和运营效率；从景区商圈向社区社群延伸，将服务触角嵌入养老、特色小店等民生业态。政策层面需建立“沙盒+信用+标准”三位一体治理，引导“好场景”低成本扩张，形成“空间内容IP”的可持续循环。"}], "avatar": ""}, {"name": "爱德华多·雷加拉多", "unit": "古巴国际政治研究中心中国问题专家", "count": 1, "arts": [{"id": "recveGZSBEtoEt", "title": "中国规划为发展中国家提供重要启示（国际论坛）", "author": "爱德华多·雷加拉多", "categories": ["行业观察", "专家视点", "广域视野"], "article_categories": ["科技创新", "新质生产力", "外贸外资", "国际合作"], "cover_url": "'covers//covers/v4_2.jpg", "avatar_url": "'avatars/leijialaduo.jpg", "date": "2026-03-16", "source": "人民日报", "unit": "古巴国际政治研究中心中国问题专家", "summary": "中国通过制度化的长期发展规划体系，实现了政策的连续性和可预期性，为改革开放、科技创新、减贫事业等取得重大成就奠定了坚实基础。五年规划已成为中国治理体系的核心环节，有效衔接现实需求与未来投资，为市场和社会提供清晰指引。这一独特的规划制度为全球南方国家提供了重要启示，表明稳定的发展规划需要制度化的长期框架，而非短期政策摆动。中国的规划体系既体现了战略远见，也确保了执行的连贯性和有效性。"}], "avatar": "'avatars/leijialaduo.jpg"}, {"name": "符大海", "unit": "中央财经大学全球经济与可持续发展研究中心副主任", "count": 1, "arts": [{"id": "recveGZSBEDhmz", "title": "【思享家】海南自贸港“封关”何以撬动亚太经贸棋局", "author": "符大海", "categories": ["专家视点"], "article_categories": ["新质生产力", "金融开放", "自贸港", "海南", "自贸区"], "cover_url": "'covers//covers/recveGZSBEDhmz.jpg", "avatar_url": "", "date": "2026-03-12", "source": "光明网", "unit": "中央财经大学全球经济与可持续发展研究中心副主任", "summary": "面对全球经贸格局深刻变化和保护主义抬头，海南自由贸易港全岛封关运作启动，通过\"一线放开、二线管住、岛内自由\"的制度创新，实现从地理枢纽向亚太经贸战略节点的跃升。这一制度型开放的突破之举，不仅为中国对外开放写下新注脚，更为区域经济一体化注入强劲动能，有力应对全球供应链挑战。海南自贸港的封关运作标志着中国开放战略的新阶段。"}], "avatar": ""}, {"name": "陈钢华", "unit": "中山大学旅游学院教授", "count": 1, "arts": [{"id": "recveGZSBERQ9q", "title": "【光明网专论】丰富高品质旅游产品供给，提高旅游服务质量", "author": "陈钢华", "categories": ["专家视点"], "article_categories": ["文旅融合", "消费升级"], "cover_url": "", "avatar_url": "", "date": "2026-02-25", "source": "光明日报", "unit": "中山大学旅游学院教授", "summary": "旅游业已进入大众化、常态化发展阶段，消费逻辑从\"有没有\"转向\"好不好\"。当前传统观光产品供过于求，深度体验产品供不应求，旅游产品与服务供需结构性矛盾凸显。需丰富高品质旅游产品供给，系统性提升旅游服务质量，推动旅游业从规模扩张迈向质量跃升。这是将旅游业打造成支柱产业、民生产业、幸福产业，为全面推进中国式现代化贡献力量的战略路径。"}], "avatar": ""}, {"name": "岳宗伟", "unit": "国务院发展研究中心公共管理与人力资源研究所副所长", "count": 1, "arts": [{"id": "recveGZSBESbqb", "title": "建设绿色智慧的数字生态文明（深入学习贯彻习近平新时代中国特色社会主义思想·学习《习近平生态文明文选》第一卷专家谈）", "author": "岳宗伟", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "新质生产力", "绿色低碳", "政治理论", "社会主义引领区"], "cover_url": "'covers//covers/recveGZSBESbqb.jpg", "avatar_url": "", "date": "2026-03-10", "source": "人民日报", "unit": "国务院发展研究中心公共管理与人力资源研究所副所长", "summary": "人工智能等数字技术的快速发展，为生态文明建设提供了全新动能。作者系统阐述了建设绿色智慧数字生态文明的重大意义与实践路径。文章指出，数字化与绿色化深度融合是推进中国式现代化的必然要求，有助于抢抓新一轮科技革命机遇，推动生态文明建设进入智能时代。在实践路径上，文章从四个维度提出系统方案：一是构建智慧高效的生态环境信息化体系，运用大数据和AI技术，整合山水林田湖草沙一体化治理数据；二是推动数智赋能生态治理模式，建立天空地海一体化监测网络，完善智能预测预警与辅助决策机制；三是推进数字化绿色化协同转型，以高品质生态环境支撑高质量发展；四是完善保障体系，从理念、政策、人才、安全等多维度为美丽中国数字化治理提供支撑。"}], "avatar": ""}, {"name": "黄彦平", "unit": "中核集团首席科学家、中国核动力研究设计院超碳一号总设计师", "count": 1, "arts": [{"id": "recveH72rBNxF0", "title": "“超碳”登场，发电不再“烧开水”", "author": "黄彦平", "categories": ["专家视点"], "article_categories": ["绿色低碳"], "cover_url": "'covers//covers/v5_2.jpg", "avatar_url": "", "date": "2026-03-11", "source": "光明日报", "unit": "中核集团首席科学家、中国核动力研究设计院超碳一号总设计师", "summary": "本文分析：从首次蒸汽发电至今，人类利用“烧开水”获取电力已有140余年。截至目前，蒸汽发电仍是现代火力发电厂与核电厂的主要发电方式，即便在现役的核动力航母等尖端装备上，同样离不开“蒸汽做功”。难怪网友调侃：人类科技的尽头就是烧开水。\n\n然而，以蒸汽为循环工质的发电技术面临效率瓶颈，而体积大、系统复杂的固有特点又限制了其在中小功率领域的应用。但随着超临界二氧化碳发电技术的出现，“烧开水”发电将迎来质变。"}], "avatar": ""}, {"name": "余有成", "unit": "中国人工智能学会副秘书长；作者张立华，系复旦大学智能机器人研究院常务副院长、特聘教授；作者吴飞，系浙江大学本科生院院长、教授", "count": 1, "arts": [{"id": "recveH72rBWGcn", "title": "中国AI的当下与未来", "author": "余有成 张立华 吴 飞", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/v5_1.jpg", "avatar_url": "", "date": "2026-03-11", "source": "光明日报", "unit": "中国人工智能学会副秘书长；作者张立华，系复旦大学智能机器人研究院常务副院长、特聘教授；作者吴飞，系浙江大学本科生院院长、教授", "summary": "本文分析：2025年年初，DeepSeek以“高性能、低成本”的双重震撼力亮相世界舞台，被国际上称为“DeepSeek时刻”……我国开源模型全球下载量首度实现历史性超越，在新兴市场呈现“爆炸式增长”态势……我们正在见证的，不仅仅是一次技术突破，更是一个智能文明新极的加速崛起。中国的人工智能，正以其独特的路径与节奏，在全球坐标系中刻下越来越深的印记，展现从追赶者到定义者的转变。"}], "avatar": ""}, {"name": "金立", "unit": "浙江大学哲学学院教授", "count": 1, "arts": [{"id": "recveMXFgQJ3b5", "title": "归纳逻辑与人工智能的互构", "author": "金立", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/v7_3.jpg", "avatar_url": "", "date": "2026-03-02", "source": "光明日报", "unit": "浙江大学哲学学院教授", "summary": "本文分析：哲学是时代精神的精华，哲学的发展离不开逻辑支撑。当前，人工智能技术已成为推动国家科技和经济高质量发展的新引擎，但从哲学上看，其发展也面临推理幻觉、意向性缺失等认知难题和挑战，因而，从逻辑学视角探讨计算建模和机器实现等深层次基础理论问题尤为必要。中国逻辑思想中蕴含的关联性归纳认知特质，能够为人工智能大语言模型的发展提供重要的推理论证框架。"}], "avatar": ""}, {"name": "付传清", "unit": "浙江工业大学土木工程学院教授", "count": 1, "arts": [{"id": "recveMXFgQ0ale", "title": "以能力重塑与机制创新锻造卓越工程师", "author": "付传清", "categories": ["专家视点"], "article_categories": ["科技创新", "人才战略"], "cover_url": "'covers//covers/recveMXFgQ0ale.jpg", "avatar_url": "", "date": "2026-03-03", "source": "光明日报", "unit": "浙江工业大学土木工程学院教授", "summary": "本文分析：工程科技创新水平直接关系国家核心竞争力与高质量发展质效。卓越工程师作为工程科技活动的核心践行者，是破解“卡脖子”技术难题、推动产业转型升级的关键支撑。在建设教育强国、科技强国、人才强国进程中，加快建设一支规模宏大、结构优化、布局合理的卓越工程师及后备人才队伍，既是顺应产业发展需求的必然要求，也是支撑中国式现代化建设的长远大计。"}], "avatar": ""}, {"name": "楼春豪", "unit": "中国现代国际关系研究院副院长、研究员", "count": 1, "arts": [{"id": "recveMXFgQWkT9", "title": "印度人工智能发展的雄心与羁绊", "author": "楼春豪", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/recveMXFgQWkT9.jpg", "avatar_url": "", "date": "2026-03-03", "source": "光明日报", "unit": "中国现代国际关系研究院副院长、研究员", "summary": "本文分析：近日，印度人工智能影响力峰会在喧嚣声中落下帷幕。印度政府在峰会上积极营销印度发展人工智能的潜力与实力，大力宣介印度引领人工智能全球治理的理念与主张，展现其争当全球人工智能“第三极”的战略雄心。不过，组织混乱、机器狗造假事件等负面新闻也让峰会效果大打折扣，引起人们对印度能否顺利推进其人工智能战略的质疑。\n\n与中美两国相比，印度在人工智能领域明显落后，但其战略雄心却毫不逊色，明确将人工智能作为推动经济……"}], "avatar": ""}, {"name": "曹祎遐", "unit": "上海市习近平新时代中国特色社会主义思想研究中心特聘研究员、上海社会科学院应用经济研究所研究员", "count": 1, "arts": [{"id": "recvf50qLSgzY6", "title": "——曹祎遐研究员在“美兰湖畔·北上海会客厅”系列论坛的演讲以三大创新路径　绘就文旅消费新图景", "author": "曹祎遐", "categories": ["专家视点"], "article_categories": [], "cover_url": "", "avatar_url": "'avatars/caoyixia.jpg", "date": "2025-04-22", "source": "解放日报", "unit": "上海市习近平新时代中国特色社会主义思想研究中心特聘研究员、上海社会科学院应用经济研究所研究员", "summary": "文旅消费市场呈现爆发式增长，需从文化解码、技术赋能、业态创新三大路径推动发展。通过文化解码创造差异化价值，技术赋能提升体验深度，业态创新拓宽变现渠道，形成从流量到留量的闭环逻辑。上海融合历史底蕴与现代活力，成为体验经济高质量发展的新高地，以开放包容姿态向世界讲述中国式现代化故事，推动文旅消费从规模扩张到价值创造跃升。"}], "avatar": "'avatars/caoyixia.jpg"}, {"name": "伍江", "unit": "同济大学建筑与城市规划学院教授，同济大学超大城市精细化治理研究院院长", "count": 1, "arts": [{"id": "recvfkaQeA91EA", "title": "建设现代化人民城市 需要仔细地去观察去琢磨\n——伍江教授在“悦见人文·立信”系列讲座的演讲", "author": "伍江", "categories": ["专家视点"], "article_categories": ["人工智能", "城市治理", "新质生产力", "文旅融合", "具身智能"], "cover_url": "'covers//covers/recvfkaQeA91EA.jpg", "avatar_url": "'avatars/wujiang.jpg", "date": "2026-03-24", "source": "解放日报", "unit": "同济大学建筑与城市规划学院教授，同济大学超大城市精细化治理研究院院长", "summary": "本文阐述城市的三大基本属性：物质属性、社会属性、文化属性。物质属性体现在生产、生活和安全，需珍视'烟火气'与'市井味'；社会属性要求城市公平正义，从'形象好'转向'功能好'，加强空间复合使用；文化属性是最高层次，城市是承载集体记忆的最大文化产品，应在保护前提下活化利用历史遗存，让艺术创新渗透城市肌理。三者辩证统一，城市才能让生活更美好。"}], "avatar": "'avatars/wujiang.jpg"}, {"name": "李心萍", "unit": "人民日报记者", "count": 1, "arts": [{"id": "recvfkbeMndPkU", "title": "在创新中国看到发展机遇", "author": "李心萍 吴燕 刘温馨", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "科技创新", "具身智能", "新质生产力", "文旅融合"], "cover_url": "'covers//covers/v6_2.jpg", "avatar_url": "", "date": "2026-03-24", "source": "人民日报", "unit": "人民日报记者", "summary": "2026年中国发展高层论坛以\"'十五五'的中国：高质量发展与共创新机遇\"为主题，与会国际嘉宾将\"确定性\"\"创新\"\"机遇\"视为认识当下中国的三个关键词。在\"确定性\"方面，\"十五五\"规划展现宏观经济政策与结构性改革协同发力，积极财政政策、适度宽松货币政策同步推进，中国正成为全球\"确定性基石\"和\"稳定性港湾\"。在\"创新\"方面，苹果、阿里巴巴等企业高度肯定中国开发者社区的创新活力，中国在人工智能开源模型、量子科技、生物制造、6G等未来产业领域持续突破，并致力于全球技术共享。在\"机遇\"方面，西门子、梅赛德斯-奔驰、美敦力等跨国企业纷纷表示将继续深耕中国市场，中国既是战略要地，也是创新策源地和消费潜力市场。郭孔丰强调，30多年来累计在华投资约1000亿元，仅2018年至今就达600亿元。罗兰贝格联席总裁将中国比喻为\"健身房\"，外资在此提升竞争力。"}], "avatar": ""}, {"name": "李晓津", "unit": "中国民航大学航空经济与发展研究所所长", "count": 1, "arts": [{"id": "recvfkc5pwUezS", "title": "航空总人口超五亿见证高质量发展", "author": "李晓津", "categories": ["行业观察", "专家视点"], "article_categories": ["文旅融合", "航空航天", "新质生产力"], "cover_url": "'covers//covers/v7_1.jpg", "avatar_url": "", "date": "2026-03-24", "source": "人民日报", "unit": "中国民航大学航空经济与发展研究所所长", "summary": "我国航空人口超5亿，成为全球第一航空人口大国，这一成就源于经济高质量发展与民航业持续进步。航空人口规模反映经济发展水平和居民收入，验证民航服务品质。成为航空人口大国带来多重利好：助推航空工业升级、促进消费增长、辐射区域发展。未来应在安全、服务、效率、效益方面持续提升，让更多人共享民航发展成果。"}], "avatar": ""}, {"name": "路向峰", "unit": "天津医科大学马克思主义学院教授", "count": 1, "arts": [{"id": "recvfkeZWAlzH2", "title": "新时代人工智能治理的伦理向度", "author": "路向峰", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "AI治理", "政治理论"], "cover_url": "'covers//covers/recvfkeZWAlzH2.jpg", "avatar_url": "", "date": "2026-03-23", "source": "光明日报", "unit": "天津医科大学马克思主义学院教授", "summary": "在人工智能技术加速渗透全球经济社会的背景下，如何构建可嵌入、可验证、可持续的伦理规范已成为时代课题。作者认为，人工智能伦理建构需应对算法不透明、数据滥用、深度伪造等系统性风险，《北京AI安全国际共识》《人工智能全球治理上海宣言》《上海合作组织成员国元首理事会天津宣言》等文件密集出台，标志着国际社会在人工智能伦理治理方面逐步形成关键共识。文章从伦理学视角系统分析人工智能治理的四个向度：价值坐标的塑造、道德基底的铸就、伦理秩序的建构，以及危机意识与价值韧性的培育。作者强调，必须将伦理构建、伦理治理与伦理创新有机结合，避免止步于让机器对齐静态的人类价值推演，始终保持对人工智能治理的清醒态度，根据发展实际不断丰富伦理学理论，唯此才能促进人工智能向上向善发展，实现科技健康发展与社会持续进步的双赢。"}], "avatar": ""}, {"name": "孙冰", "unit": "中国经济周刊记者", "count": 1, "arts": [{"id": "recvfHa8A0qC5G", "title": "未来产业，场景赋能创新", "author": "孙冰、孙庭阳", "categories": ["行业观察", "专家视点"], "article_categories": ["新质生产力", "未来产业"], "cover_url": "'covers//covers/recvfHa8A0qC5G.jpg", "avatar_url": "", "date": "2026-03-08", "source": "中国经济周刊", "unit": "中国经济周刊记者", "summary": "围绕“十五五”规划和政府工作报告提出的“培育壮大未来产业、鼓励央企国企开放应用场景”要求，文章聊聚场景如何赋能未来产业创新发展。场景作为连接技术与市场的关键资源，既是新技术验证的具体情境，也是开放创新生态的核心要素。文章汇集全国两会代表委员建言：浙江等地在22个领域谋划高价值场景已取得显著成效；代表建议推动形成“技术突破——场景验证——产业应用——体系升级”路径；新能源车、自动驾驶等领域的场景开放实践证明，真实应用场景是技术规模化落地的前提。文章同时指出，多地仍存在技术脱离市场、场景“专属资产化”等堆点，呼吁以开放共享的态度为未来产业提供优质成长环境。"}], "avatar": ""}, {"name": "朱珉迕", "unit": "解放日报记者", "count": 1, "arts": [{"id": "recvgm1202fgJl", "title": "上海市“十五五”规划专家确认：轨交“外环”正在建设！上海还能比现在“大”得多", "author": "朱珉迕 胡幸阳", "categories": ["专家视点"], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-07-02", "source": "上观新闻", "unit": "解放日报记者", "summary": "上海\"十五五\"规划专家、上海交通大学安泰经济与管理学院特聘教授陆铭指出，判断上海是否\"够大\"应从都市圈视角出发：东京都市圈人口超3700万，上海都市圈潜在规模可达3100万，而目前实际人口约2500万，发展空间广阔。他认为轨交建设不应以总里程论优劣，而应比密度、比开发强度；上海正在建设轨交\"外环\"，机场联络线开通即成通勤线，印证需求旺盛。陆铭建议沿中心城区向外延伸的轨交沿线提高土地开发强度，推动人口由\"搬入\"增量转向\"吸引\"增量。在长三角一体化方面，他强调应摆脱\"分蛋糕\"思维，以沪苏同城化为突破口，通过规划对接、土地协调、基础设施联通，让要素自由流动，形成真正的\"做大蛋糕\"共同体格局。"}], "avatar": ""}, {"name": "屈庆超", "unit": "（待查）", "count": 1, "arts": [{"id": "recvgmvMEfHt7m", "title": "依托优势加快打造智能经济新形态", "author": "屈庆超", "categories": ["行业观察", "专家视点"], "article_categories": ["新质生产力", "人工智能"], "cover_url": "", "avatar_url": "", "date": "2026-04-02", "source": "中国经济网", "unit": "（待查）", "summary": "当前，新一轮科技革命和产业变革加速演进，人工智能技术全面融入经济社会各领域，成为重塑全球经济结构、改变全球竞争格局的关键力量。习近平总书记强调，“要培育具有重大引领带动作用的人工智能企业和产业，构建数据驱动、人机协同、跨界融合、共创分享的智能经济形态”。今年的《政府工作报告》围绕打造智能经济新形态，作出有力部署。智能经济新形态是发展新质生产力的重要载体，是推动高质量发展的重要引擎。"}], "avatar": ""}, {"name": "徐胥", "unit": "经济日报记者", "count": 1, "arts": [{"id": "recvgmxtSk7opF", "title": "人工智能科技向善发展", "author": "徐胥 王一伊赵以纯", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "AI治理"], "cover_url": "", "avatar_url": "", "date": "2026-03-27", "source": "中国经济网", "unit": "经济日报记者", "summary": "随着人工智能（AI）从技术研发走向规模化应用，这一技术正深刻重塑着全球产业格局与社会生活形态。在近日举行的博鳌亚洲论坛2026年年会上，人工智能也成为最具人气和讨论度的话题之一，相关主题分论坛常常是座无虚席。当前全球人工智能发展有哪些趋势。“AI+”如何深度赋能各行各业。未来如何更好实现AI治理。政商学界嘉宾围绕这些热点话题进行深入探讨，为AI发展贡献“博鳌智慧”。"}], "avatar": ""}, {"name": "黄鑫", "unit": "经济日报记者", "count": 1, "arts": [{"id": "recvgmyIvGSILU", "title": "培育壮大未来产业", "author": "黄鑫", "categories": ["行业观察", "专家视点"], "article_categories": ["新质生产力", "未来产业"], "cover_url": "", "avatar_url": "", "date": "2026-03-19", "source": "中国经济网", "unit": "经济日报记者", "summary": "今年《政府工作报告》提出，培育壮大新兴产业和未来产业。建立未来产业投入增长和风险分担机制，培育发展未来能源、量子科技、生物制造、具身智能、脑机接口、6G等未来产业。专家表示，未来产业是关乎国家竞争力和高质量发展的必答题，具有前所未有的战略性与紧迫性。应遵循发展规律、把握历史机遇、加快多元探索，走出一条符合我国国情的未来产业培育发展之路。"}], "avatar": ""}, {"name": "张治中", "unit": "南宁职业技术大学教授、广西马克思主义理论研究和建设工程基地特约研究员", "count": 1, "arts": [{"id": "recvgmyRLK8KYS", "title": "科技赋能 推动文旅融合创新发展", "author": "张治中", "categories": ["专家视点"], "article_categories": ["文旅融合", "消费升级"], "cover_url": "", "avatar_url": "", "date": "2026-04-02", "source": "光明日报", "unit": "南宁职业技术大学教授、广西马克思主义理论研究和建设工程基地特约研究员", "summary": "作者：张治中（南宁职业技术大学教授、广西马克思主义理论研究和建设工程基地特约研究员） 文化的生命力在于创新创造，而激发创新创造活力是深化文化体制机制改革的中心环节。当前，我国人工智能技术持续突破，不仅助力破解传统文旅发展的痛点，也为文旅产业拓展国际化路径、深化交流合作搭建了新桥梁，为新时代文旅高质量发展注入了强劲动能。我国幅员辽阔、历史悠久，拥有海量优质的文旅资源。"}], "avatar": ""}];

  }
  row.appendChild(avWrap);
  var info = make('div', 'exp-info');
  info.appendChild(make('div', 'exp-name', data.name));
  if (data.unit) info.appendChild(make('div', 'exp-unit', data.unit));
  var latest = data.arts[0] ? data.arts[0].date : '';
  info.appendChild(make('div', 'exp-count', data.count + '篇文章' + (latest ? ' · 最新 ' + latest : '')));
  row.appendChild(info);
  var artsDiv = make('div', 'exp-arts');
  data.arts.slice(0, 3).forEach(function(a) {
    var cat = (a.article_categories && a.article_categories[0]) || (a.categories && a.categories[0]) || '';
    var card = makeLink(
      'purong_article.html?id=' + a.id, 'mini-card',
      (a.cover_url
        ? '<div class="mini-cover" style="background-image:url(' + a.cover_url + ')"><span class="mini-tag">' + cat + '</span></div>'
        : '<div class="mini-cover-ph">无封面图</div>') +
      '<div class="mini-body">' +
        '<div class="mini-title">' + a.title + '</div>' +
        '<div class="mini-meta">' + (a.date || '') + ' · ' + a.source + '</div>' +
      '</div>'
    );
    artsDiv.appendChild(card);
  });
  row.appendChild(artsDiv);
  row.addEventListener('click', function() { togglePanel(data.name); });
  return row;
}

function renderExpertPanel(data) {
  var id = 'panel-' + data.name.replace(/[^a-zA-Z0-9]/g, '_');
  var panel = make('div', 'exp-panel');
  panel.id = id;
  panel.style.display = 'none';
  var header = make('div', 'exp-panel-head');
  var closeBtn = make('span', 'exp-panel-close', 'x');
  closeBtn.addEventListener('click', function(e) { e.stopPropagation(); togglePanel(data.name); });
  header.appendChild(closeBtn);
  header.appendChild(make('div', 'exp-panel-title', data.name + ' 的全部文章'));
  panel.appendChild(header);
  var artsDiv = make('div', 'exp-arts-panel');
  data.arts.forEach(function(a) {
    var cat = (a.article_categories && a.article_categories[0]) || (a.categories && a.categories[0]) || '';
    var card = makeLink(
      'purong_article.html?id=' + a.id, 'art-card',
      (a.cover_url
        ? '<div class="art-cover" style="background-image:url(' + a.cover_url + ')"><span class="art-tag">' + cat + '</span></div>'
        : '<div class="art-cover-ph">无封面图</div>') +
      '<div class="art-body">' +
        '<div class="art-title">' + a.title + '</div>' +
        '<div class="art-meta">' + (a.date || '') + ' · ' + a.source + '</div>' +
        '<div class="art-summary">' + (a.summary || '') + '</div>' +
      '</div>'
    );
    artsDiv.appendChild(card);
  });
  panel.appendChild(artsDiv);
  return panel;
}

function buildExpertList(filterAuthor, filterTags) {
  function latestDate(arts) {
    var ds = arts.map(function(a){ return a.date||''; }).filter(Boolean).sort();
    return ds[ds.length-1] || '';
  }
  var visible = EXPERT_LIST.filter(function(d) {
    if (filterAuthor && d.name !== filterAuthor) return false;
    if (filterTags.length > 0) {
      return d.arts.some(function(a) {
        return filterTags.every(function(t) {
          return a.article_categories && a.article_categories.indexOf(t) >= 0;
        });
      });
    }
    return true;
  });
  visible.sort(function(a, b) {
    var da = latestDate(a.arts); var db = latestDate(b.arts);
    if (db < da) return -1; if (db > da) return 1; return 0;
  });
  var totalArts = visible.reduce(function(s, d) {
    if (filterTags.length > 0) {
      return s + d.arts.filter(function(a) {
        return filterTags.every(function(t) {
          return a.article_categories && a.article_categories.indexOf(t) >= 0;
        });
      }).length;
    }
    return s + d.arts.length;
  }, 0);
  document.getElementById('result-count').textContent = visible.length;
  document.getElementById('result-total').textContent = totalArts;
  var container = document.getElementById('expert-list');
  container.innerHTML = '';
  if (visible.length === 0) {
    container.innerHTML = '<div class="empty-state">未找到符合条件的专家和文章</div>';
    return;
  }
  visible.forEach(function(d) {
    container.appendChild(renderExpertRow(d));
    container.appendChild(renderExpertPanel(d));
  });
}

function togglePanel(name) {
  var id = 'panel-' + name.replace(/[^a-zA-Z0-9]/g, '_');
  var panel = document.getElementById(id);
  if (!panel) return;
  var isOpen = panel.style.display === 'block';
  var all = document.querySelectorAll('.exp-panel');
  for (var i = 0; i < all.length; i++) all[i].style.display = 'none';
  if (!isOpen) {
    panel.style.display = 'block';
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function onFilterChange() {
  var author = document.getElementById('author-select').value;
  var tags = [];
  ALL_TAGS.forEach(function(t) {
    var chip = document.getElementById('tag-' + t);
    if (chip && chip.querySelector('input').checked) tags.push(t);
  });
  ALL_TAGS.forEach(function(t) {
    var chip = document.getElementById('tag-' + t);
    if (!chip) return;
    if (tags.indexOf(t) >= 0) chip.classList.add('active');
    else chip.classList.remove('active');
  });
  buildExpertList(author, tags);
  var params = [];
  if (author) params.push('author=' + encodeURIComponent(author));
  tags.forEach(function(t) { params.push('tag=' + encodeURIComponent(t)); });
  var qs = params.length ? '?' + params.join('&') : '';
  history.replaceState(null, '', qs ? location.pathname + qs : location.pathname);
}

(function() {
  var params = {};
  location.search.slice(1).split('&').forEach(function(p) {
    var kv = p.split('=');
    if (kv[0] === 'author') params.author = decodeURIComponent(kv[1] || '');
    if (kv[0] === 'tag') { if (!params.tags) params.tags = []; params.tags.push(decodeURIComponent(kv[1] || '')); }
  });
  if (params.author) {
    var sel = document.getElementById('author-select');
    for (var i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === params.author) { sel.value = params.author; break; }
    }
  }
  if (params.tags) {
    params.tags.forEach(function(t) {
      var chip = document.getElementById('tag-' + t);
      if (chip) {
        chip.querySelector('input').checked = true;
        chip.classList.add('active');
      }
    });
  }
  buildExpertList(params.author || '', params.tags || []);
  if (params.author) togglePanel(params.author);
})();
</script>
