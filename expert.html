<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>专家视点 - 浦融智库</title>
<style>:root{--navy:#0d1b2a;--navy-lt:#162535;--navy-mid:#1e3347;--border:#2a4a63;--gold:#c9a84c;--cream:#f5f0e8;--gray-1:#8a9bb0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh}
a{text-decoration:none;color:inherit}
img{border:none;vertical-align:middle}
.nav{background:rgba(13,27,42,.96);border-bottom:1px solid var(--border);padding:0 60px;height:64px;display:flex;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.nav-brand{display:flex;align-items:center;gap:12px}
.nav-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#e8c96a);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--navy)}
.nav-logo-name{font-size:16px;font-weight:600;color:var(--cream)}
.nav-links{display:flex;list-style:none;gap:36px;margin-left:60px}
.nav-links a{color:var(--gray-1);font-size:15px;transition:color .2s}
.nav-links a:hover,.nav-links a.active{color:var(--cream)}
.filter-bar{display:flex;align-items:flex-start;gap:32px;padding:20px 60px;background:var(--navy-lt);border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-group{display:flex;align-items:center;gap:10px}
.filter-label{font-size:13px;color:var(--gray-1);white-space:nowrap}
.filter-select{background:var(--navy-mid);border:1px solid var(--border);color:var(--cream);font-size:14px;padding:8px 14px;border-radius:6px;min-width:180px;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--gold)}
.filter-select option{background:var(--navy-mid)}
.tag-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tag-chip{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--gray-1);padding:6px 12px;border-radius:20px;border:1px solid var(--border);transition:all .2s;user-select:none}
.tag-chip:hover{border-color:var(--gold);color:var(--cream)}
.tag-chip.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
.tag-chip input{display:none}
.result-bar{display:flex;justify-content:space-between;align-items:center;padding:16px 60px;font-size:13px;color:var(--gray-1);border-bottom:1px solid var(--border)}
.expert-list{padding:32px 60px;max-width:1100px;margin:0 auto}
.exp-card{display:flex;align-items:flex-start;gap:28px;padding:32px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .2s}
.exp-card:first-child{padding-top:0}
.exp-card:hover{opacity:.85}
.exp-av-wrap{width:88px;height:88px;border-radius:50%;border:3px solid var(--gold);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy-lt),var(--navy-mid))}
.exp-av{width:100%;height:100%;object-fit:cover}
.exp-av-text{font-family:'Georgia',serif;font-size:32px;font-weight:700;color:var(--gold)}
.exp-info{flex:1;min-width:0}
.exp-name{font-family:'Georgia',serif;font-size:22px;color:#fff;margin-bottom:6px;text-shadow:0 1px 3px rgba(0,0,0,.4)}
.exp-unit{font-size:14px;color:var(--gray-1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-count{font-size:12px;color:var(--gold);margin-bottom:16px}
.exp-arts{display:flex;gap:16px;flex-wrap:wrap;flex:1}
.exp-arts-panel{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding-top:16px}
.mini-card{display:flex;flex-direction:column;width:200px;border-radius:8px;overflow:hidden;background:var(--navy-lt);border:1px solid var(--border);transition:border-color .2s}
.mini-card:hover{border-color:var(--gold)}
.mini-cover{height:120px;background-size:cover;background-position:center;position:relative}
.mini-tag{position:absolute;top:8px;left:8px;background:rgba(13,27,42,.85);color:var(--gold);font-size:10px;padding:2px 8px;border-radius:3px}
.mini-cover-ph{height:120px;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gray-1)}
.mini-body{padding:10px}
.mini-title{font-size:13px;line-height:1.4;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-meta{font-size:11px;color:var(--gray-1)}
.art-card{display:flex;flex-direction:column;border-radius:8px;overflow:hidden;background:var(--navy-lt);border:1px solid var(--border);transition:border-color .2s}
.art-card:hover{border-color:var(--gold)}
.art-cover{height:160px;background-size:cover;background-position:center;position:relative}
.art-tag{position:absolute;top:10px;left:10px;background:rgba(13,27,42,.85);color:var(--gold);font-size:10px;padding:3px 10px;border-radius:3px}
.art-cover-ph{height:160px;background:var(--navy-mid);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gray-1)}
.art-body{padding:14px;flex:1}
.art-title{font-size:15px;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-meta{font-size:12px;color:var(--gray-1);margin-bottom:8px}
.art-summary{font-size:13px;color:var(--gray-1);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.exp-panel{border-bottom:1px solid var(--border);padding-bottom:24px;margin-bottom:8px}
.exp-panel-head{display:flex;align-items:center;gap:12px;padding:16px 0 12px}
.exp-panel-close{font-size:18px;color:var(--gray-1);cursor:pointer;padding:4px 8px;border-radius:4px;transition:color .2s}
.exp-panel-close:hover{color:var(--gold)}
.exp-panel-title{font-size:14px;color:var(--gray-1)}
.empty-state{text-align:center;padding:60px;color:var(--gray-1);font-size:15px}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;padding:48px 60px;border-top:1px solid var(--border);margin-top:40px}
.footer-brand .footer-name{font-size:16px;font-weight:600;color:var(--cream);margin-bottom:8px}
.footer-brand p{font-size:13px;color:var(--gray-1);line-height:1.6}
.footer-col h4{font-size:13px;font-weight:600;color:var(--cream);margin-bottom:12px}
.footer-col a{display:block;font-size:13px;color:var(--gray-1);margin-bottom:8px;transition:color .2s}
.footer-col a:hover{color:var(--gold)}
.footer-copy{text-align:center;padding:20px;font-size:12px;color:var(--gray-1);border-top:1px solid var(--border)}
@media(max-width:960px){.exp-arts,.exp-arts-panel{grid-template-columns:repeat(2,1fr)}.filter-bar,.nav,.expert-list,.result-bar{padding-left:24px;padding-right:24px}.footer-inner{padding:40px 24px}}
@media(max-width:640px){.exp-arts,.exp-arts-panel{grid-template-columns:1fr}.footer-inner{grid-template-columns:1fr 1fr}.exp-card{flex-direction:column}.filter-bar{gap:16px}}
</style>
</head>

<script>var ALL_ARTS = [{"id": "recveC3qpqyICx", "title": "微短剧行业要“以人民为中心”", "author": "杨洪涛", "categories": ["行业观察", "专家视点", "案例研究"], "article_categories": ["文旅融合"], "cover_url": "'covers//covers/v8_1.jpg", "avatar_url": "", "date": "2026-02-10", "source": "光明日报", "unit": "中国传媒大学戏剧影视学院文艺系副主任、教授、博士生导师", "summary": "近日，国务院办公厅印发《加快培育服务消费新增长点工作方案》，微短剧被明确纳入“激发重点领域发展活力”的相关部署。近年来，随着互联网和数智技术的发展，以微短剧等为代表的新大众文艺强势崛起。然而，作为新大众文艺中颇具影响力和代表性的微短剧，在发展中也出现了一些乱象。因此，推动微短剧行业高质量健康发展，是繁荣互联网条件下新大众文艺的必然要求。\n\n微短剧行业要把“以人民为中心”的创作导向作为行业发展的第一要务。新大众文艺最为显著的特征就是亿万普通人正以前所未有的力度、深度和广度积极参与文艺创作，人民群众人人都是创作者、传播者和评论者。外卖“诗人”用脚力丈量城市的寻常巷陌，手工匠人用眼力瞄准非遗传承，金"}, {"id": "recveC3qObyi2t", "title": "AI时代，数字素养教育迎来整体性革新", "author": "孙宇", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/test_new_1.jpg", "avatar_url": "", "date": "2026-02-12", "source": "光明日报", "unit": "对外经济贸易大学北京对外开放研究院研究员、文学与国际传播学院讲师", "summary": "随着数字技术加速重塑社会形态，数字素养已从个人发展的一项优势，升级为社会可持续发展的核心动力。各国纷纷将其提升至战略高度，视作教育创新与社会治理的重要支点。为应对这一趋势，经济合作与发展组织、欧盟2025年联合发布《赋能AI时代的学习者：中小学AI素养框架》草案，致力于将AI素养融入基础教育。然而，面对技术的指数级发展，传统教育体系在课程设置、教学方法和师资储备等方面都呈现出明显的适应困难，亟待探索新的应对路径。\n\n数智化浪潮越涌越猛，数字素养已是人们在数字社会里立足、发展的核心能力。2004年以色列学者阿尔卡莱首次提出数字素养的基本框架时，就赋予了其丰富的内涵，包括图像素养、再创造素养、分支"}, {"id": "recveC3repz0VE", "title": "数智技术赋能司法公正评价体系", "author": "王永杰 吴何奇", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "司法公正"], "cover_url": "'covers//covers/test_new_2.jpg", "avatar_url": "", "date": "2026-02-14", "source": "光明日报", "unit": "中共上海市委党校副校长、教授；作者吴何奇，系上海政法学院副教授", "summary": "“十五五”规划建议明确指出：“规范司法权力运行，完善司法公正实现和评价机制，提高司法裁判公正性、稳定性、权威性。”通过将人工智能深度嵌入法律检索、数据校准、风险预警与公众监督环节，能够有效解决司法公正评价机制中最难做实的痛点，把抽象的公正落实到看得见的过程，把专业的公正“翻译”给大众。为司法公正评价划定统一基准线　　传统的案件质量评查模式，主要依赖人工阅卷。"}, {"id": "recveC3rCqjsRX", "title": "以系统思维健全网络生态治理长效机制", "author": "姚宏志 刘 东", "categories": ["专家视点"], "article_categories": ["网络治理"], "cover_url": "'covers//covers/v8_2.jpg", "avatar_url": "", "date": "2026-02-24", "source": "光明日报", "unit": "安徽省中国特色社会主义理论体系研究中心研究员、安徽师范大学马克思主义学院院长；作者刘东，系安徽师范大学马克思主义学院讲师", "summary": "本文分析：网络空间已成为人们生产生活的新场域、民众精神生活的新家园和国家治理的新疆域，网络生态治理事关国家发展和安全，事关人民群众切身利益。党的十八大以来，以习近平同志为核心的党中央把网络生态治理摆在重要位置，着力营造主旋律高扬、正能量充沛的网络空间，重拳出击整治各类网络乱象，我国网络生态明显好转，网络生态治理长效机制基本构建。"}, {"id": "recveC3s8OeQaA", "title": "发展组团式、网络化的现代化城市群和都市圈", "author": "张可云", "categories": ["行业观察", "专家视点"], "article_categories": ["城市治理", "区域联动", "新质生产力"], "cover_url": "'covers//covers/v8_3.jpg", "avatar_url": "", "date": "2026-02-24", "source": "光明日报", "unit": "全国经济地理研究会会长、中国人民大学应用经济学院教授", "summary": "2025年7月中旬召开的中央城市工作会议，对城市工作作出全面、深远的战略部署，提出“发展组团式、网络化的现代化城市群和都市圈”，这是进一步提高城市对人口和经济社会发展的综合承载能力的重要举措。城市群是新型城镇化的主体形态，是中国式现代化的领头羊，是支撑国民经济与地方经济增长、促进区域协调发展的核心引擎，也是参与国际竞争合作的重要平台。"}, {"id": "recveC3sxB0HJp", "title": "数智时代如何促进高水平区域联动", "author": "岳利萍、杨欣怡", "categories": ["专家视点"], "article_categories": ["区域联动", "新质生产力", "数智化"], "cover_url": "'covers//covers/v8_4.jpg", "avatar_url": "", "date": "2026-02-24", "source": "光明日报", "unit": "西北大学中国西部经济发展研究院研究员；作者杨欣怡，系西北大学中国西部经济发展研究院副研究员", "summary": "本文分析：区域协调发展是中国式现代化的内在要求。党的二十届四中全会审议通过的《中共中央关于制定国民经济和社会发展第十五个五年规划的建议》，将“促进区域联动发展”作为“优化区域经济布局，促进区域协调发展”的重要抓手，并提出“加快人工智能等数智技术创新”“全面实施‘人工智能+’行动”。伴随数智技术加速迭代与深度融合，区域间要素流动与资源配置方式正经历深刻变革，以高水平区域联动促进高质量区域协调发展……"}, {"id": "recveC3sVzJoaw", "title": "【光明时评】文商旅深度融合激发消费新活力", "author": "张鹏翼 李文琦", "categories": ["专家视点"], "article_categories": ["文旅融合", "消费升级", "北京"], "cover_url": "'covers//covers/recveC3sVzJoaw.jpg", "avatar_url": "", "date": "2026-02-25", "source": "光明日报", "unit": "北京大学首都高端智库研究员、北京大学信息管理系长聘副教授；作者李文琦，系北京大学信息管理系助理研究员", "summary": "文商旅深度融合正成为以高质量供给撬动内需潜力、推动消费提质扩容的重要路径。各地通过重构复合消费场景，延伸消费链条，形成\"一地生多景、一景带多业\"的协同效应，推动消费者从走马观花转向沉浸留驻。精准供给是激发文商旅活力的关键，须从资源思维转向用户思维，针对本地市民、国内游客、境外游客分别提供差异化体验，在精细化服务中释放消费潜能。数智赋能方面，各地加快推进AR、VR等技术重构展陈与导览模式，城市级智慧文旅平台整合多维数据实现实时联动，推动文化传播从单向灌输转为双向互动。当前，文商旅融合从景区商圈延伸至社区社群，将服务触角嵌入养老、特色小店等民生业态，既激发社区经济活力，也留住了乡愁，成为以人民为中心定义美好生活的生动实践，兼顾提振消费与改善民生的双重目标。"}, {"id": "recveC3AEwCbUP", "title": "全力打造人工智能产业发展新高地", "author": "谭涵文", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "具身智能"], "cover_url": "", "avatar_url": "", "date": "2026-02-13", "source": "人民日报", "unit": "人民日报记者", "summary": "返回目录 &nbsp;&nbsp; 放大 缩小 全文复制 &nbsp;&nbsp;&nbsp; &nbsp;&nbsp; 下一篇 黄海之滨，山东青岛正掀起一场人工智能的创新浪潮。立足国家人工智能创新应用先导区建设，这里汇聚了500多家相关企业，全力打造产业发展的新高地。 “十五五”规划建议提出，“推动科技创新和产业创新深度融合”“加大应用场景建设和开放力度”。青岛分批次研究制定支持人工智能和具身智能机器人产业发展的系列政策依托其在海洋资源工业制造基础设施等方面的特色优势推动人工智能产业发展。"}, {"id": "recveC3AEwXQmg", "title": "以中国人的智慧培养人工智能", "author": "田沁鑫", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/recveC3AEwXQmg.jpg", "avatar_url": "", "date": "2026-03-12", "source": "人民日报", "unit": "全国政协常委、中国国家话剧院院长", "summary": "田沁鑫从文化创作者视角探讨如何以中国人的智慧培养人工智能。她认为，文化原创力的彰显并非技术叠加或传统复刻，而是在理解技术潜力与局限的基础上，坚守人的创造与体验、独特性与伦理价值，智慧运用科技手段，让优秀传统文化基因在新时代焕发新生。在实践层面，中国国家话剧院借助AI技术高效整理海量历史典籍，同时利用AI辅助生成北宋美学画卷，与17组高清LED屏幕和全息纱幕构成超大屏风，呈现话剧《苏堤春晓》的壮阔叙事；并首次尝试\"第二现场\"新业态，与6个城市同步演播，让科技与艺术的协奏带给观众真切的获得感与幸福感。作者强调，无论科技如何发展，人类的创造力与思想价值都无可替代，要在数智时代凝聚共识，将技术作为驱动文化创新的引擎与孕育创造的土壤，激发文化原创力。"}, {"id": "recveEmsxulZzm", "title": "具身智能：从场景落地到产业崛起", "author": "孙广见", "categories": ["行业观察"], "article_categories": ["人工智能", "具身智能", "广东"], "cover_url": "'covers//covers/recveEmsxulZzm.jpg", "avatar_url": "", "date": "2026-03-09", "source": "新华网", "unit": "新华社记者", "summary": "&emsp;&emsp;从春晚舞台的灵动表演到银行大堂的贴心服务，从工业车间的高效作业到训练中心的家务练习，具身智能正走进越来越多的生产生活场景，推动人工智能与机器人技术深度耦合。 &emsp;&emsp;今年的政府工作报告提出，建立未来产业投入增长和风险分担机制，培育发展未来能源、量子科技、具身智能、脑机接口、6G等未来产业。全国两会期间多位代表委员和一些业内人士表示十五五期间国产人形机器人有望在技术突破场景落地产业化进程等多方面。"}, {"id": "recveEmxJgXbS3", "title": "两会特稿·中国经济问答丨开局之年，如何因地制宜发展新质生产力？", "author": "新华网", "categories": ["行业观察"], "article_categories": ["新质生产力", "北京", "科技创新", "江苏", "全国"], "cover_url": "'covers//covers/recveEmxJgXbS3.jpg", "avatar_url": "", "date": "2026-03-08", "source": "新华网", "unit": "新华社国家高端智库", "summary": "新质生产力是推动高质量发展、增强经济竞争力的关键。科技创新是核心要素，需要全链条推进关键核心技术攻关，提高基础研究投入比重。原始创新是创新的\"总开关\"，我国部分创新已踏足\"无人区\"，需坚持自主创新在国际竞争中赢得主动。因地制宜发展新质生产力，要深入破除体制机制障碍，建设现代化产业体系，推动产业转型升级，为\"十五五\"开局之年的高质量发展提供强劲动力。"}, {"id": "recveEmxJgPA4x", "title": "消费新场景：惠民生、促发展的新空间", "author": "陈之殷 陈恒", "categories": ["行业观察", "专家视点"], "article_categories": ["文旅融合", "消费升级", "新质生产力"], "cover_url": "'covers//covers/recveEmxJgPA4x.jpg", "avatar_url": "", "date": "2026-03-11", "source": "光明日报", "unit": "光明日报记者", "summary": "近年来，消费市场涌现出大量有声有色的新场景，在促消费、惠民生中发挥着日益重要的作用。本期光明智库民生论坛聚焦“以场景创新激活消费需求”，刘志彪、刘奕、张瑾三位专家深入探讨。专家们指出，消费新场景本质上是用“环境营造+需求匹配”实现消费体验具象化、沉浸式升级，其关键在于从资源思维转向用户思维，精准供给满足本地市民、国内游客、境外游客的差异化需求。在具体路径上，应以文化IP为核心整合商业、旅游、娱乐，延伸消费链条；通过数智赋能提升场景传播力和运营效率；从景区商圈向社区社群延伸，将服务触角嵌入养老、特色小店等民生业态。政策层面需建立“沙盒+信用+标准”三位一体治理，引导“好场景”低成本扩张，形成“空间内容IP”的可持续循环。"}, {"id": "recveGLpi2lChU", "title": "国共两党智库论坛有力推动两岸融合发展", "author": "郑振清", "categories": ["行业观察"], "article_categories": ["两岸关系"], "cover_url": "", "avatar_url": "", "date": "2026-02-14", "source": "中国经济网", "unit": "清华大学公共管理学院、清华大学台湾研究院长聘教授", "summary": "国共两党智库论坛近日在北京举行标志着暌违近十年的国共两党机制化交流得以恢复此次论坛汇聚两岸经济民生领域的行业代表与专家学者余人围绕两岸交流合作前瞻主题就两岸旅游交流合作两岸产业交流合作两岸环境与永续发展交流合作三项议题进行深入交流研讨并达成内容丰富的条共同意见此次论坛的举办及所取得的成果顺应两岸民意呼声聚焦两岸经济民生交流合作将有力推动两岸融合发展造福两岸同。"}, {"id": "recveGLpUQX32c", "title": "数智科技带来文化发展新机遇", "author": "李冬阳", "categories": ["行业观察"], "article_categories": ["人工智能", "科技创新"], "cover_url": "", "avatar_url": "", "date": "2026-02-13", "source": "中国经济网", "unit": "北京大学光华管理学院金融系副教授、博士生导师", "summary": "首页产业市场滚动新闻数智科技带来文化发展新机遇来源经济日报查看余下全文设置网页字体为默认大小重写设置网页字体大小的事件页面前的完整可弹出查看成功则执行执行标题描述分享的必须和当前打开的网页的是一样的缩略图地址楷体首页产业市场滚动新闻数智科技带来文化发展新机遇年月日来源经济日报字号大中小徐江旻国家统计局发布的最新数据显示年全国规模以上文化及相关产业企业实现营业。"}, {"id": "recveGLqoFT4LJ", "title": "推动科技小院从建起来到强起来", "author": "郑军", "categories": ["行业观察"], "article_categories": ["科技创新", "乡村振兴"], "cover_url": "", "avatar_url": "", "date": "2026-02-10", "source": "中国经济网", "unit": "山东农业大学经济管理学院教授", "summary": "日前教育部办公厅农业农村部办公厅中国科协办公厅印发通知公布了通过年质量监测的农业专业学位研究生培养单位和科技小院名单这是个部门首次对科技小院及其培养单位进行质量监测自年中国农业大学在河北曲周首创科技小院以来作为集科技创新社会服务和人才培养于一体的新型模式科技小院已在全国遍地开花并扬帆出海近日发布的中央一号文件专门部署提升农业科技创新效能科技小院以零门槛零距离。"}, {"id": "recveGZSBEtoEt", "title": "中国规划为发展中国家提供重要启示（国际论坛）", "author": "爱德华多·雷加拉多", "categories": ["行业观察", "专家视点", "广域视野"], "article_categories": ["科技创新", "新质生产力", "外贸外资", "国际合作"], "cover_url": "'covers//covers/v4_2.jpg", "avatar_url": "'avatars/leijialaduo.jpg", "date": "2026-03-16", "source": "人民日报", "unit": "古巴国际政治研究中心中国问题专家", "summary": "中国通过制度化的长期发展规划体系，实现了政策的连续性和可预期性，为改革开放、科技创新、减贫事业等取得重大成就奠定了坚实基础。五年规划已成为中国治理体系的核心环节，有效衔接现实需求与未来投资，为市场和社会提供清晰指引。这一独特的规划制度为全球南方国家提供了重要启示，表明稳定的发展规划需要制度化的长期框架，而非短期政策摆动。中国的规划体系既体现了战略远见，也确保了执行的连贯性和有效性。"}, {"id": "recveGZSBEDhmz", "title": "【思享家】海南自贸港“封关”何以撬动亚太经贸棋局", "author": "符大海", "categories": ["专家视点"], "article_categories": ["新质生产力", "金融开放", "自贸港", "海南", "自贸区"], "cover_url": "'covers//covers/recveGZSBEDhmz.jpg", "avatar_url": "", "date": "2026-03-12", "source": "光明网", "unit": "中央财经大学全球经济与可持续发展研究中心副主任", "summary": "面对全球经贸格局深刻变化和保护主义抬头，海南自由贸易港全岛封关运作启动，通过\"一线放开、二线管住、岛内自由\"的制度创新，实现从地理枢纽向亚太经贸战略节点的跃升。这一制度型开放的突破之举，不仅为中国对外开放写下新注脚，更为区域经济一体化注入强劲动能，有力应对全球供应链挑战。海南自贸港的封关运作标志着中国开放战略的新阶段。"}, {"id": "recveGZSBERQ9q", "title": "【光明网专论】丰富高品质旅游产品供给，提高旅游服务质量", "author": "陈钢华", "categories": ["专家视点"], "article_categories": ["文旅融合", "消费升级"], "cover_url": "", "avatar_url": "", "date": "2026-02-25", "source": "光明日报", "unit": "中山大学旅游学院教授", "summary": "旅游业已进入大众化、常态化发展阶段，消费逻辑从\"有没有\"转向\"好不好\"。当前传统观光产品供过于求，深度体验产品供不应求，旅游产品与服务供需结构性矛盾凸显。需丰富高品质旅游产品供给，系统性提升旅游服务质量，推动旅游业从规模扩张迈向质量跃升。这是将旅游业打造成支柱产业、民生产业、幸福产业，为全面推进中国式现代化贡献力量的战略路径。"}, {"id": "recveGZSBESbqb", "title": "建设绿色智慧的数字生态文明（深入学习贯彻习近平新时代中国特色社会主义思想·学习《习近平生态文明文选》第一卷专家谈）", "author": "岳宗伟", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "新质生产力", "绿色低碳", "政治理论", "社会主义引领区"], "cover_url": "'covers//covers/recveGZSBESbqb.jpg", "avatar_url": "", "date": "2026-03-10", "source": "人民日报", "unit": "国务院发展研究中心公共管理与人力资源研究所副所长", "summary": "人工智能等数字技术的快速发展，为生态文明建设提供了全新动能。作者系统阐述了建设绿色智慧数字生态文明的重大意义与实践路径。文章指出，数字化与绿色化深度融合是推进中国式现代化的必然要求，有助于抢抓新一轮科技革命机遇，推动生态文明建设进入智能时代。在实践路径上，文章从四个维度提出系统方案：一是构建智慧高效的生态环境信息化体系，运用大数据和AI技术，整合山水林田湖草沙一体化治理数据；二是推动数智赋能生态治理模式，建立天空地海一体化监测网络，完善智能预测预警与辅助决策机制；三是推进数字化绿色化协同转型，以高品质生态环境支撑高质量发展；四是完善保障体系，从理念、政策、人才、安全等多维度为美丽中国数字化治理提供支撑。"}, {"id": "recveH72rB5AiB", "title": "两会特稿·中国经济问答丨开局之年，如何因地制宜发展新质生产力？", "author": "新华网", "categories": ["行业观察"], "article_categories": ["科技创新", "新质生产力", "北京", "江苏", "全国"], "cover_url": "'covers//covers/recveH72rB5AiB.jpg", "avatar_url": "", "date": "2026-03-08", "source": "新华网", "unit": "", "summary": "新质生产力是推动高质量发展、增强经济竞争力的核心动力。科技创新是发展新质生产力的核心要素，需全链条推进关键核心技术攻关，提高基础研究投入比重。我国2025年重大原创成果不断涌现，在全球创新指数排名中首次趻身前十。因地制宜发展新质生产力，要深入破除体制机制障碍，建设现代化产业体系，推动产业转型升级。各地应根据自身条件找准新质生产力的发展方向，充分发挥比较优势。全国两会期间，各界代表委员围绕“建设现代化产业体系”“全面增强自主创新能力”“深入破除体制机制障碍”等读發献策，共同探讨如何让新质生产力加速成长。无论是干站在统笹第一线的大决策者，还是热情劳作的各界创新者，都把因地制宜发展新质生产力视为高质量发展的必由之路。"}, {"id": "recveH72rBNxF0", "title": "“超碳”登场，发电不再“烧开水”", "author": "黄彦平", "categories": ["专家视点"], "article_categories": ["绿色低碳"], "cover_url": "'covers//covers/v5_2.jpg", "avatar_url": "", "date": "2026-03-11", "source": "光明日报", "unit": "中核集团首席科学家、中国核动力研究设计院超碳一号总设计师", "summary": "本文分析：从首次蒸汽发电至今，人类利用“烧开水”获取电力已有140余年。截至目前，蒸汽发电仍是现代火力发电厂与核电厂的主要发电方式，即便在现役的核动力航母等尖端装备上，同样离不开“蒸汽做功”。难怪网友调侃：人类科技的尽头就是烧开水。\n\n然而，以蒸汽为循环工质的发电技术面临效率瓶颈，而体积大、系统复杂的固有特点又限制了其在中小功率领域的应用。但随着超临界二氧化碳发电技术的出现，“烧开水”发电将迎来质变。"}, {"id": "recveH72rBWGcn", "title": "中国AI的当下与未来", "author": "余有成 张立华 吴 飞", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/v5_1.jpg", "avatar_url": "", "date": "2026-03-11", "source": "光明日报", "unit": "中国人工智能学会副秘书长；作者张立华，系复旦大学智能机器人研究院常务副院长、特聘教授；作者吴飞，系浙江大学本科生院院长、教授", "summary": "本文分析：2025年年初，DeepSeek以“高性能、低成本”的双重震撼力亮相世界舞台，被国际上称为“DeepSeek时刻”……我国开源模型全球下载量首度实现历史性超越，在新兴市场呈现“爆炸式增长”态势……我们正在见证的，不仅仅是一次技术突破，更是一个智能文明新极的加速崛起。中国的人工智能，正以其独特的路径与节奏，在全球坐标系中刻下越来越深的印记，展现从追赶者到定义者的转变。"}, {"id": "recveMXFgQJ3b5", "title": "归纳逻辑与人工智能的互构", "author": "金立", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/v7_3.jpg", "avatar_url": "", "date": "2026-03-02", "source": "光明日报", "unit": "浙江大学哲学学院教授", "summary": "本文分析：哲学是时代精神的精华，哲学的发展离不开逻辑支撑。当前，人工智能技术已成为推动国家科技和经济高质量发展的新引擎，但从哲学上看，其发展也面临推理幻觉、意向性缺失等认知难题和挑战，因而，从逻辑学视角探讨计算建模和机器实现等深层次基础理论问题尤为必要。中国逻辑思想中蕴含的关联性归纳认知特质，能够为人工智能大语言模型的发展提供重要的推理论证框架。"}, {"id": "recveMXFgQ0ale", "title": "以能力重塑与机制创新锻造卓越工程师", "author": "付传清", "categories": ["专家视点"], "article_categories": ["科技创新", "人才战略"], "cover_url": "'covers//covers/recveMXFgQ0ale.jpg", "avatar_url": "", "date": "2026-03-03", "source": "光明日报", "unit": "浙江工业大学土木工程学院教授", "summary": "本文分析：工程科技创新水平直接关系国家核心竞争力与高质量发展质效。卓越工程师作为工程科技活动的核心践行者，是破解“卡脖子”技术难题、推动产业转型升级的关键支撑。在建设教育强国、科技强国、人才强国进程中，加快建设一支规模宏大、结构优化、布局合理的卓越工程师及后备人才队伍，既是顺应产业发展需求的必然要求，也是支撑中国式现代化建设的长远大计。"}, {"id": "recveMXFgQWkT9", "title": "印度人工智能发展的雄心与羁绊", "author": "楼春豪", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/recveMXFgQWkT9.jpg", "avatar_url": "", "date": "2026-03-03", "source": "光明日报", "unit": "中国现代国际关系研究院副院长、研究员", "summary": "本文分析：近日，印度人工智能影响力峰会在喧嚣声中落下帷幕。印度政府在峰会上积极营销印度发展人工智能的潜力与实力，大力宣介印度引领人工智能全球治理的理念与主张，展现其争当全球人工智能“第三极”的战略雄心。不过，组织混乱、机器狗造假事件等负面新闻也让峰会效果大打折扣，引起人们对印度能否顺利推进其人工智能战略的质疑。\n\n与中美两国相比，印度在人工智能领域明显落后，但其战略雄心却毫不逊色，明确将人工智能作为推动经济……"}, {"id": "recveMXFgQ4dr3", "title": "加强全球人工智能资源共享", "author": "本报记者 梁 桐", "categories": ["行业观察", "广域视野"], "article_categories": ["人工智能", "新质生产力"], "cover_url": "'covers//covers/recveMXFgQ4dr3.jpg", "avatar_url": "", "date": "2026-03-02", "source": "中国经济网", "unit": "", "summary": "日前，国际清算银行发布《人工智能对新兴市场的经济影响》报告指出，人工智能（AI）对生产力和经济发展的影响在不同国家和地区之间存在显著差异，这反映出各国在AI部门构成，以及采用和部署AI的能力等方面各不相同，同时，新兴经济体从AI中的受益程度存在较大异质性。\n\n报告指出，AI准备度是决定国家能否有效部署AI并从中受益的关键因素，其主要包括数字基础设施、技能和机构能力等。"}, {"id": "recveQ2GhPhkMF", "title": "全文｜以文明交流互鉴推动人类文明发展进步", "author": "新华社研究院", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-02-18", "source": "新华社研究院", "unit": "新华社内部研究机构", "summary": "新华社研究院发布智库报告，系统阐述文明交流互鉴对推动人类文明发展进步的深远意义。报告从历史回望、现实困境、中国方案、全球力量四个维度展开：历史上，丝绸之路、大航海时代、百年翻译运动等无不印证文明交流互鉴是人类进步的不竭动力；当下，经济复苏乏力、地区冲突频发、逆全球化思潮蔓延，使文明发展面临严峻挑战。中国倒导平等、互鉴、对话、包容的文明观，通过全球发展倡议、全球安全倡议、全球文明倡议为世界提供了破解困境的公共品。报告指出，各国应共同凝聚文明交流互鉴的全球力量，努力构建人类命运共同体。"}, {"id": "recveSRz6mX2MI", "title": "扎根中国 共谋发展", "author": "袁勇", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-25", "source": "中国经济网", "unit": "中国经济网记者", "summary": "本文报道施耐德电气董事长赵国华在论坛发言。他指出，中国凭借市场、产业和创新优势，成为全球经济增长重要引擎。中国通过培育新质生产力推动产业升级，并扩大开放优化投资环境，吸引跨国企业扎根共谋发展。\n\n赵国华强调，施耐德电气深耕中国市场38年，始终对中国充满信心。中国是其全球第二大市场及重要供应链与研发基地。未来将继续加大在华投入，推动产业高质量发展。技术创新是新质生产力发展关键，施耐德电气通过“零碳计划”等举措赋能人才，推动绿色转型，成果惠及全球。"}, {"id": "recveSRzG5ZU9Q", "title": "释放发展动能激发创新活力", "author": "本报记者 袁 勇", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-25", "source": "中国经济网", "unit": "", "summary": "亚洲开发银行行长高度评价中国发展成就。中国经济社会发展取得长足进步，建立了具有全球竞争力的产业，建设了充满活力的城市。面向未来，中国要推动高质量发展，实现包容性增长和持久繁荣。中国改善营商环境、深化市场准入改革、积极开展国际合作，可以推动亚太地区经济增长。中国分享成功的发展经验，可以促进区域高质量发展，在此过程中，中国也将成为一个更具有韧性和包容性的经济体。"}, {"id": "recveSRzG5mvAa", "title": "扎根中国 共谋发展", "author": "本报记者 袁 勇", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-25", "source": "中国经济网", "unit": "", "summary": "施耐德电气深耕中国市场38年，中国已成为其全球第二大市场和最重要的供应链基地之一，也是全球四大研发基地之一。新质生产力推动产业升级，创新促进先进技术融入应用场景，助力各大产业同步提升效率和可持续性。跨国企业与中国产业伙伴携手推动产业高质量发展，在技术方面、生态方面、人才方面实现全面创新。施耐德电气将继续加大在华投入，强化生态协作，为中国产业转型升级贡献力量。"}, {"id": "recveTwq04GqRR", "title": "全球南方国家需推进发展议程", "author": "本报记者 袁 勇", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-25", "source": "中国经济网", "unit": "", "summary": "全球南方国家需要推进发展议程，中国的现代化经验可为其带来宝贵启示。改革开放以来，中国经济年均增长率达到9%，成长为世界第二大经济体。中国有8亿多人口摆脱贫困，占全球同期减贫人数的四分之三。中国从世界工厂转型为创新高地，逐步发展成科学技术和创新的全球领导者。科技创新是中国的核心发展战略，中国持续加大研发投入，在可再生能源、量子科技、人工智能等领域取得诸多突破性成果。全球南方国家要学习中国经验，加强国际合作，推动经济社会发展。"}, {"id": "recveTwq04FINX", "title": "施耒德电气集团董事长赵国华——扎根中国 共谋发展", "author": "袁勇", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-25", "source": "中国经济网", "unit": "经济日报记者", "summary": "施耐德电气继续加大在华投入，强化生态协作。中国新质生产力发展引领新兴产业和未来产业崛起，也推动了传统产业转型升级。创新是新质生产力发展的重要动力，创新推动先进技术融入应用场景，助力各大产业同步提升效率和可持续性，实现敏捷、韧性、安全、绿色。在生态方面，创新促使各方开放协作，施耐德电气通过发起\"零碳计划\"等举措，带动产业链上下游共同加速转型。跨国企业与中国伙伴深度合作，推动产业转型升级。"}, {"id": "recveWUxuI1EWp", "title": "“文旅+”激发消费新动能", "author": "本报记者 张 雪", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-27", "source": "中国经济网", "unit": "", "summary": "逐渐升温的赏花游、多点开花“一票难求”的演出活动、种类繁多活力四射的体育赛事……春暖花开、万物复苏，人们跟着演出、跟着赛事去旅行，消费热点不断涌现，展现出文旅产业拉动消费的巨大潜能。\n\n近日，中共中央办公厅、国务院办公厅印发《提振消费专项行动方案》，再次对扩大文旅消费作出多项部署，有助于更好发挥文化赋能、旅游带动作用，从不同渠道增加居民的消费意愿、消费能力，形成进一步扩大消费的持续动力。"}, {"id": "recveWUyaQ1Wei", "title": "海南自由贸易港封关运作会带来哪些变化？（聚焦博鳌亚洲论坛2025年年会）", "author": "董泽扬", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-03-26", "source": "人民日报", "unit": "本报记者  李安琪", "summary": "返回目录 &nbsp;&nbsp; 放大 缩小 全文复制 &nbsp;&nbsp;&nbsp; &nbsp;&nbsp; 下一篇 琼岛三月，春潮涌动。 3月25日下午，博鳌亚洲论坛国际会议中心。作为博鳌亚洲论坛2025年年会框架下的主题论坛之一，第五届全球自由贸易港发展论坛在此举行。在长达2.5小时的交流分享中，与会嘉宾分析世界自由贸易发展趋势，聚焦普惠包容的经贸合作，探讨海南自由贸易港发展路径，为中国经济高质量发展、持续扩大高水平对外开放献计献策，为推动发展更有韧性的经济全球化贡献智慧。"}, {"id": "recveYr9KhqUrQ", "title": "贸易战中，永远不要低估民企的韧性", "author": "朱珉迕、胡幸阳", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-09", "source": "解放日报", "unit": "上观新闻", "summary": "贸易战中民企展现出强大韧性。民企通过创新驱动、转型升级，适应复杂多变的国际环境。民企的韧性来自于市场化机制、创新精神、团队凝聚力。支持民企发展，有助于增强经济抗风险能力，推动经济高质量发展。民企是推动经济发展的重要力量，其韧性和活力对于应对国际贸易挑战具有重要意义，是经济发展的重要支撑，需要进一步优化政策环境。"}, {"id": "recveYraiiepiD", "title": "提升水上旅游能级 打造世界级名片", "author": "张凯旋", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-01", "source": "解放日报", "unit": "上海商学院研究生处处长、教授", "summary": "上海水上旅游要创新体验场景，打造世界级名片。借鉴国际经验，推动\"一江一河\"旅游产品升级。完善陆域配套设施，推动文商旅体展多业态融合。提升旅游服务品质，有助于打造中国入境旅游第一站，展现上海城市魅力。通过创新体验场景和完善配套设施，将\"一江一河\"打造成为享誉全球的世界级旅游名片，推动上海旅游业发展。"}, {"id": "recveYraiiEIuv", "title": "临港促进跨境医疗服务要素流动", "author": "沈思怡", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-01", "source": "解放日报", "unit": "上观新闻", "summary": "本报讯（记者 沈思怡）昨天下午，临港新片区举办跨境医疗方案发布会暨首批项目签约揭牌仪式。会议现场发布了《临港新片区发展跨境医疗 推进国际医疗服务集聚区建设实施方案》（以下简称《实施方案》），并揭牌了临港新片区跨境医疗服务中心与临港新片区药械进出口服务中心。实施方案提出到年临港新片区要集聚一批高水平国际医疗服务资源形成聚焦复杂手术疑难杂症等的严肃医疗资源组团聚焦医疗美容高端体检等的消费医。"}, {"id": "recvf4nr3eFfEg", "title": "强化国有企业履行战略使命评价", "author": "陈元志", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-15", "source": "解放日报", "unit": "中国浦东干部学院", "summary": "国有企业要强化战略使命评价，建立科学的评价体系。通过评价引导企业聚焦主业、做强做优，履行社会责任。评价要体现国企的战略地位和使命担当，激励企业创新发展。完善评价机制，有助于推动国企高质量发展，更好服务国家战略。国企评价体系的完善，对于推进国企改革、提升国企竞争力具有重要意义，推动国企向更高质量发展。"}, {"id": "recvf4nrzvai0K", "title": "书写引领区新叙事", "author": "徐建", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-15", "source": "解放日报", "unit": "上海市浦东改革与发展研究院、中国（上海）自由贸易试验区研究院院长", "summary": "在全球化面临逆流、世界不确定性加大的当下，浦东开发开放35周年之际，本文系统梳理了浦东发展的核心逻辑与下一步战略方向。浦东历经三个发展阶段——率先开放快速发展、开放促改革全面开发、深化改革深度接轨国际——始终以\"站在地球仪旁边思考浦东开发\"为根本逻辑，GDP从不足60亿元增长至约2.3万亿元。展望未来，作者认为浦东应在全球化\"大变局\"中继续高扬开放旗帜，前瞻探索下一轮全球化新形式；坚持\"以开放倒逼改革、以改革推动开放\"的浦东叙事，释放自贸区、临港新片区的制度创新能量；以战略性新兴产业和未来产业为重点构建新型产业体系；并以消费结构性升级撬动内需，培育智能时代消费动能。文章以\"以开放为旗、创新为魂\"作结，表达了对下一个浦东的坚定信心。"}, {"id": "recvf4nrzvghln", "title": "全文｜RCEP与海上丝绸之路愿景：中国—东盟合作新空间", "author": "新华社研究院", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-11", "source": "新华社研究院", "unit": "新华社研究院", "summary": "新华社研究院发布智库报告，系统梳理RCEP生效三周年与\"21世纪海上丝绸之路\"十周年背景下中国—东盟合作的成就、机遇与展望。报告指出，RCEP与共建海上丝绸之路协同效应显著：西部陆海新通道2024年铁海联运外贸发运同比增长24%，RCEP成员国运量占比达17%；中老铁路、雅万高铁等标志性项目陆续建成，双边贸易额持续扩大，产供链深度融合。面向未来，报告建议中国与东盟加强政策对接提升规则一体化水平，推进区域产供链一体化建设；用好中国高水平对外开放空间构建更高水平RCEP，推动互联互通和产供链高质量融合。报告认为，中国与东盟合作是区域多边主义的典范，是构建人类命运共同体的生动例证，双方应秉持共商共建共享原则，携手构建更为紧密的中国—东盟命运共同体，共创亚太地区美好明天。"}, {"id": "recvf4nrzviais", "title": "打造东南沿海高水平开放门户", "author": "本报记者 刘春沐阳", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-09", "source": "中国经济网", "unit": "——厦门深入实施自贸试验区提升战略调查", "summary": "打造东南沿海高水平开放门户，需要深化改革、扩大开放。充分发挥地理优势，加强与东盟、南亚的经济合作。建立高水平开放平台，优化营商环境，吸引外资和人才。东南沿海开放门户建设是推动区域协调发展的重要举措。要充分利用地理位置优势，建立与东盟、南亚的经济合作机制，推动区域经济融合发展，实现互利共赢，促进区域繁荣。"}, {"id": "recvf50q8hY0yG", "title": "十年，这三个自贸试验区有何变化", "author": "本报记者  罗珊珊  李  刚  靳  博", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-22", "source": "人民日报", "unit": "", "summary": "广东、天津、福建自贸试验区设立10年来，以制度创新为核心，全面落实800多项改革试点任务。广东自贸试验区推动港澳人才在内地评职称，深化粤港澳大湾区人才流动；天津自贸试验区融资租赁创新走在全国前列；福建自贸试验区深化两岸经济合作。面对美国滥施关税，我国将坚定不移办好自己的事，将改革开放进行到底。自贸试验区作为改革开放试验田，为构建新发展格局提供了重要支撑。"}, {"id": "recvf50qLS2ogA", "title": "“出口转内销”要有新打法", "author": "张娟", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-22", "source": "解放日报", "unit": "上海市开放战略研究中心（上海WTO事务咨询中心）副主任、研究员", "summary": "中国出口企业面临高额关税困境，采取多元化市场布局和转战内需市场策略。\"出口转内销\"已从权宜之计转为长期战略，需推动市场一体化、制度一体化和产业一体化。政府需解决制度性障碍，打造优质营商环境，深化制度型开放。企业需认识到内销市场是需要全新打法的竞技场，内外贸\"两条腿走路\"是稳健选择，政策应重点围绕\"转\"而非仅仅促进\"销\"。"}, {"id": "recvf50qLSgzY6", "title": "——曹祎遐研究员在“美兰湖畔·北上海会客厅”系列论坛的演讲以三大创新路径　绘就文旅消费新图景", "author": "曹祎遐", "categories": ["专家视点"], "article_categories": [], "cover_url": "", "avatar_url": "'avatars/caoyixia.jpg", "date": "2025-04-22", "source": "解放日报", "unit": "上海市习近平新时代中国特色社会主义思想研究中心特聘研究员、上海社会科学院应用经济研究所研究员", "summary": "文旅消费市场呈现爆发式增长，需从文化解码、技术赋能、业态创新三大路径推动发展。通过文化解码创造差异化价值，技术赋能提升体验深度，业态创新拓宽变现渠道，形成从流量到留量的闭环逻辑。上海融合历史底蕴与现代活力，成为体验经济高质量发展的新高地，以开放包容姿态向世界讲述中国式现代化故事，推动文旅消费从规模扩张到价值创造跃升。"}, {"id": "recvf50qLSENiF", "title": "贸易战制胜之道，就是把改革开放进行到底", "author": "朱珉迕/胡幸阳", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-22", "source": "解放日报", "unit": "解放日报记者", "summary": "贸易战背景下，中国企业展现出强大韧性，没有一家准备躺倒，都在奋斗。上海应稳住企业军心，拆掉民企的旋转门、玻璃门、弹簧门，实现不同所有制企业地位平等、机会平等、规则平等。政策要标签化双向配置，实现免申即享。企业困难虽具体，但解决一个就能救活一个企业，这就是中国企业的奋斗精神，是中国经济韧性的生动体现。"}, {"id": "recvf50qLS7EjH", "title": "引领跨境金融，上海FT账户再创新", "author": "张杨", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-22", "source": "解放日报", "unit": "解放日报记者", "summary": "上海FT账户创新推出多项举措：支持银行开发境外机构自由账户存款产品，允许外币存款利率市场化定价；支持跨境电商结售汇及资金收款；研究开展新型风险转移产品发行和交易试点；支持银行设立跨境银团贷款中心。多部门组成专班，为\"走出去\"企业提供\"金融服务包\"，推动跨境金融服务创新，助力企业全球化发展，提升上海国际金融中心竞争力。"}, {"id": "recvfa6MaFuCxB", "title": "壮大新质生产力，国资国企挑大梁", "author": "张杨/吴卫群/王力/查睿/吴丹璐/俱鹤飞", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-03", "source": "解放日报", "unit": "解放日报", "summary": "上海国资国企深入学习贯彻习近平总书记重要讲话精神，将深化改革、优化布局、强化功能，因地制宜发展新质生产力，在推进\"五个中心\"建设中\"挑大梁、当主力\"。以服务国家战略为牵引，推动国有资本向重要行业集中，发展人工智能等战略性新兴产业，加快布局集成电路、生物医药、高端装备等领域，实施\"基金+基地+基建\"协同推进模式，全面推进国企并购重组和市值管理，为上海建设\"五个中心\"作出更大贡献。"}, {"id": "recvfa6MQafPHZ", "title": "在推动科技自立自强中贡献青春力量", "author": "洪俊杰/吴頔/顾杰/林子璐", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-03", "source": "解放日报", "unit": "解放日报", "summary": "习近平总书记在上海考察时强调，实现中华民族的伟大梦想寄希望于年轻人。上海创新创业青年倍感振奋，表示要怀爱国之心、立报国之志、增强国之能，把个人奋斗同国家前途命运紧紧联系在一起。青年创新创业者要勇立时代潮头、勇于创新创造，在科技创新赋能国家发展、社会进步上跑出加速度，为上海加快建成具有全球影响力的科技创新高地作出更大贡献，在推进中国式现代化的宽广舞台上绽放青春光彩。"}, {"id": "recvfa6MQakuXl", "title": "习近平访问金砖国家新开发银行", "author": "新华社", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-30", "source": "人民日报", "unit": "新华社", "summary": "国家主席习近平在上海访问金砖国家新开发银行，会见行长罗塞芙。习近平指出，新开发银行是全球南方联合自强的创举，已成为国际金融体系新兴力量和全球南方合作的金字招牌。新开发银行要开启高质量发展的第二个\"金色十年\"，紧贴全球南方发展需求，提供高质量、低成本、可持续的基础设施融资，在国际金融架构改革中放大全球南方声音，支持全球南方国家走好现代化道路。中方将一如既往支持新开发银行发展，加强项目合作，分享发展经验。"}, {"id": "recvfa6MQaXMQw", "title": "让初心薪火相传 把使命永担在肩", "author": "洪俊杰", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-29", "source": "解放日报", "unit": "解放日报", "summary": "作为党的诞生地、初心始发地、伟大建党精神孕育地，上海牢记习近平总书记殷殷嘱托，挖掘好、保护好、利用好红色资源，弘扬伟大建党精神。通过实施\"党的诞生地\"红色文化传承弘扬工程，建设中共一大纪念馆等红色阵地，打造建党历史资源高地、建党精神研究高地、建党故事传播高地。上海发挥红色资源凝心聚力、铸魂育人、推动发展作用，努力建设习近平文化思想最佳实践地，以实际行动践行\"让初心薪火相传，把使命永担在肩\"。"}, {"id": "recvfa6MQaSgpo", "title": "中共中央国务院印发《关于实施自由贸易试验区提升战略的意见》", "author": "", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-22", "source": "人民日报", "unit": "", "summary": "中共中央、国务院印发《关于实施自由贸易试验区提升战略的意见》，对自贸区建设作出系统部署。经过5年左右的首创性、集成式探索，实现制度型开放水平、系统性改革成效、开放型经济质量全面提升。以贸易、投资、资金流动、交通运输、人员往来自由便利和数据安全有序流动为重点，推动全产业链创新发展，将自贸区建设成为畅通国内国际双循环的重要枢纽，打造开放层次更高、营商环境更优、辐射作用更强的改革开放新高地。"}, {"id": "recvfaBsaxnj98", "title": "守护千年根脉 留住历史记忆", "author": "光明日报调研组", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-09", "source": "光明日报", "unit": "光明日报", "summary": "本文分析：天空中，直升机轰鸣，360度低空全景下，山西平遥古城全貌如画卷般铺展，给游客留下独特的“云端记忆”。刚刚过去的“五一”假期，空中游览古城成为游客的“新宠”。\n\n夜幕中，焕真平遥数字艺术光影秀亮起，沉浸式数字影像交织，让游客在光影中穿越历史，邂逅科技与古韵交融的浪漫，全方位领略平遥魅力。\n\n这是一座历史与现代交织的古城。"}, {"id": "recvfaBsPjDMiO", "title": "看一揽子金融政策如何稳市场稳预期（权威发布）", "author": "吴秋余", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-08", "source": "人民日报", "unit": "本报记者", "summary": "中国人民银行推出一揽子货币政策措施，包括降准0.5个百分点提供长期流动性约1万亿元、下调政策利率0.1个百分点、下调结构性货币政策工具利率0.25个百分点。政策既包括数量型、价格型，也包括结构型，旨在保持流动性充裕、降低融资成本、支持科技创新和扩大消费。政策措施将向金融机构提供低成本中长期资金，稳定净息差，带动社会综合融资成本稳中有降，有效支持实体经济稳定增长。"}, {"id": "recvfaBsPjYolw", "title": "均有硬核科技，在各自赛道占据领先身位，正形成良好盈利模式上海科创“八杰”赋能新兴产业链", "author": "李晔", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-08", "source": "解放日报", "unit": "解放日报", "summary": "开栏的话  习近平总书记不久前的上海之行，为高起点谋划“十五五”发展举旗定向，对新征程上上海改革发展提出新的更高要求。我们要更加深刻地认识上海肩负的历史使命，最重要的就是做到八个字：为国担当、勇为尖兵。\n\n    上海的价值，从来体现于承载国家战略、服务国家战略上。越是国家有需要、外部有挑战、人民有期待，上海越是要主动担当、主动作为。"}, {"id": "recvfaBsPj3GTn", "title": "以城市为媒介　推进国际传播格局重构", "author": "徐剑", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-06", "source": "解放日报", "unit": "解放日报", "summary": "推进国际传播格局重构需要以城市为媒介，创新开展网络外宣，构建多渠道、立体式对外传播格局。数字技术融入国际传播各个环节，推动城市形象塑造与传播形态深刻变革：传播内容多模态化、传播渠道平台化、传播主体多元化。要把握数字传播规律，以城市为载体讲好中国故事，创造\"人人创作、人人共享、人人转发\"的产品，开创多层次话语圈同频共振、复调传播新格局，全面提升国际传播效能。"}, {"id": "recvfaBsPjCfTc", "title": "——张道根研究员在上海市宏观经济学会论坛的演讲坚定不移办好自己的事　坚定不移扩大高水平对外开放", "author": "张道根", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-06", "source": "解放日报", "unit": "解放日报", "summary": "中国发展进入新阶段，比较优势发生重大变化，超大规模市场成为最大优势。面对百年未有之大变局和更加不确定的国际环境，要加快构建新发展格局，统筹国内经济工作和国际经贸斗争，坚定不移办好自己的事，坚定不移扩大高水平对外开放。以自身发展确定性应对外部环境不确定性，坚持稳中求进工作总基调，着力稳就业、稳企业、稳市场、稳预期，这是关系新发展阶段中国改革开放与经济再平衡的总体战略。"}, {"id": "recvfaBsPjmusz", "title": "绘制低空经济发展安全图谱", "author": "李晶/顾莹", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-06", "source": "解放日报", "unit": "解放日报", "summary": "低空经济作为创新型经济形态，整合社会性、创新性和战略性资源，是培育新质生产力的重要摇篮。无人机在物流运输、应急救援、测绘巡查、农林植保等领域应用广泛，多地争相\"向天空要生产力\"。2025年中国低空经济市场规模将超过8500亿元。但低空飞行面临空域资源紧缺、监管难题、安全隐患、隐私侵犯等双重风险挑战，需要政策法规和标准体系护航，确保低空经济安全有序发展。"}, {"id": "recvfaBsPjphZm", "title": "护航低空经济发展", "author": "马洪/赖德斌", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-06", "source": "解放日报", "unit": "解放日报", "summary": "低空经济快速发展需要法治护航。面对空域管理制度与新型资源要素开发的结构性矛盾、技术规范滞后、市场准入粗疏等问题，需要加快制定低空经济产业促进法，明确中央和地方政府职责定位，建立联席会议机制协调空域管理、基础设施建设、飞行规则制定等工作。围绕主体、内容、程序三个方面进行规范设计，为低空经济产业科技创新提供制度保障，促进产业良性竞争与有序发展。"}, {"id": "recvfaBsPjZ6hW", "title": "通用人工智能对高等教育的影响", "author": "光明日报", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-05", "source": "光明日报", "unit": "光明日报", "summary": "本文分析：随着人类教育发展，大学也不断变革升级，从传统的知识殿堂逐步成为集知识传授、创造与社会服务于一体的学术机构。如今，通用人工智能（AGI）正推动大学迈向全新发展阶段。\n\n进入21世纪，随着AGI技术的迅猛发展，大学教育迎来了新的变革契机。从世界范围看，以奇点大学、密涅瓦大学、斯坦福大学等为代表的新型大学，展现出与以往不同的特质。"}, {"id": "recvfaBsPjo0nb", "title": "构建智慧教育新生态  提升科创策源新能级", "author": "郑庆华", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-05", "source": "解放日报", "unit": "解放日报", "summary": "同济大学深入学习贯彻习近平总书记在上海考察重要讲话精神，充分发挥自身优势，服务上海加快建成具有全球影响力的科技创新高地。制定《人工智能赋能学科创新发展行动计划》，以\"数智化、绿色化、融合化\"转型为路径，推动人工智能与传统学科双向赋能。深化人才培养改革，构建\"师—机—生\"互学习、同进步、共成长的智慧教育新生态，全面提升学生人工智能素养，为国家重大战略提供人才支撑。"}, {"id": "recvfaBsPjmO4g", "title": "科技创新筑基领航  打造医卫健康“重器”", "author": "周俭", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-05", "source": "解放日报", "unit": "解放日报", "summary": "中山医院作为国家公立医院高质量发展试点单位，承载攻克疑难重症、突破技术瓶颈的重任。围绕生物医药领域\"卡脖子\"问题开展技术攻关，构建全周期全链条转化网络，推进\"中山科创十条\"制度突破。2022—2024年累计申请专利近2700项，成果转化330项，占全国三甲医院转化总量的7.3%。以系统性创新举措推动医学创新成果蓬勃发展，向铸造卫生健康领域\"国之重器\"迈进。"}, {"id": "recvfdUJqDcmSK", "title": "投资中国  投资未来", "author": "罗珊珊", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-27", "source": "人民日报", "unit": "本报记者", "summary": "返回目录 &nbsp;&nbsp; 放大 缩小 全文复制 &nbsp;&nbsp;&nbsp; &nbsp;&nbsp; 下一篇 近日，习近平主席复信中国丹麦商会负责人，勉励中国丹麦商会及会员企业为增进中丹、中欧友好和深化互利合作作出新贡献习近平主席指出：“中国过去是、现在是、将来也必然是外商理想、安全、有为的投资目的地，相信中国就是相信明天，投资中国就是投资未来” 5月22日，中国贸促会在北京举办2025年全球贸易投资促进峰会，峰会主题为“拥抱数智时代，携手共同发展”。"}, {"id": "recvfdUJXglrNO", "title": "度假区项目昨完成交接，31日开始试运营测试，记者探营感受乐园“吃住购娱”上海新添奇趣之旅，乐高乐园即将启幕", "author": "李宝花/黄勇娣", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-27", "source": "解放日报", "unit": "解放日报", "summary": "上海乐高乐园度假区项目完成交接，从建设阶段过渡到运营阶段，5月31日进入试运营测试阶段。自2021年破土动工以来，来自全球15个国家的超300个团队、上万名建设者历经近1300个日夜精心雕琢。乐园包含悟空小侠主题区全球首发、中国首创室内版迷你天地等特色区域，为游客提供全新的主题乐园奇趣体验。"}, {"id": "recvfdUJXgDL8b", "title": "推动医保基金监管关口前移", "author": "孙秀艳", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-26", "source": "人民日报", "unit": "人民日报记者", "summary": "国家医保局向社会公开发布第一批医保基金智能监管规则和知识点，将医保政策中明确的规则要求和常见问题内置到智能监管子系统的事前提醒模块。医务人员开处方时，一旦系统发现违规行为就会发出提示，把问题解决在萌芽阶段。第一批\"两库\"包括药品区分性别使用、医疗服务项目区分性别使用、药品儿童专用等5类规则1万多条知识点明细，推动医保基金监管关口前移。"}, {"id": "recvfdUJXgmAde", "title": "新城更青春  青年更向上", "author": "柳森", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-26", "source": "解放日报", "unit": "解放日报", "summary": "如今，越来越多的科技创新源于年轻人的原创性思考。 在让更多创新创业项目从“校园象牙塔”走到“市场金字塔”，形成青年向上、城市向前、共伴成长的积极格局方面，上海新城颇具潜力。 如何让上海的新城更具“年轻力”？上海社会科学院城市与人口发展研究所研究员邓智团对这个问题研究已久。他与记者分享了自己新近的思考成果。本报记者柳森善于创新的城市都在做这三件事城市周刊今年开年以来由深度求索宇树科技游戏科学云深。"}, {"id": "recvfdUJXgXpwC", "title": "为发展规划立法有何深意", "author": "郑德高", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-03", "source": "解放日报", "unit": "解放日报", "summary": "上海市人大常委会审议通过《上海市发展规划条例》，将发展规划工作纳入法治化轨道。上海率先建立以国民经济和社会发展规划为统领、国土空间规划为基础、专项规划和区域规划为支撑的规划制度体系，突出规划的战略引领、精准施策与融合治理作用，为超大城市高水平规划与高效能治理提供了\"上海方案\"。发展规划的核心价值是前瞻性把握形势变化，将战略意图转化为可落地的发展蓝图。"}, {"id": "recvfdUJXgBRb1", "title": "出口数据“超预期”，“中国制造”彰显竞争力（专家解读）", "author": "张鹏杨", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-26", "source": "人民日报", "unit": "受访专家：北京工业大学经济与管理学院教授、北京大兴经济开发区数据产业高级顾问", "summary": "4月份中国出口同比增长9.3%，大幅领先市场预期。在美国滥施关税的背景下，中国出口表现亮眼，彰显强劲的产业韧性与灵活的全球适配能力。前4个月中国出口高技术产品同比增长7.4%，占出口比重近两成，电动汽车、锂电池、光伏产品\"新三样\"延续增长势头。出口市场呈现多元化趋势，对共建\"一带一路\"国家出口增长尤为迅速，中国出口结构不断优化、科技含量持续提升。"}, {"id": "recvfdUJXgG0uu", "title": "打造14万亿元市场的“上海标准”", "author": "张杨", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-26", "source": "解放日报", "unit": "解放日报", "summary": "本报记者 张杨 截至5月20日，上海私募股权和创业投资份额转让平台（下称“上海S基金交易平台”）已成交121笔基金份额，成交总金额约为252.44亿元，规模位居全国第一。同时，上海S基金交易平台在2024年新增交易融资金额也突破百亿元。这是近日召开的上海S基金联盟2025年度大会上传出的信息。这一建设中的金融平台，正在努力为国内14万亿元规模私募市场打造资金循环畅通的“上海标准”。"}, {"id": "recvfdUJXgKyuV", "title": "瞄准痛点优化民企投融资环境", "author": "巫云仙", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-24", "source": "中国经济网", "unit": "", "summary": "日前正式施行的《中华人民共和国民营经济促进法》设有“投资融资促进”专章，为促进民营企业可持续发展提供了法治保障。优化民营企业投融资环境是促进我国民营经济持续、健康、高质量发展的重要一环。近年来，我国在优化民营企业投融资环境方面取得重大进展。较为突出的制度性突破是在2023年启动民营经济促进法立法进程，并在浙江和广东等省份先行试点相关条例，今年通过该法并开始施行。"}, {"id": "recvfdUJXgb8wg", "title": "重病老人在银行取钱去世，银行如何破解特殊场景的声誉危机丨金舆之言", "author": "金舆之言", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-23", "source": "微信公众号", "unit": "金舆之言", "summary": "本文分析：重病老人在银行取钱去世，银行如何破解特殊场景的声誉危机\n\n5月14日，湖南株洲一网民发布视频反映，其姑妈在重病住院期间，让子女带着身份证到农业银行株洲田心支行取一笔5万元的定期存款，用来支付医药费，但被银行要求“必须本人前来办理”。之后家属将老人用轮椅推到银行办理相关业务，期间老人不幸去世。\n\n该视频发布后，引起舆论广泛关注，“曝病重老人被要求亲自取钱在银行去世”“农行回应重病客户取款时不幸去世”……"}, {"id": "recvfeJtSEDLl5", "title": "——邓智团研究员在“理润申城”活动上的演讲人文经济赋能城市更新", "author": "上观新闻", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-03", "source": "解放日报", "unit": "解放日报", "summary": "\"人文经济学\"是习近平总书记提出的一项重大课题，蕴含推动物质文明和精神文明协调发展的辩证法。人文经济并非文化与经济的简单叠加，而是人文与经济良性互动、相得益彰。传统城市更新理念存在\"重物质、轻文化\"倾向，人文经济的本质是回归人本身，追求人、文化、经济的三元统一，旨在探索兼具经济活力与人文魅力的城市发展新范式，为城市更新注入人文动能。"}, {"id": "recvfeJtSEDbxX", "title": "旅游休闲街区如何创新发展", "author": "本报记者", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-03", "source": "光明日报", "unit": "光明日报", "summary": "本文分析：当游客不再满足于走马观花式的打卡，旅游休闲街区该如何重构吸引力？在街区场景改造中，如何“点石成金”，实现老城区与新业态的双向奔赴？\n\n近日，由文化和旅游部等主办的全国旅游休闲街区创新交流活动在湖南省岳阳市举办。活动以“新场景、新供给、新体验”为主题，围绕街区场景改造、街区体验创新等话题，解码国家级旅游休闲街区文旅消费场景打造新路径、产业提质升级新模式。"}, {"id": "recvfeJtSEm16F", "title": "完善中国特色现代企业制度 促进更多世界一流企业脱颖而出", "author": "项安波", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-27", "source": "光明日报", "unit": "国务院发展研究中心企业研究所", "summary": "《关于完善中国特色现代企业制度的意见》的印发，是新时代完善中国特色现代企业制度的重大制度安排，标志着我国企业制度建设进入新阶段。文章系统阐释《意见》六大核心框架：坚持和加强党的领导、完善公司治理结构、提升科学管理水平、健全创新激励制度、建立企业社会责任与文化体系、优化综合监管和服务体系。文章指出，中国特色现代企业制度既是经济体制改革成果，也是社会主义制度在微观经济领域的集中体现，经历了从\"厘清产权、政企分开\"到\"党建引领、创新驱动\"的历史演进。《意见》对国有企业通过深化改革释放活力，对民营企业进行制度赋能，推动更多企业向具有全球竞争力的世界一流企业前进，对促进中国式现代化建设具有重要战略意义。"}, {"id": "recvfeJtSEwYHu", "title": "非标商业，水灵灵的活力从哪来？", "author": "本报记者 李婕", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-05-27", "source": "人民日报", "unit": "", "summary": "北京、上海等城市涌现出大量由旧仓库、老厂房改造而成的\"非标\"商业空间，以开放式街区、个性化品牌和丰富的社交娱乐场景吸引消费者。与标准化商业相比，非标商业更加注重独特性和情绪价值，催生了品牌与消费者的双向奔赴。非标商业崛起的背后，是城市更新浪潮中大量存量空间亟待激活、传统商业趋同化问题日益凸显的现实背景。要实现长期稳定运营，需坚持产业逻辑、社群逻辑与设计驱动逻辑，以优质产品和鲜明定位形成可持续竞争力。"}, {"id": "recvffPGTPlYLk", "title": "文化强国 智库何为", "author": "本报记者 陈恒 陈之殷", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-05", "source": "光明日报", "unit": "", "summary": "光明智库以\"文化强国，智库何为\"为题举办首期圆桌对话，多位专家就文化智库发展现状、短板与未来方向展开深入研讨。与谈人指出，我国文化智库数量超300家，已形成多元体系，但仍存在特色不明显、前瞻性研究不足、国际影响力偏弱等问题。面向\"十五五\"，应强化顶层设计、整合资源、打造专业化研究团队，并善用大数据和生成式AI提升研究效能。文化智库还需增强国际传播话语权，以全球视野参与全球文化治理，助力中华文化影响力持续提升。"}, {"id": "recvffPHxtEmdt", "title": "节日非遗出圈，连接传统与现代", "author": "方云", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-04", "source": "解放日报", "unit": "解放日报", "summary": "本文分析节日非遗出圈现象及其传统与现代连接意义。每逢节假日，海派非遗活动广泛开展，如清明风筝节、端午龙舟赛等，为节日注入文化底蕴。新媒体推动非遗从社区走向大众，青年成为传承新生力量。\n\n节日非遗融合多元要素构建独特文化系统。潮汕英歌舞、上海张园非遗春节等案例显示，非遗出圈促进文旅融合，强化文化自信与共同体意识。非遗可持续发展需多方协同：专业群体深化研究，大众普及非遗知识，加强互动交流，在创新中坚守本真性，让新生代力量推动非遗持续绽放魅力。"}, {"id": "recvffPHxtoopo", "title": "（2025年5月28日上海市第十六届人民代表大会常务委员会第二十二次会议通过）上海市发展规划条例", "author": "上观新闻", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-04", "source": "解放日报", "unit": "解放日报", "summary": "第一章 总则 第一条 为了落实国家发展战略，推进本市统一规划体系建设，规范发展规划制定，保障发展规划实施，发挥发展规划战略导向作用，全面推动高质量发展，推进治理体系和治理能力现代化，根据有关法律、行政法规，结合本市实际，制定本条例 第二条 本市发展规划以及依据发展规划编制的专项规划、区域规划的制定、实施和监督管理等活动，适用本条例 本条例所称发展规划，是指市、区国民经济和社会发展规划纲要。"}, {"id": "recvffPHxtSwwl", "title": "北京不断强化科技创新策源功能（奋勇争先，决战决胜“十四五”）", "author": "王昊男", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-04", "source": "人民日报", "unit": "本报记者", "summary": "返回目录放大缩小全文复制上一篇下一篇北京国际科技创新中心建设捷报频传国家自然科学基金委员会不久前公布年度中国科学十大进展其中项研究成果源自北京高被引科学家数量连续两年排名全球创新城市首位项科技成果去年获得国家科技进步奖年月习近平总书记在河北考察并主持召开深入推进京津冀协同发展座谈会时强调要加快建设北京国际科技创新中心和高水平人才高地着力打造我国自主创新的重要。"}, {"id": "recvffPHxtZ47O", "title": "数说中国居民休闲活动", "author": "周钰千", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-04", "source": "光明日报", "unit": "光明日报记者", "summary": "前段时间，中国旅游研究院规划与休闲研究所发布《中国休闲发展年度报告（2024）》和《中国休闲发展年度报告（2023——2024）》一年多前，该研究所还发布了《中国休闲发展年度报告（2022——2023）》 这三份《报告》依托中国旅游研究院（文化和旅游部数据中心）自主网络平台对北京、上海、广州、成都、西安、长沙、沈阳、武汉、南京、杭州等10个样本城市进行问卷调查，分别从时间、空间和活动选择等维度对我国城乡居民休闲行为展开分析和研究通过报告中的数据，可以看到近几年我国居民休闲活动的特点及变化趋势。"}, {"id": "recvfjKouT82wY", "title": "深化文旅融合  发展全域旅游", "author": "秦国伟", "categories": ["行业观察"], "article_categories": ["文旅融合", "消费升级"], "cover_url": "'covers//covers/recvfjKouT82wY.jpg", "avatar_url": "", "date": "2026-03-24", "source": "解放日报", "unit": "安徽省六安市文化和旅游局党组书记、局长", "summary": "本文探讨文旅融合的内涵深化、外延拓展与价值升华。文旅融合需从'物理相加'到'化学相融'，实现理念、职能、产业、市场、服务融合；外延从狭义文化资源拓展到广义生态，发展全域旅游。其价值在于培育增长新引擎、增强文化自信、促进协调共享、践行绿色发展、展示国家形象。应坚持创新驱动、深化改革开放、健全实施机制，保障融合发展战略落地见效。"}, {"id": "recvfkaQeA91EA", "title": "建设现代化人民城市 需要仔细地去观察去琢磨\n——伍江教授在“悦见人文·立信”系列讲座的演讲", "author": "伍江", "categories": ["专家视点"], "article_categories": ["人工智能", "城市治理", "新质生产力", "文旅融合", "具身智能"], "cover_url": "'covers//covers/recvfkaQeA91EA.jpg", "avatar_url": "'avatars/wujiang.jpg", "date": "2026-03-24", "source": "解放日报", "unit": "同济大学建筑与城市规划学院教授，同济大学超大城市精细化治理研究院院长", "summary": "本文阐述城市的三大基本属性：物质属性、社会属性、文化属性。物质属性体现在生产、生活和安全，需珍视'烟火气'与'市井味'；社会属性要求城市公平正义，从'形象好'转向'功能好'，加强空间复合使用；文化属性是最高层次，城市是承载集体记忆的最大文化产品，应在保护前提下活化利用历史遗存，让艺术创新渗透城市肌理。三者辩证统一，城市才能让生活更美好。"}, {"id": "recvfkaY0ey5fg", "title": "AI音乐“狂飙”，行业正在遭遇怎样的冲击？", "author": "束涵/余敏之", "categories": ["行业观察"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/v6_1.jpg", "avatar_url": "", "date": "2026-03-24", "source": "解放日报", "unit": "解放日报记者；作者余敏之，系解放日报见习记者", "summary": "本文报道AI音乐对行业的冲击与重构。生成式AI正淘汰低技术含量、可批量复制的功能性音乐创作，词曲作者失业增多，但混音等主观判断环节仍有抗压性。资深玩家用AI作灵感催化剂，平台降低创作门槛。AI音乐商业化面临版权规则不清、内容质量参差的困境。行业可能形成哑铃型结构，审美、情感和独立品格成为稀缺能力，人的连接性工种抗风险能力更强。"}, {"id": "recvfkbeMndPkU", "title": "在创新中国看到发展机遇", "author": "李心萍 吴燕 刘温馨", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "科技创新", "具身智能", "新质生产力", "文旅融合"], "cover_url": "'covers//covers/v6_2.jpg", "avatar_url": "", "date": "2026-03-24", "source": "人民日报", "unit": "人民日报记者", "summary": "2026年中国发展高层论坛以\"'十五五'的中国：高质量发展与共创新机遇\"为主题，与会国际嘉宾将\"确定性\"\"创新\"\"机遇\"视为认识当下中国的三个关键词。在\"确定性\"方面，\"十五五\"规划展现宏观经济政策与结构性改革协同发力，积极财政政策、适度宽松货币政策同步推进，中国正成为全球\"确定性基石\"和\"稳定性港湾\"。在\"创新\"方面，苹果、阿里巴巴等企业高度肯定中国开发者社区的创新活力，中国在人工智能开源模型、量子科技、生物制造、6G等未来产业领域持续突破，并致力于全球技术共享。在\"机遇\"方面，西门子、梅赛德斯-奔驰、美敦力等跨国企业纷纷表示将继续深耕中国市场，中国既是战略要地，也是创新策源地和消费潜力市场。郭孔丰强调，30多年来累计在华投资约1000亿元，仅2018年至今就达600亿元。罗兰贝格联席总裁将中国比喻为\"健身房\"，外资在此提升竞争力。"}, {"id": "recvfkc5pwUezS", "title": "航空总人口超五亿见证高质量发展", "author": "李晓津", "categories": ["行业观察", "专家视点"], "article_categories": ["文旅融合", "航空航天", "新质生产力"], "cover_url": "'covers//covers/v7_1.jpg", "avatar_url": "", "date": "2026-03-24", "source": "人民日报", "unit": "中国民航大学航空经济与发展研究所所长", "summary": "我国航空人口超5亿，成为全球第一航空人口大国，这一成就源于经济高质量发展与民航业持续进步。航空人口规模反映经济发展水平和居民收入，验证民航服务品质。成为航空人口大国带来多重利好：助推航空工业升级、促进消费增长、辐射区域发展。未来应在安全、服务、效率、效益方面持续提升，让更多人共享民航发展成果。"}, {"id": "recvfkcnICnXfS", "title": "外资参与我国资本市场意愿增强", "author": "", "categories": ["行业观察"], "article_categories": ["金融开放", "外贸外资"], "cover_url": "'covers//covers/recvfkcnICnXfS.jpg", "avatar_url": "", "date": "2026-03-24", "source": "中国经济网", "unit": "", "summary": "新'国九条'发布以来，外资参与我国资本市场意愿显著提升。'十四五'期间新增14家外资控股机构，今年255家外资机构调研688次。外资流入注入长期资金、改善流动性、带来成熟投资理念、推动估值优化。证监会提出以开放促改革，营造透明稳定可预期的市场环境，提升资本市场对外资吸引力。"}, {"id": "recvfkcAwNwNFf", "title": "科技金融支持创新创造", "author": "", "categories": ["行业观察"], "article_categories": ["科技创新", "江苏"], "cover_url": "'covers//covers/recvfkcAwNwNFf.jpg", "avatar_url": "", "date": "2026-03-24", "source": "中国经济网", "unit": "", "summary": "科技金融作为金融'五篇大文章'之首，支持创新创造成效显著。科技型中小企业贷款余额3.63万亿元，同比增长19.8%。政策引导创业投资'投早投小投硬科技'，推动银行信贷加大支持。金融机构从'看抵押'转向'看技术'，创新评估体系。资本市场通过科创板'绿色通道'等制度，构建与科技创新规律匹配的资本供给体系。"}, {"id": "recvfkd1zNHkVj", "title": "从溯源到展望，读懂中国经济脉络", "author": "陈新光", "categories": ["行业观察"], "article_categories": ["新质生产力"], "cover_url": "'covers//covers/v7_4.jpg", "avatar_url": "", "date": "2026-03-21", "source": "解放日报", "unit": "上海大学经济学院特聘教授", "summary": "陆丁、杨锡怡合著的《话说中国特色经济》，以深邃洞察与通俗表达，构建'溯源—探索—实践—展望'的逻辑闭环。创新性将'中国特色经济'形成界定为自组织过程，突破传统转型理论框架。全书兼顾底层逻辑挖掘与通俗化表达，既服务高校教学，又推动经济知识社会普及，堪称理解中国经济的'必读指南'。"}, {"id": "recvfkdpI9mjIw", "title": "精准滴灌发展银发经济", "author": "王山", "categories": ["行业观察"], "article_categories": ["消费升级", "新质生产力", "银发经济"], "cover_url": "'covers//covers/recvfkdpI9mjIw.jpg", "avatar_url": "", "date": "2026-03-21", "source": "中国经济网", "unit": "中国社会科学院经济研究所研究员", "summary": "银发经济是培育新质生产力的重要途径，当前仍处于起步阶段，面临供需错位、政策支持不完善、标准化水平低等问题。应优化供给结构，推动'精准滴灌'；完善政策支持体系；建立质量标准和认证体系；营造友好型消费环境，释放市场潜力。通过系统思维和多方协同，助力经济发展与民生改善形成良性循环。"}, {"id": "recvfkdqAxpVxD", "title": "用好数字机遇促文旅融合", "author": "金文珊", "categories": ["行业观察"], "article_categories": ["文旅融合", "消费升级"], "cover_url": "'covers//covers/recvfkdqAxpVxD.jpg", "avatar_url": "", "date": "2026-03-23", "source": "中国经济网", "unit": "经济日报记者", "summary": "数字技术正深度融入文旅肌理，重塑产业发展逻辑。新技术打破时空壁垒、重构呈现逻辑，让文化更'潮'；创新载体形式、孵化文旅IP，让传播更广；推动跨界融合、完善产业链条，让价值更高。关键在于利用新技术搭建普惠性服务体系，推动文化全民共创共享，将文旅发展与文化惠民深度绑定。"}, {"id": "recvfkeZWAlzH2", "title": "新时代人工智能治理的伦理向度", "author": "路向峰", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "AI治理", "政治理论"], "cover_url": "'covers//covers/recvfkeZWAlzH2.jpg", "avatar_url": "", "date": "2026-03-23", "source": "光明日报", "unit": "天津医科大学马克思主义学院教授", "summary": "在人工智能技术加速渗透全球经济社会的背景下，如何构建可嵌入、可验证、可持续的伦理规范已成为时代课题。作者认为，人工智能伦理建构需应对算法不透明、数据滥用、深度伪造等系统性风险，《北京AI安全国际共识》《人工智能全球治理上海宣言》《上海合作组织成员国元首理事会天津宣言》等文件密集出台，标志着国际社会在人工智能伦理治理方面逐步形成关键共识。文章从伦理学视角系统分析人工智能治理的四个向度：价值坐标的塑造、道德基底的铸就、伦理秩序的建构，以及危机意识与价值韧性的培育。作者强调，必须将伦理构建、伦理治理与伦理创新有机结合，避免止步于让机器对齐静态的人类价值推演，始终保持对人工智能治理的清醒态度，根据发展实际不断丰富伦理学理论，唯此才能促进人工智能向上向善发展，实现科技健康发展与社会持续进步的双赢。"}, {"id": "recvfkfbAGhS5P", "title": "为“十五五”开局做好自然资源要素保障", "author": "常钦", "categories": ["政策解读"], "article_categories": ["科技创新", "”十五五“"], "cover_url": "'covers//covers/recvfkfbAGhS5P.jpg", "avatar_url": "", "date": "2026-03-20", "source": "人民日报", "unit": "人民日报记者", "summary": "自然资源部、国家林草局印发《关于进一步做好自然资源要素保障的通知》，13条政策为'十五五'开局提供要素保障。建立规划动态维护机制，实现空间规划与国家发展规划同频共振；推行'一张图'审批，减少层级、提高效率、降低成本；设定'盘活一亩才能新增一亩'硬指标；新增建设用地原则上不用于经营性房地产开发。"}, {"id": "recvfkgcg2Lrcm", "title": "中办国办印发《国有企业领导人员廉洁从业规定》", "author": "", "categories": ["政策解读"], "article_categories": ["国企改革"], "cover_url": "'covers//covers/v4_1.jpg", "avatar_url": "", "date": "2026-03-23", "source": "中国经济网", "unit": "", "summary": "中共中央办公厅、国务院办公厅印发《国有企业领导人员廉洁从业规定》，明确廉洁从业'五应当'：对党忠诚、担当作为、依规依法、保障民生、作风过硬。规定禁止滥用职权、谋取私利、违规营利、为亲属谋利、盲目追求政绩、违规选人用人、搞'四风'等七类行为。建立党内监督主导、各类监督贯通协调机制，为做强做优做大国有企业提供坚强保障。"}, {"id": "recvfpcNF0226m", "title": "鼓励首创性、集成式探索 以高水平开放推动自由贸易试验区高质量发展", "author": "符正平、彭曦", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-16", "source": "人民日报", "unit": "中山大学自贸区综合研究院、粤港澳发展研究院", "summary": "本文分析指出，建设自由贸易试验区是以习近平同志为核心的党中央在新时代推进改革开放的重要战略举措。党的二十届三中全会《决定》提出\"实施自由贸易试验区提升战略，鼓励首创性、集成式探索\"。文章系统阐述了首创性探索和集成式探索的内涵与路径，指出首创性探索需围绕国家战略需求，在监管模式、技术手段、体制机制等方面率先突破；集成式探索则需加强制度集成、资源整合与全产业链协同。文章建议，应发挥基层首创精神，加大综合改革授权，同时健全风险防控机制，在数据跨境、金融开放等高风险领域建立全周期管理体系，以\"小切口\"实现\"大突破\"，推动自由贸易试验区成为新时代高水平对外开放的重要引擎。"}, {"id": "recvfpcOeWbzYd", "title": "深圳综合改革试点积厚成势", "author": "本报记者 刘坤", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-13", "source": "光明日报", "unit": "", "summary": "&nbsp; 日前，中共中央办公厅、国务院办公厅发布《关于深入推进深圳综合改革试点深化改革创新扩大开放的意见》（以下简称《意见》）。《意见》有哪些亮点。如何抓好落实。6月12日，国务院新闻办举行新闻发布会，围绕相关问题进行了回应。坚持顶层设计同基层探索有机结合 国家发展改革委副主任李春临在会上介绍，《意见》的主要内容，可以概括为“一个总体要求、四方面重要举措、一项保障措施”。"}, {"id": "recvfpcOeW3jFg", "title": "以人民城市理念引领人民城市建设（深入学习贯彻习近平新时代中国特色社会主义思想·学习《习近平经济文选》第一卷专家谈）", "author": "林晨、李晶", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-12", "source": "人民日报", "unit": "中国人民大学应用经济学院、南昌大学中国中部经济社会发展研究中心", "summary": "本文系统阐述了人民城市理念的深刻内涵与实践路径。人民城市理念是中国特色城市发展道路的精髓要义，深刻回答了城市建设发展为了谁、依靠谁的根本问题。文章指出，人民城市具有四大鲜明特点：以人为本，让人民群众在城市生活得更方便、更舒心、更美好；重视历史文化保护，在现代化进程中延续城市文脉；推进城市现代化，运用科技手段提升城市治理水平；保护城市生态环境，践行绿色低碳发展理念。文章认为，推进人民城市建设需处理好四对关系：顶层设计与基层探索、现代化建设与历史文化传承保护、集中发展与分散发展、城市高质量发展与乡村全面振兴。"}, {"id": "recvfpcOeW5zuu", "title": "文旅融合绘就万里长江画卷", "author": "李小波", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-11", "source": "光明日报", "unit": "国家文化公园专家咨询委员会委员、四川师范大学国家文化公园研究中心主任", "summary": "2021年，长江国家文化公园建设正式启动。2025年，《长江国家文化公园建设保护规划》发布，规划范围包括上海、江苏、浙江、安徽、江西、湖北、湖南、重庆、四川、贵州、云南、西藏、青海13个省（区、市），将文化遗产的整体性、系统性保护作为首要任务，同时创新文旅融合，加快长江国际黄金旅游带建设。旅融合贯穿"}, {"id": "recvfpcOeW0V7j", "title": "坚定不移维护自由贸易与开放合作", "author": "郝碧榕", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-09", "source": "中国经济网", "unit": "", "summary": "2025年5月20日，中国与东盟经贸部长共同宣布全面完成中国—东盟自贸区3.0版谈判。在全球经济格局深刻调整的背景下，这一里程碑式的成果不仅为区域经济一体化注入新动能，更为世界经济的稳定与繁荣贡献了“中国—东盟方案”。作为中国首个对外商谈并建立的自贸区，同时也是东盟框架下的首个自贸协定，中国—东盟自贸区的发展历程堪称区域合作的典范。"}, {"id": "recvfrFA47IqQa", "title": "以金融高水平开放推动经济高质量发展", "author": "", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-19", "source": "中国经济网", "unit": "", "summary": "国家金融监督管理总局与上海市人民政府联合印发《关于支持上海国际金融中心建设行动方案》，深入贯彻落实党中央、国务院关于加快建设上海国际金融中心的决策部署。《行动方案》聚焦重点领域，围绕金融机构集聚、产品与服务创新、互联互通与跨境合作、金融人才引育四大方向提出具体举措，推动商业银行、保险机构、基金公司等各类金融机构进一步向上海集聚。在创新领域，方案支持上海探索科技金融、跨境金融创新试点，对标国际高标准经贸规则扩大金融制度型开放。监管层面，方案建立健全金融创新监管工作机制，探索\"限定业务、限定额度、风险熔断\"的监管互动模式。深化推进上海国际金融中心和国际科技创新中心联动建设，以金融高水平开放为上海建设具有全球影响力的国际金融中心提供制度保障。"}, {"id": "recvfrFAEFq913", "title": "促进内外贸规则制度衔接", "author": "韩秉志、谢瑶、李治国、李景、耿丹丹", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-18", "source": "中国经济网", "unit": "经济日报记者", "summary": "2021年12月，国务院办公厅印发《关于促进内外贸一体化发展的意见》；2022年12月，北京、上海、江苏等9地被列为试点地区；2024年12月，商务部表示，9个试点地区积极先行先试，已完成80%的试点任务，形成一批成功经验。目前，各地内外贸一体化工作进展如何。有哪些创新性举措和办法。本报即日起推出“内外贸一体化提速”系列报道。今年4月25日召开的中共中央政治局会议再次提出，加快推动内外贸一体化。"}, {"id": "recvfrFAEFPQ35", "title": "上海要再做几件“人无我有”的大事情", "author": "朱珉迕/胡幸阳", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-17", "source": "解放日报", "unit": "解放日报", "summary": "王战 1952年生，教授。上海市第七届社联主席、中国改革研究会副会长、上海市“十五五”规划专家咨询委员会专家。曾任中共上海市委副秘书长、研究室主任，上海市决策咨询委员会主任，上海社科院院长等。■做出了大事，大家就会振奋，“精气神”就会上来。我认为东西两个枢纽，是有潜力成为这样的“大事”的。另外，对上海来说，创新并不只是科技要创新。"}, {"id": "recvfrFAEFHeXp", "title": "上海高层“智囊”王战：逢四逢五，上海必有大突破", "author": "", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-16", "source": "微信公众号", "unit": "", "summary": "从跟随汪道涵开展上海经济发展战略研究算起，王战担任上海高层\"智囊\"已持续40年，先后参与服务8位市委书记、7位市长，深度参与了浦东开发、世博会筹备、自贸区建设等多项重大规划。王战提出\"逢四逢五，上海必有大突破\"的规律性观察，认为2024、2025年上海正站在新一轮突破的历史节点上。文章聚焦王战对当前上海发展的核心判断：上海要做好\"龙头\"，立足长三角、长江经济带乃至\"一带一路\"谋划城市功能，积极推动东西两个枢纽建设；要重点突破\"人无我有\"的大事，重振\"敢闯敢试、创新求变\"的改革精神。王战强调，创新不只是科技创新，制度、政策、观念、文化都需要创新，唯有\"奋力一跳\"，才能在新一轮全球城市竞争中占据有利位置。"}, {"id": "recvfrFAEF7IiD", "title": "荟聚在昆明", "author": "侯实 缪慧姍", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-16", "source": "人民日报", "unit": "复旦大学文物与博物馆学系、国土与文化资源研究中心讲师；作者缪慧姍，系中国人民大学历史学院博士研究生", "summary": "抗战时期，西南联大在昆明8年间留下的史迹群，是城市级文化遗产的重要组成部分。作者以“系列遗产”方法，将昆明市域内与西南联大相关的校舍旧址、科研机构旧址、名人旧居、纪念性遗址等视作整体。这批史迹狭小简陋，且随城市开发而分散，但却承载了联大专家学人在战火中坚持追求学术报国的崇高精神。闻一多的多次迁居与用生命踏踿真理的创业史诗、华罗庚在极简陋条件下完成《堆坦素数论》，都成为这批史迹的精神内涵。当前，昆明市正通过“西南联大毎年理学”等主题活动，将历史文化底蕴链接起昆明城乡与今昔往事，引导参观者沿着先辈足迹追溯西南联大历史，传承联大精神。"}, {"id": "recvfy02E3bmgQ", "title": "改革开放创辉煌 扬帆起航正当时", "author": "李鹏", "categories": ["行业观察"], "article_categories": ["改革开放"], "cover_url": "'covers//covers/recvfy02E3bmgQ.jpg", "avatar_url": "", "date": "2026-03-10", "source": "中国浦东干部学院", "unit": "中国浦东干部学院教学研究部", "summary": "中国浦东干部学院依托厅局级干部培训班，与上海市社会科学界联合会联合举办学术茶座，聚焦习近平总书记关于全面深化改革的重要论述，围绕深圳、浦东、雄安的改革开放实践经验展开深入研讨。刘靖北、沈斐、焦永利等教授作理论阐述，学员代表分享福建职务科技成果改革、人工智能标识方案、跨境电商发展等最新实践案例。与会学员表示，学术茶座内容丰富、针对性强，有助于提升改革认识、坚定改革信心、启发改革思路。学院地处浦东改革开放最前沿，将持续凝练最新实践案例，深化改革开放精神的科学内涵和时代价值。"}, {"id": "recvfy0P1C4qOU", "title": "从“心”出发 向“实”而行——正确政绩观的党性逻辑与实践向度", "author": "吴涛", "categories": ["行业观察", "专家视点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfy0P1C4qOU.jpg", "avatar_url": "", "date": "2026-03-11", "source": "北京日报", "unit": "中国浦东干部学院基层党建研究中心主任、教授", "summary": "习近平总书记强调引导党员干部树立和践行正确政绩观，创造经得起实践、人民、历史检验的实绩。文章从党性自觉、历史耐心、求是务实、科学考评四个维度系统阐述：以坚强党性为核，通过党性自觉校准政绩观坐标，以为民造福为原点，以对党忠诚为底色；以历史耐心为度，在显绩与潜绩、数量与质量的辩证统一中重塑政绩标尺；以求是务实为本，通过调查研究、攻坚克难、力戒虚功践行政绩观真谛；以科学考评为矩。"}, {"id": "recvfy11zyk5D1", "title": "量子城市空间智能建设如何探索全球超大城市治理新路径", "author": "焦永利", "categories": ["行业观察", "广域视野"], "article_categories": ["城市规划"], "cover_url": "'covers//covers/recvfy11zyk5D1.jpg", "avatar_url": "", "date": "2026-03-27", "source": "澎湃新闻", "unit": "中国浦东干部学院公共政策创新研究中心", "summary": "上海发布量子城市空间智能建设实施方案，以量子城市技术体系赋能城市治理，推进空间治理智慧化。文章系统阐述量子城市的总体设计框架，包括新尺度（构建空间法则和计算元规则）、新范式（开发空间治理大模型和城市操作系统）、新生态（迈向精细敏捷和开放共享的治理生态）、新场景（开发创新场景和美好生活场景）。同时指出面临技术集成、算法透明、制度创新等挑战。"}, {"id": "recvfybNTcXsHq", "title": "从“上海故事”到“上海叙事”，不仅提高“知名度”，还要提高“美誉度”", "author": "李敏、蒋春柳", "categories": ["本埠热点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfybNTcXsHq.jpg", "avatar_url": "", "date": "2026-03-05", "source": "上观新闻", "unit": "中国浦东干部学院城市治理研究中心、上海广播电视台", "summary": "上海提升全球叙事传播能力建设取得积极成效。2025年全市生产总值达5.67万亿元，跻身全球城市前五位；全球城市指数排名跃升至第8位。文章指出，全球新闻报道对上海的情绪值为正面积极。文章从四方面提出优化路径：落实人民城市理念，将人民性嵌入城市文化基因；激活多元主体参与动能，提升城市叙事传播效能；构建智慧传播矩阵，打造全球数字叙事中枢；加大全球叙事内容供给力度，讲好中国故事。文章强调，城市叙事能力与营商环境相互促进，已成为全球城市的战略资本，上海有望在全球城市竞争中占据更有利位置。"}, {"id": "recvfyckB87Vgp", "title": "“第二个结合”的学理、道理与哲理：推进马克思主义中国化时代化的内在逻辑与实践深耕", "author": "吴涛", "categories": ["专家视点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfyckB87Vgp.jpg", "avatar_url": "", "date": "2026-03-04", "source": "中国理论网", "unit": "中国浦东干部学院基层党建研究中心", "summary": "文章系统阐释第二个结合的学理依据、内在道理与深层哲理。从学理层面，第二个结合是马克思主义扎根中国文化土壤的历史必然，彰显新时代中国共产党人高度的理论原创性。从内在道理看，其核心在于守正与创新、主体性与开放性的辩证统一：以马克思主义之矢射中华优秀传统文化之的，实现创造性转化。从深层哲理论，第二个结合既是中国式现代化道路的文明根基，又为构建人类命运共同体提供价值基石。文章建议，未来研究应深化学理辨析、强化体系建构、推动实践转化，为加快构建中国哲学社会科学自主知识体系提供理论支撑。"}, {"id": "recvfydkJphS1U", "title": "把治理根基深植于人民之中：新时代党建引领基层治理的理论逻辑与实践路径", "author": "吴涛", "categories": ["行业观察", "专家视点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfydkJphS1U.jpg", "avatar_url": "", "date": "2026-02-26", "source": "上观新闻", "unit": "中国浦东干部学院基层党建研究中心主任", "summary": "党的二十届四中全会将党建引领基层治理提升到战略全局高度。文章从理论逻辑、战略部署、实践路径三维度展开论述。理论层面，党建引领是马克思主义国家学说的当代实践、百年奋斗经验的深刻昭示、应对风险挑战的战略抉择。战略层面，需健全党组织领导的自治、法治、德治相结合的治理体系，以服务高质量发展为中心任务，以建设现代化人民城市为关键场域。"}, {"id": "recvfGQm4rE2KW", "title": "浦东创投集团旗下浦东AI种子基金领投裸眼3D领先解决方案商联访智能", "author": "浦东创投", "categories": ["行业观察", "本埠热点"], "article_categories": ["投资动态", "人机交互"], "cover_url": "'covers//covers/recvfGQm4rE2KW.jpg", "avatar_url": "", "date": "2026-04-03", "source": "浦东创投", "unit": "浦东创投集团", "summary": "联访智能科技（上海）有限公司宣布完成数百万元天使轮融资，由浦东创投集团旗下浦东人工智能种子基金领投。公司源自上海理工大学和上海交通大学医学院共建的医工交叉创新研究院科技成果转化，致力于推动裸眼3D显示从展示型产品向生产力工具演进。本轮资金将用于技术迭代与市场拓展，加速成为行业领先的立体视觉交互解决方案服务商。"}, {"id": "recvfHa8A0qC5G", "title": "未来产业，场景赋能创新", "author": "孙冰、孙庭阳", "categories": ["行业观察", "专家视点"], "article_categories": ["新质生产力", "未来产业"], "cover_url": "'covers//covers/recvfHa8A0qC5G.jpg", "avatar_url": "", "date": "2026-03-08", "source": "中国经济周刊", "unit": "中国经济周刊记者", "summary": "围绕“十五五”规划和政府工作报告提出的“培育壮大未来产业、鼓励央企国企开放应用场景”要求，文章聊聚场景如何赋能未来产业创新发展。场景作为连接技术与市场的关键资源，既是新技术验证的具体情境，也是开放创新生态的核心要素。文章汇集全国两会代表委员建言：浙江等地在22个领域谋划高价值场景已取得显著成效；代表建议推动形成“技术突破——场景验证——产业应用——体系升级”路径；新能源车、自动驾驶等领域的场景开放实践证明，真实应用场景是技术规模化落地的前提。文章同时指出，多地仍存在技术脱离市场、场景“专属资产化”等堆点，呼吁以开放共享的态度为未来产业提供优质成长环境。"}, {"id": "recvfHmZrt9vEI", "title": "中国为跨国公司构筑投资热土", "author": "谢希瑶、邵琨", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-21", "source": "新华社", "unit": "新华社", "summary": "商务部国际贸易经济合作研究院在第六届跨国公司领导人青岛峰会期间发布报告，从确定性、安全性、开放性、规模性、便利性、成长性、盈利性七个维度，系统阐释中国为跨国公司构筑投资热土的综合优势。报告指出，尽管受国际形势影响近两年中国吸收外资规模有所下滑，但仍居发展中国家前列。跨国公司正加速抢抓中国推动新质生产力发展机遇，在未来制造、未来健康、未来能源等前沿产业加快布局。2025年一季度，电子商务服务业实际使用外资同比翻番，生物药品制造业、航空航天器及设备制造业外资增速均超40%，外资质量和结构持续优化。报告认为，随着百年变局加速演进，中国作为全球资本避风港与增长极的双重价值日益凸显。"}, {"id": "recvfHmZZBYxct", "title": "坚定不移建设开放型世界经济（深入学习贯彻习近平新时代中国特色社会主义思想·学习《习近平经济文选》第一卷专家谈）", "author": "隆国强", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-20", "source": "人民日报", "unit": "国务院发展研究中心", "summary": "建设开放型世界经济是习近平总书记在《习近平经济文选》第一卷中多次深刻阐释的重要命题。文章系统梳理了开放型世界经济的核心内涵，阐明在单边主义、保护主义抬头的当下，经济全球化仍是不可阻挡的历史潮流，中国推动开放型世界经济建设既是自身发展的内在需要，也是负责任大国的历史担当。文章提出五项推进路径：坚持高水平对外开放、优化稳外资政策环境、完善全球经济治理体系、加快构建面向全球的高水平自由贸易区网络、高质量共建一带一路，推动硬联通与软联通相辅相成，落实全球发展倡议和联合国2030年可持续发展议程，为全球经济稳定和包容发展贡献中国方案。"}, {"id": "recvfHmZZB7Gd2", "title": "商务部：用好上海自贸区试点经验，充分发挥改革开放综合试验平台作用上海自贸区80条试点措施基本落地", "author": "张煜", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-20", "source": "解放日报", "unit": "解放日报", "summary": "商务部新闻发言人何亚东表示，上海自贸试验区自2023年开展全面对接国际高标准经贸规则试点以来，80条试点措施已基本落地，形成了一批引领性、标志性制度创新成果，为稳步扩大制度型开放提供了\"自贸方案\"。具体成效方面：货物贸易自由便利上，便利化通关模式已吸引马士基设立国际中转集拼中心，中转时间缩短50%；数字贸易规则方面，数据出境负面清单聚焦再保险、航运、商贸三个行业，推动数据便利安全跨境流动；政府采购方面，2200多个采购项目已按高标准规则要求实施，1000多个项目发布中英文公告。商务部将持续推进试点经验因地制宜复制推广，支持自贸试验区发挥改革开放综合试验平台作用，以高水平开放推动深层次改革和高质量发展。"}, {"id": "recvfHmZZBrEvz", "title": "中国特色金融发展之路的源头活水与价值启示——溯源习近平同志在福建工作期间关于金融重要论述与实践", "author": "新华社研究院", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-19", "source": "新华社研究院", "unit": "新华社研究院", "summary": "新华社研究院历时半年完成专题报告，系统溯源习近平同志在福建工作期间关于金融的重要论述与实践，阐释中国特色金融发展之路的深层逻辑与时代价值。报告认为，这条道路以习近平新时代中国特色社会主义思想为根本指引，坚持政治性与专业性有机结合、效率与公平协同推进、自主创新与开放合作统一，为全球金融发展贡献了中国智慧。福建是习近平新时代中国特色社会主义思想的重要孕育地，习近平同志在福建工作期间围绕走出符合中国国情的金融发展道路进行了一系列深入探索，构成习近平经济思想金融篇的重要源头。报告由新华社国家高端智库组织实施，汇聚来自人民银行、金融监管总局及顶级高校的专家学者，为理解中国特色金融体制改革提供了权威参考。"}, {"id": "recvfHmZZBR7gx", "title": "中国特色金融发展之路的源头活水与价値启示——満源习近平同志在福建工作期间关于金融重要论述与实践", "author": "曹筱凡、秦宏", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-19", "source": "新华社研究院", "unit": "新华社研究院", "summary": "新华社研究院历时半年完成专题报告，系统源源习近平同志在福建工作期间关于金融的重要论述与实践，阐释中国特色金融发展之路的深层逻辑与时代价値。报告从「政治性与专业性的有机结合」「效率与公平的协同推进」「自主性与开放性的动态平衡」三个维度，系统分析中国特色金融发展之路的鲜明特点。报告指出，福建是习近平新时代中国特色社会主义思想的重要孕育地和实践地，习近平同志在福建工作期间率先提出「离岸金融」、推动「活立木贷款」、治理民间「标会」等大量原创性理念和变革性实践，构成习近平经济思想金融篇的重要源头。课题组由新华社高端智库多位专家组成，历时半年调研写作完成。"}, {"id": "recvfTCcBMXeYt", "title": "", "author": "", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "", "source": "", "unit": "", "summary": ""}, {"id": "recvfTMDNaDgl1", "title": "“游戏沪十条”助力“全球电竞之都”建设", "author": "张熠", "categories": ["行业观察", "政策解读"], "article_categories": ["游戏电竞"], "cover_url": "'covers//covers/recvfTMDNaDgl1.jpg", "avatar_url": "", "date": "2026-04-05", "source": "上观新闻", "unit": "解放日报", "summary": "上海发布《上海市关于支持游戏电竞产业发展的若干举措》（\"游戏沪十条\"），聚焦四大核心方向推动游戏电竞产业高质量发展：一是强化集聚区引导，在徐汇、杨浦、静安三大核心区给予资金支持，完善全链条生态配套；二是优化资本与人才要素供给，成立首期5亿元游戏产业投资基金，推进产教融合；三是深化游戏跨界融合，支持人工智能等前沿技术在游戏研发中应用，推动游戏科技赋能医疗、教育等行业；四是搭建高能级出海服务平台，提供产品本地化、法律合规等一站式服务，推动上海成为全球游戏电竞资源战略枢纽。上海2025年网络游戏产业销售收入已达1707亿元，获批版号数量全国第一，\"游戏沪十条\"将进一步巩固其\"全球电竞之都\"的领先地位。"}, {"id": "recvfjKldbXEc8", "title": "坚持智能化绿色化融合化 驱动上海产业提质升级", "author": "汤文侃", "categories": ["行业观察", "本埠热点"], "article_categories": ["新质生产力", "绿色低碳", "具身智能", "人工智能", "文旅融合", "产业升级", "上海"], "cover_url": "'covers//covers/recvfjKldbXEc8.jpg", "avatar_url": "", "date": "2026-03-24", "source": "解放日报", "unit": "上海市经济和信息化委员会主任", "summary": "本文分析上海产业'三化'转型的必然选择、探索实践与未来路径。智能化、绿色化、融合化是巩固壮大实体经济根基、培育新质生产力、赢得未来竞争主动的关键所在。近年来上海在智能工厂培育、绿色园区创建、服务型制造发展等方面取得积极成效。未来应以'数智+绿色'优化重点产业，以'场景+应用'加快转型成势，以'链条+集群'优化转型生态，推动产业高质量发展。"}, {"id": "recvgfiJOu9ONw", "title": "上海迪士尼迎泼天流量背后，解码全球品牌与中国市场的“同频成长”", "author": "唐玮婕", "categories": ["本埠热点"], "article_categories": ["文旅融合"], "cover_url": "", "avatar_url": "", "date": "2026-04-09", "source": "上观新闻", "unit": "文汇报经济部记者", "summary": "\"原汁原味迪士尼，别具一格中国风\"已融入上海迪士尼的每一处细节。中国国际经济交流中心发布报告，深入剖析上海迪士尼度假区十年本土化运营的成长路径。报告指出，上海迪士尼把中国文化深度融入建筑设计、故事讲述、节庆活动等各个维度，本土原创IP玲娜贝儿更是现象级成功。截至2025年10月，上海迪士尼累计接待游客突破1亿人次，2024年接待游客达1470万人次，稳居全球主题乐园排行榜第五位，生动诠释全球品牌与中国市场的\"同频成长\"释放出的强劲活力。"}, {"id": "recvgfjlZjyE3e", "title": "解·析｜CDS落地上海，迈出沪港合作新一步", "author": "倪外", "categories": ["本埠热点"], "article_categories": ["人工智能"], "cover_url": "", "avatar_url": "", "date": "2026-04-09", "source": "上观新闻", "unit": "上观新闻记者", "summary": "香港大学张江基地正式启用，率先引入香港大学计算与数据科学学院（CDS），打造世界级科研与人才培养平台。CDS落地上海，展现出沪港联动为国育才、选才、用才的新气象。依托张江科学城完善的创新生态与产业配套，CDS有望在促进产学研深度融合上实现更多突破，催生起带有张江特质的硅谷式创新创业生态环境。沪港两地可以在发挥各自优势的基础上，不断提升合作强度、创新浓度和高质量发展程度，深化沪港合作，更好服务于创新型国家建设。"}, {"id": "recvgfpaSochaX", "title": "上海迪士尼成中国游客“快乐老家”", "author": "沈思怡", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-04-09", "source": "解放日报", "unit": "解放日报记者", "summary": "上海迪士尼度假区发布“原汁原味迪士尼，别具一格中国风”本土化运营成功实践研究报告，系统拆解其如何在建筑、文化、体验、产业等多个维度推进国际IP与中国本土文化的深度融合。度假区十周年正式破土动工十五年后，上海迪士尼已成为让中国游客视为“快乐老家”的标志性旅游目的地。在业界战略上，度假区拓展嫦乐地边界，开发小迪士尼等圆内特色体验项目。学界尓人指出，度假区已成为中外合资项目在设计、建筑及运营管理等方面大规模知识与技术双向交流的典范案例，开边赏饭饮、零售、交通等产业也获得长足发展，“迪士尼效应”持续外溢。"}, {"id": "recvgfsh6fZMg4", "title": "上海浦东：解锁脑机接口“全球首证”\n加速育成生物医药“热带雨林”", "author": "姜微 何欣荣", "categories": ["行业观察", "本埠热点"], "article_categories": ["人机交互"], "cover_url": "'covers//covers/recvgfsh6fZMg4.jpg", "avatar_url": "", "date": "2026-04-07", "source": "新华每日电讯", "unit": "新华每日电讯记者", "summary": "国家药品监督管理局批准博睷康医疗科技（上海）有限公司的“植入式脑机接口手部运动功能代偿系统”创新产品注册申请，实现脑机接口医疗器械全球首发上市。这张具有标志意义的“全球首证”，背后是浦东新区多年来精心耗修的生物医药“热带雨林”产业生态。浦东已底层肥沃的六大创新平台成为生物医药创新连接器，“下一个大药”的元益中心、可堆积的同类小分子药、细胞治疗工厂、阿斯利康全球级细肃疗法中心陈列陆续落地。从实验室走向临床，从“中国新”走向“全球新”，浦东正以脑机接口等未来产业为新引擎，持续锅造世界级生物医药产业集群，助力中国生物医药从“跟跑并跑”迈向“全球领跑”。"}, {"id": "recvgj8UfIMWS9", "title": "上海“人造太阳”实现千秒级长脉冲运行刷新纪录", "author": "曹博文", "categories": ["行业观察", "本埠热点"], "article_categories": ["核能制造"], "cover_url": "", "avatar_url": "", "date": "2026-04-04", "source": "新民晚报", "unit": "新民晚报记者", "summary": "上海“人造太阳”实现千秒级长脉冲运行刷新纪录 2026-04-04 作者：曹博文 2026年春，上海临港新片区传来核聚变领域的重磅突破，能量奇点能源科技（上海）有限公司自主研发的全球首台全高温超导托卡马克装置“洪荒70”，成功实现1337秒稳态长脉冲等离子体运行。” 曹博文 摄 核聚变因模仿太阳热核"}, {"id": "recvgm11mQuJCm", "title": "推动国际科技创新中心建设迈出新步伐", "author": "张骏", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-07-08", "source": "解放日报", "unit": "解放日报记者", "summary": "中共上海市第十二届委员会第七次全体会议7月7日在世博中心举行，审议通过《关于深入学习贯彻习近平总书记考察上海重要讲话精神为国担当勇为尖兵深化国际科技创新中心建设的意见》。全会要求充分发挥上海创新资源集聚优势，在制度创新方面先行先试，推动国际科技创新中心建设迈出新步伐。重点部署包括：抢占前沿领域科技制高点，加快集成电路、生物医药、人工智能三大先导产业攻坚突破；推动科技创新和产业创新深度融合，促进成果高效转化；深化教育科技人才体制机制一体改革，建设高水平人才高地；构建一流科技金融体系，打造全球领先科创园区。全会同时强调要高水平编制\"十五五\"规划，全力抓好稳就业、稳企业、稳市场、稳预期，推动\"五个中心\"建设向纵深发展。"}, {"id": "recvgm1202BUS4", "title": "数字化创新为企业松绑减负", "author": "李治国", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-07-08", "source": "中国经济网", "unit": "经济日报记者", "summary": "“检查码”的诞生，源于对监管痛点的精准施治与数字赋能的高效破解，其更深层价值在于重构监管者与被监管者的关系，铸就双向约束的“盾牌”。今年起，一项名为“检查码”的创新举措在上海涉企行政检查中全面推行，这是上海优化营商环境8.0行动方案中一项重点推广内容。通过“检查码”，多个检查任务被归并起来，大大减少了“重复查”“多头查”“随意查”现象。"}, {"id": "recvgm1202vPgB", "title": "农文旅深度融合绘新篇", "author": "王胜强", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-07-08", "source": "中国经济网", "unit": "经济日报记者", "summary": "炎炎夏日，到河北涉县旅游的游客多了起来。游客们三三两两在清漳河畔戏水游玩、到韩王九寨观云海、太行五指山空中草原露营吃火锅。“山里的云海太壮观了，让人神清气爽。”带着家人从北京到涉县自驾游的高志翔站在韩王山巅看着眼前的景象说。涉县地处太行山东麓、河北省西南部、晋冀豫三省交界处。县全域全季游，先后获“全"}, {"id": "recvgm1202fgJl", "title": "上海市“十五五”规划专家确认：轨交“外环”正在建设！上海还能比现在“大”得多", "author": "朱珉迕 胡幸阳", "categories": ["专家视点"], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-07-02", "source": "上观新闻", "unit": "解放日报记者", "summary": "上海\"十五五\"规划专家、上海交通大学安泰经济与管理学院特聘教授陆铭指出，判断上海是否\"够大\"应从都市圈视角出发：东京都市圈人口超3700万，上海都市圈潜在规模可达3100万，而目前实际人口约2500万，发展空间广阔。他认为轨交建设不应以总里程论优劣，而应比密度、比开发强度；上海正在建设轨交\"外环\"，机场联络线开通即成通勤线，印证需求旺盛。陆铭建议沿中心城区向外延伸的轨交沿线提高土地开发强度，推动人口由\"搬入\"增量转向\"吸引\"增量。在长三角一体化方面，他强调应摆脱\"分蛋糕\"思维，以沪苏同城化为突破口，通过规划对接、土地协调、基础设施联通，让要素自由流动，形成真正的\"做大蛋糕\"共同体格局。"}, {"id": "recvgm1202cfhx", "title": "以改革促消费的逻辑与路径", "author": "杨振", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-24", "source": "光明日报", "unit": "中央党校〔国家行政学院〕习近平新时代中国特色社会主义思想研究中心研究员、经济学教研部教授", "summary": "【观察与思考】 提振消费是经济实现稳中求进的重要支撑。2025年《政府工作报告》将“大力提振消费、提高投资效益，全方位扩大国内需求”列为需要着重抓好的十大方面工作之首，强调“加快补上内需特别是消费短板，使内需成为拉动经济增长的主动力和稳定锚”。随后，中共中央办公厅、国务院办公厅印发《提振消费专项行动方案》，从增加城乡居民收入、提升居民消费能力、优化居民消费环境等方面进行系统部署，将“以增收减负提升消费能力，以高质量供给创造有效需求，以优化消费环境增强消费意愿”作为解决有效需求不足问题的总方针。"}, {"id": "recvgm1202cv0Z", "title": "以改革闯新路、以开放促升级 实现“五个中心”功能新提升", "author": "干春晖", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-24", "source": "解放日报", "unit": "上海社会科学院常务副院长、上海市社联副主席，研究员", "summary": "\"五个中心\"功能新提升，关键在于以改革闯新路、以开放促升级，最大限度释放上海开放枢纽和创新策源的综合优势。文章从三个维度展开：其一，深化全球资源配置功能，推动制度型金融开放体系建设，优化企业\"走出去\"综合服务，做强全球大宗商品和人民币资产定价权；其二，激活新质生产力引擎，通过体制机制一体改革打通\"知识——技术——产业转化\"通道，培育世界一流科技企业，推动制造业智能化、数字化、绿色化重构；其三，拓展长三角协同纵深，构建跨区域创新共同体，打造世界级产业集群，推动人民城市建设迈上新台阶。上海应锚定\"当好全国改革开放排头兵、创新发展先行者\"时代坐标，在\"十五五\"规划实施期间充分激发开放与改革的叠加效应。"}, {"id": "recvgm1202Ohy6", "title": "深聚焦解难题求成效 加快建成科创高地", "author": "张勇 王果", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-24", "source": "解放日报", "unit": "张勇系上海市发展改革研究院副院长；王果系上海市发展改革研究院改革创新所所长", "summary": "加快建成具有全球影响力的科技创新高地，需在五个方面深聚焦、解难题、求成效。一是加强高风险、高价值基础研究，探索\"选人而非项目\"的科研风险分担机制，重点支持甘坐冷板凳的科研人员开展前沿探索；二是推动科技创新与产业创新深度融合，建立概念验证基金池，完善新型研发机构市场化运行管理机制；三是提升创新要素集聚能力，将\"投资于物\"与\"投资于人\"紧密结合，积极培育科技型企业家这一新型要素；四是打造开放协同的科技创新网络，立足长三角、深度融入全球创新体系，建设世界级重大科技基础设施集群；五是构筑敏捷治理的创新生态，明确新经济业态\"谁来管\"\"管什么\"\"怎么管\"，以监管沙盒等柔性工具降低治理成本。"}, {"id": "recvgm12020W9p", "title": "为科创高地建设提供人才支撑", "author": "吴毅", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-24", "source": "解放日报", "unit": "上海对外经贸大学党委副书记", "summary": "为上海加快建成具有全球影响力的科技创新高地，需在打造科技型人才和应用型人才两支队伍上重点发力。科技型人才方面，要全程贯通，夯实\"引育留用\"全链条，重视高层次人才自主培养，建立符合科研规律的长周期评价机制，鼓励科研人员潜心基础研究和原始创新；探索产学研协同培养模式，依托重大科技基础设施推动高校、科研院所与科技企业联合培育人才。应用型人才方面，要面向先进制造业、数字经济等重点产业需求，推动职业教育与本科教育融通衔接，培育具有工程实践能力的复合型人才。同时深化人才体制机制改革，探索\"赛事引才\"\"榜单引才\"等精准化引才方式，建立多元化人才评价体系，为各类人才提供良好干事创业环境。"}, {"id": "recvgm1202ezVj", "title": "弘扬“中国—中亚精神”：区域合作的成就、机遇与展望", "author": "新华社研究院", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-06-22", "source": "新华社研究院", "unit": "新华社研究院", "summary": "全文｜弘扬“中国－中亚精神”：区域合作的成就、机遇与展望 中亚，亚欧大陆的中心，与中国山水相连、唇齿相依。这里有多元的文明，不同的族群、不同的风尚相互碰撞、彼此交融，是阡陌交通的枢纽，更是人类文明的熔炉。回望历史，中国同中亚人民一道推动了丝绸之路的兴起和繁荣，共同书写了“驰命走驿，不绝于时月；商胡贩客，日款于塞下”的交往佳话。"}, {"id": "recvgmvMEfHt7m", "title": "依托优势加快打造智能经济新形态", "author": "屈庆超", "categories": ["行业观察", "专家视点"], "article_categories": ["新质生产力", "人工智能"], "cover_url": "", "avatar_url": "", "date": "2026-04-02", "source": "中国经济网", "unit": "（待查）", "summary": "当前，新一轮科技革命和产业变革加速演进，人工智能技术全面融入经济社会各领域，成为重塑全球经济结构、改变全球竞争格局的关键力量。习近平总书记强调，“要培育具有重大引领带动作用的人工智能企业和产业，构建数据驱动、人机协同、跨界融合、共创分享的智能经济形态”。今年的《政府工作报告》围绕打造智能经济新形态，作出有力部署。智能经济新形态是发展新质生产力的重要载体，是推动高质量发展的重要引擎。"}, {"id": "recvgmxtSk7opF", "title": "人工智能科技向善发展", "author": "徐胥 王一伊赵以纯", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "AI治理"], "cover_url": "", "avatar_url": "", "date": "2026-03-27", "source": "中国经济网", "unit": "经济日报记者", "summary": "随着人工智能（AI）从技术研发走向规模化应用，这一技术正深刻重塑着全球产业格局与社会生活形态。在近日举行的博鳌亚洲论坛2026年年会上，人工智能也成为最具人气和讨论度的话题之一，相关主题分论坛常常是座无虚席。当前全球人工智能发展有哪些趋势。“AI+”如何深度赋能各行各业。未来如何更好实现AI治理。政商学界嘉宾围绕这些热点话题进行深入探讨，为AI发展贡献“博鳌智慧”。"}, {"id": "recvgmy9X6VC7r", "title": "优化市场生态做强科技金融", "author": "马春阳", "categories": ["行业观察"], "article_categories": ["科技创新", "科技金融"], "cover_url": "", "avatar_url": "", "date": "2026-03-20", "source": "中国经济网", "unit": "经济日报记者", "summary": "今年的《政府工作报告》提出，拓展私募股权和创投基金退出渠道，提高直接融资、股权融资比重。业内人士指出，“十五五”时期，我国经济将加速向创新驱动转型，亟需筑牢私募股权创投行业高质量发展制度基础，更好地发挥其支持科技创新的重要作用，加速构建“投早、投小、投长期、投硬科技”的市场生态。近年来，我国私募股权创投行业发展提速，积极服务直接融资、助推实体经济发展。"}, {"id": "recvgmyIvGSILU", "title": "培育壮大未来产业", "author": "黄鑫", "categories": ["行业观察", "专家视点"], "article_categories": ["新质生产力", "未来产业"], "cover_url": "", "avatar_url": "", "date": "2026-03-19", "source": "中国经济网", "unit": "经济日报记者", "summary": "今年《政府工作报告》提出，培育壮大新兴产业和未来产业。建立未来产业投入增长和风险分担机制，培育发展未来能源、量子科技、生物制造、具身智能、脑机接口、6G等未来产业。专家表示，未来产业是关乎国家竞争力和高质量发展的必答题，具有前所未有的战略性与紧迫性。应遵循发展规律、把握历史机遇、加快多元探索，走出一条符合我国国情的未来产业培育发展之路。"}, {"id": "recvgmyNaoE6s2", "title": "畅通科创企业融资渠道", "author": "陆敏", "categories": ["行业观察"], "article_categories": ["科技创新", "科技金融"], "cover_url": "", "avatar_url": "", "date": "2026-03-18", "source": "中国经济网", "unit": "经济日报记者", "summary": "今年的《政府工作报告》明确提出，加强科技创新全链条全生命周期金融服务，对关键核心技术领域的科技型企业，常态化实施上市融资、并购重组“绿色通道”机制，以科技金融支持创新创造。业内专家认为，这一重要部署紧扣新质生产力培育与高水平科技自立自强战略目标，通过制度创新打通科技、产业、金融循环堵点，为硬科技企业突破瓶颈、关键核心技术加快攻关提供稳定高效资本支撑，对我国科技金融服务也提出了更高要求。"}, {"id": "recvgmyQZqMe9J", "title": "构建就业友好型发展方式", "author": "敖蓉", "categories": ["行业观察"], "article_categories": ["新质生产力"], "cover_url": "", "avatar_url": "", "date": "2026-03-17", "source": "中国经济网", "unit": "经济日报记者", "summary": "就业是民生之本、发展之基。党中央始终把就业工作摆在治国理政的突出位置。“十五五”规划纲要提出，要“构建就业友好型发展方式”，为就业工作指明方向。今年《政府工作报告》明确就业预期目标，对促进高质量充分就业作出系统部署。其中，构建就业友好型发展方式是重点任务之一，也是实现高质量充分就业的关键抓手。2026年我国就业形势呈现总体稳定、结构分化态势。"}, {"id": "recvgmyRLK8KYS", "title": "科技赋能 推动文旅融合创新发展", "author": "张治中", "categories": ["专家视点"], "article_categories": ["文旅融合", "消费升级"], "cover_url": "", "avatar_url": "", "date": "2026-04-02", "source": "光明日报", "unit": "南宁职业技术大学教授、广西马克思主义理论研究和建设工程基地特约研究员", "summary": "作者：张治中（南宁职业技术大学教授、广西马克思主义理论研究和建设工程基地特约研究员） 文化的生命力在于创新创造，而激发创新创造活力是深化文化体制机制改革的中心环节。当前，我国人工智能技术持续突破，不仅助力破解传统文旅发展的痛点，也为文旅产业拓展国际化路径、深化交流合作搭建了新桥梁，为新时代文旅高质量发展注入了强劲动能。我国幅员辽阔、历史悠久，拥有海量优质的文旅资源。"}, {"id": "recvgmC4mVcWXk", "title": "", "author": "", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "", "source": "", "unit": "", "summary": ""}, {"id": "recvgn1iH87DAf", "title": "", "author": "", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "", "source": "", "unit": "", "summary": ""}, {"id": "recvgoGcTfLsAo", "title": "小剧场释放大能量，暑期演出黄金档来了", "author": "诸葛漪", "categories": [], "article_categories": [], "cover_url": "", "avatar_url": "", "date": "2025-07-07", "source": "解放日报", "unit": "解放日报记者", "summary": "暑期演出黄金档来临，上海小剧场市场迎来强劲增长。以亚洲大厦、上海大世界、第一百货、世茂广场构成的\"黄金四角\"为核心，2020年至2025年5月，59个小剧场共演出23644场，观众人次149.52万，票房收入逾3.85亿元。悬疑剧、喜剧和女性题材剧最受欢迎，消费主力为20至35岁女性，今年制作成本同比上涨50%。竞争白热化推动品质升级，《流星之绊》引入空间音频技术，《孤独的美食家》开设后厨实现餐演融合，《夏洛特烦恼之逆转未来》还原校园场景强化互动体验。文旅演艺融合成趋势，古宅、书院、商场等成为演出新空间，\"黄金四角\"向外延伸，演艺大世界的进剧场选择越来越丰富，上海小剧场市场正在以内容创新和体验升级释放更大能量。"}, {"id": "recvguVwuLfixA", "title": "微公交如何可持续？上海临港这条5.5公里小环线给出了一些新思路", "author": "胡玉荣", "categories": ["本埠热点"], "article_categories": ["城市治理"], "cover_url": "", "avatar_url": "", "date": "2026-04-11", "source": "劳动报", "unit": "劳动报首席记者", "summary": "上海临港新片区首条微循环公交线DZ37线于4月10日正式投运，全长5.5公里，以\"短距离、高频次、快周转\"打通社区内部出行\"毛细血管\"。与传统的\"先画线\"不同，临港公交派出\"片区服务员\"下沉社区，通过日常聊天捕捉居民真实需求，发现八成以上出行都是短距离买菜、看病、接孩子、逛商场等。两头不靠是传统公交的痛点，居民宁愿骑共享单车也不愿等公交。临港团队反其道而行：沿居民常走路段实地踩点，把真正要去的地方串成环线，站点设在小区门口和目的地跟前，做到\"出门上车，下车就到\"。同时探索公交车延伸功能，将出行与消费、文化体验结合，让公交成为社区生活的连接器。这一模式的关键在于从\"供给导向\"转向\"需求导向\"，值得其他城市社区微公交借鉴。"}];
var EXPERT_LIST = [{"name": "吴涛", "unit": "中国浦东干部学院基层党建研究中心主任、教授", "count": 3, "arts": [{"id": "recvfy0P1C4qOU", "title": "从“心”出发 向“实”而行——正确政绩观的党性逻辑与实践向度", "author": "吴涛", "categories": ["行业观察", "专家视点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfy0P1C4qOU.jpg", "avatar_url": "", "date": "2026-03-11", "source": "北京日报", "unit": "中国浦东干部学院基层党建研究中心主任、教授", "summary": "习近平总书记强调引导党员干部树立和践行正确政绩观，创造经得起实践、人民、历史检验的实绩。文章从党性自觉、历史耐心、求是务实、科学考评四个维度系统阐述：以坚强党性为核，通过党性自觉校准政绩观坐标，以为民造福为原点，以对党忠诚为底色；以历史耐心为度，在显绩与潜绩、数量与质量的辩证统一中重塑政绩标尺；以求是务实为本，通过调查研究、攻坚克难、力戒虚功践行政绩观真谛；以科学考评为矩。"}, {"id": "recvfyckB87Vgp", "title": "“第二个结合”的学理、道理与哲理：推进马克思主义中国化时代化的内在逻辑与实践深耕", "author": "吴涛", "categories": ["专家视点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfyckB87Vgp.jpg", "avatar_url": "", "date": "2026-03-04", "source": "中国理论网", "unit": "中国浦东干部学院基层党建研究中心", "summary": "文章系统阐释第二个结合的学理依据、内在道理与深层哲理。从学理层面，第二个结合是马克思主义扎根中国文化土壤的历史必然，彰显新时代中国共产党人高度的理论原创性。从内在道理看，其核心在于守正与创新、主体性与开放性的辩证统一：以马克思主义之矢射中华优秀传统文化之的，实现创造性转化。从深层哲理论，第二个结合既是中国式现代化道路的文明根基，又为构建人类命运共同体提供价值基石。文章建议，未来研究应深化学理辨析、强化体系建构、推动实践转化，为加快构建中国哲学社会科学自主知识体系提供理论支撑。"}, {"id": "recvfydkJphS1U", "title": "把治理根基深植于人民之中：新时代党建引领基层治理的理论逻辑与实践路径", "author": "吴涛", "categories": ["行业观察", "专家视点"], "article_categories": ["政治理论"], "cover_url": "'covers//covers/recvfydkJphS1U.jpg", "avatar_url": "", "date": "2026-02-26", "source": "上观新闻", "unit": "中国浦东干部学院基层党建研究中心主任", "summary": "党的二十届四中全会将党建引领基层治理提升到战略全局高度。文章从理论逻辑、战略部署、实践路径三维度展开论述。理论层面，党建引领是马克思主义国家学说的当代实践、百年奋斗经验的深刻昭示、应对风险挑战的战略抉择。战略层面，需健全党组织领导的自治、法治、德治相结合的治理体系，以服务高质量发展为中心任务，以建设现代化人民城市为关键场域。"}], "avatar": ""}, {"name": "杨洪涛", "unit": "中国传媒大学戏剧影视学院文艺系副主任、教授、博士生导师", "count": 1, "arts": [{"id": "recveC3qpqyICx", "title": "微短剧行业要“以人民为中心”", "author": "杨洪涛", "categories": ["行业观察", "专家视点", "案例研究"], "article_categories": ["文旅融合"], "cover_url": "'covers//covers/v8_1.jpg", "avatar_url": "", "date": "2026-02-10", "source": "光明日报", "unit": "中国传媒大学戏剧影视学院文艺系副主任、教授、博士生导师", "summary": "近日，国务院办公厅印发《加快培育服务消费新增长点工作方案》，微短剧被明确纳入“激发重点领域发展活力”的相关部署。近年来，随着互联网和数智技术的发展，以微短剧等为代表的新大众文艺强势崛起。然而，作为新大众文艺中颇具影响力和代表性的微短剧，在发展中也出现了一些乱象。因此，推动微短剧行业高质量健康发展，是繁荣互联网条件下新大众文艺的必然要求。\n\n微短剧行业要把“以人民为中心”的创作导向作为行业发展的第一要务。新大众文艺最为显著的特征就是亿万普通人正以前所未有的力度、深度和广度积极参与文艺创作，人民群众人人都是创作者、传播者和评论者。外卖“诗人”用脚力丈量城市的寻常巷陌，手工匠人用眼力瞄准非遗传承，金"}], "avatar": ""}, {"name": "孙宇", "unit": "对外经济贸易大学北京对外开放研究院研究员、文学与国际传播学院讲师", "count": 1, "arts": [{"id": "recveC3qObyi2t", "title": "AI时代，数字素养教育迎来整体性革新", "author": "孙宇", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能"], "cover_url": "'covers//covers/test_new_1.jpg", "avatar_url": "", "date": "2026-02-12", "source": "光明日报", "unit": "对外经济贸易大学北京对外开放研究院研究员、文学与国际传播学院讲师", "summary": "随着数字技术加速重塑社会形态，数字素养已从个人发展的一项优势，升级为社会可持续发展的核心动力。各国纷纷将其提升至战略高度，视作教育创新与社会治理的重要支点。为应对这一趋势，经济合作与发展组织、欧盟2025年联合发布《赋能AI时代的学习者：中小学AI素养框架》草案，致力于将AI素养融入基础教育。然而，面对技术的指数级发展，传统教育体系在课程设置、教学方法和师资储备等方面都呈现出明显的适应困难，亟待探索新的应对路径。\n\n数智化浪潮越涌越猛，数字素养已是人们在数字社会里立足、发展的核心能力。2004年以色列学者阿尔卡莱首次提出数字素养的基本框架时，就赋予了其丰富的内涵，包括图像素养、再创造素养、分支"}], "avatar": ""}, {"name": "王永杰", "unit": "中共上海市委党校副校长、教授；作者吴何奇，系上海政法学院副教授", "count": 1, "arts": [{"id": "recveC3repz0VE", "title": "数智技术赋能司法公正评价体系", "author": "王永杰 吴何奇", "categories": ["行业观察", "专家视点"], "article_categories": ["人工智能", "司法公正"], "cover_url": "'covers//covers/test_new_2.jpg", "avatar_url": "", "date": "2026-02-14", "source": "光明日报", "unit": "中共上海市委党校副校长、教授；作者吴何奇，系上海政法学院副教授", "summary": "“十五五”规划建议明确指出：“规范司法权力运行，完善司法公正实现和评价机制，提高司法裁判公正性、稳定性、权威性。”通过将人工智能深度嵌入法律检索、数据校准、风险预警与公众监督环节，能够有效解决司法公正评价机制中最难做实的痛点，把抽象的公正落实到看得见的过程，把专业的公正“翻译”给大众。为司法公正评价划定统一基准线　　传统的案件质量评查模式，主要依赖人工阅卷。"}], "avatar": ""}, {"name": "姚宏志", "unit": "安徽省中国特色社会主义理论体系研究中心研究员、安徽师范大学马克思主义学院院长；作者刘东，系安徽师范大学马克思主义学院讲师", "count": 1, "arts": [{"id": "recveC3rCqjsRX", "title": "以系统思维健全网络生态治理长效机制", "author": "姚宏志 刘 东", "categories": ["专家视点"], "article_categories": ["网络治理"], "cover_url": "'covers//covers/v8_2.jpg", "avatar_url": "", "date": "2026-02-24", "source": "光明日报", "unit": "安徽省中国特色社会主义理论体系研究中心研究员、安徽师范大学马克思主义学院院长；作者刘东，系安徽师范大学马克思主义学院讲师", "summary": "本文分析：网络空间已成为人们生产生活的新场域、民众精神生活的新家园和国家治理的新疆域，网络生态治理事关国家发展和安全，事关人民群众切身利益。党的十八大以来，以习近平同志为核心的党中央把网络生态治理摆在重要位置，着力营造主旋律高扬、正能量充沛的网络空间，重拳出击整治各类网络乱象，我国网络生态明显好转，网络生态治理长效机制基本构建。"}], "avatar": ""}, {"name": "张可云", "unit": "全国经济地理研究会会长、中国人民大学应用经济学院教授", "count": 1, "arts": [{"id": "recveC3s8OeQaA", "title": "发展组团式、网络化的现代化城市群和都市圈", "author": "张可云", "categories": ["行业观察", "专家视点"], "article_categories": ["城市治理", "区域联动", "新质生产力"], "cover_url": "'covers//covers/v8_3.jpg", "avatar_url": "", "date": "2026-02-24", "source": "光明日报", "unit": "全国经济地理研究会会长、中国人民大学应用经济学院教授", "summary": "2025年7月中旬召开的中央城市工作会议，对城市工作作出全面、深远的战略部署，提出“发展组团式、网络化的现代化城市群和都市圈”，这是进一步提高城市对人口和经济社会发展的综合承载能力的重要举措。城市群是新型城镇化的主体形态，是中国式现代化的领头羊，是支撑国民经济与地方经济增长、促进区域协调发展的核心引擎，也是参与国际竞争合作的重要平台。"}], "avatar": ""}, {"name": "岳利萍", "unit": "西北大学中国西部经济发展研究院研究员；作者杨欣怡，系西北大学中国西部经济发展研究院副研究员", "count": 1, "arts": [{"id": "recveC3sxB0HJp", "title": "数智时代如何促进高水平区域联动", "author": "岳利萍、杨欣怡", "categories": ["专家视点"], "article_categories": ["区域联动", "新质生产力", "数智化"], "cover_url": "'covers//covers/v8_4.jpg", "avatar_url": "", "date": "2026-02-24", "source": "光明日报", "unit": "西北大学中国西部经济发展研究院研究员；作者杨欣怡，系西北大学中国西部经济发展研究院副研究员", "summary": "本文分析：区域协调发展是中国式现代化的内在要求。党的二十届四中全会审议通过的《中共中央关于制定国民经济和社会发展第十五个五年规划的建议》，将“促进区域联动发展”作为“优化区域经济布局，促进区域协调发展”的重要抓手，并提出“加快人工智能等数智技术创新”“全面实施‘人工智能+’行动”。伴随数智技术加速迭代与深度融合，区域间要素流动与资源配置方式正经历深刻变革，以高水平区域联动促进高质量区域协调发展……"}], "avatar": ""}, {"name": "张鹏翼", "unit": "北京大学首都高端智库研究员、北京大学信息管理系长聘副教授；作者李文琦，系北京大学信息管理系助理研究员", "count": 1, "arts": [{"id": "recveC3sVzJoaw", "title": "【光明时评】文商旅深度融合激发消费新活力", "author": "张鹏翼 李文琦", "categories": ["专家视点"], "article_categories": ["文旅融合", "消费升级", "北京"], "cover_url": "'covers//covers/recveC3sVzJoaw.jpg", "avatar_url": "", "date": "2026-02-25", "source": "光明日报", "unit": "北京大学首都高端智库研究员、北京大学信息管理系长聘副教授；作者李文琦，系北京大学信息管理系助理研究员", "summary": "文商旅深度融合正成为以高质量供给撬动内需潜力、推动消费提质扩容的重要路径。各地通过重构复合消费场景，延伸消费链条，形成\"一地生多景、一景带多业\"的协同效应，推动消费者从走马观花转向沉浸留驻。精准供给是激发文商旅活力的关键，须从资源思维转向用户思维，针对本地市民、国内游客、境外游客分别提供差异化体验，在精细化服务中释放消费潜能。数智赋能方面，各地加快推进
